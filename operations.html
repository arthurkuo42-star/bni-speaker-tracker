// ============ 組聚小表板（各組組聚次數 / 引薦單數 / 引薦金額） ============
// 時間範圍由 dashboardConfig 控制（可在小齒輪選單設定，存 JSONBin）
function computeDashboardRange(config) {
  const now = new Date();
  const mode = config?.rangeMode || "thisMonth";
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (mode === "thisMonth") {
    return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: null };
  }
  if (mode === "thisQuarter") {
    const q = Math.floor(now.getMonth() / 3);
    return { start: new Date(now.getFullYear(), q * 3, 1), end: null };
  }
  if (mode === "thisYear") {
    return { start: new Date(now.getFullYear(), 0, 1), end: null };
  }
  if (mode === "last90") {
    const s = new Date(today); s.setDate(s.getDate() - 90);
    return { start: s, end: null };
  }
  if (mode === "custom") {
    return {
      start: config.customStart ? new Date(config.customStart) : null,
      end: config.customEnd ? new Date(config.customEnd + "T23:59:59") : null,
    };
  }
  // all
  return { start: null, end: null };
}

function dashboardRangeLabel(config) {
  const map = {
    thisMonth: "本月", thisQuarter: "本季", thisYear: "本年",
    last90: "近 90 天", all: "全部", custom: "自訂",
  };
  const base = map[config?.rangeMode || "thisMonth"] || "本月";
  if (config?.rangeMode === "custom") {
    return `自訂：${config.customStart || "—"} ~ ${config.customEnd || "—"}`;
  }
  return base;
}

function GroupStatsBar({ meetings, groups, config, onConfigChange }) {
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(config || { rangeMode: "thisMonth" });
  useEffect(() => { setDraft(config || { rangeMode: "thisMonth" }); }, [config, open]);

  const stats = useMemo(() => {
    const { start, end } = computeDashboardRange(config);
    const inRange = meetings.filter(m => {
      const d = new Date(m.date);
      if (start && d < start) return false;
      if (end && d > end) return false;
      return true;
    });
    return groups.map(g => {
      const gMeetings = inRange.filter(m => m.groupId === g.id);
      const refs = gMeetings.flatMap(m => m.referrals || []);
      const refTotal = refs.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      return { group: g, meetings: gMeetings.length, refCount: refs.length, refTotal };
    });
  }, [meetings, groups, config]);

  const totalMeetings = stats.reduce((s, x) => s + x.meetings, 0);
  const totalRefCount = stats.reduce((s, x) => s + x.refCount, 0);
  const totalRefAmount = stats.reduce((s, x) => s + x.refTotal, 0);

  return (
    <div className="bg-white border border-stone-200 rounded-xl px-3 py-2 mb-3 relative">
      <div className="flex items-center gap-2 mb-1.5">
        <span className="text-xs font-semibold text-stone-700">各組表現</span>
        <span className="text-[10px] text-stone-500 bg-stone-100 rounded px-1.5 py-0.5">{dashboardRangeLabel(config)}</span>
        <span className="text-[10px] text-stone-400 ml-auto whitespace-nowrap">
          合計：組聚 {totalMeetings}　引薦 {totalRefCount} 單　NT${totalRefAmount.toLocaleString()}
        </span>
        <button onClick={() => setOpen(v => !v)}
          className="p-1 text-stone-400 hover:text-[#B8860B] rounded" title="時間範圍設定">
          <Settings className="w-3.5 h-3.5" />
        </button>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-3 gap-y-0.5 text-xs">
        {stats.map(s => (
          <div key={s.group.id} className="flex items-center gap-1.5 py-0.5">
            <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: s.group.color }} />
            <span className="font-medium text-stone-700 truncate">{s.group.name}</span>
            <span className="ml-auto text-stone-500 whitespace-nowrap tabular-nums">
              {s.meetings} 次 · {s.refCount} 單 · <b className="text-emerald-700">NT${s.refTotal.toLocaleString()}</b>
            </span>
          </div>
        ))}
      </div>
      {open && (
        <div className="absolute right-2 top-10 z-30 bg-white border border-stone-200 rounded-lg shadow-lg p-3 w-72">
          <div className="text-xs font-semibold text-stone-700 mb-2">表板時間範圍</div>
          <select value={draft.rangeMode || "thisMonth"}
            onChange={e => setDraft({ ...draft, rangeMode: e.target.value })}
            className="w-full border border-stone-300 rounded-md px-2 py-1.5 text-sm mb-2">
            <option value="thisMonth">本月</option>
            <option value="thisQuarter">本季</option>
            <option value="thisYear">本年</option>
            <option value="last90">近 90 天</option>
            <option value="all">全部</option>
            <option value="custom">自訂區間</option>
          </select>
          {draft.rangeMode === "custom" && (
            <div className="grid grid-cols-2 gap-2 mb-2">
              <div>
                <label className="text-[10px] text-stone-500">起</label>
                <input type="date" value={draft.customStart || ""}
                  onChange={e => setDraft({ ...draft, customStart: e.target.value })}
                  className="w-full border border-stone-300 rounded-md px-2 py-1 text-sm" />
              </div>
              <div>
                <label className="text-[10px] text-stone-500">迄</label>
                <input type="date" value={draft.customEnd || ""}
                  onChange={e => setDraft({ ...draft, customEnd: e.target.value })}
                  className="w-full border border-stone-300 rounded-md px-2 py-1 text-sm" />
              </div>
            </div>
          )}
          <div className="flex items-center justify-end gap-2 mt-2">
            <Btn variant="outline" size="sm" onClick={() => setOpen(false)}>取消</Btn>
            <Btn variant="primary" size="sm" onClick={() => { onConfigChange(draft); setOpen(false); }}>套用</Btn>
          </div>
        </div>
      )}
    </div>
  );
}


// ============ 導生管理員驗證 ============
function MentorshipAdminGate({ onPass }) {
  const [adminKey, setAdminKey] = useState("");
  const [verifying, setVerifying] = useState(false);
  const [error, setError] = useState("");

  // 自動嘗試用 localStorage 已存的 key 驗證
  useEffect(() => {
    const saved = (typeof localStorage !== 'undefined') ? localStorage.getItem('bni_admin_key') : null;
    if (!saved) return;
    (async () => {
      try {
        const res = await fetch(PROXY_URL + '/api/members', { headers: { 'X-Admin-Key': saved } });
        if (res.ok) onPass();
      } catch {}
    })();
  }, []);

  const verify = async () => {
    if (!adminKey) return;
    setVerifying(true); setError("");
    try {
      const res = await fetch(PROXY_URL + '/api/members', { headers: { 'X-Admin-Key': adminKey } });
      if (res.status === 401) { setError("管理員密鑰錯誤"); return; }
      if (!res.ok) { setError("連線失敗：HTTP " + res.status); return; }
      try { localStorage.setItem('bni_admin_key', adminKey); } catch {}
      onPass();
    } catch (e) { setError("連線失敗：" + e.message); }
    finally { setVerifying(false); }
  };

  return (
    <div className="max-w-md mx-auto mt-12">
      <div className="bg-white rounded-xl border border-stone-200 p-6 text-center shadow-sm">
        <div className="inline-flex items-center justify-center w-14 h-14 rounded-full mb-3" style={{ background: '#FEF3C7' }}>
          <GraduationCap className="w-7 h-7" style={{ color: '#B8860B' }} />
        </div>
        <h3 className="text-lg font-bold mb-1 text-stone-800">導生計畫 · 管理員驗證</h3>
        <div className="text-xs text-stone-500 mb-5">導生資料涉及新生隱私，僅限管理員檢視</div>
        <input
          type="password"
          value={adminKey}
          onChange={e => setAdminKey(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && verify()}
          placeholder="輸入管理員密鑰（ADMIN_KEY）"
          className="w-full px-4 py-2.5 text-sm border border-stone-300 rounded-md mb-3 text-center"
        />
        {error && <div className="text-xs text-red-600 mb-3">{error}</div>}
        <button
          onClick={verify}
          disabled={verifying || !adminKey}
          className="w-full py-2.5 text-sm text-white rounded-md font-semibold disabled:opacity-50 transition"
          style={{ background: '#8B1A1A' }}
        >
          {verifying ? "驗證中⋯" : "驗證並進入"}
        </button>
        <div className="text-xs text-stone-400 mt-4">
          管理員密鑰與主站「紅綠燈管理」共用
        </div>
      </div>
    </div>
  );
}

  const [dashboardConfig, setDashboardConfig] = useState({ rangeMode: "thisMonth" });  // 組聚表板時間範圍

  const [editingMeeting, setEditingMeeting] = useState(null);
  const [filter, setFilter] = useState({ groupId: "", onlyMine: false });
  const [adminVerified, setAdminVerified] = useState(false);   // 導生功能需要管理員驗證
  const [batchExportOpen, setBatchExportOpen] = useState(false);
  const [batchExporting, setBatchExporting] = useState(false);
  const [batchSelection, setBatchSelection] = useState(new Set());
  const [toast, setToast] = useState(null);

  const showToast = (msg, type = "ok") => {
    setToast({ msg, type, id: Date.now() });
    setTimeout(() => setToast(t => (t && t.msg === msg ? null : t)), 2000);
  };

  // 初始載入
  useEffect(() => {
    (async () => {
      // 平行載入：運營台資料 + 主檔會員 + 主站 KPI 小組 + 導生預設 + 表板設定
      const [meetingsData, mainData, menteesData, extrasData, kpiGroupsRes, defaultsData, dashCfg] = await Promise.all([
        loadState(STORAGE_KEYS.MEETINGS, null),
        loadState(STORAGE_KEYS.MEMBERS, null),
        loadState(STORAGE_KEYS.MENTEES, null),
        loadState(STORAGE_KEYS.GROUP_EXTRAS, {}),
        fetch(PROXY_URL + '/api/groups').then(r => r.ok ? r.json() : {}).catch(() => ({})),
        loadState(STORAGE_KEYS.MENTORSHIP_DEFAULTS, null),
        loadState(STORAGE_KEYS.DASHBOARD_CONFIG, { rangeMode: "thisMonth" }),
      ]);
      const liveMembers = (mainData && Array.isArray(mainData.members)) ? mainData.members : [];
      const builtGroups = buildGroupsFromKpi(kpiGroupsRes, liveMembers, extrasData);
      setGroups(builtGroups);
      setMeetings(meetingsData || []);
      setMembers(liveMembers.length ? liveMembers : SEED_MEMBERS);
      setMentees(menteesData || SEED_MENTEES);
      setMentorshipDefaults(defaultsData);  // null 表示尚未設定
      if (dashCfg && typeof dashCfg === "object") setDashboardConfig(dashCfg);
      // 主站咖啡會議（只讀，用於導生頁統計）
      const mainCms = (mainData && Array.isArray(mainData.coffeeMeetings)) ? mainData.coffeeMeetings : [];
      setMainCoffeeMeetings(mainCms);
      setCoffeeSyncingAt(new Date());
      const savedUid = (typeof localStorage !== 'undefined') ? localStorage.getItem('bni_operations_user') : null;
      setCurrentUserId(savedUid || (liveMembers[0]?.id || null));
      setLoaded(true);
    })();
  }, []);

  // 儲存分會預設（供 MentorshipView 呼叫）
  const saveMentorshipDefaults = async (newDefaults) => {
    const withTime = { ...newDefaults, updatedAt: new Date().toISOString() };
    setMentorshipDefaults(withTime);
    await saveState(STORAGE_KEYS.MENTORSHIP_DEFAULTS, withTime);
  };

  // 儲存組聚表板時間範圍設定
  const saveDashboardConfig = async (cfg) => {
    setDashboardConfig(cfg);
    try { await saveState(STORAGE_KEYS.DASHBOARD_CONFIG, cfg); } catch (e) { console.error(e); }
  };

  // 手動重新整理主站咖啡會議（導生頁用）
  const refreshMainCoffee = async () => {
    try {
      const res = await apiClient.get("bni_speaker_tracker_v5");
      if (res && res.value) {
        const parsed = typeof res.value === "string" ? JSON.parse(res.value) : res.value;
        const cms = Array.isArray(parsed?.coffeeMeetings) ? parsed.coffeeMeetings : [];
        setMainCoffeeMeetings(cms);
        setCoffeeSyncingAt(new Date());
      }
    } catch (e) {
      console.error("[refreshMainCoffee]", e);
      alert("重新整理失敗：" + e.message);
    }
  };

  // 自動儲存
  // groups 本體來自主站 KPI，只把 metadata (leaderId/color) 另存
  useEffect(() => {
    if (!loaded) return;
    const extras = {};
    groups.forEach(g => {
      if (g.leaderId || g.color) extras[g.id] = { leaderId: g.leaderId, color: g.color };
    });
    saveState(STORAGE_KEYS.GROUP_EXTRAS, extras);
  }, [groups, loaded]);
  useEffect(() => { if (loaded) saveState(STORAGE_KEYS.MEETINGS, meetings); }, [meetings, loaded]);
  // members 為唯讀，由 Speaker Tracker 主檔管理
  useEffect(() => { if (loaded) saveState(STORAGE_KEYS.MENTEES, mentees); }, [mentees, loaded]);
  useEffect(() => {
    if (!loaded) return;
    try {
      if (currentUserId) localStorage.setItem('bni_operations_user', currentUserId);
      else localStorage.removeItem('bni_operations_user');
    } catch {}
  }, [currentUserId, loaded]);

  // 會議 CRUD
  const saveMeeting = (m) => {
    const updated = { ...m, updatedAt: new Date().toISOString() };
    setMeetings(meetings.some(x => x.id === updated.id) ? meetings.map(x => x.id === updated.id ? updated : x) : [updated, ...meetings]);
    // 讓編輯頁面持續開啟，只刷新 editingMeeting 內容以便繼續編輯
    setEditingMeeting(updated);
    showToast("已儲存");
  };
  const deleteMeeting = (id) => { setMeetings(meetings.filter(m => m.id !== id)); setEditingMeeting(null); };

  // 篩選會議
  const filteredMeetings = useMemo(() => {
    return meetings
      .filter(m => !filter.groupId || m.groupId === filter.groupId)
      .filter(m => !filter.onlyMine || !currentUserId ||
        m.attendees.includes(currentUserId) || m.absentees.includes(currentUserId))
      .sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [meetings, filter, currentUserId]);

  if (!loaded) return <div className="min-h-screen flex items-center justify-center bg-stone-50 text-stone-400">載入中...</div>;
  const noMembers = members.length === 0 || (members.length === SEED_MEMBERS.length && members[0]?.id === SEED_MEMBERS[0]?.id);

  return (
    <div className="min-h-screen bg-stone-50">
      {toast && (
        <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-4 py-2 rounded-lg shadow-lg text-white text-sm font-medium animate-in fade-in"
          style={{ background: toast.type === "error" ? "#A01E2E" : "#059669" }}>
          {toast.type === "error" ? "⚠️ " : "✓ "}{toast.msg}
        </div>
      )}
      {/* 頂部 ─ 視覺與 index.html 一致 */}
      <header className="border-b-2" style={{ borderColor: '#A01E2E', background: 'white' }}>
        <div className="max-w-7xl mx-auto px-4 md:px-6 py-5 flex items-center justify-between gap-3">
          <div>
            <div className="text-[10px] tracking-[0.3em] text-stone-500 mb-1">BNI · CHAPTER ASSISTANT</div>
            <h1 className="text-xl md:text-2xl font-bold" style={{ color: '#1A1414' }}>
              富鼎分會 <span className="text-stone-400 mx-1">·</span> <span style={{ color: '#A01E2E' }}>分會助理</span>
            </h1>
          </div>
          <div className="flex items-center gap-2">
            <select value={currentUserId || ""} onChange={e => setCurrentUserId(e.target.value || null)}
              className="bg-white border border-stone-200 rounded-md px-2 py-1.5 text-xs text-stone-700">
              <option value="">（切換身份）</option>
              {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
          </div>
        </div>
        {/* Tab 列 ─ 前 4 個連回主站、後 3 個為運營台內部 */}
        <div className="max-w-7xl mx-auto px-4 md:px-6 pb-3 flex items-center gap-1 md:gap-2 flex-wrap">
          {[
            { href: "index.html?view=kpi", l: "紅綠燈", i: <Target className="w-4 h-4" />, ext: true },
            { href: "index.html?view=dashboard", l: "演講", i: <Eye className="w-4 h-4" />, ext: true },
            { href: "index.html?view=coffee", l: "咖啡", i: <Coffee className="w-4 h-4" />, ext: true },
          ].map(t => (
            <a key={t.href} href={t.href}
              className="px-2 md:px-4 py-2 text-sm rounded-md transition-all flex items-center gap-1.5 bg-stone-100 text-stone-600 hover:bg-stone-200">
              {t.i}<span className="hidden md:inline">{t.l}</span>
            </a>
          ))}
          {[
            { k: "meetings", l: "組聚", i: <FileText className="w-4 h-4" />, color: "#B8860B" },
            { k: "mentorship", l: "導生", i: <GraduationCap className="w-4 h-4" />, color: "#8B1A1A" },
          ].map(t => (
            <button key={t.k} onClick={() => { setTab(t.k); try { window.history.replaceState({}, '', '?tab=' + t.k); } catch {} }}
              className={`px-2 md:px-4 py-2 text-sm rounded-md transition-all flex items-center gap-1.5 ${tab === t.k ? "text-white" : "bg-stone-100 text-stone-600 hover:bg-stone-200"}`}
              style={tab === t.k ? { background: t.color } : {}}>
              {t.i}<span className="hidden md:inline">{t.l}</span>
            </button>
          ))}
          <a href="index.html?view=chains"
            className="px-2 md:px-4 py-2 text-sm rounded-md transition-all flex items-center gap-1.5 bg-stone-100 text-stone-600 hover:bg-stone-200">
            <Users className="w-4 h-4" /><span className="hidden md:inline">服務鏈</span>
          </a>
          <button onClick={() => { setTab("groups"); try { window.history.replaceState({}, '', '?tab=groups'); } catch {} }}
            className={`px-2 md:px-4 py-2 text-sm rounded-md transition-all flex items-center gap-1.5 ${tab === "groups" ? "text-white" : "bg-stone-100 text-stone-600 hover:bg-stone-200"}`}
            style={tab === "groups" ? { background: '#475569' } : {}}>
            <Settings className="w-4 h-4" /><span className="hidden md:inline">行政小組</span>
          </button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 md:px-6 py-5">
        {tab === "meetings" && (
          <div>
            {groups.length > 0 && (
              <GroupStatsBar meetings={meetings} groups={groups}
                config={dashboardConfig} onConfigChange={saveDashboardConfig} />
            )}
            <div className="flex items-center justify-between gap-2 mb-3 flex-wrap">
              <div className="flex items-center gap-2">
                <select value={filter.groupId} onChange={e => setFilter({ ...filter, groupId: e.target.value })}
                  className="border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white">
                  <option value="">全部小組</option>
                  {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
                {currentUserId && (
                  <label className="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer">
                    <input type="checkbox" checked={filter.onlyMine} onChange={e => setFilter({ ...filter, onlyMine: e.target.checked })} />
                    只看我參與的
                  </label>
                )}
              </div>
              <div className="flex items-center gap-2">
                {filteredMeetings.length > 0 && (
                  <Btn variant="outline" size="sm" onClick={() => {
                    setBatchSelection(new Set(filteredMeetings.map(m => m.id)));
                    setBatchExportOpen(true);
                  }}>
                    <Package className="w-4 h-4" />批次匯出 ({filteredMeetings.length})
                  </Btn>
                )}
                <Btn variant="primary" onClick={() => setEditingMeeting({})}><Plus className="w-4 h-4" />新增組聚</Btn>
              </div>
            </div>

            {filteredMeetings.length === 0 ? (
              <div className="bg-white border border-dashed border-stone-300 rounded-xl py-12 text-center text-stone-400">
                <Calendar className="w-12 h-12 mx-auto mb-2 opacity-40" />
                <p className="text-sm">{meetings.length ? "無符合條件的組聚" : "尚未建立任何組聚記錄"}</p>
              </div>
            ) : (
              <div className="grid gap-3 sm:grid-cols-2">
                {filteredMeetings.map(m => (
                  <MeetingCard key={m.id} meeting={m} group={groups.find(g => g.id === m.groupId)}
                    members={members} onEdit={setEditingMeeting} />
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "mentorship" && (
          adminVerified
            ? <MentorshipView mentees={mentees} setMentees={setMentees} members={members} currentUserId={currentUserId} isAdmin={true}
                mainCoffeeMeetings={mainCoffeeMeetings} onRefreshCoffee={refreshMainCoffee} coffeeSyncingAt={coffeeSyncingAt}
                mentorshipDefaults={mentorshipDefaults} onSaveDefaults={saveMentorshipDefaults}
                onLogout={() => { setAdminVerified(false); try { localStorage.removeItem('bni_admin_key'); } catch {} }} />
            : <MentorshipAdminGate onPass={() => setAdminVerified(true)} />
        )}
        {tab === "groups" && <GroupsView groups={groups} setGroups={setGroups} members={members} meetings={meetings} />}
      </main>

      <Modal open={!!editingMeeting} onClose={() => setEditingMeeting(null)}
        title={editingMeeting?.id ? "編輯會議記錄" : "新增會議記錄"} maxWidth="max-w-3xl">
        {editingMeeting && (
          <MeetingForm meeting={editingMeeting.id ? editingMeeting : null} groups={groups} members={members}
            mentees={mentees} setMentees={setMentees}
            onSave={saveMeeting} onCancel={() => setEditingMeeting(null)} onDelete={deleteMeeting} />
        )}
      </Modal>

      <Modal open={batchExportOpen} onClose={() => !batchExporting && setBatchExportOpen(false)}
        title="批次匯出組聚記錄" maxWidth="max-w-2xl">
        <div className="space-y-3">
          <div className="flex items-center justify-between text-sm">
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox"
                checked={batchSelection.size === filteredMeetings.length && filteredMeetings.length > 0}
                onChange={e => setBatchSelection(e.target.checked
                  ? new Set(filteredMeetings.map(m => m.id))
                  : new Set())} />
              <span className="font-semibold">全選</span>
            </label>
            <span className="text-stone-500">已勾選 {batchSelection.size} / {filteredMeetings.length}</span>
          </div>

          <div className="max-h-[40vh] overflow-y-auto border border-stone-200 rounded-lg divide-y divide-stone-100">
            {filteredMeetings.map(m => {
              const g = groups.find(x => x.id === m.groupId);
              const sp = m.speaker?.memberId ? members.find(x => x.id === m.speaker.memberId) : null;
              const checked = batchSelection.has(m.id);
              return (
                <label key={m.id}
                  className={`flex items-center gap-3 px-3 py-2 cursor-pointer ${checked ? "bg-amber-50/40" : "hover:bg-stone-50"}`}>
                  <input type="checkbox" checked={checked}
                    onChange={e => setBatchSelection(prev => {
                      const next = new Set(prev);
                      if (e.target.checked) next.add(m.id); else next.delete(m.id);
                      return next;
                    })} />
                  <div className="flex-1 min-w-0 flex items-center gap-2 flex-wrap">
                    <Tag color={g?.color || "#999"}>{g?.name || "未知小組"}</Tag>
                    <span className="text-sm font-semibold">{fmtDate(m.date)}</span>
                    {sp && <span className="text-xs text-stone-500">主講：{sp.name}</span>}
                  </div>
                </label>
              );
            })}
          </div>

          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
            💡 匯出會打包成 zip 檔，每筆一個獨立檔案。批次超過 20 筆時速度會變慢，建議先用「篩選小組」減少筆數。
          </div>

          <div className="flex items-center justify-end gap-2 pt-2 border-t border-stone-200">
            <Btn variant="ghost" size="sm"
              onClick={() => !batchExporting && setBatchExportOpen(false)}
              disabled={batchExporting}>取消</Btn>
            <Btn variant="outline" size="sm"
              disabled={batchSelection.size === 0 || batchExporting}
              onClick={async () => {
                const selected = filteredMeetings.filter(m => batchSelection.has(m.id));
                if (!selected.length) return;
                setBatchExporting(true);
                try {
                  const gMap = {};
                  groups.forEach(g => { gMap[g.id] = g; });
                  await downloadBatchZip(selected, gMap, members, "docx");
                  showToast("已匯出 " + selected.length + " 筆 Word");
                  setBatchExportOpen(false);
                } catch (e) { alert("匯出失敗：" + e.message); }
                finally { setBatchExporting(false); }
              }}>
              <FileText className="w-3.5 h-3.5" />匯出 Word (zip)
            </Btn>
            <Btn variant="primary" size="sm"
              disabled={batchSelection.size === 0 || batchExporting}
              onClick={async () => {
                const selected = filteredMeetings.filter(m => batchSelection.has(m.id));
                if (!selected.length) return;
                setBatchExporting(true);
                try {
                  const gMap = {};
                  groups.forEach(g => { gMap[g.id] = g; });
                  await downloadBatchZip(selected, gMap, members, "pdf");
                  showToast("已匯出 " + selected.length + " 筆 PDF");
                  setBatchExportOpen(false);
                } catch (e) { alert("匯出失敗：" + e.message); }
                finally { setBatchExporting(false); }
              }}>
              <FileText className="w-3.5 h-3.5" />匯出 PDF (zip)
            </Btn>
          </div>
          {batchExporting && (
            <div className="text-center text-sm text-stone-500 py-2">
              <RefreshCw className="w-4 h-4 animate-spin inline-block mr-1" />匯出中，請稍候⋯
            </div>
          )}
        </div>
      </Modal>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
