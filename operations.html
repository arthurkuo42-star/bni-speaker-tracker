// ===== Storage (Railway Proxy + JSONBin，與 Speaker Tracker 共用同一個 bin) =====
const PROXY_URL = window.BNI_PROXY_URL || '';

const apiClient = {
  async get(key) {
    try {
      const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(key));
      if (res.status === 404) return null;
      if (!res.ok) throw new Error('讀取失敗: ' + res.status);
      const json = await res.json();
      return json && json.value !== undefined ? { value: json.value } : null;
    } catch (e) {
      console.error('[apiClient.get]', key, e);
      return null;
    }
  },
  async set(key, value) {
    const tryWrite = async (pin) => fetch(PROXY_URL + '/api/data', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Write-PIN': pin || '' },
      body: JSON.stringify({ key, value: typeof value === 'string' ? value : JSON.stringify(value) })
    });
    let pin = localStorage.getItem('bni_write_pin') || '';
    let res = await tryWrite(pin);
    if (res.status === 401) {
      const newPin = prompt('第一次寫入需要輸入「寫入 PIN」（與 Speaker Tracker 共用）：');
      if (!newPin) throw new Error('已取消');
      res = await tryWrite(newPin);
      if (res.ok) { localStorage.setItem('bni_write_pin', newPin); }
      else { localStorage.removeItem('bni_write_pin'); alert('PIN 錯誤'); throw new Error('PIN 錯誤'); }
    }
    if (!res.ok) throw new Error('寫入失敗: ' + res.status);
    return { value };
  }
};

async function loadState(key, fallback) {
  if (!key) return fallback;
  try {
    const r = await apiClient.get(key);
    return r && r.value ? JSON.parse(r.value) : fallback;
  } catch (e) { console.error("[loadState]", key, e); return fallback; }
}
async function saveState(key, value) {
  if (!key) return;
  try { await apiClient.set(key, JSON.stringify(value)); }
  catch (e) { console.error("[saveState]", key, e); }
}

// ============ 導生計畫工具函式 ============
function canEditMentee(mentee, currentUserId) {
  if (!currentUserId || !mentee) return false;
  return mentee.memberId === currentUserId
    || mentee.mentorPrimaryId === currentUserId
    || mentee.mentorSecondaryId === currentUserId;
}
function canCheckOneOnOne(mentee, currentUserId, targetMemberId) {
  if (!currentUserId) return false;
  if (canEditMentee(mentee, currentUserId)) return true;
  return currentUserId === targetMemberId; // 對象本人也能勾自己這格
}
function getMenteeAllTargets(mentee) {
  // 返回一對一矩陣的所有對象（核心 8 + 導師 N），依原始順序
  const core = mentee.coreTeam.map(c => ({ ...c, group: "core" }));
  const mentors = mentee.mentorTeam.map(m => ({ ...m, group: "mentor" }));
  return [...core, ...mentors];
}
function getMenteeStats(mentee) {
  const passportDone = mentee.passport.filter(p => p.completedDate).length;
  const trainingDone = mentee.trainings.filter(t => t.completedDate).length;
  const earlyAttend = mentee.earlyAttendances.length;
  const targets = getMenteeAllTargets(mentee);
  const totalCells = targets.length * ONE_ON_ONE_TYPES.length;
  let doneCells = 0;
  targets.forEach(t => {
    const rec = mentee.oneOnOnes[t.memberId] || {};
    ONE_ON_ONE_TYPES.forEach(tp => { if (rec[tp.key]?.done) doneCells++; });
  });
  const overallPct = Math.round(
    ((passportDone / GRAD_REQS.passport) * 0.25 +
      (trainingDone / GRAD_REQS.trainings) * 0.2 +
      (Math.min(earlyAttend, GRAD_REQS.earlyAttend) / GRAD_REQS.earlyAttend) * 0.15 +
      (totalCells ? doneCells / totalCells : 0) * 0.3 +
      (mentee.guests.length >= 2 ? 1 : mentee.guests.length / 2) * 0.05 +
      (mentee.coffeeMeetings.length >= 2 ? 1 : mentee.coffeeMeetings.length / 2) * 0.05
    ) * 100
  );
  return {
    passportDone, passportTotal: GRAD_REQS.passport,
    trainingDone, trainingTotal: GRAD_REQS.trainings,
    earlyAttend, earlyAttendTotal: GRAD_REQS.earlyAttend,
    oneOnOneDone: doneCells, oneOnOneTotal: totalCells,
    guestCount: mentee.guests.length, coffeeCount: mentee.coffeeMeetings.length,
    overallPct, isGraduated: !!mentee.graduationDate,
  };
}

const fmtDateTime = (d) => new Date(d).toLocaleString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });

function Field({ label, children, required, hint }) {
  return (
    <div className="mb-4">
      <label className="block text-sm font-medium text-stone-700 mb-1.5">
        {label}{required && <span className="text-red-500 ml-0.5">*</span>}

}

function Btn({ children, variant = "primary", size = "md", className = "", ...props }) {
  const base = "inline-flex items-center justify-center gap-1.5 font-medium transition rounded-lg";
  const sizes = { sm: "px-2.5 py-1 text-xs", md: "px-3.5 py-2 text-sm", lg: "px-4 py-2.5 text-base" };
  const variants = {
    primary: "bg-[#8B1A1A] hover:bg-[#6d1414] text-white",
    gold: "bg-[#B8860B] hover:bg-[#9a7009] text-white",
    ghost: "hover:bg-stone-100 text-stone-700",
    outline: "border border-stone-300 hover:bg-stone-50 text-stone-700",
    danger: "bg-red-600 hover:bg-red-700 text-white",
    success: "bg-emerald-600 hover:bg-emerald-700 text-white",
  };
  return <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>{children}</button>;
}

function Tag({ children, color }) {
  return <span className="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium" style={{ backgroundColor: `${color}20`, color }}>{children}</span>;

    !q || m.name.includes(q) || (m.industry || "").includes(q)

  const toggle = (id) => onChange(selectedIds.includes(id) ? selectedIds.filter(x => x !== id) : [...selectedIds, id]);
  return (
    <div className="border border-stone-300 rounded-lg">
      <div className="p-2 border-b border-stone-200 flex items-center gap-2">

function MeetingForm({ meeting, groups, members, onSave, onCancel, onDelete }) {
  const [form, setForm] = useState(() => meeting || {
    id: uid("mt"), groupId: groups[0]?.id || "",
    date: new Date().toISOString().slice(0, 10), time: "19:00",
    location: "", scribe: "",
    attendees: [], absentees: [],
    discussion: "", actionItems: [],
    createdAt: new Date().toISOString(),
  });
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const group = groups.find(g => g.id === form.groupId);
  const groupMembers = useMemo(() =>
    members.filter(m => group?.memberIds?.includes(m.id)),
    [members, group]
  );

  // 選了某組，沒出席的自動算缺席；若記錄人空白，自動預填小組長
  useEffect(() => {
    if (!group) return;
    const absent = group.memberIds.filter(id => !form.attendees.includes(id));
    setForm(p => ({
      ...p,
      absentees: absent,
      scribe: p.scribe || group.leaderId || "",
    }));
  }, [form.attendees, form.groupId]);

  const addAction = () => set("actionItems", [...form.actionItems, {
    id: uid("a"), title: "", assignee: "", dueDate: "",
    status: "pending", notes: "", completedAt: null,
  }]);
  const updAction = (id, k, v) => set("actionItems", form.actionItems.map(a => a.id === id ? { ...a, [k]: v } : a));
  const rmAction = (id) => set("actionItems", form.actionItems.filter(a => a.id !== id));

  const submit = () => {
    if (!form.groupId) return alert("請選擇小組");
    if (!form.date) return alert("請輸入日期");
    onSave({ ...form, updatedAt: new Date().toISOString() });
  };

  return (
    <div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="小組" required>
          <select value={form.groupId} onChange={e => set("groupId", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">請選擇</option>
            {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
          </select>
        </Field>
        <Field label="記錄人">
          <MemberSelect members={groupMembers} value={form.scribe} onChange={v => set("scribe", v)} placeholder="（選填）" />
        </Field>
        <Field label="日期" required>
          <input type="date" value={form.date} onChange={e => set("date", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
        <Field label="時間">
          <input type="time" value={form.time || ""} onChange={e => set("time", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </div>

      <Field label="地點">
        <input value={form.location || ""} onChange={e => set("location", e.target.value)}
          placeholder="例：事務所會議室、85度C..."
          className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
      </Field>

      <Field label={`出席成員（${form.attendees.length} / ${group?.memberIds.length || 0} 人）`} required
        hint={group ? `未勾選者將自動列入缺席（${form.absentees.length} 人）` : "請先選擇小組"}>
        {group ? <MemberMultiSelect members={groupMembers} selectedIds={form.attendees} onChange={v => set("attendees", v)} /> : <div className="text-sm text-stone-400 italic">請先選擇小組</div>}
      </Field>

      <Field label="討論內容">
        <textarea value={form.discussion || ""} onChange={e => set("discussion", e.target.value)}
          rows={4} placeholder="本次聚會討論要點..."
          className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
      </Field>

      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <label className="text-sm font-medium text-stone-700">行動項目（{form.actionItems.length}）</label>
          <Btn variant="outline" size="sm" onClick={addAction}><Plus className="w-3.5 h-3.5" />新增</Btn>
        </div>
        <div className="space-y-2">
          {form.actionItems.length === 0 && <div className="text-sm text-stone-400 italic text-center py-3 border border-dashed border-stone-200 rounded-lg">尚無行動項目</div>}
          {form.actionItems.map((a, i) => (
            <div key={a.id} className="border border-stone-200 rounded-lg p-3 bg-stone-50">
              <div className="flex items-start gap-2 mb-2">
                <span className="text-xs font-semibold text-stone-400 mt-1.5">#{i + 1}</span>
                <input value={a.title} onChange={e => updAction(a.id, "title", e.target.value)}
                  placeholder="待辦事項..."

                <button onClick={() => rmAction(a.id)} className="p-1.5 text-stone-400 hover:text-red-500"><Trash2 className="w-3.5 h-3.5" /></button>
              </div>
              <div className="grid grid-cols-2 gap-2 mb-2">
                <div>
                  <label className="text-xs text-stone-500">負責人</label>

                </div>
                <div>
                  <label className="text-xs text-stone-500">到期日</label>
                  <input type="date" value={a.dueDate || ""} onChange={e => updAction(a.id, "dueDate", e.target.value)}
                    className="w-full border border-stone-300 rounded-md px-2.5 py-1.5 text-sm" />
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => updAction(a.id, "status", a.status === "done" ? "pending" : "done")

                  {a.status === "done" ? <><CheckCircle2 className="w-3 h-3 inline mr-1" />已完成</> : "待完成"}
                </button>
                <input value={a.notes || ""} onChange={e => updAction(a.id, "notes", e.target.value)}
                  placeholder="備註..." className="flex-1 border border-stone-200 rounded-md px-2 py-1 text-xs bg-white" />
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="flex items-center justify-between pt-3 border-t border-stone-200">
        <div>
          {meeting && onDelete && (
            <Btn variant="danger" size="sm" onClick={() => { if (confirm("確定刪除此會議記錄？")) onDelete(meeting.id); }}>

          <Btn variant="primary" onClick={submit}><Save className="w-4 h-4" />儲存</Btn>
        </div>
      </div>
    </div>
  );
}

function ProgressDonut({ pct, size = 48, stroke = 5, color = "#B8860B" }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} className="transform -rotate-90">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#e7e5e4" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" className="transition-all" />
    </svg>
  );
}

function StatPill({ label, done, total, color }) {
  const pct = total ? Math.round(done / total * 100) : 0;
  return (
    <div className="flex-1 min-w-0 bg-stone-50 rounded-lg px-2 py-1.5">
      <div className="text-[10px] text-stone-500">{label}</div>
      <div className="text-sm font-bold" style={{ color: color || "#292524" }}>
        {done}<span className="text-xs font-normal text-stone-400">/{total}</span>
      </div>
      <div className="h-1 bg-stone-200 rounded overflow-hidden mt-1">
        <div className="h-full rounded transition-all" style={{ width: `${pct}%`, backgroundColor: color || "#B8860B" }} />
      </div>
    </div>
  );
}

      <div className="flex items-center justify-between pt-3 border-t border-stone-200">
        <div>
          {mentees.some(x => x.id === form.id) && onDelete && (
            <Btn variant="danger" size="sm" onClick={() => { if (confirm("確定刪除此新生紀錄？所有資料將遺失")) onDelete(form.id); }}>
              <Trash2 className="w-3.5 h-3.5" />刪除
            </Btn>
          )}

        <div className="flex gap-2">

          <Btn variant="primary" onClick={submit}><Save className="w-4 h-4" />儲存</Btn>

    </div>
  );
}

function MenteeDetail({ menteeId, mentees, members, currentUserId, onUpdate, onBack, onEdit }) {
  const mentee = mentees.find(m => m.id === menteeId);
  const [sectionOpen, setSectionOpen] = useState({
    oneOnOne: true, passport: true, training: true,
    attendance: false, guests: false, coffee: false,
  });
  if (!mentee) return null;

  const getM = (id) => members.find(m => m.id === id);
  const canEdit = canEditMentee(mentee, currentUserId);
  const readOnly = !canEdit;
  const s = getMenteeStats(mentee);
  const primary = getM(mentee.mentorPrimaryId);
  const secondary = getM(mentee.mentorSecondaryId);
  const menteeMember = getM(mentee.memberId);
  const toggleSec = (k) => setSectionOpen(p => ({ ...p, [k]: !p[k] }));

  const toggleOneOnOne = (mId, targetId, typeKey) => {
    const cur = mentee.oneOnOnes[targetId]?.[typeKey];
    const newVal = cur?.done ? { done: false }
      : { done: true, doneBy: currentUserId, doneAt: new Date().toISOString() };
    const newOnes = {
      ...mentee.oneOnOnes,
      [targetId]: { ...(mentee.oneOnOnes[targetId] || {}), [typeKey]: newVal },
    };
    onUpdate({ ...mentee, oneOnOnes: newOnes });
  };

  const markGraduated = () => {
    if (mentee.graduationDate) {
      if (!confirm("取消畢業狀態？")) return;
      onUpdate({ ...mentee, graduationDate: null, graduatedTeam: "" });
    } else {
      const team = prompt("畢業後加入的領導團隊？（選填）", "導師團隊") ?? "";
      onUpdate({ ...mentee, graduationDate: new Date().toISOString().slice(0, 10), graduatedTeam: team });
    }
  };

  const Section = ({ k, title, icon, right, children }) => (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
      <button onClick={() => toggleSec(k)} className="w-full flex items-center justify-between px-4 py-3 hover:bg-stone-50">
        <div className="flex items-center gap-2">
          {icon}<span className="font-semibold text-stone-800">{title}</span>{right}
        </div>
        {sectionOpen[k] ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
      </button>
      {sectionOpen[k] && <div className="px-4 pb-4">{children}</div>}
    </div>
  );

  const mainColor = mentee.graduationDate ? "#059669" : "#B8860B";

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2 flex-wrap">
        <Btn variant="ghost" size="sm" onClick={onBack}><ArrowLeft className="w-4 h-4" />返回</Btn>
        <h2 className="text-lg font-semibold text-stone-800 flex-1 truncate">
          {menteeMember?.name} · {mentee.representativeIndustry}
        </h2>
        {canEdit ? (
          <>
            <Btn variant="outline" size="sm" onClick={() => onEdit(mentee.id)}><Edit2 className="w-3.5 h-3.5" />編輯</Btn>
            <Btn variant={mentee.graduationDate ? "outline" : "success"} size="sm" onClick={markGraduated}>
              <Award className="w-3.5 h-3.5" />{mentee.graduationDate ? "取消畢業" : "標記畢業"}
            </Btn>
          </>
        ) : <Tag color="#6b7280">唯讀</Tag>}
      </div>

      <div className="bg-gradient-to-br from-amber-50 to-white border border-amber-200 rounded-xl p-4">
        <div className="flex items-center gap-3 mb-3">
          <div className="relative flex-shrink-0">
            <ProgressDonut pct={s.overallPct} size={64} stroke={6} color={mainColor} />
            <div className="absolute inset-0 flex items-center justify-center text-base font-bold" style={{ color: mainColor }}>
              {s.overallPct}%
            </div>
          </div>
          <div className="flex-1 text-sm min-w-0">
            <div className="grid grid-cols-2 gap-y-1 gap-x-2">
              <div className="truncate"><span className="text-stone-500">宣誓：</span>{fmtDate(mentee.oathDate)}</div>
              {mentee.graduationDate && <div className="truncate"><span className="text-stone-500">結業：</span>{fmtDate(mentee.graduationDate)}</div>}
              <div className="truncate"><span className="text-stone-500">正導師：</span>{primary?.name || "—"}</div>
              <div className="truncate"><span className="text-stone-500">副導師：</span>{secondary?.name || "—"}</div>
              {mentee.graduatedTeam && <div className="col-span-2 truncate"><span className="text-stone-500">畢業加入：</span>{mentee.graduatedTeam}</div>}

          </div>
        </div>
        <div className="grid grid-cols-3 gap-1.5">

      <Section k="training" title="培訓 5 必上" icon={<BookOpen className="w-4 h-4 text-[#0369a1]" />}
        right={<Tag color="#0369a1">{s.trainingDone}/{s.trainingTotal}</Tag>}>
        <TrainingSection mentee={mentee} onUpdate={onUpdate} readOnly={readOnly} />
      </Section>

      <Section k="attendance" title="例會 6:15 出席" icon={<Clock className="w-4 h-4 text-[#7c3aed]" />}
        right={<Tag color="#7c3aed">{Math.min(s.earlyAttend, s.earlyAttendTotal)}/{s.earlyAttendTotal}</Tag>}>
        <AttendanceSection mentee={mentee} onUpdate={onUpdate} readOnly={readOnly} />
      </Section>

      <Section k="guests" title="來賓邀約" icon={<UserCheck className="w-4 h-4 text-[#059669]" />}
        right={<Tag color="#059669">{s.guestCount}</Tag>}>
        <GuestSection mentee={mentee} onUpdate={onUpdate} readOnly={readOnly} kind="guests" />
      </Section>

      <Section k="coffee" title="主邀咖啡會議" icon={<Coffee className="w-4 h-4 text-[#c2410c]" />}
        right={<Tag color="#c2410c">{s.coffeeCount}</Tag>}>
        <GuestSection mentee={mentee} onUpdate={onUpdate} readOnly={readOnly} kind="coffeeMeetings" />
      </Section>
    </div>
  );
}

function MentorshipView({ mentees, setMentees, members, currentUserId }) {
  const [detailId, setDetailId] = useState(null);
  const [editingId, setEditingId] = useState(null); // "new" | mentee.id | null
  const [filter, setFilter] = useState({ mode: "all", search: "" });

  const saveMentee = (m) => {
    const updated = { ...m, updatedAt: new Date().toISOString() };
    setMentees(mentees.some(x => x.id === m.id) ? mentees.map(x => x.id === m.id ? updated : x) : [updated, ...mentees]);
    setEditingId(null);
  };
  const deleteMentee = (id) => { setMentees(mentees.filter(m => m.id !== id)); setEditingId(null); setDetailId(null); };

  const filtered = useMemo(() => {
    let list = mentees;
    if (filter.mode === "inProgress") list = list.filter(m => !m.graduationDate);
    if (filter.mode === "graduated") list = list.filter(m => m.graduationDate);
    if (filter.mode === "mine") list = list.filter(m =>
      m.mentorPrimaryId === currentUserId || m.mentorSecondaryId === currentUserId);
    if (filter.search) {
      const q = filter.search;
      list = list.filter(m => {
        const mem = members.find(x => x.id === m.memberId);
        return (mem?.name || "").includes(q) || (m.representativeIndustry || "").includes(q);
      });
    }
    return [...list].sort((a, b) => {
      if (!!a.graduationDate !== !!b.graduationDate) return a.graduationDate ? 1 : -1;
      return new Date(b.oathDate) - new Date(a.oathDate);
    });
  }, [mentees, filter, currentUserId, members]);

  const editingMentee = editingId && editingId !== "new" ? mentees.find(m => m.id === editingId) : null;

  const formModal = (
    <Modal open={!!editingId} onClose={() => setEditingId(null)}
      title={editingMentee ? "編輯新生基本資料" : "新增新生"} maxWidth="max-w-2xl">
      {editingId && (
        <MenteeForm mentee={editingMentee} members={members} mentees={mentees}
          onSave={saveMentee} onCancel={() => setEditingId(null)} onDelete={deleteMentee} />
      )}
    </Modal>
  );

  if (detailId) {
    return (
      <div>
        <MenteeDetail menteeId={detailId} mentees={mentees} members={members} currentUserId={currentUserId}
          onUpdate={saveMentee} onBack={() => setDetailId(null)} onEdit={(id) => setEditingId(id)} />
        {formModal}
      </div>
    );
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-3 gap-2 flex-wrap">
        <h2 className="text-lg font-semibold text-stone-800">導生計畫</h2>
        <Btn variant="primary" onClick={() => setEditingId("new")}><Plus className="w-4 h-4" />新增新生</Btn>
      </div>
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <select value={filter.mode} onChange={e => setFilter({ ...filter, mode: e.target.value })}
          className="border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white">
          <option value="all">全部新生</option>
          <option value="inProgress">進行中</option>
          <option value="graduated">已畢業</option>
          {currentUserId && <option value="mine">我是導師的</option>}
        </select>
        <input type="search" value={filter.search} onChange={e => setFilter({ ...filter, search: e.target.value })}
          placeholder="搜尋姓名 / 行業..."
          className="flex-1 min-w-[140px] border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white" />
      </div>
      {filtered.length === 0 ? (
        <div className="bg-white border border-dashed border-stone-300 rounded-xl py-12 text-center text-stone-400">
          <GraduationCap className="w-12 h-12 mx-auto mb-2 opacity-40" />
          <p className="text-sm">{mentees.length ? "無符合條件的新生" : "尚未建立任何新生紀錄"}</p>
        </div>
      ) : (
        <div className="grid gap-3 sm:grid-cols-2">
          {filtered.map(m => <MenteeCard key={m.id} mentee={m} members={members} onOpen={setDetailId} />)}
        </div>
      )}
      {formModal}
    </div>
  );
}

// ============ 儀表板 ============
function Dashboard({ meetings, groups, members, mentees = [], currentUserId }) {
  const stats = useMemo(() => {
    const now = new Date();
    const monthAgo = new Date(now); monthAgo.setDate(now.getDate() - 30);

    const recentMeetings = meetings.filter(m => new Date(m.date) >= monthAgo);
    const allActions = meetings.flatMap(m => m.actionItems.map(a => ({ ...a, meetingId: m.id, groupId: m.groupId })));
    const pending = allActions.filter(a => a.status === "pending");
    const done = allActions.filter(a => a.status === "done");
    const overdue = pending.filter(isOverdue);
    const completionRate = allActions.length ? (done.length / allActions.length * 100).toFixed(0) : 0;

    const byGroup = groups.map(g => {
      const gMeetings = meetings.filter(m => m.groupId === g.id);
      const totalAttend = gMeetings.reduce((s, m) => s + m.attendees.length, 0);
      const totalSlots = gMeetings.length * g.memberIds.length;
      const attendRate = totalSlots ? (totalAttend / totalSlots * 100).toFixed(0) : 0;

      const gActions = gMeetings.flatMap(m => m.actionItems);
      const gDone = gActions.filter(a => a.status === "done").length;
      const gCompletion = gActions.length ? (gDone / gActions.length * 100).toFixed(0) : 0;

      return {
        group: g, meetings: gMeetings.length,
        attendRate: Number(attendRate), completionRate: Number(gCompletion),
        pendingCount: gActions.filter(a => a.status === "pending").length,
        overdueCount: gActions.filter(a => isOverdue(a)).length,
      };
    });

    // 個人
    let personal = null;
    if (currentUserId) {
      const my = meetings.filter(m => m.attendees.includes(currentUserId) || m.absentees.includes(currentUserId));
      const attended = my.filter(m => m.attendees.includes(currentUserId));
      const myActions = allActions.filter(a => a.assignee === currentUserId);
      personal = {
        totalMeetings: my.length,
        attended: attended.length,
        attendRate: my.length ? (attended.length / my.length * 100).toFixed(0) : 0,
        myActions, myPending: myActions.filter(a => a.status === "pending"),
        myOverdue: myActions.filter(a => isOverdue(a)),
        myDone: myActions.filter(a => a.status === "done"),
      };
    }

    return { recentCount: recentMeetings.length, pending, done, overdue, allActions, completionRate, byGroup, personal };
  }, [meetings, groups, currentUserId]);

  const mentorStats = useMemo(() => {
    const inProgress = mentees.filter(m => !m.graduationDate);
    const graduated = mentees.filter(m => m.graduationDate);
    const avgProgress = inProgress.length
      ? Math.round(inProgress.reduce((s, m) => s + getMenteeStats(m).overallPct, 0) / inProgress.length)
      : 0;
    const myMentees = currentUserId
      ? mentees.filter(m => m.mentorPrimaryId === currentUserId || m.mentorSecondaryId === currentUserId)
      : [];
    const needsOneOnOne = currentUserId
      ? mentees.filter(m => !m.graduationDate).flatMap(m => {
          const targets = getMenteeAllTargets(m);
          if (!targets.find(t => t.memberId === currentUserId)) return [];
          const rec = m.oneOnOnes[currentUserId] || {};
          const incomplete = ONE_ON_ONE_TYPES.filter(t => !rec[t.key]?.done);
          return incomplete.length ? [{ mentee: m, types: incomplete }] : [];
        })
      : [];
    return {
      total: mentees.length,
      inProgress: inProgress.length,
      graduated: graduated.length,
      avgProgress, myMentees, needsOneOnOne,
    };
  }, [mentees, currentUserId]);

  return (
    <div className="space-y-5">
      <h2 className="text-lg font-semibold text-stone-800">統計儀表板</h2>

      {/* 全分會 KPI */}
      <div>
        <h3 className="text-sm font-semibold text-stone-600 mb-2">全分會概況</h3>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <div className="bg-white border border-stone-200 rounded-xl p-3">
            <div className="flex items-center justify-between text-stone-400 mb-1">
              <span className="text-xs">近 30 天會議</span><Calendar className="w-4 h-4" />
            </div>
            <div className="text-2xl font-bold text-stone-800">{stats.recentCount}</div>
          </div>
          <div className="bg-white border border-stone-200 rounded-xl p-3">
            <div className="flex items-center justify-between text-stone-400 mb-1">
              <span className="text-xs">待辦總數</span><Target className="w-4 h-4" />
            </div>
            <div className="text-2xl font-bold text-amber-700">{stats.pending.length}</div>
          </div>
          <div className="bg-white border border-stone-200 rounded-xl p-3">
            <div className="flex items-center justify-between text-stone-400 mb-1">
              <span className="text-xs">已逾期</span><AlertCircle className="w-4 h-4" />
            </div>
            <div className={`text-2xl font-bold ${stats.overdue.length ? "text-red-600" : "text-stone-800"}`}>{stats.overdue.length}</div>
          </div>
          <div className="bg-white border border-stone-200 rounded-xl p-3">
            <div className="flex items-center justify-between text-stone-400 mb-1">
              <span className="text-xs">完成率</span><TrendingUp className="w-4 h-4" />
            </div>
            <div className="text-2xl font-bold text-emerald-700">{stats.completionRate}%</div>
          </div>
        </div>
      </div>

      {/* 個人視角 */}
      {stats.personal && (
        <div>
          <h3 className="text-sm font-semibold text-stone-600 mb-2 flex items-center gap-1">
            <User className="w-4 h-4" />我的進度（{members.find(m => m.id === currentUserId)?.name}）
          </h3>
          <div className="bg-gradient-to-br from-amber-50 to-white border border-amber-200 rounded-xl p-4">
            <div className="grid grid-cols-4 gap-3 mb-4 text-center">
              <div>
                <div className="text-xs text-stone-500">出席率</div>
                <div className="text-xl font-bold text-emerald-700">{stats.personal.attendRate}%</div>
                <div className="text-[10px] text-stone-400">{stats.personal.attended}/{stats.personal.totalMeetings}</div>
              </div>
              <div>
                <div className="text-xs text-stone-500">待辦</div>
                <div className="text-xl font-bold text-amber-700">{stats.personal.myPending.length}</div>
              </div>
              <div>
                <div className="text-xs text-stone-500">逾期</div>
                <div className={`text-xl font-bold ${stats.personal.myOverdue.length ? "text-red-600" : "text-stone-500"}`}>{stats.personal.myOverdue.length}</div>
              </div>
              <div>
                <div className="text-xs text-stone-500">已完成</div>
                <div className="text-xl font-bold text-emerald-700">{stats.personal.myDone.length}</div>
              </div>
            </div>
            {stats.personal.myPending.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-600 mb-1.5">我的待辦清單</div>
                <div className="space-y-1">
                  {stats.personal.myPending.slice(0, 5).map(a => (
                    <div key={a.id} className="flex items-center justify-between text-sm bg-white rounded-md px-2.5 py-1.5">
                      <span className="flex-1 truncate">{a.title}</span>
                      {a.dueDate && <span className={`text-xs ml-2 ${isOverdue(a) ? "text-red-600 font-semibold" : "text-stone-500"}`}>{fmtDate(a.dueDate)}</span>}
                    </div>
                  ))}
                  {stats.personal.myPending.length > 5 && <div className="text-xs text-stone-400 text-center">還有 {stats.personal.myPending.length - 5} 項...</div>}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* 各組統計 */}
      <div>
        <h3 className="text-sm font-semibold text-stone-600 mb-2">各小組表現</h3>
        <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
          <div className="grid grid-cols-12 text-xs font-semibold text-stone-500 px-4 py-2 bg-stone-50 border-b border-stone-200">
            <div className="col-span-3">小組</div>
            <div className="col-span-2 text-center">組聚</div>
            <div className="col-span-3">出席率</div>
            <div className="col-span-3">完成率</div>

          {stats.byGroup.map(s => (
            <div key={s.group.id} className="grid grid-cols-12 items-center px-4 py-3 border-b border-stone-100 last:border-0 text-sm">
              <div className="col-span-3 flex items-center gap-1.5">
                <div className="w-2 h-2 rounded-full" style={{ backgroundColor: s.group.color }} />

              <div className="col-span-3">
                <div className="flex items-center gap-2">
                  <div className="flex-1 h-1.5 bg-stone-100 rounded-full overflow-hidden">
                    <div className="h-full bg-emerald-500 rounded-full transition-all" style={{ width: `${s.attendRate}%` }} />
                  </div>
                  <span className="text-xs font-semibold text-stone-600 w-8 text-right">{s.attendRate}%</span>
                </div>
              </div>
              <div className="col-span-3">
                <div className="flex items-center gap-2">
                  <div className="flex-1 h-1.5 bg-stone-100 rounded-full overflow-hidden">
                    <div className="h-full bg-[#B8860B] rounded-full transition-all" style={{ width: `${s.completionRate}%` }} />
                  </div>
                  <span className="text-xs font-semibold text-stone-600 w-8 text-right">{s.completionRate}%</span>
                </div>
              </div>
              <div className={`col-span-1 text-right font-semibold ${s.overdueCount ? "text-red-600" : "text-stone-400"}`}>{s.overdueCount}</div>
            </div>
          ))}
        </div>
      </div>

      {/* 導師視角：我是導師的新生 */}
      {mentorStats.myMentees.length > 0 && (
        <div>
          <h3 className="text-sm font-semibold text-stone-700 mb-2 flex items-center gap-1.5">
            <GraduationCap className="w-4 h-4 text-[#B8860B]" />
            我是導師的新生（{mentorStats.myMentees.length}）
          </h3>
          <div className="grid gap-2 sm:grid-cols-2">
            {mentorStats.myMentees.map(m => {
              const s = getMenteeStats(m);
              const member = members.find(x => x.id === m.memberId);
              const color = s.isGraduated ? "#059669" : "#B8860B";
              return (
                <div key={m.id} className="bg-white border border-stone-200 rounded-xl p-3 flex items-center gap-3">
                  <div className="relative flex-shrink-0">
                    <ProgressDonut pct={s.overallPct} size={44} stroke={4} color={color} />
                    <div className="absolute inset-0 flex items-center justify-center text-[10px] font-bold" style={{ color }}>{s.overallPct}%</div>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-stone-800 truncate">
                      {member?.name} {s.isGraduated && <span className="text-xs text-emerald-600">🎓</span>}
                    </div>
                    <div className="text-[11px] text-stone-500 truncate">{m.representativeIndustry}</div>
                    <div className="text-[11px] text-stone-400 mt-0.5">
                      護照 {s.passportDone}/{s.passportTotal} · 培訓 {s.trainingDone}/{s.trainingTotal} · 6:15 {Math.min(s.earlyAttend, s.earlyAttendTotal)}/{s.earlyAttendTotal}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 我的一對一待跑 */}
      {mentorStats.needsOneOnOne.length > 0 && (
        <div className="bg-pink-50 border border-pink-200 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-pink-800 mb-2 flex items-center gap-1.5">
            <Users className="w-4 h-4" />
            我的一對一待跑（{mentorStats.needsOneOnOne.reduce((s, x) => s + x.types.length, 0)} 項）
          </h3>
          <div className="space-y-2">
            {mentorStats.needsOneOnOne.map(({ mentee, types }) => {
              const member = members.find(x => x.id === mentee.memberId);
              return (
                <div key={mentee.id} className="bg-white rounded-lg px-3 py-2 flex items-start gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-stone-800">{member?.name}</div>
                    <div className="flex flex-wrap gap-1 mt-1">
                      {types.map(t => (
                        <span key={t.key} className="text-[10px] bg-pink-100 text-pink-700 px-1.5 py-0.5 rounded">{t.short}</span>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* 分會導生概況 */}
      {mentees.length > 0 && (
        <div>
          <h3 className="text-sm font-semibold text-stone-700 mb-2 flex items-center gap-1.5">
            <Award className="w-4 h-4 text-[#B8860B]" />
            分會導生概況
          </h3>
          <div className="grid grid-cols-4 gap-2">
            <div className="bg-white border border-stone-200 rounded-xl p-3 text-center">
              <div className="text-xs text-stone-500">總新生</div>
              <div className="text-xl font-bold text-stone-800 mt-1">{mentorStats.total}</div>
            </div>
            <div className="bg-white border border-stone-200 rounded-xl p-3 text-center">
              <div className="text-xs text-stone-500">進行中</div>
              <div className="text-xl font-bold text-[#B8860B] mt-1">{mentorStats.inProgress}</div>
            </div>
            <div className="bg-white border border-stone-200 rounded-xl p-3 text-center">
              <div className="text-xs text-stone-500">已畢業</div>
              <div className="text-xl font-bold text-emerald-600 mt-1">{mentorStats.graduated}</div>
            </div>
            <div className="bg-white border border-stone-200 rounded-xl p-3 text-center">
              <div className="text-xs text-stone-500">平均進度</div>
              <div className="text-xl font-bold text-[#8B1A1A] mt-1">{mentorStats.avgProgress}%</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============ 主 App ============
function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("meetings");
  const [groups, setGroups] = useState([]);
  const [meetings, setMeetings] = useState([]);
  const [members, setMembers] = useState([]);
  const [mentees, setMentees] = useState([]);
  const [currentUserId, setCurrentUserId] = useState(null);

  const [editingMeeting, setEditingMeeting] = useState(null);
  const [filter, setFilter] = useState({ groupId: "", onlyMine: false });

  // 初始載入
  useEffect(() => {
    (async () => {
      const [g, m, mainData, mte] = await Promise.all([
        loadState(STORAGE_KEYS.GROUPS, null),
        loadState(STORAGE_KEYS.MEETINGS, null),
        loadState(STORAGE_KEYS.MEMBERS, null),  // bni_speaker_tracker_v5 主檔
        loadState(STORAGE_KEYS.MENTEES, null),
      ]);
      const liveMembers = (mainData && Array.isArray(mainData.members)) ? mainData.members : [];
      setGroups(g || SEED_GROUPS);
      setMeetings(m || SEED_MEETINGS);
      setMembers(liveMembers.length ? liveMembers : SEED_MEMBERS);
      setMentees(mte || SEED_MENTEES);
      const savedUid = (typeof localStorage !== 'undefined') ? localStorage.getItem('bni_operations_user') : null;
      setCurrentUserId(savedUid || (liveMembers[0]?.id || null));
      setLoaded(true);
    })();
  }, []);

  // 自動儲存
  useEffect(() => { if (loaded) saveState(STORAGE_KEYS.GROUPS, groups); }, [groups, loaded]);
  useEffect(() => { if (loaded) saveState(STORAGE_KEYS.MEETINGS, meetings); }, [meetings, loaded]);
  // members 為唯讀，由 Speaker Tracker 主檔管理
  useEffect(() => { if (loaded) saveState(STORAGE_KEYS.MENTEES, mentees); }, [mentees, loaded]);
  useEffect(() => {
    if (!loaded) return;
    try {
      if (currentUserId) localStorage.setItem('bni_operations_user', currentUserId);
      else localStorage.removeItem('bni_operations_user');
    } catch {}
  }, [currentUserId, loaded]);

  // 會議 CRUD
  const saveMeeting = (m) => {
    setMeetings(meetings.some(x => x.id === m.id) ? meetings.map(x => x.id === m.id ? m : x) : [m, ...meetings]);
    setEditingMeeting(null);
  };
  const deleteMeeting = (id) => { setMeetings(meetings.filter(m => m.id !== id)); setEditingMeeting(null); };
  const toggleAction = (meetingId, actionId) => {
    setMeetings(meetings.map(m => m.id !== meetingId ? m : {
      ...m,
      actionItems: m.actionItems.map(a => a.id !== actionId ? a : {
        ...a,
        status: a.status === "done" ? "pending" : "done",
        completedAt: a.status === "done" ? null : new Date().toISOString(),
      }),
    }));
  };

  // 篩選會議
  const filteredMeetings = useMemo(() => {
    return meetings
      .filter(m => !filter.groupId || m.groupId === filter.groupId)
      .filter(m => !filter.onlyMine || !currentUserId ||
        m.attendees.includes(currentUserId) || m.absentees.includes(currentUserId) ||
        m.actionItems.some(a => a.assignee === currentUserId))
      .sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [meetings, filter, currentUserId]);

  if (!loaded) return <div className="min-h-screen flex items-center justify-center bg-stone-50 text-stone-400">載入中...</div>;
  const noMembers = members.length === 0 || (members.length === SEED_MEMBERS.length && members[0]?.id === SEED_MEMBERS[0]?.id);

  return (
    <div className="min-h-screen bg-stone-50">
      {/* 頂部 */}
      <header className="bg-gradient-to-r from-[#8B1A1A] to-[#6d1414] text-white sticky top-0 z-30 shadow">
        <div className="max-w-5xl mx-auto px-4 py-3">
          <div className="flex items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <Sparkles className="w-6 h-6 text-[#B8860B]" />
              <div>
                <h1 className="text-lg font-bold leading-tight">BNI 富鼎分會 · 運營台</h1>
                <p className="text-[11px] text-white/70">組聚 · 導生 · 演講追蹤</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <a href="index.html" className="text-xs text-white/80 hover:text-white border border-white/20 rounded-lg px-2 py-1 hidden sm:inline">← 主站</a>
              <select value={currentUserId || ""} onChange={e => setCurrentUserId(e.target.value || null)}
                className="bg-white/10 border border-white/20 rounded-lg px-2 py-1 text-xs text-white">
                <option value="">（切換身份）</option>
                {members.map(m => <option key={m.id} value={m.id} className="text-stone-800">{m.name}</option>)}
              </select>
            </div>
          </div>
        </div>
        <div className="max-w-5xl mx-auto px-2 flex overflow-x-auto">
          {[
            { k: "meetings", l: "組聚", i: <FileText className="w-4 h-4" /> },
            { k: "mentorship", l: "導生", i: <GraduationCap className="w-4 h-4" /> },
            { k: "dashboard", l: "儀表板", i: <BarChart3 className="w-4 h-4" /> },
            { k: "groups", l: "小組", i: <Users className="w-4 h-4" /> },
          ].map(t => (
            <button key={t.k} onClick={() => setTab(t.k)}
              className={`flex items-center gap-1.5 px-3 py-2.5 text-sm border-b-2 transition whitespace-nowrap ${tab === t.k ? "border-[#B8860B] text-white font-semibold" : "border-transparent text-white/70 hover:text-white"}`}>
              {t.i}{t.l}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-5">
        {tab === "meetings" && (
          <div>
            <div className="flex items-center justify-between gap-2 mb-3 flex-wrap">
              <div className="flex items-center gap-2">
                <select value={filter.groupId} onChange={e => setFilter({ ...filter, groupId: e.target.value })}
                  className="border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white">
                  <option value="">全部小組</option>
                  {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
                {currentUserId && (
                  <label className="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer">
                    <input type="checkbox" checked={filter.onlyMine} onChange={e => setFilter({ ...filter, onlyMine: e.target.checked })} />
                    只看我參與的
                  </label>
                )}
              </div>
              <Btn variant="primary" onClick={() => setEditingMeeting({})}><Plus className="w-4 h-4" />新增組聚</Btn>
            </div>

            {filteredMeetings.length === 0 ? (
              <div className="bg-white border border-dashed border-stone-300 rounded-xl py-12 text-center text-stone-400">
                <Calendar className="w-12 h-12 mx-auto mb-2 opacity-40" />
                <p className="text-sm">{meetings.length ? "無符合條件的組聚" : "尚未建立任何組聚記錄"}</p>
              </div>
            ) : (
              <div className="grid gap-3 sm:grid-cols-2">
                {filteredMeetings.map(m => (
                  <MeetingCard key={m.id} meeting={m} group={groups.find(g => g.id === m.groupId)}
                    members={members} onEdit={setEditingMeeting} onToggleAction={toggleAction} />
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "mentorship" && <MentorshipView mentees={mentees} setMentees={setMentees} members={members} currentUserId={currentUserId} />}
        {tab === "dashboard" && <Dashboard meetings={meetings} groups={groups} members={members} mentees={mentees} currentUserId={currentUserId} />}
        {tab === "groups" && <GroupsView groups={groups} setGroups={setGroups} members={members} meetings={meetings} />}
      </main>

      <Modal open={!!editingMeeting} onClose={() => setEditingMeeting(null)}
        title={editingMeeting?.id ? "編輯會議記錄" : "新增會議記錄"} maxWidth="max-w-3xl">
        {editingMeeting && (
          <MeetingForm meeting={editingMeeting.id ? editingMeeting : null} groups={groups} members={members}
            onSave={saveMeeting} onCancel={() => setEditingMeeting(null)} onDelete={deleteMeeting} />
        )}
      </Modal>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
