// ===== 按需動態載入 script（匯出功能才會用到的大庫 —— docx ~700KB, html2pdf ~650KB, jszip ~100KB, file-saver ~5KB）=====
const _loadedScripts = {};
function loadScript(url) {
  if (_loadedScripts[url]) return _loadedScripts[url];
  _loadedScripts[url] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => {
      delete _loadedScripts[url];
      reject(new Error('載入失敗：' + url));
    };
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}
async function ensureDocxLibs() {
  const tasks = [];
  if (!window.docx) tasks.push(loadScript('https://unpkg.com/docx@8.5.0/build/index.umd.js'));
  if (!window.JSZip) tasks.push(loadScript('https://unpkg.com/jszip@3.10.1/dist/jszip.min.js'));
  if (!window.saveAs) tasks.push(loadScript('https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js'));
  if (tasks.length) await Promise.all(tasks);
}
async function ensurePdfLibs() {
  const tasks = [];
  if (!window.html2pdf) tasks.push(loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js'));
  if (!window.saveAs) tasks.push(loadScript('https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js'));
  if (tasks.length) await Promise.all(tasks);
}

// ===== Storage (Railway Proxy + JSONBin，與 Speaker Tracker 共用同一個 bin) =====
const PROXY_URL = window.BNI_PROXY_URL || '';

// SWR（Stale-While-Revalidate）快取（與 index.src.html 同一套，共用 localStorage）
const SWR_PREFIX = 'swr_cache_v1:';
function swrRead(key) {
  try {
    const raw = localStorage.getItem(SWR_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}
function swrWrite(key, value) {
  try {
    localStorage.setItem(SWR_PREFIX + key, JSON.stringify(value));
  } catch {}
}
function swrDelete(key) {
  try {
    localStorage.removeItem(SWR_PREFIX + key);
  } catch {}
}
// SWR 版的原始 fetch：給 /api/groups 這類不走 apiClient 的端點用
async function swrFetchRaw(url, onFresh) {
  const cacheKey = 'raw:' + url;
  const cached = swrRead(cacheKey);
  const fetchIt = async () => {
    try {
      const r = await fetch(url);
      if (!r.ok) return null;
      const data = await r.json();
      swrWrite(cacheKey, data);
      return data;
    } catch {
      return null;
    }
  };
  if (cached) {
    (async () => {
      const fresh = await fetchIt();
      if (fresh && onFresh) {
        try {
          if (JSON.stringify(fresh) !== JSON.stringify(cached)) onFresh(fresh);
        } catch {}
      }
    })();
    return cached;
  }
  return (await fetchIt()) || {};
}
const apiClient = {
  // 第二參數 onFresh：背景拿到新版時的 callback（可選）
  async get(key, onFresh) {
    const cached = swrRead(key);
    const fetchFresh = async () => {
      try {
        const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(key));
        if (res.status === 404) {
          swrDelete(key);
          return null;
        }
        if (!res.ok) throw new Error('讀取失敗: ' + res.status);
        const json = await res.json();
        const result = json && json.value !== undefined ? {
          value: json.value
        } : null;
        if (result) swrWrite(key, result);
        return result;
      } catch (e) {
        console.error('[apiClient.get]', key, e);
        return null;
      }
    };
    if (cached) {
      (async () => {
        const fresh = await fetchFresh();
        if (fresh && onFresh) {
          try {
            if (JSON.stringify(fresh) !== JSON.stringify(cached)) onFresh(fresh);
          } catch {}
        }
      })();
      return cached;
    }
    return await fetchFresh();
  },
  async set(key, value) {
    const payload = typeof value === 'string' ? value : JSON.stringify(value);
    const tryWrite = async pin => fetch(PROXY_URL + '/api/data', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Write-PIN': pin || ''
      },
      body: JSON.stringify({
        key,
        value: payload
      })
    });
    let pin = localStorage.getItem('bni_write_pin') || '';
    let res = await tryWrite(pin);
    if (res.status === 401) {
      const newPin = prompt('第一次寫入需要輸入「寫入 PIN」（與 Speaker Tracker 共用）：');
      if (!newPin) throw new Error('已取消');
      res = await tryWrite(newPin);
      if (res.ok) {
        localStorage.setItem('bni_write_pin', newPin);
      } else {
        localStorage.removeItem('bni_write_pin');
        alert('PIN 錯誤');
        throw new Error('PIN 錯誤');
      }
    }
    if (!res.ok) throw new Error('寫入失敗: ' + res.status);
    // 寫入成功後立刻更新 SWR 快取
    swrWrite(key, {
      value: payload
    });
    return {
      value
    };
  }
};

// ============ 主站咖啡會議同步（安全寫入 bni_speaker_tracker_v5）============
// 只動 coffeeMeetings 欄位，其他主檔資料原封不動
// updateFn: (currentCoffeeMeetings) => newCoffeeMeetings
async function syncMainCoffeeMeetings(updateFn) {
  console.log("[syncMainCoffeeMeetings] 開始，讀取主站資料...");
  // 1. 先讀最新主站資料
  const res = await apiClient.get("bni_speaker_tracker_v5");
  console.log("[syncMainCoffeeMeetings] 讀到 res:", res ? `有（value 長度 ${res.value?.length ?? 'N/A'}）` : "null");
  if (!res || !res.value) {
    throw new Error("無法讀取主站資料（回傳空）");
  }
  let mainData;
  try {
    // 相容兩種：value 是字串（已 stringify）或已是物件
    mainData = typeof res.value === "string" ? JSON.parse(res.value) : res.value;
  } catch (e) {
    console.error("[syncMainCoffeeMeetings] 解析失敗:", e, "前 200 字元:", String(res.value).slice(0, 200));
    throw new Error("主站資料解析失敗: " + e.message);
  }
  if (!mainData || typeof mainData !== "object") throw new Error("主站資料格式錯誤（非物件）");

  // 2. 套用更新（僅 coffeeMeetings 欄位）
  const current = Array.isArray(mainData.coffeeMeetings) ? mainData.coffeeMeetings : [];
  console.log("[syncMainCoffeeMeetings] 主站原有 coffeeMeetings 筆數:", current.length);
  const updated = updateFn(current);
  if (!Array.isArray(updated)) throw new Error("updateFn 必須回傳陣列");
  console.log("[syncMainCoffeeMeetings] 更新後 coffeeMeetings 筆數:", updated.length);

  // 3. 寫回（其他欄位保持原樣）
  const newMain = {
    ...mainData,
    coffeeMeetings: updated,
    updatedAt: new Date().toISOString()
  };
  console.log("[syncMainCoffeeMeetings] 寫回 bni_speaker_tracker_v5...");
  await apiClient.set("bni_speaker_tracker_v5", JSON.stringify(newMain));
  console.log("[syncMainCoffeeMeetings] ✓ 寫回完成");
}

// ============ 小組顏色 palette ============
const GROUP_COLORS = ["#B8860B", "#8B1A1A", "#2D5A27", "#6B4C8A", "#8B6F47", "#1E5A8A", "#A0522D", "#556B2F"];

// ============ 組聚匯出工具 ============
// 檔名安全化
function safeFilename(s) {
  return String(s || "").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, "").slice(0, 80);
}

// 建立組聚的文字內容結構，Word 與 PDF 共用這個資料
function buildMeetingContent(meeting, group, members) {
  const getMember = id => members.find(m => m.id === id);
  const memberName = id => getMember(id)?.name || "（未知成員）";
  const memberLabel = id => {
    const m = getMember(id);
    return m ? m.industry ? `${m.name}（${m.industry}）` : m.name : "（未知成員）";
  };
  const dateStr = meeting.date ? new Date(meeting.date).toLocaleDateString("zh-TW", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit"
  }) : "";
  const timeStr = meeting.time || "";
  const attendeesNames = (meeting.attendees || []).map(memberName).join("、");
  const absenteesNames = (meeting.absentees || []).map(memberName).join("、");
  const scribeName = meeting.scribe ? memberName(meeting.scribe) : "";

  // 主講人（多位）：每位主講人各自帶 openers/feedback/connections/grid
  // 舊單主講結構（meeting.speaker + meeting.conversationOpeners + meeting.feedback + meeting.neededConnections）相容
  let speakers = Array.isArray(meeting.speakers) ? meeting.speakers : [];
  if (speakers.length === 0 && (meeting.speaker?.memberId || meeting.speaker?.topic || (meeting.conversationOpeners || []).length || (meeting.feedback || []).length || (meeting.neededConnections || []).length)) {
    speakers = [{
      id: "legacy_speaker",
      memberId: meeting.speaker?.memberId || "",
      topic: meeting.speaker?.topic || "",
      conversationOpeners: meeting.conversationOpeners || [],
      feedback: meeting.feedback || [],
      neededConnections: meeting.neededConnections || [],
      collaborationGrid: {
        centerProfile: "",
        cells: ["", "", "", "", "", "", "", ""]
      }
    }];
  }
  // 過濾：只匯出有實質內容的主講人（避免使用者誤按 + 後留下空白卡）
  speakers = speakers.filter(sp => {
    const hasIdentity = !!sp.memberId || !!(sp.topic || "").trim();
    const hasOpeners = (sp.conversationOpeners || []).some(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim);
    const hasFeedback = (sp.feedback || []).some(f => f.content);
    const hasConnections = (sp.neededConnections || []).some(nc => nc.profileWanted || (nc.offers || []).length);
    const grid = sp.collaborationGrid;
    const hasGrid = grid && (grid.centerProfile || (grid.cells || []).some(c => c));
    return hasIdentity || hasOpeners || hasFeedback || hasConnections || hasGrid;
  });
  const isChapter = isChapterMeeting(meeting);
  return {
    isChapter,
    meta: {
      groupName: isChapter ? CHAPTER_GROUP_NAME : group?.name || "未知小組",
      date: dateStr,
      time: timeStr,
      location: meeting.location || "",
      scribeName,
      attendeesNames,
      absenteesNames,
      attendeeCount: (meeting.attendees || []).length,
      absenteeCount: (meeting.absentees || []).length
    },
    sharings: (meeting.sharings || []).map(s => ({
      name: memberName(s.memberId),
      content: s.content || ""
    })),
    resourceShares: (meeting.resourceShares || []).map(r => ({
      name: memberName(r.memberId),
      industry: getMember(r.memberId)?.industry || "",
      needs: r.needs || "",
      offers: r.offers || ""
    })).filter(r => r.needs || r.offers),
    speakers: speakers.map(sp => ({
      name: sp.memberId ? memberLabel(sp.memberId) : "",
      topic: sp.topic || "",
      conversationOpeners: (sp.conversationOpeners || []).filter(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim).map(o => ({
        who: o.who || "",
        yesno: o.yesno || "",
        tagline: o.tagline || "",
        painSolution: o.painSolution || "",
        cta: o.cta || "",
        verbatim: o.verbatim || ""
      })),
      feedback: (sp.feedback || []).map(f => ({
        from: memberName(f.fromMemberId),
        content: f.content || ""
      })),
      neededConnections: (sp.neededConnections || []).map(nc => ({
        profileWanted: nc.profileWanted || "",
        offers: (nc.offers || []).map(of => ({
          introducer: of.introducerId ? memberName(of.introducerId) : "",
          contactName: of.contactName || "",
          contactProfession: of.contactProfession || "",
          status: of.status || "pending"
        }))
      })),
      collaborationGrid: sp.collaborationGrid && (sp.collaborationGrid.centerProfile || (sp.collaborationGrid.cells || []).some(c => c)) ? {
        centerProfile: sp.collaborationGrid.centerProfile || "",
        cells: [...(sp.collaborationGrid.cells || []), "", "", "", "", "", "", "", ""].slice(0, 8)
      } : null
    })),
    guests: (meeting.guests || []).map(g => {
      const kind = g.kind || "member";
      const linked = kind === "member" && g.memberId ? getMember(g.memberId) : null;
      const displayName = kind === "member" ? linked ? linked.name : "（未選擇會員）" : g.name || "（未填姓名）";
      const displayIndustry = kind === "member" ? linked?.industry || "" : g.industry || "";
      const sourceLabel = kind === "member" ? isChapterMeeting(meeting) ? "分會會員（非出席）" : "分會別組會員" : g.fromChapter ? `外部 · ${g.fromChapter}` : "外部來賓";
      const hasValidIdentity = kind === "member" ? !!linked : !!g.name;
      return {
        name: displayName,
        industry: displayIndustry,
        sourceLabel,
        kind,
        hasValidIdentity,
        sharing: g.sharing || "",
        feedback: g.feedback || "",
        otherFeedback: g.otherFeedback || ""
      };
    }).filter(g => g.sharing || g.feedback || g.otherFeedback || g.hasValidIdentity),
    referrals: (meeting.referrals || []).map(r => ({
      from: memberName(r.fromMemberId),
      to: memberName(r.toMemberId),
      referralName: r.referralName || "",
      content: r.content || "",
      amount: Number(r.amount) || 0
    })),
    referralTotal: (meeting.referrals || []).reduce((s, r) => s + (Number(r.amount) || 0), 0),
    nextMeeting: meeting.nextMeeting || {}
  };
}

// 產出 Word .docx（使用 docx.js UMD 全域 window.docx）

    alert("Word 匯出功能未就緒（docx 庫載入失敗）");
    return null;
  }
  const d = window.docx;
  const c = buildMeetingContent(meeting, group, members);

  const RED = "8B1A1A";
  const GOLD = "B8860B";
  const DARK = "1A1414";
  const FONT = "標楷體";
  const txt = (text, opts = {}) => new d.TextRun({
    text: String(text || ""),
    font: FONT,
    size: 22,
    ...opts
  });
  const p = (children, opts = {}) => new d.Paragraph({
    children: Array.isArray(children) ? children : [children],
    spacing: {
      after: 80
    },
    ...opts
  });
  const hr = () => new d.Paragraph({
    border: {
      bottom: {
        color: "CCCCCC",

    spacing: {
      before: 60,
      after: 120

  const h1 = (text, color = RED) => new d.Paragraph({
    children: [new d.TextRun({
      text,
      font: FONT,
      size: 36,
      bold: true,

    spacing: {
      before: 120,
      after: 120
    },
    alignment: d.AlignmentType.CENTER

  const h2 = (text, emoji = "") => new d.Paragraph({

  const bullet = text => new d.Paragraph({

  const kv = (k, v) => new d.Paragraph({

  return d.Packer.toBlob(doc);
}

    section: 'margin-bottom:10px;page-break-inside:avoid;',
    kv: 'margin:3px 0;',
    item: 'margin:5px 0;',
    sub: 'padding-left:2em;color:#555;font-size:11pt;margin-top:2px;',
    fromto: 'color:#8B1A1A;font-weight:bold;',
    amount: 'color:#8B1A1A;font-weight:600;',
    ncBlock: 'margin:8px 0;',
    ncTitle: 'color:#B8860B;font-weight:bold;margin-bottom:3px;',
    ncList: 'margin:4px 0 4px 1.5em;padding:0;',
    ncLi: 'margin:2px 0;',
    ncLiEmpty: 'color:#888;list-style:none;margin:2px 0;',
    imported: 'color:#4A6741;font-size:10pt;',
    total: 'text-align:right;color:#8B1A1A;font-weight:bold;font-size:13pt;margin-top:10px;border-top:1px solid #B8860B;padding-top:5px;',
    statusDone: 'color:#4A6741;',

  const section = (title, emoji, body) => body ? `<div style="${S.section}"><div style="${S.h2}">${emoji} ${title}</div>${body}</div>` : "";
  const kv = (k, v) => `<div style="${S.kv}"><b>${esc(k)}：</b>${esc(v || "—")}</div>`;
  let sharingsBlock = "";
  if (c.sharings.length) {
    sharingsBlock = c.sharings.map(s => `<div style="${S.item}"><b>${esc(s.name)}：</b>${esc(s.content)}</div>`).join("");
  }
  let guestsBlock = "";
  if (c.guests && c.guests.length) {
    guestsBlock = c.guests.map((g, i) => {
      const title = `${i + 1}. <b style="color:#059669;">${esc(g.name)}</b>` + (g.industry ? `（${esc(g.industry)}）` : "") + ` <span style="color:#888;font-size:10pt;">· ${esc(g.sourceLabel)}</span>`;
      const rows = [];
      if (g.sharing) rows.push(`<div style="${S.item}"><b>💬 成長/喜悅：</b>${esc(g.sharing)}</div>`);
      if (g.feedback) rows.push(`<div style="${S.item}"><b>💡 對主講人建議：</b>${esc(g.feedback)}</div>`);
      if (g.otherFeedback) rows.push(`<div style="${S.item}"><b>📝 其他回饋：</b>${esc(g.otherFeedback)}</div>`);
      return `<div style="${S.ncBlock}"><div style="${S.ncTitle}">${title}</div>${rows.join("")}</div>`;
    }).join("");
  }
  let resourceSharesBlock = "";
  if (c.resourceShares && c.resourceShares.length) {
    resourceSharesBlock = c.resourceShares.map((r, i) => {
      const title = `${i + 1}. <b style="color:#059669;">${esc(r.name)}</b>` + (r.industry ? `（${esc(r.industry)}）` : "");
      const rows = [];
      if (r.needs) rows.push(`<div style="${S.item}"><b>💼 需要的資源：</b>${esc(r.needs)}</div>`);

  let speakersBlock = "";

          if (o.tagline) rows.push(kv("介紹夥伴", o.tagline));
          if (o.painSolution) rows.push(kv("痛點解決", o.painSolution));
          if (o.cta) rows.push(kv("對接方式", o.cta));
          const verbatim = o.verbatim ? `<div style="margin-top:4px;padding-top:4px;border-top:1px dashed #ccc;"><b>完整逐字稿：</b><div style="white-space:pre-wrap;color:#555;font-size:11pt;margin-top:2px;">${esc(o.verbatim)}</div></div>` : "";
          parts.push(`<div style="${S.ncBlock}"><div style="${S.ncTitle}">目標客群 ${i + 1}</div>${rows.join("")}${verbatim}</div>`);

      }

      // 對主講人建議
      if (sp.feedback.length) {

      // 九宮格合作圖（先腦力激盪 → 再到具體人脈需求）
      if (sp.collaborationGrid) {
        const cells = sp.collaborationGrid.cells;

        const cellStyle = "border:1px solid #B8860B;padding:8px;text-align:center;width:33%;height:60px;vertical-align:middle;";

        </table>`);
      }

      // 主講人需要的合作人脈
      if (sp.neededConnections.length) {

// 產出 PDF Blob（用 html2pdf 動態 export）
async function exportMeetingPdf(meeting, group, members) {
  await ensurePdfLibs();
  if (!window.html2pdf) {
    alert("PDF 匯出功能未就緒（html2pdf 載入失敗）");
    return null;
  }
  const htmlFragment = buildMeetingHtml(meeting, group, members);
  // 建一個螢幕內可見但透明的容器讓 html2canvas 能正常截圖
  const container = document.createElement("div");
  container.innerHTML = htmlFragment;
  container.style.position = "absolute";
  container.style.left = "0";
  container.style.top = "0";
  container.style.width = "794px"; // 210mm @ 96dpi ≈ 794px
  container.style.background = "white";
  container.style.zIndex = "-1"; // 藏在所有東西後面
  container.style.opacity = "0"; // 視覺上看不到
  container.style.pointerEvents = "none";
  document.body.appendChild(container);

  // 等一個 frame 讓瀏覽器 layout + 字型載入
  await new Promise(r => requestAnimationFrame(() => r()));
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
  } catch {}
  try {
    const worker = window.html2pdf().set({
      margin: [10, 10, 10, 10],
      filename: "meeting.pdf",
      image: {
        type: "jpeg",
        quality: 0.95
      },
      html2canvas: {
        scale: 2,
        useCORS: true,
        backgroundColor: "#ffffff",
        logging: false,
        // 重要：讓 html2canvas 用容器本身大小而不是 window
        windowWidth: 794
      },
      jsPDF: {
        unit: "mm",
        format: "a4",
        orientation: "portrait",
        compress: true
      },
      pagebreak: {
        mode: ["css", "legacy"]
      }
    }).from(container);
    const blob = await worker.outputPdf("blob");
    return blob;
  } finally {
    document.body.removeChild(container);
  }
}

// 組聚檔名（不含副檔名）
function meetingFilenameBase(meeting, group) {
  const dateStr = meeting.date || "無日期";
  const isChapter = isChapterMeeting(meeting);
  const groupName = isChapter ? CHAPTER_GROUP_NAME : group?.name || "未知小組";
  const prefix = isChapter ? "分會會議記錄" : "組聚記錄";
  return safeFilename(`${prefix}_${dateStr}_${groupName}`);
}

// 單筆下載（Word 或 PDF）
async function downloadSingle(meeting, group, members, format) {
  const base = meetingFilenameBase(meeting, group);
  if (format === "docx") {
    const blob = await exportMeetingDocx(meeting, group, members);
    if (!blob) return;
    window.saveAs(blob, base + ".docx");
  } else if (format === "pdf") {
    const blob = await exportMeetingPdf(meeting, group, members);
    if (!blob) return;
    window.saveAs(blob, base + ".pdf");
  }
}

// 批次下載（打包 zip，全部扁平在根目錄）
async function downloadBatchZip(meetings, groupsMap, members, format) {
  // 批次一定要 zip + saveAs；若是 pdf 也要 html2pdf，做個 union
  if (format === "pdf") {
    await Promise.all([ensurePdfLibs(), ensureDocxLibs()]); // ensureDocxLibs 會帶 JSZip + saveAs
  } else {
    await ensureDocxLibs();
  }
  if (!window.JSZip) {
    alert("批次匯出功能未就緒（JSZip 載入失敗）");
    return;
  }
  const zip = new window.JSZip();
  const seen = {}; // 檔名重複防撞
  for (const meeting of meetings) {
    const group = groupsMap[meeting.groupId];
    let base = meetingFilenameBase(meeting, group);
    // 防止重複：加 -2 -3 etc
    if (seen[base]) {
      seen[base]++;
      base = `${base}-${seen[base]}`;
    } else {
      seen[base] = 1;
    }
    let blob;
    if (format === "docx") {
      blob = await exportMeetingDocx(meeting, group, members);
    } else if (format === "pdf") {
      blob = await exportMeetingPdf(meeting, group, members);
    }
    if (blob) {
      zip.file(base + "." + format, blob);
    }
  }
  const zipBlob = await zip.generateAsync({
    type: "blob"
  });
  const today = new Date().toISOString().slice(0, 10);
  window.saveAs(zipBlob, `組聚記錄批次匯出_${today}_${meetings.length}筆.zip`);
}

// 將主站 KPI 小組（{組名: [姓名...]}）與 members 合併成運營台 groups[] 格式
function buildGroupsFromKpi(kpiGroups, members, extras) {
  if (!kpiGroups || typeof kpiGroups !== "object") return [];
  const nameToId = {};
  members.forEach(m => {
    if (m.name) nameToId[m.name.trim()] = m.id;
  });
  const entries = Object.entries(kpiGroups);
  return entries.map(([groupName, memberNames], i) => {
    const groupId = "kpi_" + groupName; // 穩定 ID（組名當鍵）
    const memberIds = (memberNames || []).map(n => nameToId[String(n).trim()]).filter(Boolean);
    const extra = extras && extras[groupId] || {};
    return {
      id: groupId,
      name: groupName,
      color: extra.color || GROUP_COLORS[i % GROUP_COLORS.length],
      leaderId: extra.leaderId || null,
      memberIds,
      _sourceMemberNames: memberNames || [] // 保留原始姓名陣列供除錯
    };
  });
}
async function loadState(key, fallback, onFresh) {
  if (!key) return fallback;
  try {
    const wrappedOnFresh = onFresh ? fresh => {
      try {
        const parsed = fresh && fresh.value ? JSON.parse(fresh.value) : fallback;
        onFresh(parsed);
      } catch (e) {
        console.error("[loadState onFresh]", key, e);
      }
    } : undefined;
    const r = await apiClient.get(key, wrappedOnFresh);
    return r && r.value ? JSON.parse(r.value) : fallback;
  } catch (e) {
    console.error("[loadState]", key, e);
    return fallback;
  }
}
async function saveState(key, value) {
  if (!key) return;
  try {
    await apiClient.set(key, JSON.stringify(value));
  } catch (e) {
    console.error("[saveState]", key, e);
  }
}

function canEditMentee(mentee, currentUserId, isAdmin) {
  if (isAdmin) return true; // 管理員一律可編輯
  if (!currentUserId || !mentee) return false;
  return mentee.memberId === currentUserId || mentee.mentorPrimaryId === currentUserId || mentee.mentorSecondaryId === currentUserId;
}
function canCheckOneOnOne(mentee, currentUserId, targetMemberId, isAdmin) {
  if (isAdmin) return true;
  if (!currentUserId) return false;
  if (canEditMentee(mentee, currentUserId, isAdmin)) return true;
  return currentUserId === targetMemberId; // 對象本人也能勾自己這格
}

    ...c,
    group: "core"

  const mentors = mentee.mentorTeam.map(m => ({

    group: "mentor"
  }));
  return [...core, ...mentors];

    ONE_ON_ONE_TYPES.forEach(tp => {
      if (rec[tp.key]?.done) doneCells++;

  });
  // 咖啡與來賓從主站資料計算（若無則退回舊 mentee.guests/coffeeMeetings 做相容）
  let coffeeCount, guestCount;
  if (Array.isArray(mainCoffeeMeetings)) {
    const myCms = mainCoffeeMeetings.filter(cm => cm.inviterId === mentee.memberId);
    coffeeCount = myCms.length;
    guestCount = myCms.filter(cm => cm.meetingStatus === "done" && cm.attendanceWillingness === "confirmed").length;
  } else {
    coffeeCount = (mentee.coffeeMeetings || []).length;
    guestCount = (mentee.guests || []).length;
  }
  const overallPct = Math.round((passportDone / GRAD_REQS.passport * 0.25 + trainingDone / GRAD_REQS.trainings * 0.2 + Math.min(earlyAttend, GRAD_REQS.earlyAttend) / GRAD_REQS.earlyAttend * 0.15 + (totalCells ? doneCells / totalCells : 0) * 0.3 + (guestCount >= 2 ? 1 : guestCount / 2) * 0.05 + (coffeeCount >= 2 ? 1 : coffeeCount / 2) * 0.05) * 100);
  return {
    passportDone,
    passportTotal: GRAD_REQS.passport,
    trainingDone,
    trainingTotal: GRAD_REQS.trainings,
    earlyAttend,
    earlyAttendTotal: GRAD_REQS.earlyAttend,
    oneOnOneDone: doneCells,
    oneOnOneTotal: totalCells,
    guestCount,
    coffeeCount,
    overallPct,
    isGraduated: !!mentee.graduationDate
  };
}

    return {
      start: new Date(now.getFullYear(), q * 3, 1),
      end: null

      start: new Date(now.getFullYear(), 0, 1),
      end: null
    };
  }

    return {
      start: s,
      end: null
    };

    return {
      start: config.customStart ? new Date(config.customStart) : null,
      end: config.customEnd ? new Date(config.customEnd + "T23:59:59") : null

    start: null,
    end: null
