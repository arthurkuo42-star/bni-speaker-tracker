// ===== Storage (Railway Proxy + JSONBin，與 Speaker Tracker 共用同一個 bin) =====
const PROXY_URL = window.BNI_PROXY_URL || '';

const apiClient = {
  async get(key) {
    try {
      const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(key));
      if (res.status === 404) return null;
      if (!res.ok) throw new Error('讀取失敗: ' + res.status);
      const json = await res.json();
      return json && json.value !== undefined ? { value: json.value } : null;
    } catch (e) {
      console.error('[apiClient.get]', key, e);
      return null;
    }
  },
  async set(key, value) {
    const tryWrite = async (pin) => fetch(PROXY_URL + '/api/data', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Write-PIN': pin || '' },
      body: JSON.stringify({ key, value: typeof value === 'string' ? value : JSON.stringify(value) })
    });
    let pin = localStorage.getItem('bni_write_pin') || '';
    let res = await tryWrite(pin);
    if (res.status === 401) {
      const newPin = prompt('第一次寫入需要輸入「寫入 PIN」（與 Speaker Tracker 共用）：');
      if (!newPin) throw new Error('已取消');
      res = await tryWrite(newPin);
      if (res.ok) { localStorage.setItem('bni_write_pin', newPin); }
      else { localStorage.removeItem('bni_write_pin'); alert('PIN 錯誤'); throw new Error('PIN 錯誤'); }
    }
    if (!res.ok) throw new Error('寫入失敗: ' + res.status);
    return { value };
  }
};

// ============ 主站咖啡會議同步（安全寫入 bni_speaker_tracker_v5）============
// 只動 coffeeMeetings 欄位，其他主檔資料原封不動
// updateFn: (currentCoffeeMeetings) => newCoffeeMeetings
async function syncMainCoffeeMeetings(updateFn) {
  console.log("[syncMainCoffeeMeetings] 開始，讀取主站資料...");
  // 1. 先讀最新主站資料
  const res = await apiClient.get("bni_speaker_tracker_v5");
  console.log("[syncMainCoffeeMeetings] 讀到 res:", res ? `有（value 長度 ${res.value?.length ?? 'N/A'}）` : "null");
  if (!res || !res.value) {
    throw new Error("無法讀取主站資料（回傳空）");
  }
  let mainData;
  try {
    // 相容兩種：value 是字串（已 stringify）或已是物件
    mainData = typeof res.value === "string" ? JSON.parse(res.value) : res.value;
  } catch (e) {
    console.error("[syncMainCoffeeMeetings] 解析失敗:", e, "前 200 字元:", String(res.value).slice(0, 200));
    throw new Error("主站資料解析失敗: " + e.message);
  }
  if (!mainData || typeof mainData !== "object") throw new Error("主站資料格式錯誤（非物件）");

  // 2. 套用更新（僅 coffeeMeetings 欄位）
  const current = Array.isArray(mainData.coffeeMeetings) ? mainData.coffeeMeetings : [];
  console.log("[syncMainCoffeeMeetings] 主站原有 coffeeMeetings 筆數:", current.length);
  const updated = updateFn(current);
  if (!Array.isArray(updated)) throw new Error("updateFn 必須回傳陣列");
  console.log("[syncMainCoffeeMeetings] 更新後 coffeeMeetings 筆數:", updated.length);

  // 3. 寫回（其他欄位保持原樣）
  const newMain = { ...mainData, coffeeMeetings: updated, updatedAt: new Date().toISOString() };
  console.log("[syncMainCoffeeMeetings] 寫回 bni_speaker_tracker_v5...");
  await apiClient.set("bni_speaker_tracker_v5", JSON.stringify(newMain));
  console.log("[syncMainCoffeeMeetings] ✓ 寫回完成");
}

// ============ 組聚匯出工具 ============
// 檔名安全化
function safeFilename(s) {
  return String(s || "").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, "").slice(0, 80);
}

// 建立組聚的文字內容結構，Word 與 PDF 共用這個資料
function buildMeetingContent(meeting, group, members) {
  const getMember = (id) => members.find(m => m.id === id);
  const memberName = (id) => getMember(id)?.name || "（未知成員）";
  const memberLabel = (id) => {
    const m = getMember(id);
    return m ? (m.industry ? `${m.name}（${m.industry}）` : m.name) : "（未知成員）";
  };

  const dateStr = meeting.date ? new Date(meeting.date).toLocaleDateString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit" }) : "";
  const timeStr = meeting.time || "";
  const attendeesNames = (meeting.attendees || []).map(memberName).join("、");
  const absenteesNames = (meeting.absentees || []).map(memberName).join("、");
  const speakerName = meeting.speaker?.memberId ? memberLabel(meeting.speaker.memberId) : "";
  const speakerTopic = meeting.speaker?.topic || "";
  const scribeName = meeting.scribe ? memberName(meeting.scribe) : "";

  return {
    meta: {
      groupName: group?.name || "未知小組",
      date: dateStr,
      time: timeStr,
      location: meeting.location || "",
      scribeName,
      attendeesNames,
      absenteesNames,
      attendeeCount: (meeting.attendees || []).length,
      absenteeCount: (meeting.absentees || []).length,
    },
    sharings: (meeting.sharings || []).map(s => ({
      name: memberName(s.memberId),
      content: s.content || "",
    })),
    speaker: {
      name: speakerName,
      topic: speakerTopic,
    },
    feedback: (meeting.feedback || []).map(f => ({
      from: memberName(f.fromMemberId),
      content: f.content || "",
    })),
    neededConnections: (meeting.neededConnections || []).map(nc => ({
      profileWanted: nc.profileWanted || "",
      offers: (nc.offers || []).map(of => ({
        introducer: of.introducerId ? memberName(of.introducerId) : "",
        contactName: of.contactName || "",
        contactProfession: of.contactProfession || "",
        status: of.status || "pending",
      })),
    })),
    referrals: (meeting.referrals || []).map(r => ({
      from: memberName(r.fromMemberId),
      to: memberName(r.toMemberId),
      referralName: r.referralName || "",
      content: r.content || "",
      amount: Number(r.amount) || 0,
    })),
    referralTotal: (meeting.referrals || []).reduce((s, r) => s + (Number(r.amount) || 0), 0),
    nextMeeting: meeting.nextMeeting || {},
  };
}

// 產出 Word .docx（使用 docx.js UMD 全域 window.docx）
function exportMeetingDocx(meeting, group, members) {
  if (!window.docx) { alert("Word 匯出功能未就緒（docx 庫未載入）"); return null; }
  const d = window.docx;
  const c = buildMeetingContent(meeting, group, members);

  // 常用樣式
  const RED = "8B1A1A";
  const GOLD = "B8860B";
  const DARK = "1A1414";
  const FONT = "標楷體";

  const txt = (text, opts = {}) => new d.TextRun({ text: String(text || ""), font: FONT, size: 22, ...opts });
  const p = (children, opts = {}) => new d.Paragraph({ children: Array.isArray(children) ? children : [children], spacing: { after: 80 }, ...opts });
  const hr = () => new d.Paragraph({ border: { bottom: { color: "CCCCCC", size: 6, style: "single" } }, spacing: { before: 60, after: 120 } });
  const h1 = (text, color = RED) => new d.Paragraph({
    children: [new d.TextRun({ text, font: FONT, size: 36, bold: true, color })],
    spacing: { before: 120, after: 120 },
    alignment: d.AlignmentType.CENTER,
  });
  const h2 = (text, emoji = "") => new d.Paragraph({
    children: [new d.TextRun({ text: (emoji ? emoji + " " : "") + text, font: FONT, size: 26, bold: true, color: RED })],
    spacing: { before: 200, after: 100 },
    border: { bottom: { color: RED, size: 10, style: "single" } },
  });
  const bullet = (text) => new d.Paragraph({
    children: [txt(text)],
    bullet: { level: 0 },
    spacing: { after: 40 },
  });
  const kv = (k, v) => new d.Paragraph({
    children: [
      new d.TextRun({ text: (k || "") + "：", font: FONT, size: 22, bold: true, color: DARK }),
      new d.TextRun({ text: String(v || "—"), font: FONT, size: 22, color: DARK }),
    ],
    spacing: { after: 40 },
  });

  const children = [];
  children.push(h1("BNI 富鼎分會 組聚記錄"));

    alignment: d.AlignmentType.CENTER,
    spacing: { after: 200 },
  }));

  // 基本資訊
  children.push(h2("基本資訊", "📋"));
  children.push(kv("小組", c.meta.groupName));
  children.push(kv("日期", c.meta.date));
  if (c.meta.time) children.push(kv("時間", c.meta.time));
  if (c.meta.location) children.push(kv("地點", c.meta.location));
  if (c.meta.scribeName) children.push(kv("記錄", c.meta.scribeName));
  children.push(kv("出席", `${c.meta.attendeesNames || "—"}（${c.meta.attendeeCount} 人）`));
  if (c.meta.absenteeCount > 0) children.push(kv("缺席", `${c.meta.absenteesNames}（${c.meta.absenteeCount} 人）`));

  // 成長/喜悅分享
  if (c.sharings.length) {
    children.push(h2("成長/喜悅分享", "💬"));
    c.sharings.forEach(s => {
      children.push(new d.Paragraph({
        children: [
          new d.TextRun({ text: s.name + "：", font: FONT, size: 22, bold: true }),
          txt(s.content),
        ],
        spacing: { after: 80 },
      }));
    });
  }

  // 主講人專業簡報
  if (c.speaker.name || c.speaker.topic) {
    children.push(h2("主講人專業簡報", "🎤"));
    if (c.speaker.name) children.push(kv("主講人", c.speaker.name));
    if (c.speaker.topic) children.push(kv("主題", c.speaker.topic));
  }

  // 對主講人的建議
  if (c.feedback.length) {
    children.push(h2("對主講人的建議", "💡"));
    c.feedback.forEach((f, i) => {
      children.push(new d.Paragraph({
        children: [
          new d.TextRun({ text: `${i + 1}. ${f.from}：`, font: FONT, size: 22, bold: true }),
          txt(f.content),
        ],
        spacing: { after: 60 },
      }));
    });
  }

  // 主講人需要的合作人脈
  if (c.neededConnections.length) {
    children.push(h2("主講人需要的合作人脈", "🤝"));
    c.neededConnections.forEach((nc, i) => {
      children.push(new d.Paragraph({
        children: [new d.TextRun({ text: `需求 ${i + 1}：${nc.profileWanted}`, font: FONT, size: 22, bold: true, color: GOLD })],
        spacing: { before: 80, after: 40 },
      }));
      if (nc.offers.length === 0) {
        children.push(bullet("（尚無引薦）"));
      } else {
        nc.offers.forEach(of => {
          const parts = [];
          if (of.introducer) parts.push(`${of.introducer} 有人脈`);
          if (of.contactName) parts.push(`${of.contactName}`);
          if (of.contactProfession) parts.push(`（${of.contactProfession}）`);
          if (of.status === "imported") parts.push("[已匯入咖啡會議]");
          children.push(bullet(parts.join(" ") || "—"));
        });
      }
    });
  }

  // 小組內引薦
  if (c.referrals.length) {
    children.push(h2("小組內引薦", "🎯"));
    c.referrals.forEach((r, i) => {
      const amount = r.amount > 0 ? ` · 成交 NT$ ${r.amount.toLocaleString()}` : "";
      children.push(new d.Paragraph({
        children: [
          new d.TextRun({ text: `${i + 1}. `, font: FONT, size: 22, bold: true }),
          new d.TextRun({ text: `${r.from} → ${r.to}`, font: FONT, size: 22, bold: true, color: RED }),
          txt(`：${r.referralName || "—"}${amount}`),
        ],
        spacing: { after: 30 },
      }));
      if (r.content) {
        children.push(new d.Paragraph({
          children: [txt("　　" + r.content, { color: "555555" })],
          spacing: { after: 60 },
        }));
      }
    });
    if (c.referralTotal > 0) {
      children.push(new d.Paragraph({
        children: [new d.TextRun({ text: `本次引薦總額：NT$ ${c.referralTotal.toLocaleString()}`, font: FONT, size: 24, bold: true, color: RED })],
        alignment: d.AlignmentType.RIGHT,
        spacing: { before: 80, after: 100 },
      }));
    }
  }

  // 下次組聚
  if (c.nextMeeting.date || c.nextMeeting.time || c.nextMeeting.location) {
    children.push(h2("下次組聚", "📅"));
    if (c.nextMeeting.date) children.push(kv("日期", c.nextMeeting.date));
    if (c.nextMeeting.time) children.push(kv("時間", c.nextMeeting.time));
    if (c.nextMeeting.location) children.push(kv("地點", c.nextMeeting.location));
  }

  // 頁尾
  const doc = new d.Document({
    styles: {
      default: {
        document: { run: { font: FONT, size: 22 } },
      },
    },
    sections: [{
      properties: { page: { margin: { top: 1000, right: 1000, bottom: 1000, left: 1000 } } },
      headers: {
        default: new d.Header({
          children: [new d.Paragraph({
            alignment: d.AlignmentType.RIGHT,
            children: [new d.TextRun({ text: "BNI 富鼎分會 · 組聚記錄", font: FONT, size: 18, color: "888888" })],
          })],
        }),
      },
      footers: {
        default: new d.Footer({
          children: [new d.Paragraph({
            alignment: d.AlignmentType.CENTER,
            children: [
              new d.TextRun({ text: "第 ", font: FONT, size: 20 }),
              new d.TextRun({ children: [d.PageNumber.CURRENT], font: FONT, size: 20 }),
              new d.TextRun({ text: " 頁／共 ", font: FONT, size: 20 }),
              new d.TextRun({ children: [d.PageNumber.TOTAL_PAGES], font: FONT, size: 20 }),
              new d.TextRun({ text: " 頁", font: FONT, size: 20 }),
            ],
          })],
        }),
      },
      children,
    }],
  });

  return d.Packer.toBlob(doc);
}

// 產出會議記錄 HTML 片段（body 內容），供 PDF 列印使用
// 樣式 inline，避免離屏 div 拿不到外部 style
function buildMeetingHtml(meeting, group, members) {
  const c = buildMeetingContent(meeting, group, members);
  const esc = (s) => String(s || "").replace(/[&<>"']/g, ch =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

  // inline style helpers
  const S = {
    root: 'font-family:"標楷體","DFKai-SB","BiauKai",serif;color:#1A1414;font-size:12pt;line-height:1.6;padding:20px;background:white;width:100%;',
    h1: 'color:#8B1A1A;text-align:center;font-size:20pt;margin:0 0 5px;font-weight:bold;',
    subtitle: 'color:#B8860B;text-align:center;font-size:13pt;margin:0 0 20px;',
    h2: 'color:#8B1A1A;font-size:14pt;border-bottom:2px solid #8B1A1A;padding-bottom:3px;margin:18px 0 8px;font-weight:bold;',
    section: 'margin-bottom:10px;page-break-inside:avoid;',
    kv: 'margin:3px 0;',
    item: 'margin:5px 0;',
    sub: 'padding-left:2em;color:#555;font-size:11pt;margin-top:2px;',
    fromto: 'color:#8B1A1A;font-weight:bold;',
    amount: 'color:#8B1A1A;font-weight:600;',
    ncBlock: 'margin:8px 0;',
    ncTitle: 'color:#B8860B;font-weight:bold;margin-bottom:3px;',
    ncList: 'margin:4px 0 4px 1.5em;padding:0;',
    ncLi: 'margin:2px 0;',
    ncLiEmpty: 'color:#888;list-style:none;margin:2px 0;',
    imported: 'color:#4A6741;font-size:10pt;',
    total: 'text-align:right;color:#8B1A1A;font-weight:bold;font-size:13pt;margin-top:10px;border-top:1px solid #B8860B;padding-top:5px;',
    statusDone: 'color:#4A6741;',
    statusPending: 'color:#B8860B;',
  };

  const section = (title, emoji, body) => body
    ? `<div style="${S.section}"><div style="${S.h2}">${emoji} ${title}</div>${body}</div>`
    : "";
  const kv = (k, v) => `<div style="${S.kv}"><b>${esc(k)}：</b>${esc(v || "—")}</div>`;

  let sharingsBlock = "";
  if (c.sharings.length) {
    sharingsBlock = c.sharings.map(s =>
      `<div style="${S.item}"><b>${esc(s.name)}：</b>${esc(s.content)}</div>`).join("");
  }

  let speakerBlock = "";
  if (c.speaker.name || c.speaker.topic) {
    speakerBlock = (c.speaker.name ? kv("主講人", c.speaker.name) : "")
      + (c.speaker.topic ? kv("主題", c.speaker.topic) : "");
  }

  let feedbackBlock = "";
  if (c.feedback.length) {
    feedbackBlock = c.feedback.map((f, i) =>
      `<div style="${S.item}">${i + 1}. <b>${esc(f.from)}：</b>${esc(f.content)}</div>`).join("");
  }

  let ncBlock = "";
  if (c.neededConnections.length) {
    ncBlock = c.neededConnections.map((nc, i) => {
      const offersHtml = nc.offers.length ? nc.offers.map(of => {
        const parts = [];
        if (of.introducer) parts.push(`${esc(of.introducer)} 有人脈`);
        if (of.contactName) parts.push(esc(of.contactName));
        if (of.contactProfession) parts.push(`（${esc(of.contactProfession)}）`);
        if (of.status === "imported") parts.push(`<span style="${S.imported}">[已匯入咖啡會議]</span>`);
        return `<li style="${S.ncLi}">${parts.join(" ")}</li>`;
      }).join("") : `<li style="${S.ncLiEmpty}">（尚無引薦）</li>`;
      return `<div style="${S.ncBlock}">
        <div style="${S.ncTitle}">需求 ${i + 1}：${esc(nc.profileWanted)}</div>
        <ul style="${S.ncList}">${offersHtml}</ul>
      </div>`;
    }).join("");
  }

  let referralsBlock = "";
  if (c.referrals.length) {
    const rows = c.referrals.map((r, i) => {
      const amt = r.amount > 0 ? `<span style="${S.amount}">成交 NT$ ${r.amount.toLocaleString()}</span>` : "";
      return `<div style="${S.item}">
        ${i + 1}. <span style="${S.fromto}">${esc(r.from)} → ${esc(r.to)}</span>：${esc(r.referralName || "—")} ${amt}
        ${r.content ? `<div style="${S.sub}">${esc(r.content)}</div>` : ""}
      </div>`;
    }).join("");
    const total = c.referralTotal > 0
      ? `<div style="${S.total}">本次引薦總額：NT$ ${c.referralTotal.toLocaleString()}</div>` : "";
    referralsBlock = rows + total;
  }

  let nextBlock = "";
  if (c.nextMeeting.date || c.nextMeeting.time || c.nextMeeting.location) {
    nextBlock = (c.nextMeeting.date ? kv("日期", c.nextMeeting.date) : "")
      + (c.nextMeeting.time ? kv("時間", c.nextMeeting.time) : "")
      + (c.nextMeeting.location ? kv("地點", c.nextMeeting.location) : "");
  }

  return `<div style="${S.root}">
<div style="${S.h1}">BNI 富鼎分會 組聚記錄</div>
<div style="${S.subtitle}">${esc(c.meta.groupName)} · ${esc(c.meta.date)}${c.meta.time ? " " + esc(c.meta.time) : ""}</div>

<div style="${S.section}">
  <div style="${S.h2}">📋 基本資訊</div>
  ${kv("小組", c.meta.groupName)}
  ${kv("日期", c.meta.date)}
  ${c.meta.time ? kv("時間", c.meta.time) : ""}
  ${c.meta.location ? kv("地點", c.meta.location) : ""}
  ${c.meta.scribeName ? kv("記錄", c.meta.scribeName) : ""}
  ${kv("出席", `${c.meta.attendeesNames || "—"}（${c.meta.attendeeCount} 人）`)}
  ${c.meta.absenteeCount > 0 ? kv("缺席", `${c.meta.absenteesNames}（${c.meta.absenteeCount} 人）`) : ""}
</div>

${section("成長/喜悅分享", "💬", sharingsBlock)}
${section("主講人專業簡報", "🎤", speakerBlock)}
${section("對主講人的建議", "💡", feedbackBlock)}
${section("主講人需要的合作人脈", "🤝", ncBlock)}
${section("小組內引薦", "🎯", referralsBlock)}
${section("下次組聚", "📅", nextBlock)}
</div>`;
}

// 產出 PDF Blob（用 html2pdf 動態 export）
async function exportMeetingPdf(meeting, group, members) {
  if (!window.html2pdf) { alert("PDF 匯出功能未就緒（html2pdf 未載入）"); return null; }
  const htmlFragment = buildMeetingHtml(meeting, group, members);
  // 建一個螢幕內可見但透明的容器讓 html2canvas 能正常截圖
  const container = document.createElement("div");
  container.innerHTML = htmlFragment;
  container.style.position = "absolute";
  container.style.left = "0";
  container.style.top = "0";
  container.style.width = "794px";       // 210mm @ 96dpi ≈ 794px
  container.style.background = "white";
  container.style.zIndex = "-1";         // 藏在所有東西後面
  container.style.opacity = "0";         // 視覺上看不到
  container.style.pointerEvents = "none";
  document.body.appendChild(container);

  // 等一個 frame 讓瀏覽器 layout + 字型載入
  await new Promise(r => requestAnimationFrame(() => r()));
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
  } catch {}

  try {
    const worker = window.html2pdf().set({
      margin: [10, 10, 10, 10],
      filename: "meeting.pdf",
      image: { type: "jpeg", quality: 0.95 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        backgroundColor: "#ffffff",
        logging: false,
        // 重要：讓 html2canvas 用容器本身大小而不是 window
        windowWidth: 794,
      },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait", compress: true },
      pagebreak: { mode: ["css", "legacy"] },
    }).from(container);
    const blob = await worker.outputPdf("blob");
    return blob;
  } finally {
    document.body.removeChild(container);
  }
}

// 組聚檔名（不含副檔名）
function meetingFilenameBase(meeting, group) {
  const dateStr = meeting.date || "無日期";
  const groupName = group?.name || "未知小組";
  return safeFilename(`組聚記錄_${dateStr}_${groupName}`);
}

// 單筆下載（Word 或 PDF）
async function downloadSingle(meeting, group, members, format) {
  const base = meetingFilenameBase(meeting, group);
  if (format === "docx") {
    const blob = await exportMeetingDocx(meeting, group, members);
    if (!blob) return;
    window.saveAs(blob, base + ".docx");
  } else if (format === "pdf") {
    const blob = await exportMeetingPdf(meeting, group, members);
    if (!blob) return;
    window.saveAs(blob, base + ".pdf");
  }
}

// 批次下載（打包 zip，全部扁平在根目錄）
async function downloadBatchZip(meetings, groupsMap, members, format) {
  if (!window.JSZip) { alert("批次匯出功能未就緒（JSZip 未載入）"); return; }
  const zip = new window.JSZip();
  const seen = {};  // 檔名重複防撞
  for (const meeting of meetings) {
    const group = groupsMap[meeting.groupId];
    let base = meetingFilenameBase(meeting, group);
    // 防止重複：加 -2 -3 etc
    if (seen[base]) {
      seen[base]++;
      base = `${base}-${seen[base]}`;
    } else {
      seen[base] = 1;
    }
    let blob;
    if (format === "docx") {
      blob = await exportMeetingDocx(meeting, group, members);
    } else if (format === "pdf") {
      blob = await exportMeetingPdf(meeting, group, members);
    }
    if (blob) {
      zip.file(base + "." + format, blob);
    }
  }
  const zipBlob = await zip.generateAsync({ type: "blob" });
  const today = new Date().toISOString().slice(0, 10);
  window.saveAs(zipBlob, `組聚記錄批次匯出_${today}_${meetings.length}筆.zip`);
}

// 將主站 KPI 小組（{組名: [姓名...]}）與 members 合併成運營台 groups[] 格式
function buildGroupsFromKpi(kpiGroups, members, extras) {
  if (!kpiGroups || typeof kpiGroups !== "object") return [];
  const nameToId = {};
  members.forEach(m => { if (m.name) nameToId[m.name.trim()] = m.id; });
  const entries = Object.entries(kpiGroups);
  return entries.map(([groupName, memberNames], i) => {
    const groupId = "kpi_" + groupName; // 穩定 ID（組名當鍵）
    const memberIds = (memberNames || []).map(n => nameToId[String(n).trim()]).filter(Boolean);
    const extra = (extras && extras[groupId]) || {};
    return {
      id: groupId,
      name: groupName,
      color: extra.color || GROUP_COLORS[i % GROUP_COLORS.length],
      leaderId: extra.leaderId || null,
      memberIds,
      _sourceMemberNames: memberNames || [],  // 保留原始姓名陣列供除錯
    };
  });
}

async function loadState(key, fallback) {
  if (!key) return fallback;
  try {
    const r = await apiClient.get(key);
    return r && r.value ? JSON.parse(r.value) : fallback;
  } catch (e) { console.error("[loadState]", key, e); return fallback; }
}
async function saveState(key, value) {
  if (!key) return;
  try { await apiClient.set(key, JSON.stringify(value)); }
  catch (e) { console.error("[saveState]", key, e); }
}

// ============ 導生計畫工具函式 ============
function canEditMentee(mentee, currentUserId, isAdmin) {
  if (isAdmin) return true;                        // 管理員一律可編輯
  if (!currentUserId || !mentee) return false;
  return mentee.memberId === currentUserId
    || mentee.mentorPrimaryId === currentUserId
    || mentee.mentorSecondaryId === currentUserId;
}
function canCheckOneOnOne(mentee, currentUserId, targetMemberId, isAdmin) {
  if (isAdmin) return true;
  if (!currentUserId) return false;
  if (canEditMentee(mentee, currentUserId, isAdmin)) return true;
  return currentUserId === targetMemberId; // 對象本人也能勾自己這格
}
function getMenteeAllTargets(mentee) {
  // 返回一對一矩陣的所有對象（核心 8 + 導師 N），依原始順序
  const core = mentee.coreTeam.map(c => ({ ...c, group: "core" }));
  const mentors = mentee.mentorTeam.map(m => ({ ...m, group: "mentor" }));
  return [...core, ...mentors];
}
function getMenteeStats(mentee, mainCoffeeMeetings) {
  const passportDone = mentee.passport.filter(p => p.completedDate).length;
  const trainingDone = mentee.trainings.filter(t => t.completedDate).length;
  const earlyAttend = mentee.earlyAttendances.length;
  const targets = getMenteeAllTargets(mentee);
  const totalCells = targets.length * ONE_ON_ONE_TYPES.length;
  let doneCells = 0;
  targets.forEach(t => {
    const rec = mentee.oneOnOnes[t.memberId] || {};
    ONE_ON_ONE_TYPES.forEach(tp => { if (rec[tp.key]?.done) doneCells++; });
  });
  // 咖啡與來賓從主站資料計算（若無則退回舊 mentee.guests/coffeeMeetings 做相容）
  let coffeeCount, guestCount;
  if (Array.isArray(mainCoffeeMeetings)) {
    const myCms = mainCoffeeMeetings.filter(cm => cm.inviterId === mentee.memberId);
    coffeeCount = myCms.length;
    guestCount = myCms.filter(cm =>
      cm.meetingStatus === "done" && cm.attendanceWillingness === "confirmed"
    ).length;
  } else {
    coffeeCount = (mentee.coffeeMeetings || []).length;
    guestCount = (mentee.guests || []).length;
  }
  const overallPct = Math.round(
    ((passportDone / GRAD_REQS.passport) * 0.25 +
      (trainingDone / GRAD_REQS.trainings) * 0.2 +
      (Math.min(earlyAttend, GRAD_REQS.earlyAttend) / GRAD_REQS.earlyAttend) * 0.15 +
      (totalCells ? doneCells / totalCells : 0) * 0.3 +
      (guestCount >= 2 ? 1 : guestCount / 2) * 0.05 +
      (coffeeCount >= 2 ? 1 : coffeeCount / 2) * 0.05
    ) * 100
  );
  return {
    passportDone, passportTotal: GRAD_REQS.passport,
    trainingDone, trainingTotal: GRAD_REQS.trainings,
    earlyAttend, earlyAttendTotal: GRAD_REQS.earlyAttend,
    oneOnOneDone: doneCells, oneOnOneTotal: totalCells,
    guestCount, coffeeCount,
    overallPct, isGraduated: !!mentee.graduationDate,
  };
}

function MeetingForm({ meeting, groups, members, mentees, setMentees, onSave, onCancel, onDelete }) {

    id: uid("mt"), groupId: groups[0]?.id || "",

    location: "", scribe: "",

    speaker: { memberId: "", topic: "" },  // 2. 主講人
    feedback: [],             // 3. 對主講人建議
    neededConnections: [],    // 4. 主講人需要的人脈
    referrals: [],            // 5. 小組內引薦記錄
    nextMeeting: { date: "", time: "", location: "" },  // 6. 下次組聚
    discussion: "", actionItems: [],        // actionItems 保留欄位但 UI 已移除（舊資料相容）
    createdAt: new Date().toISOString(),
  });

  // 遷移舊記錄：若 meeting 沒有新欄位，補齊空值
  useEffect(() => {
    if (!meeting) return;
    setForm(p => ({
      sharings: [], speaker: { memberId: "", topic: "" },
      feedback: [], neededConnections: [], referrals: [],
      nextMeeting: { date: "", time: "", location: "" },
      ...p,
    }));
  }, []);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const group = groups.find(g => g.id === form.groupId);
  const groupMembers = useMemo(() =>
    members.filter(m => group?.memberIds?.includes(m.id)),
    [members, group]
  );
  const attendingMembers = useMemo(() =>
    groupMembers.filter(m => form.attendees.includes(m.id)),
    [groupMembers, form.attendees]
  );

  // 選了某組，沒出席的自動算缺席；若記錄人空白，自動預填小組長
  useEffect(() => {
    if (!group) return;
    const absent = group.memberIds.filter(id => !form.attendees.includes(id));
    setForm(p => ({
      ...p,
      absentees: absent,
      scribe: p.scribe || group.leaderId || "",
    }));
  }, [form.attendees, form.groupId]);

  // ===== 各區塊 CRUD =====
  const upd = (arr, id, k, v) => arr.map(x => x.id === id ? { ...x, [k]: v } : x);
  const rm = (arr, id) => arr.filter(x => x.id !== id);

  // 1. 分享
  const addSharing = (memberId) => set("sharings", [...form.sharings, { id: uid("s"), memberId, content: "" }]);

      id: uid("of"), introducerId: "", contactName: "", contactProfession: "",

  ));

    nc.id !== ncId ? nc : { ...nc, offers: nc.offers.filter(of => of.id !== ofId) }
  ));

        </Field>
        <Field label="記錄人">
          <MemberSelect members={groupMembers} value={form.scribe} onChange={v => set("scribe", v)} placeholder="（選填）" />
        </Field>
        <Field label="日期" required>
          <input type="date" value={form.date} onChange={e => set("date", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
        <Field label="時間">
          <input type="time" value={form.time || ""} onChange={e => set("time", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </div>

      <Field label="地點">
        <input value={form.location || ""} onChange={e => set("location", e.target.value)}
          placeholder="例：事務所會議室、85度C..."
          className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
      </Field>

      <Field label={`出席成員（${form.attendees.length} / ${group?.memberIds.length || 0} 人）`} required
        hint={group ? `未勾選者將自動列入缺席（${form.absentees.length} 人）` : "請先選擇小組"}>
        {group ? <MemberMultiSelect members={groupMembers} selectedIds={form.attendees} onChange={v => set("attendees", v)} /> : <div className="text-sm text-stone-400 italic">請先選擇小組</div>}
      </Field>

      {/* ============ 1. 成長 / 喜悅分享 ============ */}
      <FormSection title="1. 成長 / 喜悅分享" badge={summary("", form.sharings.length)} icon={<Sparkles className="w-4 h-4 text-[#B8860B]" />}>
        {attendingMembers.length === 0 ? (
          <div className="text-xs text-stone-400 italic py-2">請先勾選出席成員</div>
        ) : (
          <>
            <div className="space-y-2 mb-2">
              {form.sharings.map(s => {
                const m = members.find(x => x.id === s.memberId);
                return (
                  <div key={s.id} className="border border-stone-200 rounded-lg p-2.5 bg-stone-50">
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className="text-sm font-semibold text-stone-700">{m?.name || "?"}</span>
                      <button onClick={() => rmSharing(s.id)} className="ml-auto p-1 text-stone-400 hover:text-red-500"><Trash2 className="w-3.5 h-3.5" /></button>
                    </div>
                    <textarea value={s.content} onChange={e => updSharing(s.id, "content", e.target.value)}
                      rows={2} placeholder="分享成長進度或喜悅..."
                      className="w-full border border-stone-200 rounded px-2 py-1.5 text-sm bg-white" />
                  </div>
                );
              })}
            </div>
            {pendingShareMembers.length > 0 && (
              <select onChange={e => { if (e.target.value) { addSharing(e.target.value); e.target.value = ""; } }}
                value="" className="w-full border border-dashed border-stone-300 rounded-lg px-3 py-2 text-sm bg-white text-stone-500">
                <option value="">+ 新增分享（{pendingShareMembers.length} 位出席成員尚未分享）</option>
                {pendingShareMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            )}
          </>
        )}
      </FormSection>

      {/* ============ 2. 主講人 ============ */}
      <FormSection title="2. 主講人專業簡報" badge={form.speaker?.topic ? <span className="text-[10px] bg-emerald-500 text-white px-1.5 py-0.5 rounded-full">已填</span> : summary("", 0)} icon={<Presentation2 className="w-4 h-4 text-[#B8860B]" />}>
        <div className="grid grid-cols-1 sm:grid-cols-[180px_1fr] gap-2">
          <MemberSelect members={attendingMembers.length ? attendingMembers : groupMembers}
            value={form.speaker?.memberId || ""}
            onChange={v => set("speaker", { ...form.speaker, memberId: v })}
            placeholder="選擇主講人..." />
          <input value={form.speaker?.topic || ""}
            onChange={e => set("speaker", { ...form.speaker, topic: e.target.value })}
            placeholder="簡報標題（本次主講的主題）"
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </div>
      </FormSection>

      {/* ============ 3. 對主講人的建議 ============ */}
      <FormSection title="3. 對主講人的建議" badge={summary("", form.feedback.length)} icon={<MessageSquareQuote className="w-4 h-4 text-[#B8860B]" />}>
        {!form.speaker?.memberId ? (
          <div className="text-xs text-stone-400 italic py-2">請先選擇主講人</div>
        ) : (
          <>
            <div className="space-y-2 mb-2">
              {form.feedback.map(f => {
                const m = members.find(x => x.id === f.fromMemberId);
                return (
                  <div key={f.id} className="border border-stone-200 rounded-lg p-2.5 bg-stone-50">
                    <div className="flex items-center gap-2 mb-1.5">
                      <span className="text-sm font-semibold text-stone-700">{m?.name || "?"}</span>
                      <button onClick={() => rmFeedback(f.id)} className="ml-auto p-1 text-stone-400 hover:text-red-500"><Trash2 className="w-3.5 h-3.5" /></button>
                    </div>
                    <textarea value={f.content} onChange={e => updFeedback(f.id, "content", e.target.value)}
                      rows={2} placeholder={`給 ${members.find(x => x.id === form.speaker.memberId)?.name || "主講人"} 的建議...`}
                      className="w-full border border-stone-200 rounded px-2 py-1.5 text-sm bg-white" />
                  </div>
                );
              })}
            </div>
            {pendingFeedbackMembers.length > 0 && (
              <select onChange={e => { if (e.target.value) { addFeedback(e.target.value); e.target.value = ""; } }}
                value="" className="w-full border border-dashed border-stone-300 rounded-lg px-3 py-2 text-sm bg-white text-stone-500">
                <option value="">+ 新增建議（{pendingFeedbackMembers.length} 位尚未給建議）</option>
                {pendingFeedbackMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
            )}
          </>
        )}
      </FormSection>

      {/* ============ 4. 主講人需要的合作人脈 ============ */}
      <FormSection title="4. 主講人需要的合作人脈" badge={summary("", form.neededConnections.reduce((s, nc) => s + nc.offers.length, 0))} icon={<Link2 className="w-4 h-4 text-[#B8860B]" />}>
        {!form.speaker?.memberId ? (
          <div className="text-xs text-stone-400 italic py-2">請先選擇主講人</div>
        ) : (
          <>
            <div className="text-xs text-stone-500 mb-2 bg-amber-50 border border-amber-200 rounded p-2">
              💡 這裡記錄的引薦意向不會直接寫入咖啡會議。組聚結束後，主講人可到主站「Coffee Meeting」頁面一鍵匯入，狀態才會正式轉為「邀約中」。
            </div>
            <div className="space-y-3">
              {form.neededConnections.map((nc, idx) => (
                <div key={nc.id} className="border border-stone-200 rounded-lg p-3 bg-stone-50">
                  <div className="flex items-start gap-2 mb-2">
                    <span className="text-xs font-bold text-[#8B1A1A] mt-1.5">需求 {idx + 1}</span>
                    <input value={nc.profileWanted} onChange={e => updConnection(nc.id, "profileWanted", e.target.value)}
                      placeholder="想認識的對象描述（例：熟悉不動產估價的代書）"
                      className="flex-1 border border-stone-300 rounded-md px-2.5 py-1.5 text-sm" />
                    <button onClick={() => rmConnection(nc.id)} className="p-1.5 text-stone-400 hover:text-red-500"><Trash2 className="w-3.5 h-3.5" /></button>
                  </div>
                  {nc.offers.length > 0 && (
                    <div className="ml-4 pl-3 border-l-2 border-[#B8860B] space-y-1.5 mb-2">
                      {nc.offers.map(of => {
                        const intro = members.find(x => x.id === of.introducerId);
                        return (
                          <div key={of.id} className="bg-white rounded p-2 text-xs">
                            <div className="grid grid-cols-[110px_1fr_auto] gap-1.5 items-center mb-1">
                              <MemberSelect members={attendingMembers} value={of.introducerId} onChange={v => updOffer(nc.id, of.id, "introducerId", v)} placeholder="邀約人" />
                              <input value={of.contactName} onChange={e => updOffer(nc.id, of.id, "contactName", e.target.value)}
                                placeholder="人脈姓名" className="border border-stone-200 rounded px-2 py-1" />
                              <button onClick={() => rmOffer(nc.id, of.id)} className="p-1 text-stone-400 hover:text-red-500"><X className="w-3 h-3" /></button>
                            </div>
                            <input value={of.contactProfession} onChange={e => updOffer(nc.id, of.id, "contactProfession", e.target.value)}
                              placeholder="人脈專業（例：不動產估價師）" className="w-full border border-stone-200 rounded px-2 py-1 text-xs" />
                          </div>
                        );
                      })}
                    </div>
                  )}
                  <button onClick={() => addOffer(nc.id)}
                    className="ml-4 text-xs text-[#8B1A1A] hover:underline flex items-center gap-1">
                    <Plus className="w-3 h-3" />誰有此人脈？
                  </button>
                </div>
              ))}
              <Btn variant="outline" size="sm" onClick={addConnection}><Plus className="w-3.5 h-3.5" />新增人脈需求</Btn>
            </div>
          </>
        )}
      </FormSection>

      {/* ============ 5. 小組內引薦記錄 ============ */}
      <FormSection title="5. 小組內彼此引薦" badge={summary("", form.referrals.length)} icon={<ArrowRightLeft className="w-4 h-4 text-[#B8860B]" />}>
        <div className="space-y-2">
          {form.referrals.map((r, i) => (
            <div key={r.id} className="border border-stone-200 rounded-lg p-2.5 bg-stone-50">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-xs font-bold text-stone-400">#{i + 1}</span>
                <MemberSelect members={attendingMembers} value={r.fromMemberId} onChange={v => updReferral(r.id, "fromMemberId", v)} placeholder="引薦人" />
                <ArrowRightLeft className="w-3 h-3 text-stone-400" />
                <MemberSelect members={attendingMembers} value={r.toMemberId} onChange={v => updReferral(r.id, "toMemberId", v)} placeholder="收到引薦" />
                <button onClick={() => rmReferral(r.id)} className="ml-auto p-1 text-stone-400 hover:text-red-500"><Trash2 className="w-3.5 h-3.5" /></button>
              </div>
              <div className="grid grid-cols-[1fr_140px] gap-2 mb-2">
                <input value={r.referralName} onChange={e => updReferral(r.id, "referralName", e.target.value)}
                  placeholder="被引薦對象（例：林先生）"
                  className="border border-stone-300 rounded px-2 py-1.5 text-sm" />
                <div className="flex items-center gap-1">
                  <span className="text-xs text-stone-500">成交金額</span>
                  <input type="number" value={r.amount || ""} onChange={e => updReferral(r.id, "amount", e.target.value)}
                    placeholder="0" className="w-full border border-stone-300 rounded px-2 py-1.5 text-sm text-right" />
                </div>
              </div>
              <textarea value={r.content} onChange={e => updReferral(r.id, "content", e.target.value)}
                rows={2} placeholder="引薦內容（業務類型、需求描述...）"
                className="w-full border border-stone-200 rounded px-2 py-1.5 text-sm bg-white" />
            </div>
          ))}
          <Btn variant="outline" size="sm" onClick={addReferral}><Plus className="w-3.5 h-3.5" />新增引薦</Btn>
        </div>
      </FormSection>

      {/* ============ 6. 下次組聚 ============ */}
      <FormSection title="6. 下次組聚時間" badge={form.nextMeeting?.date ? <span className="text-[10px] bg-emerald-500 text-white px-1.5 py-0.5 rounded-full">已填</span> : summary("", 0)} icon={<Calendar className="w-4 h-4 text-[#B8860B]" />}>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs text-stone-500">日期</label>
            <input type="date" value={form.nextMeeting?.date || ""}
              onChange={e => set("nextMeeting", { ...form.nextMeeting, date: e.target.value })}
              className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
          </div>
          <div>
            <label className="text-xs text-stone-500">時間</label>
            <input type="time" value={form.nextMeeting?.time || ""}
              onChange={e => set("nextMeeting", { ...form.nextMeeting, time: e.target.value })}
              className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
          </div>
        </div>
        <div className="mt-2">
          <label className="text-xs text-stone-500">地點（留空則沿用本次）</label>
          <input value={form.nextMeeting?.location || ""}
            onChange={e => set("nextMeeting", { ...form.nextMeeting, location: e.target.value })}
            placeholder={form.location || "例：事務所會議室..."}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </div>
      </FormSection>

      {/* ============ 附加：其他討論（預設收起） ============ */}
      <FormSection title="其他討論" defaultOpen={false}
        badge={form.discussion ? <span className="text-[10px] bg-emerald-500 text-white px-1.5 py-0.5 rounded-full">已填</span> : summary("", 0)}
        icon={<FileText className="w-4 h-4 text-stone-500" />}>
        <Field label="其他討論">
          <textarea value={form.discussion || ""} onChange={e => set("discussion", e.target.value)}
            rows={3} placeholder="若有其他議題..."
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </FormSection>

      <div className="flex items-center justify-between pt-3 border-t border-stone-200 mt-4">
        <div>
          {meeting && onDelete && (
            <Btn variant="danger" size="sm" onClick={() => { if (confirm("確定刪除此會議記錄？")) onDelete(meeting.id); }}>
              <Trash2 className="w-3.5 h-3.5" />刪除
            </Btn>
          )}
        </div>
        <div className="flex gap-2">
          <Btn variant="outline" onClick={onCancel}>取消</Btn>
          <Btn variant="primary" onClick={submit}><Save className="w-4 h-4" />儲存</Btn>
        </div>
      </div>
    </div>
  );
}

// 通用摺疊 Section
function FormSection({ title, icon, badge, defaultOpen = true, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden mb-3">
      <button type="button" onClick={() => setOpen(!open)}
        className="w-full flex items-center justify-between px-3.5 py-2.5 hover:bg-stone-50 transition">
        <div className="flex items-center gap-2">
          {icon}
          <h4 className="font-semibold text-sm text-stone-800">{title}</h4>
          {badge}
        </div>
        {open ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
      </button>
      {open && <div className="px-3.5 pb-3.5 pt-1 border-t border-stone-100">{children}</div>}
    </div>
  );
}

// ============ 會議卡片 ============
function MeetingCard({ meeting, group, members, onEdit }) {
  const [expanded, setExpanded] = useState(false);
  const [exportMenu, setExportMenu] = useState(false);
  const [exporting, setExporting] = useState(false);
  const getMember = (id) => members.find(m => m.id === id);
  const totalInGroup = group?.memberIds.length || 0;
  const attendRate = totalInGroup ? (meeting.attendees.length / totalInGroup * 100).toFixed(0) : 0;

  // 6 大欄位統計
  const sharings = meeting.sharings || [];
  const speaker = meeting.speaker || {};
  const speakerMember = speaker.memberId ? getMember(speaker.memberId) : null;
  const feedback = meeting.feedback || [];
  const neededConnections = meeting.neededConnections || [];
  const offerCount = neededConnections.reduce((s, nc) => s + (nc.offers?.length || 0), 0);
  const referrals = meeting.referrals || [];
  const referralTotal = referrals.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const nextMeeting = meeting.nextMeeting || {};

  const pill = (label, val, color) => (
    <span className={`inline-flex items-center gap-0.5 text-[10px] px-1.5 py-0.5 rounded ${color}`}>
      {label}<b className="ml-0.5">{val}</b>
    </span>
  );

  return (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden hover:shadow-md transition">
      <div className="h-1" style={{ backgroundColor: group?.color || "#999" }} />
      <div className="p-4">
        <div className="flex items-start justify-between gap-2 mb-2">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap mb-1">
              <Tag color={group?.color || "#999"}>{group?.name || "未知小組"}</Tag>
              <span className="text-sm font-semibold text-stone-800">{fmtDate(meeting.date)}</span>
              {meeting.time && <span className="text-xs text-stone-500">{meeting.time}</span>}
            </div>
            <div className="flex items-center gap-3 text-xs text-stone-500 flex-wrap">
              {meeting.location && <span className="flex items-center gap-0.5"><MapPin className="w-3 h-3" />{meeting.location}</span>}
              {meeting.scribe && <span className="flex items-center gap-0.5"><Edit2 className="w-3 h-3" />{getMember(meeting.scribe)?.name || "—"}</span>}
            </div>
          </div>
          <div className="flex items-center gap-1 flex-shrink-0 relative">
            <button onClick={() => setExportMenu(v => !v)}
              disabled={exporting}
              className="p-1.5 text-stone-400 hover:text-[#B8860B] hover:bg-stone-50 rounded-lg disabled:opacity-50"
              title="匯出記錄">
              {exporting ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Download className="w-4 h-4" />}
            </button>
            {exportMenu && !exporting && (
              <div className="absolute top-full right-0 mt-1 bg-white border border-stone-200 rounded-lg shadow-lg py-1 z-20 min-w-[140px]">
                <button onClick={async () => {
                    setExportMenu(false); setExporting(true);
                    try { await downloadSingle(meeting, group, members, "docx"); }
                    catch (e) { alert("匯出失敗：" + e.message); }
                    finally { setExporting(false); }
                  }}
                  className="w-full px-3 py-1.5 text-left text-sm hover:bg-stone-50 flex items-center gap-2">
                  <FileText className="w-3.5 h-3.5 text-[#2B5797]" /> Word (.docx)
                </button>
                <button onClick={async () => {
                    setExportMenu(false); setExporting(true);
                    try { await downloadSingle(meeting, group, members, "pdf"); }
                    catch (e) { alert("匯出失敗：" + e.message); }
                    finally { setExporting(false); }
                  }}
                  className="w-full px-3 py-1.5 text-left text-sm hover:bg-stone-50 flex items-center gap-2">
                  <FileText className="w-3.5 h-3.5 text-[#C0392B]" /> PDF
                </button>
              </div>
            )}
            <button onClick={() => onEdit(meeting)} className="p-1.5 text-stone-400 hover:text-[#8B1A1A] hover:bg-stone-50 rounded-lg" title="編輯">
              <Edit2 className="w-4 h-4" />
            </button>
          </div>
        </div>

        {speakerMember && (
          <div className="bg-gradient-to-br from-amber-50 to-white border border-amber-200 rounded-lg px-2.5 py-1.5 mb-2 flex items-center gap-2">
            <Presentation2 className="w-4 h-4 text-[#B8860B] flex-shrink-0" />
            <div className="flex-1 min-w-0">
              <div className="text-[11px] text-[#B8860B] font-semibold">本次主講：{speakerMember.name}</div>
              {speaker.topic && <div className="text-xs text-stone-700 truncate">{speaker.topic}</div>}
            </div>
          </div>
        )}

        <div className="my-2">
          <div className="bg-emerald-50 rounded-lg py-1.5 text-center">
            <div className="text-lg font-bold text-emerald-700">{meeting.attendees.length}<span className="text-xs font-normal text-emerald-600">/{totalInGroup}</span></div>
            <div className="text-[10px] text-emerald-600">出席（{attendRate}%）</div>
          </div>
        </div>

        {/* 6 大欄位摘要 pill */}
        <div className="flex flex-wrap gap-1 mb-2">
          {sharings.length > 0 && pill("分享", sharings.length, "bg-amber-50 text-amber-700")}
          {feedback.length > 0 && pill("建議", feedback.length, "bg-blue-50 text-blue-700")}
          {offerCount > 0 && pill("人脈引薦", offerCount, "bg-purple-50 text-purple-700")}
          {referrals.length > 0 && pill(`引薦 NT$${referralTotal.toLocaleString()}`, referrals.length, "bg-pink-50 text-pink-700")}
          {nextMeeting.date && pill("下次", fmtShort(nextMeeting.date), "bg-stone-100 text-stone-600")}
        </div>

        {meeting.discussion && (
          <div className="text-sm text-stone-600 mb-2">
            <p className={expanded ? "" : "line-clamp-2"}>{meeting.discussion}</p>
          </div>
        )}

        <button onClick={() => setExpanded(!expanded)} className="text-xs text-[#B8860B] hover:text-[#8B1A1A] flex items-center gap-1">
          {expanded ? <ChevronDown className="w-3 h-3" /> : <ChevronRight className="w-3 h-3" />}
          {expanded ? "收合" : "展開詳細"}
        </button>

        {expanded && (
          <div className="mt-3 pt-3 border-t border-stone-100 space-y-3 text-sm">
            <div>
              <div className="text-xs font-semibold text-stone-700 mb-1.5">出席 ({meeting.attendees.length})</div>
              <div className="flex flex-wrap gap-1">
                {meeting.attendees.map(id => <span key={id} className="text-xs px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded">{getMember(id)?.name || id}</span>)}
              </div>
            </div>
            {meeting.absentees?.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-700 mb-1.5">缺席 ({meeting.absentees.length})</div>
                <div className="flex flex-wrap gap-1">
                  {meeting.absentees.map(id => <span key={id} className="text-xs px-2 py-0.5 bg-stone-100 text-stone-600 rounded">{getMember(id)?.name || id}</span>)}
                </div>
              </div>
            )}

            {sharings.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-700 mb-1.5 flex items-center gap-1"><Sparkles className="w-3 h-3 text-[#B8860B]" />成長/喜悅分享</div>
                <div className="space-y-1">
                  {sharings.map(s => (
                    <div key={s.id} className="text-xs bg-amber-50/50 rounded p-1.5">
                      <b className="text-[#B8860B]">{getMember(s.memberId)?.name || "?"}：</b>
                      <span className="text-stone-700">{s.content || "（未填）"}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {feedback.length > 0 && (
              <div>

function ProgressDonut({ pct, size = 48, stroke = 5, color = "#B8860B" }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} className="transform -rotate-90">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#e7e5e4" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" className="transition-all" />
    </svg>
  );
}

function StatPill({ label, done, total, color }) {
  const pct = total ? Math.round(done / total * 100) : 0;
  return (
    <div className="flex-1 min-w-0 bg-stone-50 rounded-lg px-2 py-1.5">
      <div className="text-[10px] text-stone-500">{label}</div>
      <div className="text-sm font-bold" style={{ color: color || "#292524" }}>
        {done}<span className="text-xs font-normal text-stone-400">/{total}</span>
      </div>
      <div className="h-1 bg-stone-200 rounded overflow-hidden mt-1">
        <div className="h-full rounded transition-all" style={{ width: `${pct}%`, backgroundColor: color || "#B8860B" }} />
      </div>
    </div>
  );
}

function OneOnOneMatrix({ mentee, members, currentUserId, onUpdate, readOnly, isAdmin, editMode }) {
  const targets = getMenteeAllTargets(mentee);
  const getM = (id) => members.find(m => m.id === id);
  const [local, setLocal] = useState(mentee.oneOnOnes);
  useEffect(() => { setLocal(mentee.oneOnOnes); }, [mentee.id, mentee.oneOnOnes]);
  const dirty = JSON.stringify(local) !== JSON.stringify(mentee.oneOnOnes);

  // 計算本地變更數
  const dirtyCount = useMemo(() => {
    let cnt = 0;
    const all = new Set([...Object.keys(local), ...Object.keys(mentee.oneOnOnes)]);
    all.forEach(tid => {
      ONE_ON_ONE_TYPES.forEach(t => {
        const a = local[tid]?.[t.key]?.done || false;
        const b = mentee.oneOnOnes[tid]?.[t.key]?.done || false;
        if (a !== b) cnt++;
      });
    });
    return cnt;
  }, [local, mentee.oneOnOnes]);

  const toggle = (targetId, typeKey) => {
    const cur = local[targetId]?.[typeKey];
    const newVal = cur?.done ? { done: false }
      : { done: true, doneBy: currentUserId, doneAt: new Date().toISOString() };
    setLocal(p => ({
      ...p,
      [targetId]: { ...(p[targetId] || {}), [typeKey]: newVal },
    }));
  };
  const submit = () => onUpdate({ ...mentee, oneOnOnes: local });
  const reset = () => setLocal(mentee.oneOnOnes);

  const grouped = [
    { label: "核心團隊", items: targets.filter(t => t.group === "core") },
    { label: "導師團隊", items: targets.filter(t => t.group === "mentor") },
  ];
  return (
    <div className="space-y-4">
      {grouped.map(sec => (
        <div key={sec.label}>
          <div className="text-xs font-semibold text-stone-500 mb-1.5 px-1">{sec.label}（{sec.items.length} 人）</div>
          <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
            {sec.items.length === 0 && <div className="text-sm text-stone-400 italic text-center py-3">尚未設定</div>}
            {sec.items.map((tgt, i) => {
              const m = getM(tgt.memberId);
              const rec = local[tgt.memberId] || {};
              const origRec = mentee.oneOnOnes[tgt.memberId] || {};
              const canCheck = !readOnly && editMode && canCheckOneOnOne(mentee, currentUserId, tgt.memberId, isAdmin);
              const isMe = currentUserId === tgt.memberId;
              return (
                <div key={tgt.memberId + i} className={`px-3 py-2 ${i !== 0 ? "border-t border-stone-100" : ""}`}>
                  <div className="flex items-center gap-1 mb-1.5">
                    <span className="text-[10px] text-stone-400 bg-stone-100 px-1.5 py-0.5 rounded">{tgt.role}</span>
                    <span className="text-sm font-medium text-stone-800">{m?.name || tgt.memberId}</span>
                    {isMe && <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">我</span>}
                  </div>
                  <div className="grid grid-cols-5 gap-1">
                    {ONE_ON_ONE_TYPES.map(t => {
                      const cell = rec[t.key] || { done: false };
                      const origDone = origRec[t.key]?.done || false;
                      const pendingChange = cell.done !== origDone;
                      const byM = getM(cell.doneBy);
                      return (
                        <button key={t.key} type="button"
                          disabled={!canCheck}
                          onClick={() => toggle(tgt.memberId, t.key)}
                          title={cell.done && byM ? `${byM.name} 簽 ${cell.doneAt ? fmtDate(cell.doneAt) : ""}` : (canCheck ? "點擊打勾" : "無權限")}
                          className={`py-1.5 rounded-md border text-[10px] font-medium transition flex flex-col items-center gap-0.5 relative
                            ${cell.done ? "bg-emerald-50 border-emerald-300 text-emerald-700" : "bg-white border-stone-200 text-stone-400"}
                            ${pendingChange ? "ring-2 ring-amber-400 ring-offset-1" : ""}
                            ${canCheck ? "hover:border-emerald-400" : "opacity-70 cursor-not-allowed"}`}>
                          {cell.done ? <CheckCircle2 className="w-3.5 h-3.5" /> : <Circle className="w-3.5 h-3.5" />}
                          <span className="leading-none">{t.short}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {dirty && editMode && !readOnly && <SubmitBar onSubmit={submit} onReset={reset} label={`一對一矩陣有 ${dirtyCount} 項變更待儲存`} />}
    </div>
  );
}

// GuestSection 現在改為**唯讀**，資料來源是主站咖啡會議
// kind === "coffeeMeetings"：顯示所有 inviterId = mentee.memberId 的咖啡會議
// kind === "guests"：只顯示「已出席例會」（meetingStatus=done 且 attendanceWillingness=confirmed）的那些
function GuestSection({ mentee, mainCoffeeMeetings = [], onRefreshCoffee, coffeeSyncingAt, kind = "guests" }) {
  const allMyMeetings = useMemo(() =>
    mainCoffeeMeetings.filter(cm => cm.inviterId === mentee.memberId),
    [mainCoffeeMeetings, mentee.memberId]
  );
  const list = useMemo(() => {
    if (kind === "guests") {
      return allMyMeetings.filter(cm =>
        cm.meetingStatus === "done" && cm.attendanceWillingness === "confirmed"
      );
    }
    return allMyMeetings;
  }, [allMyMeetings, kind]);

  // 排序：最新在前
  const sorted = useMemo(() => [...list].sort((a, b) => {
    const da = a.meetingTime || a.createdAt || "";
    const db = b.meetingTime || b.createdAt || "";
    return db.localeCompare(da);
  }), [list]);

  const hintText = kind === "guests"
    ? "此區資料來自「主站咖啡會議」中已出席例會的記錄（meetingStatus=已完成 且 出席意願=確認出席）"
    : "此區資料來自「主站咖啡會議」中該新生為邀約人的全部記錄";
  // 預填邀約人的主站連結
  const newLink = `index.html?view=coffee&inviter=${encodeURIComponent(mentee.memberId)}`;

  const fmtSyncAt = coffeeSyncingAt ? `${String(coffeeSyncingAt.getHours()).padStart(2, "0")}:${String(coffeeSyncingAt.getMinutes()).padStart(2, "0")}` : "";

  return (
    <div>
      <div className="text-[11px] text-stone-500 mb-2 flex items-start gap-1.5">
        <AlertCircle className="w-3 h-3 mt-0.5 flex-shrink-0" />
        <span className="flex-1">{hintText}</span>
      </div>
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <a href={newLink} target="_blank" rel="noopener noreferrer"
          className="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-semibold text-white rounded-md hover:opacity-90"
          style={{ background: "#8B6F47" }}>
          <Coffee className="w-3.5 h-3.5" />去主站新增咖啡會議 ↗
        </a>
        {onRefreshCoffee && (
          <button onClick={onRefreshCoffee}
            className="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs text-stone-600 border border-stone-300 rounded-md hover:bg-stone-50">
            <RefreshCw className="w-3 h-3" />重新整理
          </button>
        )}
        {fmtSyncAt && <span className="text-[10px] text-stone-400">同步於 {fmtSyncAt}</span>}
      </div>
      <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
        {sorted.length === 0 && <div className="text-sm text-stone-400 italic text-center py-6">
          尚無紀錄{kind === "guests" ? "（還沒有成功帶來賓出席）" : ""}
        </div>}
        {sorted.map((cm, i) => {
          const statusColor =
            cm.meetingStatus === "done" ? "#4A6741" :
            cm.meetingStatus === "cancelled" ? "#888" : "#A01E2E";
          const statusText =
            cm.meetingStatus === "done" ? "已完成" :
            cm.meetingStatus === "cancelled" ? "已取消" : "邀約中";
          const willColor =
            cm.attendanceWillingness === "confirmed" ? "#059669" :
            cm.attendanceWillingness === "declined" ? "#6b7280" :
            cm.attendanceWillingness === "pending" ? "#B8860B" : "#888";
          const willText =
            cm.attendanceWillingness === "confirmed" ? "已出席" :
            cm.attendanceWillingness === "declined" ? "未出席" :
            cm.attendanceWillingness === "pending" ? "邀約中" : "未確認";
          const convColor =
            cm.conversionStatus === "signed" || cm.conversionStatus === "paid" ? "#A01E2E" :
            cm.conversionStatus === "sworn" ? "#1A6B1A" :
            cm.conversionStatus === "following" ? "#8B6F47" : null;
          const convText =
            cm.conversionStatus === "signed" ? "已簽單" :
            cm.conversionStatus === "paid" ? "已繳費" :
            cm.conversionStatus === "sworn" ? "已宣誓🎉" :
            cm.conversionStatus === "following" ? "跟進中" : null;
          return (
            <div key={cm.id} className={`px-3 py-2.5 ${i !== 0 ? "border-t border-stone-100" : ""}`}>
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-xs text-stone-500 font-mono">{(cm.meetingTime || "").slice(0, 10) || "—"}</span>
                <span className="text-sm font-semibold text-stone-800">{cm.guestName || "—"}</span>
                <span className="text-xs text-stone-500">{cm.guestIndustry || ""}</span>
              </div>
              <div className="flex items-center gap-1 mt-1 flex-wrap">
                <Tag color={statusColor}>{statusText}</Tag>
                <Tag color={willColor}>{willText}</Tag>
                {convText && <Tag color={convColor}>{convText}</Tag>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AttendanceSection({ mentee, onUpdate, readOnly, editMode }) {
  const [local, setLocal] = useState(mentee.earlyAttendances);
  useEffect(() => { setLocal(mentee.earlyAttendances); }, [mentee.id, mentee.earlyAttendances]);
  const dirty = JSON.stringify(local) !== JSON.stringify(mentee.earlyAttendances);
  const addToday = () => {
    const today = new Date().toISOString().slice(0, 10);
    if (local.includes(today)) return alert("今日已記錄");
    setLocal([...local, today].sort());
  };
  const addCustom = () => {
    const d = prompt("輸入日期（YYYY-MM-DD）", new Date().toISOString().slice(0, 10));
    if (!d || local.includes(d)) return;
    setLocal([...local, d].sort());
  };
  const rm = (d) => setLocal(local.filter(x => x !== d));
  const submit = () => onUpdate({ ...mentee, earlyAttendances: local });
  const reset = () => setLocal(mentee.earlyAttendances);
  const done = local.length >= GRAD_REQS.earlyAttend;
  const canEditNow = !readOnly && editMode;
  return (
    <div>
      <div className="text-xs text-stone-500 mb-2 flex items-center gap-2">
        累計 {local.length} / {GRAD_REQS.earlyAttend} 次（例會 6:15 前到場達標）
        {done && <Tag color="#059669">✓ 已達標</Tag>}
      </div>
      <div className="flex flex-wrap gap-1.5 mb-2 min-h-[28px]">
        {local.map(d => (
          <div key={d} className="inline-flex items-center bg-purple-50 text-purple-700 rounded-md px-2 py-1 text-xs">
            {fmtDate(d)}
            {canEditNow && <button onClick={() => rm(d)} className="ml-1 text-purple-400 hover:text-red-500">×</button>}
          </div>
        ))}
        {local.length === 0 && <span className="text-sm text-stone-400 italic">尚無紀錄</span>}
      </div>
      {canEditNow && (
        <div className="flex gap-2">
          <Btn variant="outline" size="sm" onClick={addToday}><Plus className="w-3.5 h-3.5" />記錄今日</Btn>
          <Btn variant="ghost" size="sm" onClick={addCustom}>補登其他日期</Btn>
        </div>
      )}
      {dirty && canEditNow && <SubmitBar onSubmit={submit} onReset={reset} />}
    </div>
  );
}

function MenteeForm({ mentee, members, mentees, mentorshipDefaults, onSave, onCancel, onDelete }) {
  // 初始化優先級：編輯現有新生 > 分會預設 > 最新一位新生 > 全空
  const [form, setForm] = useState(() => {
    if (mentee) return mentee;
    const latest = mentees[0];
    const d = mentorshipDefaults;

    // 核心團隊優先級
    let coreTeam;
    if (d && Array.isArray(d.coreTeam) && d.coreTeam.length) {
      coreTeam = CORE_ROLES.map(r => {
        const found = d.coreTeam.find(c => c.role === r);
        return { role: r, memberId: found?.memberId || "" };
      });
    } else if (latest) {
      coreTeam = latest.coreTeam.map(c => ({ ...c }));
    } else {
      coreTeam = CORE_ROLES.map(r => ({ role: r, memberId: "" }));
    }

    // 導師團隊優先級
    let mentorTeam;
    if (d && Array.isArray(d.mentorTeam) && d.mentorTeam.length) {
      mentorTeam = d.mentorTeam.map(m => ({ ...m }));
    } else if (latest) {
      mentorTeam = latest.mentorTeam.map(m => ({ ...m }));
    } else {
      mentorTeam = [];
    }

    // 培訓預定日期：只從分會預設套用
    const schedule = (d && d.trainingSchedule) || {};
    const trainings = TRAININGS.map(t => ({
      id: t.id,
      scheduledDate: schedule[t.id] || null,
      completedDate: null,
    }));

    return {
      id: uid("mte"),
      memberId: "", representativeIndustry: "",
      oathDate: new Date().toISOString().slice(0, 10),
      graduationDate: null, graduatedTeam: "",
      mentorPrimaryId: "", mentorSecondaryId: "",
      coreTeam, mentorTeam,
      oneOnOnes: {},
      passport: W_MILESTONES.map(w => ({ key: w.key, completedDate: null })),
      trainings,
      guests: [], coffeeMeetings: [], earlyAttendances: [], supplementReports: [],
      createdAt: new Date().toISOString(),
    };
  });
  // 判斷是否「新增模式且成功套用了預設」
  const isNew = !mentee;
  const hasAppliedDefaults = isNew && !!(mentorshipDefaults &&
    ((mentorshipDefaults.coreTeam?.length || 0) + (mentorshipDefaults.mentorTeam?.length || 0) > 0));
  // 團隊快照摺疊狀態：套用預設時預設摺疊，否則展開
  const [teamExpanded, setTeamExpanded] = useState(!hasAppliedDefaults);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const updCore = (idx, memberId) => {
    const nc = [...form.coreTeam]; nc[idx] = { ...nc[idx], memberId }; set("coreTeam", nc);
  };
  const updMentorTeam = (list) => {
    set("mentorTeam", list.map(id => form.mentorTeam.find(x => x.memberId === id) || { memberId: id, role: "導師" }));
  };
  const setMentorRole = (id, role) =>
    set("mentorTeam", form.mentorTeam.map(m => m.memberId === id ? { ...m, role } : m));

  const submit = () => {
    if (!form.memberId) return alert("請選擇新生");
    if (!form.mentorPrimaryId || !form.mentorSecondaryId) return alert("請選擇正副導師");
    onSave({ ...form, updatedAt: new Date().toISOString() });
  };
  const mentorOptions = members.filter(m => m.id !== form.memberId);

  // 套用預設的摘要（用於提示條）
  const appliedSummary = hasAppliedDefaults ? (() => {
    const chairRoleCount = form.coreTeam.filter(c => c.memberId).length;
    const mentorCount = form.mentorTeam.length;
    const scheduledCount = form.trainings.filter(t => t.scheduledDate).length;
    const parts = [];
    if (chairRoleCount) parts.push(`核心 ${chairRoleCount} 職`);
    if (mentorCount) parts.push(`導師 ${mentorCount} 人`);
    if (scheduledCount) parts.push(`培訓 ${scheduledCount} 場日期`);
    return parts.join("、");
  })() : "";

  return (
    <div>
      {hasAppliedDefaults && (
        <div className="mb-3 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 text-xs text-emerald-900 flex items-start gap-2">
          <CheckCircle2 className="w-4 h-4 mt-0.5 flex-shrink-0" />
          <div className="flex-1">
            <b>已套用分會預設</b>（{appliedSummary}）
            {!teamExpanded && <button onClick={() => setTeamExpanded(true)} className="ml-2 underline">調整此新生的團隊快照</button>}
          </div>
        </div>
      )}

      <div className="grid grid-cols-2 gap-3">
        <Field label="新生" required>
          <MemberSelect members={members} value={form.memberId} onChange={v => set("memberId", v)} placeholder="選擇會員..." />
        </Field>
        <Field label="代表專業">
          <input value={form.representativeIndustry} onChange={e => set("representativeIndustry", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" placeholder="例：短影音行銷" />
        </Field>
        <Field label="宣誓日" required>
          <input type="date" value={form.oathDate} onChange={e => set("oathDate", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
        <Field label="畢業日" hint="結業後填寫">
          <input type="date" value={form.graduationDate || ""} onChange={e => set("graduationDate", e.target.value || null)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="正導師" required>
          <MemberSelect members={mentorOptions} value={form.mentorPrimaryId} onChange={v => set("mentorPrimaryId", v)} />
        </Field>
        <Field label="副導師" required>
          <MemberSelect members={mentorOptions} value={form.mentorSecondaryId} onChange={v => set("mentorSecondaryId", v)} />
        </Field>
      </div>

      {/* 團隊快照：若已套用預設且未展開則摺疊 */}
      {teamExpanded ? (
        <>
          <Field label="核心團隊快照（宣誓當下）" hint="名單建立後釘死，不隨換屆變動">
            <div className="grid grid-cols-2 gap-2">
              {form.coreTeam.map((c, i) => (
                <div key={c.role} className="flex items-center gap-2">
                  <span className="text-xs text-stone-500 w-10 flex-shrink-0">{c.role}</span>
                  <div className="flex-1"><MemberSelect members={members} value={c.memberId} onChange={v => updCore(i, v)} placeholder="—" /></div>
                </div>
              ))}
            </div>
          </Field>

          <Field label={`導師團隊快照（${form.mentorTeam.length} 人）`} hint="預設為導師，可個別調整為副導師">
            <MemberMultiSelect members={mentorOptions} selectedIds={form.mentorTeam.map(m => m.memberId)} onChange={updMentorTeam} />
            {form.mentorTeam.length > 0 && (
              <div className="mt-2 flex flex-wrap gap-1">
                {form.mentorTeam.map(m => {
                  const mem = members.find(x => x.id === m.memberId);
                  return (
                    <div key={m.memberId} className="inline-flex items-center gap-1 bg-stone-100 rounded-md px-2 py-1 text-xs">
                      <span>{mem?.name}</span>
                      <select value={m.role} onChange={e => setMentorRole(m.memberId, e.target.value)}
                        className="bg-transparent text-xs border-l border-stone-300 pl-1">
                        <option value="導師">導師</option>
                        <option value="副導師">副導師</option>
                      </select>
                    </div>
                  );
                })}
              </div>
            )}
          </Field>

          {hasAppliedDefaults && (
            <div className="mb-3 -mt-2">
              <button onClick={() => setTeamExpanded(false)} className="text-xs text-stone-500 hover:text-stone-700 underline">
                ↑ 收合團隊快照
              </button>
            </div>
          )}
        </>
      ) : (
        <div className="mb-4 p-3 bg-stone-50 border border-stone-200 rounded-lg text-xs text-stone-600">
          核心團隊 {form.coreTeam.filter(c => c.memberId).length} 職 · 導師團隊 {form.mentorTeam.length} 人 已套用預設，可按上方「調整此新生的團隊快照」展開編輯。
        </div>
      )}

      <div className="flex items-center justify-between pt-3 border-t border-stone-200">
        <div>
          {mentees.some(x => x.id === form.id) && onDelete && (
            <Btn variant="danger" size="sm" onClick={() => { if (confirm("確定刪除此新生紀錄？所有資料將遺失")) onDelete(form.id); }}>
              <Trash2 className="w-3.5 h-3.5" />刪除
            </Btn>
          )}
        </div>
        <div className="flex gap-2">
          <Btn variant="outline" onClick={onCancel}>取消</Btn>
          <Btn variant="primary" onClick={submit}><Save className="w-4 h-4" />儲存</Btn>
        </div>
      </div>
    </div>
  );
}

function MenteeDetail({ menteeId, mentees, members, currentUserId, isAdmin, mainCoffeeMeetings = [], onRefreshCoffee, coffeeSyncingAt, onUpdate, onBack, onEdit }) {
  const mentee = mentees.find(m => m.id === menteeId);
  const [sectionOpen, setSectionOpen] = useState({
    oneOnOne: true, passport: true, training: true,
    attendance: false, guests: false, coffee: false,
  });
  const [editMode, setEditMode] = useState(false);
  if (!mentee) return null;

  const getM = (id) => members.find(m => m.id === id);
  const canEdit = canEditMentee(mentee, currentUserId, isAdmin);
  const readOnly = !canEdit;
  const s = getMenteeStats(mentee, mainCoffeeMeetings);
  const primary = getM(mentee.mentorPrimaryId);
  const secondary = getM(mentee.mentorSecondaryId);
  const menteeMember = getM(mentee.memberId);
  const toggleSec = (k) => setSectionOpen(p => ({ ...p, [k]: !p[k] }));

  const markGraduated = () => {
    if (mentee.graduationDate) {
      if (!confirm("取消畢業狀態？")) return;
      onUpdate({ ...mentee, graduationDate: null, graduatedTeam: "" });
    } else {
      const team = prompt("畢業後加入的領導團隊？（選填）", "導師團隊") ?? "";
      onUpdate({ ...mentee, graduationDate: new Date().toISOString().slice(0, 10), graduatedTeam: team });
    }
  };

  const Section = ({ k, title, icon, right, children }) => (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
      <button onClick={() => toggleSec(k)} className="w-full flex items-center justify-between px-4 py-3 hover:bg-stone-50">
        <div className="flex items-center gap-2">
          {icon}<span className="font-semibold text-stone-800">{title}</span>{right}
        </div>
        {sectionOpen[k] ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
      </button>
      {sectionOpen[k] && <div className="px-4 pb-4">{children}</div>}
    </div>

  const mainColor = mentee.graduationDate ? "#059669" : "#B8860B";

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2 flex-wrap">
        <Btn variant="ghost" size="sm" onClick={onBack}><ArrowLeft className="w-4 h-4" />返回</Btn>
        <h2 className="text-lg font-semibold text-stone-800 flex-1 truncate">

          <>

                <CheckCircle2 className="w-3.5 h-3.5" />完成編輯

            <Btn variant="outline" size="sm" onClick={() => onEdit(mentee.id)}><Edit2 className="w-3.5 h-3.5" />基本資料</Btn>
            <Btn variant={mentee.graduationDate ? "outline" : "success"} size="sm" onClick={markGraduated}>
              <Award className="w-3.5 h-3.5" />{mentee.graduationDate ? "取消畢業" : "標記畢業"}

              <div className="truncate"><span className="text-stone-500">正導師：</span>{primary?.name || "—"}</div>

// ============ 分會預設團隊設定 Modal ============
function MentorshipDefaultsModal({ open, onClose, members, defaults, onSave }) {
  // 初始化 local state：用傳入的 defaults 或空白
  const [coreTeam, setCoreTeam] = useState([]);
  const [mentorTeam, setMentorTeam] = useState([]);
  const [trainingSchedule, setTrainingSchedule] = useState({});  // { t1: "2026-05-12", ... }
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!open) return;
    // Modal 開啟時重置 local state
    if (defaults) {
      setCoreTeam(defaults.coreTeam?.length
        ? CORE_ROLES.map(r => {
            const found = defaults.coreTeam.find(c => c.role === r);
            return { role: r, memberId: found?.memberId || "" };
          })
        : CORE_ROLES.map(r => ({ role: r, memberId: "" })));
      setMentorTeam((defaults.mentorTeam || []).map(m => ({ ...m })));
      setTrainingSchedule({ ...(defaults.trainingSchedule || {}) });
    } else {
      setCoreTeam(CORE_ROLES.map(r => ({ role: r, memberId: "" })));
      setMentorTeam([]);
      setTrainingSchedule({});
    }
  }, [open, defaults]);

  if (!open) return null;

  const updCore = (idx, memberId) => {
    const nc = [...coreTeam];
    nc[idx] = { ...nc[idx], memberId };
    setCoreTeam(nc);
  };
  const updMentorTeam = (ids) => {
    setMentorTeam(ids.map(id => mentorTeam.find(x => x.memberId === id) || { memberId: id, role: "導師" }));
  };
  const setMentorRole = (id, role) =>
    setMentorTeam(mentorTeam.map(m => m.memberId === id ? { ...m, role } : m));
  const setTrainingDate = (trainingId, date) =>
    setTrainingSchedule(p => ({ ...p, [trainingId]: date || null }));

  const handleSave = async () => {
    setSaving(true);
    try {
      await onSave({
        coreTeam: coreTeam.filter(c => c.memberId),
        mentorTeam: mentorTeam.filter(m => m.memberId),
        trainingSchedule,
      });
      onClose();
    } catch (e) {
      alert("儲存失敗：" + e.message);
    } finally {
      setSaving(false);
    }
  };

  const coreFilled = coreTeam.filter(c => c.memberId).length;

  return (
    <Modal open={open} onClose={onClose} title="分會預設團隊" maxWidth="max-w-2xl"
      footer={
        <div className="flex items-center justify-between gap-2">
          <span className="text-xs text-stone-500">
            {defaults?.updatedAt ? `上次更新：${fmtDate(defaults.updatedAt)}` : "尚未設定過"}
          </span>
          <div className="flex gap-2">
            <Btn variant="ghost" size="sm" onClick={onClose} disabled={saving}>取消</Btn>
            <Btn variant="primary" size="sm" onClick={handleSave} disabled={saving}>
              <Save className="w-3.5 h-3.5" />
              {saving ? "儲存中⋯" : "儲存預設"}
            </Btn>
          </div>
        </div>
      }>
      <div className="space-y-5">
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
          💡 這裡設定的內容會套用到<b>每次新增新生</b>。既有新生的快照不會被影響。
        </div>

        {/* 核心團隊 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="font-semibold text-stone-800 flex items-center gap-2">
              <Users className="w-4 h-4 text-[#B8860B]" />
              核心團隊（8 職）
            </div>
            <span className="text-xs text-stone-500">已填 {coreFilled}/8</span>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {coreTeam.map((c, i) => (
              <div key={c.role} className="flex items-center gap-2">
                <span className="text-xs text-stone-600 w-14 flex-shrink-0">{c.role}</span>
                <div className="flex-1 min-w-0">
                  <MemberSelect members={members} value={c.memberId}
                    onChange={id => updCore(i, id)} placeholder="—" />
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* 導師團隊 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="font-semibold text-stone-800 flex items-center gap-2">
              <GraduationCap className="w-4 h-4 text-[#8B1A1A]" />
              導師團隊（{mentorTeam.length} 人）
            </div>
          </div>
          <MemberMultiSelect members={members} selectedIds={mentorTeam.map(m => m.memberId)} onChange={updMentorTeam} />
          {mentorTeam.length > 0 && (
            <div className="mt-2 flex flex-wrap gap-1.5">
              {mentorTeam.map(m => {
                const mem = members.find(x => x.id === m.memberId);
                return (
                  <div key={m.memberId} className="inline-flex items-center gap-1 bg-stone-50 border border-stone-200 rounded-md px-2 py-1 text-xs">
                    <span>{mem?.name || m.memberId}</span>
                    <select value={m.role} onChange={e => setMentorRole(m.memberId, e.target.value)}
                      className="text-[10px] bg-white border border-stone-200 rounded px-1 py-0.5">
                      <option value="導師">導師</option>
                      <option value="副導師">副導師</option>

  const [filter, setFilter] = useState({ mode: "all", search: "" });

  const saveMentee = (m) => {
    const updated = { ...m, updatedAt: new Date().toISOString() };
    setMentees(mentees.some(x => x.id === m.id) ? mentees.map(x => x.id === m.id ? updated : x) : [updated, ...mentees]);
    setEditingId(null);
  };

  const filtered = useMemo(() => {
    let list = mentees;
    if (filter.mode === "inProgress") list = list.filter(m => !m.graduationDate);
    if (filter.mode === "graduated") list = list.filter(m => m.graduationDate);
    if (filter.mode === "mine") list = list.filter(m =>
      m.mentorPrimaryId === currentUserId || m.mentorSecondaryId === currentUserId);
