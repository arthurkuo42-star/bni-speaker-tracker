<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BNI 主題演講進度追蹤</title>

<!-- PWA：可安裝為手機 App（加到主畫面 → 全螢幕原生體驗）-->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#8B1A1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="富鼎分會">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./web-app-manifest-192x192.png">
<link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png">

<!-- Railway Proxy URL（請改成您的 Railway domain） -->
<script>
  window.BNI_PROXY_URL = 'https://bni-kpi-production.up.railway.app';
</script>

<!-- Preconnect：提早跟各 CDN 建立 TCP / TLS，縮短後續下載的首位元組時間 -->
<link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Prefetch：主頁閒置時偷偷載 operations.html，之後點「組聚 / 導師」瞬間開 -->
<link rel="prefetch" href="operations.html" as="document">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<!-- 注意：xlsx (~900KB) 改為按需動態載入（匯入/下載範本時才抓）-->
<style>
  /* ============================================================
   * BNI 富鼎品牌色票（設計 token）
   * 任何要改色的地方，直接改這裡的 CSS 變數即可全站套用。
   * 對應原本散落的硬寫色碼：
   *   #F5F0E8 / #FAF7F2  → 背景
   *   #8B1A1A             → BNI 主紅（瀏覽器標題列、主標題）
   *   #A01E2E             → 紅綠燈/演講/後台 強調色
   *   #2D5A27             → 紅綠燈綠
   *   #8B6F47             → 咖啡棕
   *   #6B4C8A             → 服務鏈紫
   *   #1A1414             → 深色文字
   * ============================================================ */
  :root {
    --c-bg: #F5F0E8;
    --c-surface: #FAF7F2;
    --c-card: #FFFFFF;
    --c-text: #1A1414;
    --c-muted: #78716C;

    --c-brand: #8B1A1A;
    --c-brand-deep: #6B0E0E;

    --c-kpi: #A01E2E;
    --c-kpi-green: #2D5A27;
    --c-kpi-yellow: #C99B2E;
    --c-coffee: #8B6F47;
    --c-chain: #6B4C8A;

    /* 字體 stack（避免每元件都寫一次 fontFamily） */
    --font-sans: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', 'Heiti TC', 'Apple LiGothic', sans-serif;
    --font-serif: 'Noto Serif TC', 'Playfair Display', serif;
  }
  body {
    /* 優先用系統內建 CJK 字型繪出首頁，等 Noto Sans TC 下載完才切換 —— 減少 FOIT */
    font-family: var(--font-sans);
    background: var(--c-bg);
    color: var(--c-text);
    margin: 0;
  }
  .loading-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--c-bg); color: var(--c-coffee); font-size: 14px;
  }
  /* === 身份識別歡迎畫面 === */
  .identity-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(26, 20, 20, 0.45);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .identity-card {
    background: var(--c-card);
    border-radius: 16px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    width: 100%; max-width: 420px;
    padding: 28px 24px;
    font-family: var(--font-sans);
  }
  .identity-card h2 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 22px;
    color: var(--c-text);
    margin: 0 0 6px;
  }
  .identity-card .hint {
    font-size: 13px;
    color: var(--c-muted);
    margin-bottom: 18px;
    line-height: 1.6;
  }
  .identity-card .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--c-kpi);
    margin-bottom: 8px;
  }
  .identity-card .skip {
    margin-top: 14px;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--c-muted);
    font-size: 12px;
    cursor: pointer;
    padding: 8px;
  }
  .identity-card .skip:hover { color: var(--c-text); }
  /* === 頂部身份小卡 === */
  .identity-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px 4px 4px;
    border-radius: 999px;
    background: #F5EFE7;
    color: var(--c-text);
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .identity-chip:hover { background: #ECE3D5; }
  .identity-chip.unset { background: transparent; border-color: #E7E0D2; color: var(--c-muted); padding-left: 10px; }
  .identity-chip .avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--c-kpi);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  /* === 手機底部 tab bar（Session 3）=== */
  .bottom-tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: var(--c-card);
    border-top: 1px solid #E7E0D2;
    z-index: 50;
    padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
  }
  .bottom-tab {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    padding: 4px;
    font-size: 11px;
    color: var(--c-muted);
    background: none; border: none;
    cursor: pointer;
    font-family: var(--font-sans);
    transition: color 0.15s;
  }
  .bottom-tab.active { color: var(--c-kpi); font-weight: 600; }
  .bottom-tab .icon { font-size: 22px; line-height: 1; }
  .bottom-tab.active .icon { transform: translateY(-1px); transition: transform 0.15s; }
  @media (min-width: 768px) {
    .bottom-tab-bar { display: none; }
  }
  @media (max-width: 767px) {
    body { padding-bottom: 68px; }  /* 推開內容、避免被 bottom tab 蓋住 */
  }

  /* === 手機漢堡選單 drawer（Session 3）=== */
  .hamburger-btn {
    width: 40px; height: 40px;
    border-radius: 8px;
    border: 1px solid #E7E0D2;
    background: var(--c-card);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--c-text);
  }
  .hamburger-btn:hover { background: #F5EFE7; }
  .drawer-overlay {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(26,20,20,0.4);
    backdrop-filter: blur(2px);
    animation: drawerFade 0.18s ease;
  }
  .drawer-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 280px; max-width: 85vw;
    background: var(--c-card);
    z-index: 70;
    box-shadow: -8px 0 24px rgba(0,0,0,0.15);
    padding: 16px;
    display: flex; flex-direction: column;
    gap: 4px;
    font-family: var(--font-sans);
    animation: drawerSlide 0.22s ease;
    overflow-y: auto;
  }
  .drawer-panel .drawer-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #F0E6D2;
  }
  .drawer-panel .drawer-head .label {
    font-size: 10px; letter-spacing: 0.3em; color: var(--c-muted);
  }
  .drawer-panel .drawer-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none; background: transparent;
    color: var(--c-muted); cursor: pointer;
    font-size: 18px; line-height: 1;
  }
  .drawer-panel .drawer-close:hover { background: #F5EFE7; }
  .drawer-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--c-text);
    text-decoration: none;
    border: none; background: transparent;
    text-align: left;
    cursor: pointer;
    font-family: var(--font-sans);
  }
  .drawer-item:hover { background: #F5EFE7; }
  .drawer-item .item-icon { font-size: 18px; width: 24px; text-align: center; }
  .drawer-item.active { background: #FCEFE3; color: var(--c-kpi); font-weight: 600; }
  @keyframes drawerSlide {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  @keyframes drawerFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* === 閱讀/編輯模式切換按鈕（Session 4）=== */
  .mode-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: #F5EFE7;
    border: 1px solid transparent;
    color: var(--c-text);
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background 0.15s;
  }
  .mode-toggle:hover { background: #ECE3D5; }
  .mode-toggle.edit { background: var(--c-kpi); color: #fff; }
  .mode-toggle.edit:hover { background: var(--c-brand-deep); }
  /* 編輯模式條（提示目前可以動資料） */
  .edit-mode-banner {
    background: linear-gradient(90deg, var(--c-kpi) 0%, #C5371A 100%);
    color: #fff;
    font-size: 12px;
    font-family: var(--font-sans);
    text-align: center;
    padding: 6px 12px;
    letter-spacing: 0.05em;
  }
  .edit-mode-banner button {
    background: rgba(255,255,255,0.15); border: none;
    color: #fff; cursor: pointer;
    padding: 2px 10px; border-radius: 4px;
    margin-left: 12px; font-size: 11px;
    font-family: var(--font-sans);
  }
  .edit-mode-banner button:hover { background: rgba(255,255,255,0.25); }

  /* === 桌機「⋯ 更多」下拉選單（次要功能：演講/服務鏈/後台/導生）=== */
  .more-menu-container {
    position: relative;
    display: inline-block;
  }
  .more-menu-btn {
    padding: 8px 14px;
    border-radius: 6px;
    background: #F5EFE7;
    border: 1px solid transparent;
    color: var(--c-text);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: background 0.15s;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .more-menu-btn:hover { background: #ECE3D5; }
  .more-menu-btn.open { background: var(--c-text); color: #fff; }
  .more-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    min-width: 160px;
    background: var(--c-card);
    border: 1px solid #E7E0D2;
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 4px;
    z-index: 40;
    font-family: var(--font-sans);
    animation: dropdownIn 0.12s ease;
  }
  .more-dropdown a, .more-dropdown button {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 8px 12px;
    background: none; border: none;
    text-decoration: none;
    text-align: left;
    color: var(--c-text);
    font-size: 13px;
    font-family: var(--font-sans);
    cursor: pointer;
    border-radius: 6px;
  }
  .more-dropdown a:hover, .more-dropdown button:hover { background: #F5EFE7; }
  .more-dropdown .active { background: #FCEFE3; color: var(--c-kpi); font-weight: 600; }
  .more-dropdown .item-icon { font-size: 16px; width: 20px; text-align: center; }
  @keyframes dropdownIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

// ===== 按需動態載入 xlsx（~900KB，只有匯入/下載範本時才需要）=====
const _loadedScripts = {};
function loadScript(url) {
  if (_loadedScripts[url]) return _loadedScripts[url];
  _loadedScripts[url] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => { delete _loadedScripts[url]; reject(new Error('載入失敗：' + url)); };
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}
async function ensureXLSX() {
  if (window.XLSX) return;
  await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');
}

// ===== Storage (Railway Proxy 雲端同步) =====
// 部署後在 index.html 裡設定 window.BNI_PROXY_URL
const PROXY_URL = window.BNI_PROXY_URL || '';

// SWR（Stale-While-Revalidate）快取助手
// 原理：讀取時先回 localStorage 的舊版（瞬間顯示），同時背景抓新版；
// 新版回來後透過 onFresh callback 通知畫面靜默更新。
const SWR_PREFIX = 'swr_cache_v1:';
function swrRead(key) {
  try {
    const raw = localStorage.getItem(SWR_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function swrWrite(key, value) {
  try { localStorage.setItem(SWR_PREFIX + key, JSON.stringify(value)); } catch {}
}
function swrDelete(key) {
  try { localStorage.removeItem(SWR_PREFIX + key); } catch {}
}

// 共享 PIN 取得邏輯：避免並發寫入時 prompt 跳多次
let _pinAskingPromise = null;
async function obtainWritePin() {
  const cached = localStorage.getItem('bni_write_pin');
  if (cached) return cached;
  if (_pinAskingPromise) return _pinAskingPromise;
  _pinAskingPromise = new Promise((resolve, reject) => {
    const pin = prompt('第一次寫入需要輸入「寫入 PIN」（分會共用，請向幹部索取）：');
    if (pin) resolve(pin.trim());
    else {
      // 明確告知使用者：取消 = 沒儲存
      alert('⚠️ 你取消了 PIN 輸入\n\n你剛剛的修改「沒有」儲存到雲端。\n如果想保留變更，請重新編輯後再次儲存並輸入 PIN（888888）。');
      reject(new Error('已取消'));
    }
  });
  _pinAskingPromise.finally(() => {
    setTimeout(() => { _pinAskingPromise = null; }, 0);
  });
  return _pinAskingPromise;
}

const apiClient = {
  // 第三參數 onFresh：背景拿到新版時的 callback（可選）
  async get(key, shared = true, onFresh) {
    const cached = swrRead(key);
    const fetchFresh = async () => {
      try {
        const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(key));
        // 404 = 雲端真的沒有這個 key（跟網路錯誤的 null 區分開：
        // 只有確定不存在才可以初始化寫入，網路錯誤時寫入會蓋掉既有資料）
        if (res.status === 404) { swrDelete(key); return { missing: true }; }
        if (!res.ok) throw new Error('讀取失敗: ' + res.status);
        const json = await res.json();
        const result = json && json.value !== undefined ? { value: json.value } : null;
        if (result) swrWrite(key, result);
        return result;
      } catch (e) {
        console.error('[apiClient.get]', key, e);
        return null;
      }
    };
    if (cached) {
      // 有快取：立刻回傳舊版，背景抓新版
      (async () => {
        const fresh = await fetchFresh();
        if (fresh && onFresh) {
          try {
            if (JSON.stringify(fresh) !== JSON.stringify(cached)) onFresh(fresh);
          } catch {}
        }
      })();
      return cached;
    }
    // 沒快取：等網路回來
    const fresh = await fetchFresh();
    if (!fresh) alert('讀取雲端資料失敗，請檢查網路或 Proxy 設定');
    return fresh;
  },

  async set(key, value, shared = true, opts = {}) {
    // opts.deletedIds：告訴伺服器哪些 id 是「明確刪除」。伺服器對主站資料做防縮水合併，
    // 沒宣告刪除的「整包少幾筆」會被當成舊快取漏資料而還原回去。
    const tryWrite = async (pin) => {
      return fetch(PROXY_URL + '/api/data', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Write-PIN': pin || ''
        },
        body: JSON.stringify({ key, value, ...(opts.deletedIds ? { deletedIds: opts.deletedIds } : {}) })
      });
    };

    let pin = localStorage.getItem('bni_write_pin') || '';
    let res = await tryWrite(pin);

    if (res.status === 401) {
      // 並發寫入共用同一個 prompt，使用者只會被問 1 次
      const newPin = await obtainWritePin();
      res = await tryWrite(newPin);
      if (res.ok) {
        localStorage.setItem('bni_write_pin', newPin);
      } else {
        localStorage.removeItem('bni_write_pin');
        alert('PIN 錯誤，請重新整理再試');
        throw new Error('PIN 錯誤');
      }
    }

    if (!res.ok) throw new Error('寫入失敗: ' + res.status);
    // 寫入成功後立刻更新 SWR 快取，讓下次讀取不需等網路
    swrWrite(key, { value });
    return { value };
  }
};

// SWR 版的原始 fetch：給 /api/chains-data 這類不走 apiClient 的 GET 端點用
async function swrFetchRaw(url, onFresh) {
  const cacheKey = 'raw:' + url;
  const cached = swrRead(cacheKey);
  const fetchIt = async () => {
    try {
      const r = await fetch(url);
      if (!r.ok) return null;
      const data = await r.json();
      swrWrite(cacheKey, data);
      return data;
    } catch { return null; }
  };
  if (cached) {
    (async () => {
      const fresh = await fetchIt();
      if (fresh && onFresh) {
        try { if (JSON.stringify(fresh) !== JSON.stringify(cached)) onFresh(fresh); } catch {}
      }
    })();
    return cached;
  }
  return await fetchIt();
}

// ============ 可搜尋的會員選擇器 ============
function MemberSearchSelect({ members, value, onChange, placeholder = '— 請選擇 —', allowClear = true, showIndustry = true }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState('');
  const containerRef = useRef(null);

  const selected = value ? members.find(m => m.id === value) : null;

  // 點擊外部關閉
  useEffect(() => {
    const handler = (e) => {
      if (containerRef.current && !containerRef.current.contains(e.target)) {
        setOpen(false);
        setQuery('');
      }
    };
    if (open) document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const filtered = useMemo(() => {
    if (!query.trim()) return members;
    const q = query.toLowerCase();
    return members.filter(m =>
      (m.name || '').toLowerCase().includes(q) ||
      (m.industry || '').toLowerCase().includes(q) ||
      (m.company || '').toLowerCase().includes(q)
    );
  }, [members, query]);

  const pick = (id) => {
    onChange(id);
    setOpen(false);
    setQuery('');
  };

  return (
    <div ref={containerRef} className="relative" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <button
        type="button"
        onClick={() => setOpen(!open)}
        className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md bg-white text-left flex items-center justify-between hover:border-stone-500 transition-colors"
      >
        <span className={selected ? 'text-stone-800' : 'text-stone-400'}>
          {selected ? (
            <>
              <span className="font-medium">{selected.name}</span>
              {showIndustry && selected.industry && <span className="text-stone-500 ml-1 text-xs">· {selected.industry}</span>}
            </>
          ) : placeholder}
        </span>
        <ChevronDown className={`w-4 h-4 text-stone-400 transition-transform ${open ? 'rotate-180' : ''}`} />
      </button>

      {open && (
        <div className="absolute z-20 mt-1 w-full bg-white border border-stone-300 rounded-md shadow-lg max-h-64 overflow-hidden flex flex-col">
          <div className="p-2 border-b border-stone-200 sticky top-0 bg-white">
            <input
              type="text"
              autoFocus
              value={query}
              onChange={e => setQuery(e.target.value)}
              placeholder="搜尋姓名 / 行業 / 公司⋯"
              className="w-full px-2 py-1.5 text-sm border border-stone-200 rounded focus:outline-none focus:border-stone-500"
            />
          </div>
          <div className="overflow-y-auto">
            {allowClear && (
              <button
                type="button"
                onClick={() => pick(null)}
                className="w-full px-3 py-2 text-sm text-left hover:bg-stone-50 text-stone-400 italic border-b border-stone-100"
              >
                清除選擇
              </button>
            )}
            {filtered.length === 0 ? (
              <div className="px-3 py-4 text-sm text-stone-400 text-center">找不到符合的會員</div>
            ) : (
              filtered.map(m => (
                <button
                  key={m.id}
                  type="button"
                  onClick={() => pick(m.id)}
                  className={`w-full px-3 py-2 text-sm text-left hover:bg-amber-50 transition-colors ${value === m.id ? 'bg-amber-50' : ''}`}
                >
                  <div className="font-medium text-stone-800">{m.name}</div>
                  {showIndustry && (m.industry || m.company) && (
                    <div className="text-xs text-stone-500">
                      {m.industry}{m.industry && m.company ? ' · ' : ''}{m.company}
                    </div>
                  )}
                </button>
              ))
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// 取得 ISO 週一的日期
const getMonday = (d) => {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(date.setDate(diff));
  monday.setHours(0, 0, 0, 0);
  return monday;
};

const formatDate = (d) => {
  const date = new Date(d);
  return `${date.getMonth() + 1}/${date.getDate()}`;
};

const formatFullDate = (d) => {
  const date = new Date(d);
  return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
};

const weekdayZh = (d) => ['日', '一', '二', '三', '四', '五', '六'][new Date(d).getDay()];

const daysBetween = (d1, d2) => {
  const a = new Date(d1); a.setHours(0, 0, 0, 0);
  const b = new Date(d2); b.setHours(0, 0, 0, 0);
  return Math.round((b - a) / (1000 * 60 * 60 * 24));
};

// 算某個任務的截止日：演講日往前推 weekBefore 週（weekBefore=0 即演講當天）
const taskDeadline = (meetingDate, weekBefore) => {
  const d = new Date(meetingDate);
  d.setDate(d.getDate() - (weekBefore || 0) * 7);
  return d;
};
// 短日期：6/19（四）
const formatShortDate = (d) => {
  const date = new Date(d);
  return `${date.getMonth() + 1}/${date.getDate()}（${weekdayZh(date)}）`;
};
// 未完成任務相對今天的緊急狀態（已完成回 null）
const deadlineStatus = (deadline, done) => {
  if (done) return null;
  const diff = daysBetween(new Date(), deadline);
  if (diff < 0) return { label: `逾期 ${-diff} 天`, color: '#A01E2E', urgent: true };
  if (diff === 0) return { label: '今天到期', color: '#A01E2E', urgent: true };
  if (diff <= 7) return { label: `剩 ${diff} 天`, color: '#854F0B', urgent: false };
  return null;
};

// 預設 6 週的會議日（週四）
const generateDefaultMeetings = (count = 12) => {
  const today = new Date();
  const monday = getMonday(today);
  const meetings = [];
  for (let i = 0; i < count; i++) {
    const meetingDate = new Date(monday);
    meetingDate.setDate(monday.getDate() + 3 + i * 7); // 週四
    meetings.push({
      id: `m_${meetingDate.getTime()}`,
      date: meetingDate.toISOString(),
      slotA: { speakerId: null, helperId: null, topic: '', tasks: {} },
      slotB: { speakerId: null, helperId: null, topic: '', tasks: {} },
    });
  }
  return meetings;
};

        // 已經有 PIN 在身上 → 直接進入編輯
        persistEditMode(true);
        showToast('已切換到編輯模式', 'success');
        return;
      }
      // 沒有 PIN → 跟使用者要
      const pin = await obtainWritePin();
      if (!pin) return;
      // 驗證 PIN：嘗試一個 noop 寫入確認 PIN 對
      // 簡化做法：直接存 PIN 並切換，下次真要寫入時若 PIN 錯 obtainWritePin 會重問
      localStorage.setItem('bni_write_pin', pin);
      persistEditMode(true);
      showToast('已切換到編輯模式', 'success');
    } catch {
      // 使用者取消
    }
  };
  const editCtxValue = useMemo(() => ({ editMode, setEditMode: persistEditMode, requestEditMode }), [editMode]);
  const setIdentity = (id) => {
    try {
      if (id) {
        localStorage.setItem(IDENTITY_KEY, id);
        localStorage.removeItem(IDENTITY_SKIP_KEY);
      } else {
        localStorage.removeItem(IDENTITY_KEY);
      }
    } catch {}
    setIdentityId(id);
    setIdentityPrompt(false);
  };
  const clearIdentity = () => setIdentity(null);
  const skipIdentity = () => {
    try { localStorage.setItem(IDENTITY_SKIP_KEY, '1'); } catch {}
    setIdentityPrompt(false);
  };
  const identityMember = useMemo(() => {
    if (!identityId || !data?.members) return null;
    return data.members.find(m => m.id === identityId) || null;
  }, [identityId, data?.members]);
  const identityCtxValue = useMemo(() => ({
    memberId: identityId,
    member: identityMember,
    setIdentity,
    clearIdentity,
  }), [identityId, identityMember]);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  // 載入資料（SWR：先用快取瞬間顯示，背景抓新版後靜默更新）
  useEffect(() => {
    (async () => {
      try {
        const res = await apiClient.get(STORAGE_KEY, true, (fresh) => {
          // 背景拿到新版：無縫更新畫面
          if (fresh && fresh.value) {
            try { setData(JSON.parse(fresh.value)); } catch {}
          }
        });
        if (res && res.value) {
          setData(JSON.parse(res.value));
        } else if (res && res.missing) {
          // 雲端確定沒有資料（404）→ 初始化寫入
          const init = defaultData();
          setData(init);
          await apiClient.set(STORAGE_KEY, JSON.stringify(init), true);
        } else {
          // 網路錯誤（讀不到 ≠ 不存在）→ 只在本機顯示預設畫面，絕不寫上雲端，
          // 並擋住後續儲存，避免把空資料蓋掉雲端既有資料
          setData(defaultData());
          setLoadFailed(true);
        }
      } catch (e) {
        setData(defaultData());
        setLoadFailed(true);
      }
      try {
        const pinRes = await apiClient.get(PIN_KEY, true, (fresh) => {
          setPinSet(!!(fresh && fresh.value));
        });
        setPinSet(!!(pinRes && pinRes.value));
      } catch (e) {
        setPinSet(false);
      }
      setLoading(false);
    })();
  }, []);

  // 儲存資料
  const saveData = async (next, opts = {}) => {
    if (loadFailed) {
      showToast('資料未正確載入，請重新整理頁面後再操作', 'error');
      return;
    }
    const withTime = { ...next, updatedAt: new Date().toISOString() };
    setData(withTime);
    try {
      await apiClient.set(STORAGE_KEY, JSON.stringify(withTime), true, opts);
    } catch (e) {
      showToast('儲存失敗，請重試', 'error');
    }
  };

  if (loading || !data) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: '#FAF7F2' }}>
        <div className="text-stone-500">載入中⋯</div>
      </div>
    );
  }

  // 首次進站且分會已有會員 → 跳「請選擇你是誰」歡迎畫面
  // （已選過、或按過「先不選」、或還沒有會員資料 → 不擋）
  const shouldShowIdentityWelcome =
    !identityId &&
    (data.members?.length || 0) > 0 &&
    (() => { try { return !localStorage.getItem(IDENTITY_SKIP_KEY); } catch { return true; } })();

  return (
    <IdentityContext.Provider value={identityCtxValue}>
    <EditModeContext.Provider value={editCtxValue}>
    <div className="min-h-screen" style={{ background: '#FAF7F2', fontFamily: "'Noto Serif TC', 'Playfair Display', serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet" />

      {(shouldShowIdentityWelcome || identityPrompt) && (
        <IdentitySelect
          members={data.members}
          onPick={setIdentity}
          onSkip={skipIdentity}
        />
      )}

      {editMode && (
        <div className="edit-mode-banner">
          ✏️ 編輯模式 — 你可以新增/編輯/刪除
          <button onClick={() => persistEditMode(false)}>切回閱讀模式</button>
        </div>
      )}

      <Header
        view={view}
        setView={setView}
        adminAuth={adminAuth}
        setAdminAuth={setAdminAuth}
        chapterName={data.chapterName}
        identityMember={identityMember}
        onIdentityClick={() => setIdentityPrompt(true)}
        onOpenDrawer={() => setDrawerOpen(true)}
        editMode={editMode}
        onToggleEditMode={requestEditMode}
      />

      <main className="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-10">
        {view === 'home' && (
          <HomeView data={data} setView={setView} setAdminTab={setAdminTab} />
        )}
        {view === 'kpi' && (
          <KpiDashboard />
        )}
        {view === 'dashboard' && (
          <Dashboard data={data} onGoProgress={() => { setAdminTab('progress'); setView('admin'); }} />
        )}
        {view === 'coffee' && (
          <CoffeeMeetingPage data={data} saveData={saveData} showToast={showToast} />
        )}
        {view === 'chains' && (
          <ServiceChainView />
        )}
        {view === 'kpi-admin' && (
          <KpiAdminPanel showToast={showToast} />
        )}
        {view === 'admin' && !adminAuth && (
          <AdminGate pinSet={pinSet} setPinSet={setPinSet} onPass={() => setAdminAuth(true)} showToast={showToast} />
        )}
        {view === 'admin' && adminAuth && (
          <AdminPanel
            data={data}
            saveData={saveData}
            adminTab={adminTab}
            setAdminTab={setAdminTab}
            showToast={showToast}
          />
        )}
      </main>

      {toast && (
        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg shadow-xl z-50 text-sm font-medium ${toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-stone-800 text-white'}`}
          style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
          {toast.msg}
        </div>
      )}

      <footer className="text-center py-8 text-xs text-stone-400" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
        最後更新：{new Date(data.updatedAt).toLocaleString('zh-TW')}
      </footer>

      <BottomTabBar view={view} setView={setView} />
      <MobileDrawer
        open={drawerOpen}
        onClose={() => setDrawerOpen(false)}
        view={view}
        setView={setView}
        adminAuth={adminAuth}
        setAdminAuth={setAdminAuth}
      />
    </div>
    </EditModeContext.Provider>
    </IdentityContext.Provider>
  );
}

// 桌機「⋯ 更多」下拉：收 4 個次要功能（演講/服務鏈/後台/導生）
function MoreMenu({ view, setView, secondaryHasActive }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    if (open) document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  return (
    <div className="more-menu-container" ref={ref}>
      <button
        type="button"
        className={`more-menu-btn ${(open || secondaryHasActive) ? 'open' : ''}`}
        onClick={() => setOpen(!open)}
        aria-haspopup="menu"
        aria-expanded={open}
      >
        ⋯ 更多
      </button>
      {open && (
        <div className="more-dropdown" role="menu">
          {SECONDARY_NAVS.map(n => n.type === 'view' ? (
            <button
              key={n.id}
              className={view === n.id ? 'active' : ''}
              onClick={() => { setView(n.id); setOpen(false); }}
            >
              <span className="item-icon">{n.emoji}</span>{n.label}
            </button>
          ) : (
            <a key={n.id} href={n.href} onClick={() => setOpen(false)}>
              <span className="item-icon">{n.emoji}</span>{n.label}
            </a>
          ))}
        </div>
      )}
    </div>
  );
}

// 卡片 1：我的紅綠燈
function MyKpiCard({ me, onMore }) {
  const [loading, setLoading] = useState(true);
  const [myKpi, setMyKpi] = useState(null);  // { totalScore, groupName, ...raw fields }
  const [remainWeeks, setRemainWeeks] = useState(0);
  const [err, setErr] = useState(null);

  useEffect(() => {
    if (!me) { setLoading(false); return; }
    const proxy = (typeof window !== 'undefined' && window.BNI_PROXY_URL) ? window.BNI_PROXY_URL : '';
    if (!proxy) { setLoading(false); setErr('需部署後查看'); return; }
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch(proxy + '/api/groups-overview');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        if (cancelled) return;
        // 在 groups 裡找名字
        let hit = null;
        for (const [gName, g] of Object.entries(json.groups || {})) {
          const m = (g.members || []).find(x => x.name === me.name);
          if (m) { hit = { ...m, groupName: gName }; break; }
        }
        setMyKpi(hit);
        setRemainWeeks((json.config && json.config.remainWeeks) || 0);
      } catch (e) {
        if (!cancelled) setErr('資料載入失敗');
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [me?.name]);

  return (
    <HomeCard title="我的紅綠燈" accent="var(--c-kpi-green)" emoji="🚦" onMore={me ? onMore : null}>
      {!me && <CardPlaceholder text="選擇身份後查看本人分數" />}
      {me && loading && <CardPlaceholder text="載入中⋯" />}
      {me && !loading && err && <CardPlaceholder text={err} />}
      {me && !loading && !err && !myKpi && <CardPlaceholder text="這個月還沒有你的紀錄" />}
      {me && !loading && !err && myKpi && (() => {
        const lk = getKpiLightKey(myKpi.totalScore);
        const c = LIGHT_COLORS[lk];
        const recs = getKpiRecommendations(myKpi, remainWeeks);
        // 最多顯示 2 條建議避免卡片爆滿，再多的話會員可以點「更多」進完整 KPI 頁
        const shownPrimary = recs && recs.primary ? recs.primary.slice(0, 2) : [];
        return (
          <div>
            <div className="flex items-center gap-3 mb-3">
              <div className="px-4 py-3 rounded-xl flex-shrink-0 text-center" style={{ background: c.bg, minWidth: 84 }}>
                <div className="text-4xl font-bold leading-none" style={{ color: c.color }}>{Math.round(myKpi.totalScore)}</div>
                <div className="text-xs mt-1.5" style={{ color: c.color }}>{c.emoji} {c.label}</div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-xs tracking-widest text-stone-400">{myKpi.groupName || ''}</div>
                <div className="text-sm font-medium mt-1" style={{ color: 'var(--c-text)' }}>
                  {recs ? recs.headline : ''}
                </div>
              </div>
            </div>
            {recs && recs.status === 'perfect' && (
              <div className="text-sm text-stone-600 text-center py-2">繼續保持，年底拿榮譽會員 💪</div>
            )}
            {recs && shownPrimary.length > 0 && (
              <ul className="space-y-1.5 text-sm text-stone-700 border-t border-stone-100 pt-3">
                {shownPrimary.map((u, i) => (
                  <li key={i} className="flex gap-1.5">
                    <span className="text-stone-400 flex-shrink-0">▸</span>
                    <span>{u.action}<span className="text-stone-400 ml-1">+{u.gain} 分</span></span>
                  </li>
                ))}
                {recs.primary.length > 2 && (
                  <li className="text-xs text-stone-400 pl-3">還有 {recs.primary.length - 2} 項建議，可點「更多」查看</li>
                )}
              </ul>
            )}
            {recs && recs.status !== 'perfect' && shownPrimary.length === 0 && (

// 卡片 3：本週 + 下週要關注（涵蓋未來 14 天）
function ThisWeekCard({ data, me, onMore }) {
  const weekly = useMemo(() => {
    const now = new Date();
    const monday = getMonday(now);
    // 範圍：本週一 ~ 下下週日（共 14 天，涵蓋本週和下週）
    const sundayNextWeek = new Date(monday);
    sundayNextWeek.setDate(monday.getDate() + 13);
    sundayNextWeek.setHours(23, 59, 59, 999);
    const sundayThisWeek = new Date(monday);
    sundayThisWeek.setDate(monday.getDate() + 6);
    sundayThisWeek.setHours(23, 59, 59, 999);

    const meetingsInRange = (data.meetings || [])
      .filter(m => {
        const d = new Date(m.date);
        return d >= monday && d <= sundayNextWeek;
      })
      .sort((a, b) => new Date(a.date) - new Date(b.date));

    // 分本週 / 下週兩段
    const thisWeek = meetingsInRange.filter(m => new Date(m.date) <= sundayThisWeek);
    const nextWeek = meetingsInRange.filter(m => new Date(m.date) > sundayThisWeek);

    // 我這兩週要做的事
    let myRole = null;        // 本週的角色（主講優先）
    let myRoleWhen = null;    // 'thisWeek' | 'nextWeek'
    let pendingTaskCount = 0;
    if (me) {
      meetingsInRange.forEach(m => {
        const isThisWeek = new Date(m.date) <= sundayThisWeek;
        ['slotA', 'slotB'].forEach(k => {
          const slot = m[k];
          // 第一個碰到的角色（依時間早晚），主講 > 小幫手
          if (!myRole) {
            if (slot.speakerId === me.id) { myRole = 'speaker'; myRoleWhen = isThisWeek ? 'thisWeek' : 'nextWeek'; }
            else if (slot.helperId === me.id) { myRole = 'helper'; myRoleWhen = isThisWeek ? 'thisWeek' : 'nextWeek'; }
          }
          if (slot.speakerId === me.id || slot.helperId === me.id) {
            (data.taskTemplate || []).forEach(t => {
              if (!slot.tasks?.[t.id]?.done) pendingTaskCount++;
            });
          }
        });
      });
    }

    return { thisWeek, nextWeek, myRole, myRoleWhen, pendingTaskCount };
  }, [data.meetings, data.taskTemplate, me?.id]);

  const memberById = useMemo(() => {
    const map = {};
    (data.members || []).forEach(m => { map[m.id] = m; });
    return map;
  }, [data.members]);

  const renderMeeting = (m) => (
    <div key={m.id} className="mb-2 last:mb-0">
      <div className="text-xs text-stone-400 mb-1">{formatFullDate(m.date)}（週{weekdayZh(m.date)}）</div>
      {['slotA', 'slotB'].map(k => {
        const slot = m[k];
        if (!slot.speakerId) return null;
        const speaker = memberById[slot.speakerId];
        const isMe = me && slot.speakerId === me.id;
        return (
          <div key={k} className="flex justify-between gap-2 py-0.5 text-sm">
            <span className={isMe ? 'font-bold' : 'text-stone-700'} style={{ color: isMe ? 'var(--c-kpi)' : undefined }}>
              {isMe ? '👉 ' : ''}{speaker?.name || '—'}
            </span>
            <span className="text-stone-500 truncate ml-2">{slot.topic || '（未填講題）'}</span>
          </div>
        );
      })}
    </div>
  );

  const totalCount = weekly.thisWeek.length + weekly.nextWeek.length;

  return (
    <HomeCard title="本週 + 下週演講" accent="var(--c-kpi)" emoji="📅" onMore={onMore}>
      {totalCount === 0 && <CardPlaceholder text="這兩週沒有安排演講" />}
      {totalCount > 0 && (
        <div>
          {me && weekly.myRole && (
            <div className="mb-3 p-2.5 rounded-lg text-center font-medium text-sm" style={{ background: '#FFF1E0', color: 'var(--c-kpi)' }}>
              ⚡ {weekly.myRoleWhen === 'thisWeek' ? '本週' : '下週'}輪到你（{weekly.myRole === 'speaker' ? '主講' : '小幫手'}）
            </div>
          )}
          {weekly.thisWeek.length > 0 && (
            <>
              <div className="text-xs tracking-widest text-stone-400 mb-1 mt-1">本週</div>
              {weekly.thisWeek.map(renderMeeting)}
            </>
          )}
          {weekly.nextWeek.length > 0 && (
            <>
              <div className="text-xs tracking-widest text-stone-400 mb-1 mt-3 pt-3 border-t border-stone-100">下週</div>
              {weekly.nextWeek.map(renderMeeting)}
            </>
          )}
          {me && weekly.pendingTaskCount > 0 && (
            <div className="mt-3 pt-3 border-t border-stone-100 text-sm text-stone-600">
              你還有 <span className="font-bold" style={{ color: 'var(--c-kpi)' }}>{weekly.pendingTaskCount}</span> 個任務未完成
            </div>
          )}
        </div>
      )}
    </HomeCard>
  );
}

  return (
    <div className="bg-white rounded-lg overflow-hidden shadow-sm border border-stone-200">
      <button
        onClick={() => setExpanded(!expanded)}

    ? (slot.speakerId === personalMemberId ? 'speaker' : slot.helperId === personalMemberId ? 'helper' : null)

    .filter(t => !slot.tasks?.[t.id]?.done)

function AdminGate({ pinSet, setPinSet, onPass, showToast }) {
  const [pin, setPin] = useState('');
  const [pin2, setPin2] = useState('');
  const [mode, setMode] = useState(pinSet ? 'login' : 'setup');

  const handleSetup = async () => {
    if (pin.length < 4) {
      showToast('PIN 至少 4 碼', 'error');
      return;
    }
    if (pin !== pin2) {
      showToast('兩次輸入的 PIN 不一致', 'error');
      return;
    }
    await apiClient.set(PIN_KEY, pin, true);
    setPinSet(true);
    onPass();
    showToast('PIN 設定完成');
  };

  const handleLogin = async () => {
    const res = await apiClient.get(PIN_KEY, true);
    if (res && res.value === pin) {
      onPass();
    } else {
      showToast('PIN 錯誤', 'error');
      setPin('');
    }
  };

  return (
    <div className="max-w-md mx-auto mt-12 md:mt-20">
      <div className="bg-white p-8 rounded-lg border border-stone-200 shadow-sm">
        <div className="text-center mb-6">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-full mb-3" style={{ background: '#A01E2E' }}>

          </div>
          <h2 className="text-2xl font-bold" style={{ color: '#1A1414' }}>
            {mode === 'setup' ? '設定管理密碼' : '後台管理'}
          </h2>
          <div className="text-sm text-stone-500 mt-1" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
            {mode === 'setup' ? '首次使用，請設定管理員 PIN（至少 4 碼）' : '請輸入管理員 PIN'}

        </div>

        <div className="space-y-3" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
          <input

          />

        </div>

    </div>
  );
}

// ============ 演講準備總覽（追蹤人視角：一眼看出誰落後）============
const OV_META = {
  done:  { label: '已完成',  color: '#2D5A27', bg: '#EAF3DE', bar: '#639922', dot: '#639922', rank: 3 },
  green: { label: '進度正常', color: '#2D5A27', bg: '#EAF3DE', bar: '#639922', dot: '#639922', rank: 2 },
  amber: { label: '稍微落後', color: '#854F0B', bg: '#FAEEDA', bar: '#EF9F27', dot: '#EF9F27', rank: 1 },
  red:   { label: '明顯落後', color: '#A01E2E', bg: '#FBEAEA', bar: '#E24B4A', dot: '#E24B4A', rank: 0 },
};
function SpeechOverview({ data, onGoProgress }) {
  const HORIZON_WEEKS = 8;
  const today = new Date();
  const contentTasks = (data.taskTemplate || []).filter(t => (t.track || 'content') === 'content');
  const mById = {}; (data.members || []).forEach(m => { mById[m.id] = m; });

  const rows = [];
  (data.meetings || [])
    .filter(m => { const diff = daysBetween(today, new Date(m.date)); return diff >= -1 && diff <= HORIZON_WEEKS * 7; })
    .forEach(m => {
      ['slotA', 'slotB'].forEach(sk => {
        const slot = m[sk];
        if (!slot || !slot.speakerId) return;
        const speaker = mById[slot.speakerId];
        if (!speaker) return;
        const weeksUntil = Math.max(0, Math.ceil(daysBetween(today, new Date(m.date)) / 7));
        const isDone = t => !!slot.tasks?.[t.id]?.done;
        const cDone = contentTasks.filter(isDone).length;
        const total = contentTasks.length;
        const shouldDone = contentTasks.filter(t => t.weekBefore >= weeksUntil).length;
        const behind = Math.max(0, shouldDone - cDone);
        const overdue = contentTasks.filter(t => !isDone(t) && t.weekBefore > weeksUntil);
        const nextUp = contentTasks.filter(t => !isDone(t)).sort((a, b) => b.weekBefore - a.weekBefore)[0];
        let status;
        if (total > 0 && cDone === total) status = 'done';
        else if (behind >= 2 || overdue.length >= 2) status = 'red';
        else if (behind === 1 || overdue.length === 1) status = 'amber';
        else status = 'green';
        rows.push({
          key: m.id + sk, meeting: m, speaker, helper: slot.helperId ? mById[slot.helperId] : null,
          topic: slot.topic, weeksUntil, cDone, total, status,
          nextUp, nextDl: nextUp ? taskDeadline(m.date, nextUp.weekBefore) : null,
        });
      });
    });

  rows.sort((a, b) => OV_META[a.status].rank - OV_META[b.status].rank || new Date(a.meeting.date) - new Date(b.meeting.date));
  const needAttention = rows.filter(r => r.status === 'red' || r.status === 'amber').length;

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <div>
          <h3 className="text-xl font-bold" style={{ color: '#1A1414' }}>演講準備總覽</h3>
          <div className="text-xs text-stone-500 mt-0.5">未來 {HORIZON_WEEKS} 週 · 共 {rows.length} 場 · {needAttention > 0 ? <span style={{ color: '#A01E2E' }} className="font-semibold">{needAttention} 位需要關注</span> : <span style={{ color: '#2D5A27' }}>全部跟上進度</span>}</div>
        </div>
        <button onClick={onGoProgress} className="px-3 py-2 text-sm rounded-md text-white hover:opacity-90" style={{ background: '#A01E2E' }}>
          去更新進度 →
        </button>
      </div>

      {rows.length === 0 ? (
        <div className="text-center text-stone-400 py-12 border border-dashed border-stone-200 rounded-lg">
          未來 {HORIZON_WEEKS} 週尚未安排演講人<br />
          <span className="text-xs">到「週次安排」指派演講人後，這裡就會自動列出</span>
        </div>
      ) : (
        <div className="space-y-2">
          {rows.map(r => {
            const meta = OV_META[r.status];
            const pct = r.total > 0 ? Math.round(r.cDone / r.total * 100) : 0;
            return (
              <div key={r.key} className="rounded-lg border border-stone-200 overflow-hidden" style={{ borderLeft: `4px solid ${meta.dot}` }}>
                <div className="p-3 md:p-4">
                  <div className="flex items-center justify-between gap-3 mb-2 flex-wrap">
                    <div className="flex items-baseline gap-2 min-w-0">
                      <span className="font-bold text-base" style={{ color: '#1A1414' }}>{r.speaker.name}</span>
                      <span className="text-xs text-stone-500 truncate">{r.speaker.industry || ''}</span>
                      {r.helper && <span className="text-[11px] text-stone-400">· 小幫手 {r.helper.name}</span>}
                    </div>
                    <div className="inline-flex items-center gap-1.5 text-xs font-semibold px-2 py-1 rounded-full whitespace-nowrap" style={{ background: meta.bg, color: meta.color }}>
                      <span className="w-2 h-2 rounded-full" style={{ background: meta.dot }} />
                      {meta.label}
                    </div>
                  </div>
                  <div className="flex items-center gap-3 mb-2">
                    <span className="text-sm font-semibold whitespace-nowrap" style={{ color: '#1A1414' }}>{formatShortDate(r.meeting.date)}</span>
                    <span className="text-xs text-stone-400 whitespace-nowrap">{r.weeksUntil === 0 ? '本週' : `剩 ${r.weeksUntil} 週`}</span>
                    <div className="flex-1 h-2 rounded-full bg-stone-100 overflow-hidden">
                      <div className="h-full rounded-full" style={{ width: `${pct}%`, background: meta.bar }} />
                    </div>
                    <span className="text-xs font-semibold whitespace-nowrap" style={{ color: '#1A1414' }}>{r.cDone}/{r.total}</span>
                  </div>
                  {r.topic && <div className="text-xs text-stone-500 mb-1 truncate">主題：{r.topic}</div>}
                  {r.nextUp ? (
                    <div className="text-xs flex items-center gap-1.5">
                      <span className="text-stone-400">下一步</span>
                      <span className="font-semibold text-stone-700">{formatShortDate(r.nextDl)}</span>
                      <span className="text-stone-600 truncate">{r.nextUp.name}</span>
                    </div>
                  ) : (
                    <div className="text-xs font-semibold" style={{ color: '#2D5A27' }}>✓ 準備全部完成</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
