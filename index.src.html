// ============ 週次排程管理 ============
function ScheduleManager({ data, saveData, showToast }) {
  const updateSlot = (meetingId, slotKey, field, value) => {
    const next = {
      ...data,
      meetings: data.meetings.map(m => {
        if (m.id !== meetingId) return m;
        return {
          ...m,
          [slotKey]: { ...m[slotKey], [field]: value }
        };
      })
    };
    saveData(next);
  };

  const updateDate = (meetingId, newDate) => {
    const next = {
      ...data,
      meetings: data.meetings.map(m => m.id === meetingId ? { ...m, date: new Date(newDate).toISOString() } : m)
    };
    saveData(next);
  };

  const addMeeting = () => {
    const lastDate = data.meetings.length > 0
      ? new Date(data.meetings[data.meetings.length - 1].date)
      : new Date();
    const next = new Date(lastDate);
    next.setDate(next.getDate() + 7);
    const newMeeting = {
      id: `m_${next.getTime()}`,
      date: next.toISOString(),
      slotA: { speakerId: null, helperId: null, topic: '', tasks: {} },
      slotB: { speakerId: null, helperId: null, topic: '', tasks: {} },
    };
    saveData({ ...data, meetings: [...data.meetings, newMeeting] });
  };

  const deleteMeeting = (meetingId) => {
    if (!confirm('確定刪除這一週的排程？')) return;
    // deletedIds：向伺服器宣告明確刪除（否則防縮水合併會把它救回來）
    saveData({ ...data, meetings: data.meetings.filter(m => m.id !== meetingId) }, { deletedIds: { meetings: [meetingId] } });
  };

  const sorted = [...data.meetings].sort((a, b) => new Date(a.date) - new Date(b.date));

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="flex justify-between items-center mb-5">
        <h3 className="text-xl font-bold" style={{ color: '#1A1414' }}>週次排程</h3>
        <button
          onClick={addMeeting}
          className="px-4 py-2 rounded-md text-white text-sm flex items-center gap-1.5"
          style={{ background: '#A01E2E' }}
        >
          <Plus className="w-4 h-4" />新增週次
        </button>
      </div>

      {data.members.length === 0 && (
        <div className="mb-4 p-4 rounded-md bg-amber-50 border border-amber-200 text-amber-800 text-sm">
          尚未匯入會員名單，請先到「會員管理」匯入會員
        </div>
      )}

      <div className="space-y-3">
        {sorted.map(meeting => (
          <div key={meeting.id} className="bg-white rounded-lg border border-stone-200 p-4">
            <div className="flex items-center justify-between mb-3 pb-3 border-b border-stone-100">
              <div className="flex items-center gap-3">
                <input
                  type="date"
                  value={new Date(meeting.date).toISOString().slice(0, 10)}
                  onChange={e => updateDate(meeting.id, e.target.value)}
                  className="px-3 py-1.5 text-sm border border-stone-300 rounded-md"
                />
                <span className="text-xs text-stone-500">
                  週{weekdayZh(meeting.date)}
                </span>
              </div>
              <button
                onClick={() => deleteMeeting(meeting.id)}
                className="text-stone-400 hover:text-red-600"
              >
                <Trash2 className="w-4 h-4" />
              </button>
            </div>
            <div className="grid md:grid-cols-2 gap-4">
              {['slotA', 'slotB'].map(slotKey => (
                <div key={slotKey} className="space-y-2">
                  <div className="text-xs font-semibold text-stone-600">
                    {slotKey === 'slotA' ? '主題演講 A' : '主題演講 B'}
                  </div>
                  <div>
                    <label className="text-xs text-stone-500 block mb-1">演講人</label>
                    <MemberSearchSelect
                      members={data.members}
                      value={meeting[slotKey].speakerId}
                      onChange={id => updateSlot(meeting.id, slotKey, 'speakerId', id)}
                      placeholder="— 選擇演講人 —"
                    />
                  </div>
                  <div>
                    <label className="text-xs text-stone-500 block mb-1">小幫手</label>
                    <MemberSearchSelect
                      members={data.members}
                      value={meeting[slotKey].helperId}
                      onChange={id => updateSlot(meeting.id, slotKey, 'helperId', id)}
                      placeholder="— 選擇小幫手 —"
                    />
                  </div>
                  <div>
                    <label className="text-xs text-stone-500 block mb-1">演講主題</label>
                    <input
                      type="text"
                      value={meeting[slotKey].topic || ''}
                      onChange={e => updateSlot(meeting.id, slotKey, 'topic', e.target.value)}
                      placeholder="主題未定"
                      className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md"
                    />
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ============ 進度更新 ============
function ProgressManager({ data, saveData, showToast }) {
  const [selectedMeetingId, setSelectedMeetingId] = useState(null);
  const [expandedNotes, setExpandedNotes] = useState(new Set());
  const [showAll, setShowAll] = useState(false);
  const [edmModal, setEdmModal] = useState(null); // null | { text, speakerName }

  // ── 產生 EDM 草稿（依現有 slot 資料填入範本）──
  const generateEdmDraft = (slot, speaker, dateStr) => {
    const d = new Date(dateStr);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const fullDate = `${yyyy}.${mm}.${dd}(${weekdayZh(d)})`;
    const shortDate = `${mm}/${dd}`;
    const slogan = (slot.slogan || '').trim() || '[請填 Slogan]';
    const industries = [slot.desiredPartner1, slot.desiredPartner2, slot.desiredPartner3]
      .map((s, i) => `行業${i + 1}：${(s || '').trim() || '（未填）'}`)
      .join('\n');
    return [
      '富鼎鈦金名人堂專題簡報',
      `📆 ${fullDate}`,
      '⏰ 早上06:30-09:30',
      `📑${slogan}`,
      '',
      '[此處主講人自填本文]',
      '',
      `✨${slogan}✨`,
      '',
      `本週富鼎分會將由${speaker.industry || ''}代表-${speaker.name}分享「${slogan}」心動不如馬上行動，趕快手刀報名「${shortDate}」專題簡報！`,
      '',
      `💯 ${slogan}`,
      '🗣 積極邀請行業別：',
      industries,
    ].join('\n');
  };

  const sorted = [...data.meetings].sort((a, b) => new Date(a.date) - new Date(b.date));
  const meetingsWithSpeakers = sorted.filter(m => m.slotA.speakerId || m.slotB.speakerId);

  // 預設只顯示未來 6 週（今日起 +1 天內視為本週）
  const today = new Date();
  const upcomingMeetings = useMemo(() => {
    const filtered = meetingsWithSpeakers.filter(m => daysBetween(today, new Date(m.date)) >= -1);
    return filtered.slice(0, 6);
  }, [meetingsWithSpeakers]);
  const displayMeetings = showAll ? meetingsWithSpeakers : upcomingMeetings;

  const memberById = useMemo(() => {
    const map = {};
    data.members.forEach(m => { map[m.id] = m; });
    return map;
  }, [data.members]);

  const toggleTask = (meetingId, slotKey, taskId) => {
    const next = {
      ...data,
      meetings: data.meetings.map(m => {
        if (m.id !== meetingId) return m;
        const slot = m[slotKey];
        const currentTask = slot.tasks?.[taskId] || {};
        return {
          ...m,
          [slotKey]: {
            ...slot,
            tasks: {
              ...slot.tasks,
              [taskId]: {
                ...currentTask,
                done: !currentTask.done,
                doneAt: !currentTask.done ? new Date().toISOString() : null
              }
            }
          }
        };
      })
    };
    saveData(next);
  };

  const updateNote = (meetingId, slotKey, taskId, note) => {
    const next = {
      ...data,
      meetings: data.meetings.map(m => {
        if (m.id !== meetingId) return m;
        const slot = m[slotKey];
        const currentTask = slot.tasks?.[taskId] || {};
        return {
          ...m,
          [slotKey]: {
            ...slot,
            tasks: {
              ...slot.tasks,
              [taskId]: { ...currentTask, note }
            }
          }
        };
      })
    };
    saveData(next);
  };

  // 編輯 slot 層級的欄位（主題、主力客群、引薦…）
  const updateSlotField = (meetingId, slotKey, field, value) => {
    const next = {
      ...data,
      meetings: data.meetings.map(m => {
        if (m.id !== meetingId) return m;
        return {
          ...m,
          [slotKey]: { ...m[slotKey], [field]: value }
        };
      })
    };
    saveData(next);
  };

  const toggleNoteExpand = (key) => {
    setExpandedNotes(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key);
      else next.add(key);
      return next;
    });
  };

  if (meetingsWithSpeakers.length === 0) {
    return (
      <div className="text-center py-12 text-stone-400" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
        尚未安排任何演講人，請先到「週次安排」指派
      </div>
    );
  }

  const selected = displayMeetings.find(m => m.id === selectedMeetingId) || displayMeetings[0] || meetingsWithSpeakers[0];

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="flex items-center justify-between mb-5">
        <h3 className="text-xl font-bold" style={{ color: '#1A1414' }}>進度更新</h3>
        <button
          onClick={() => setShowAll(!showAll)}
          className="text-xs text-stone-500 hover:text-stone-800 underline"
        >
          {showAll ? `僅顯示未來 6 週` : `顯示全部（${meetingsWithSpeakers.length} 場）`}
        </button>
      </div>

      <div className="flex flex-wrap gap-2 mb-5">
        {displayMeetings.map(m => {
          const daysDiff = daysBetween(today, new Date(m.date));
          const isThisWeek = daysDiff >= -1 && daysDiff <= 6;
          const isPast = daysDiff < -1;
          return (
            <button
              key={m.id}
              onClick={() => setSelectedMeetingId(m.id)}
              className={`px-3 py-1.5 text-sm rounded-md border transition-colors ${selected.id === m.id ? 'text-white' : isPast ? 'bg-stone-50 text-stone-400 border-stone-200' : 'bg-white text-stone-600 border-stone-300 hover:border-stone-500'}`}
              style={selected.id === m.id ? { background: '#A01E2E', borderColor: '#A01E2E' } : {}}
            >
              {formatDate(m.date)} 週{weekdayZh(m.date)}
              {isThisWeek && selected.id !== m.id && <span className="ml-1 text-[10px]" style={{ color: '#A01E2E' }}>· 本週</span>}
            </button>
          );
        })}
        {displayMeetings.length === 0 && (
          <div className="text-sm text-stone-400">未來 6 週尚未安排演講人，請先到「週次安排」指派</div>
        )}
      </div>

      {/* EDM 草稿彈窗 */}
      {edmModal && (
        <div
          className="fixed inset-0 z-[60] flex items-center justify-center p-4"
          style={{ background: 'rgba(0,0,0,0.4)' }}
          onClick={() => setEdmModal(null)}
        >
          <div
            className="bg-white rounded-lg shadow-xl w-full max-w-2xl flex flex-col"
            style={{ maxHeight: '90vh' }}
            onClick={e => e.stopPropagation()}
          >
            <div className="flex items-center justify-between px-5 py-3 border-b border-stone-200">
              <div className="flex items-center gap-2">
                <Megaphone className="w-5 h-5" style={{ color: '#8B6F47' }} />
                <h3 className="font-bold text-stone-800">EDM 草稿 — {edmModal.speakerName}</h3>
              </div>
              <button onClick={() => setEdmModal(null)} className="p-1 rounded hover:bg-stone-100">
                <X className="w-5 h-5 text-stone-500" />
              </button>
            </div>
            <div className="p-5 flex-1 overflow-y-auto">
              <div className="text-xs text-stone-500 mb-2">
                已自動帶入：日期、Slogan、主講人、想合作的三種專業別。本文段請主講人自填後再寄出。可在下方文字框直接編輯。
              </div>
              <textarea
                value={edmModal.text}
                onChange={e => setEdmModal({ ...edmModal, text: e.target.value })}
                rows={20}
                className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md focus:border-stone-500 focus:outline-none"
                style={{ fontFamily: "'Noto Sans TC', sans-serif", whiteSpace: 'pre' }}
              />
            </div>
            <div className="px-5 py-3 border-t border-stone-200 flex justify-end gap-2">
              <button
                onClick={() => setEdmModal(null)}
                className="px-4 py-2 text-sm border border-stone-300 rounded-md hover:bg-stone-50"
              >
                關閉
              </button>
              <button
                onClick={async () => {
                  try {
                    await navigator.clipboard.writeText(edmModal.text);
                    showToast?.('已複製到剪貼簿', 'success');
                  } catch {
                    showToast?.('複製失敗，請手動選取再 Ctrl+C', 'error');
                  }
                }}
                className="px-4 py-2 text-sm text-white rounded-md hover:opacity-90"
                style={{ background: '#A01E2E' }}
              >
                📋 複製到剪貼簿
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="grid md:grid-cols-2 gap-4">
        {['slotA', 'slotB'].map(slotKey => {
          const slot = selected[slotKey];
          const speaker = slot.speakerId ? memberById[slot.speakerId] : null;
          const helper = slot.helperId ? memberById[slot.helperId] : null;

          // 計算進度條
          const contentTasks = data.taskTemplate.filter(t => (t.track || 'content') === 'content');
          const contentDone = contentTasks.filter(t => slot.tasks?.[t.id]?.done).length;
          const contentPct = contentTasks.length ? Math.round(contentDone / contentTasks.length * 100) : 0;
          const mySelfCoffees = (data.coffeeMeetings || []).filter(cm => cm.inviterId === slot.speakerId);
          const coffeeDone = mySelfCoffees.filter(cm => cm.meetingStatus === 'done').length;
          const coffeeTarget = data.coffeeTargetPerSpeech || 5;
          const coffeePct = Math.min(100, Math.round(coffeeDone / coffeeTarget * 100));

          return (
            <div key={slotKey} className="bg-white rounded-lg border border-stone-200 p-4">
              <div className="text-xs font-semibold text-stone-600 mb-2">
                {slotKey === 'slotA' ? '主題演講 A' : '主題演講 B'}
              </div>
              {speaker ? (
                <>
                  {/* 演講人儀表板頭部 */}
                  <div className="mb-3">
                    <div className="flex items-baseline gap-2 mb-2">
                      <div className="font-bold text-lg" style={{ color: '#1A1414' }}>{speaker.name}</div>
                      <div className="text-xs text-stone-500">{speaker.industry || ''}</div>
                    </div>

                    {/* 進度條 */}
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      <div>
                        <div className="flex items-center justify-between text-[10px] text-stone-500 mb-0.5">
                          <span className="flex items-center gap-1"><Presentation className="w-3 h-3" style={{ color: '#A01E2E' }} />簡報準備</span>
                          <span>{contentDone}/{contentTasks.length} · {contentPct}%</span>
                        </div>
                        <div className="h-1.5 rounded-full overflow-hidden" style={{ background: '#F0EBE3' }}>
                          <div className="h-full transition-all" style={{ width: contentPct + '%', background: '#A01E2E' }} />
                        </div>
                      </div>
                      <div>
                        <div className="flex items-center justify-between text-[10px] text-stone-500 mb-0.5">
                          <span className="flex items-center gap-1"><Coffee className="w-3 h-3" style={{ color: '#8B6F47' }} />咖啡會議</span>
                          <span>{coffeeDone}/{coffeeTarget} · {coffeePct}%</span>
                        </div>
                        <div className="h-1.5 rounded-full overflow-hidden" style={{ background: '#F0EBE3' }}>
                          <div className="h-full transition-all" style={{ width: coffeePct + '%', background: '#8B6F47' }} />
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 演講人詳細資料編輯 */}
                  <div className="mb-4 space-y-2 p-3 rounded-md" style={{ background: '#FAF7F2' }}>
                    <div>
                      <label className="text-[10px] text-stone-500 tracking-wider">Slogan（EDM 主標、宣傳金句）</label>
                      <input type="text" value={slot.slogan || ''}
                        onChange={e => updateSlotField(selected.id, slotKey, 'slogan', e.target.value)}
                        placeholder="例：讓財富，不只存在，而是持續流動"
                        className="w-full mt-0.5 px-2 py-1.5 text-sm border border-stone-200 rounded bg-white focus:border-stone-500 focus:outline-none" />
                    </div>
                    <div>
                      <label className="text-[10px] text-stone-500 tracking-wider">演講主題</label>
                      <input type="text" value={slot.topic || ''}
                        onChange={e => updateSlotField(selected.id, slotKey, 'topic', e.target.value)}
                        placeholder="例：商標異議實戰案例"
                        className="w-full mt-0.5 px-2 py-1.5 text-sm border border-stone-200 rounded bg-white focus:border-stone-500 focus:outline-none" />
                    </div>
                    <div>
                      <label className="text-[10px] text-stone-500 tracking-wider">主力客群</label>
                      <input type="text" value={slot.targetAudience || ''}
                        onChange={e => updateSlotField(selected.id, slotKey, 'targetAudience', e.target.value)}
                        placeholder="例：中小企業主、品牌持有人"
                        className="w-full mt-0.5 px-2 py-1.5 text-sm border border-stone-200 rounded bg-white focus:border-stone-500 focus:outline-none" />
                    </div>
                    <div>
                      <label className="text-[10px] text-stone-500 tracking-wider">想要合作的對象（業務人脈圈中三種專業別）</label>
                      {(slot.desiredPartners && !slot.desiredPartner1 && !slot.desiredPartner2 && !slot.desiredPartner3) && (
                        <div className="text-[10px] text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1 mt-0.5 mb-1">
                          舊資料合併欄位：「{slot.desiredPartners}」 → 請拆到下方三格
                        </div>
                      )}
                      <div className="grid grid-cols-3 gap-1 mt-0.5">
                        <input type="text" value={slot.desiredPartner1 || ''}
                          onChange={e => updateSlotField(selected.id, slotKey, 'desiredPartner1', e.target.value)}
                          placeholder="行業 1"
                          className="px-2 py-1.5 text-sm border border-stone-200 rounded bg-white focus:border-stone-500 focus:outline-none" />
                        <input type="text" value={slot.desiredPartner2 || ''}
                          onChange={e => updateSlotField(selected.id, slotKey, 'desiredPartner2', e.target.value)}
                          placeholder="行業 2"
                          className="px-2 py-1.5 text-sm border border-stone-200 rounded bg-white focus:border-stone-500 focus:outline-none" />
                        <input type="text" value={slot.desiredPartner3 || ''}
                          onChange={e => updateSlotField(selected.id, slotKey, 'desiredPartner3', e.target.value)}
                          placeholder="行業 3"
                          className="px-2 py-1.5 text-sm border border-stone-200 rounded bg-white focus:border-stone-500 focus:outline-none" />
                      </div>
                    </div>
                    <div className="pt-1 border-t border-stone-200/60">
                      <div className="text-[10px] text-amber-700 tracking-wider mb-1 flex items-center gap-1">
                        <Lightbulb className="w-3 h-3" /> 引薦金字塔
                      </div>
                      <div className="space-y-1.5">
                        <div>
                          <label className="text-[10px] text-stone-500">一般引薦</label>
                          <input type="text" value={slot.generalReferral || ''}
                            onChange={e => updateSlotField(selected.id, slotKey, 'generalReferral', e.target.value)}
                            placeholder="門檻低、容易遇到的引薦類型"
                            className="w-full mt-0.5 px-2 py-1 text-xs border border-stone-200 rounded bg-white" />
                        </div>
                        <div>
                          <label className="text-[10px] text-stone-500">理想引薦</label>
                          <input type="text" value={slot.idealReferral || ''}
                            onChange={e => updateSlotField(selected.id, slotKey, 'idealReferral', e.target.value)}
                            placeholder="有難度但可行的引薦"
                            className="w-full mt-0.5 px-2 py-1 text-xs border border-stone-200 rounded bg-white" />
                        </div>
                        <div>
                          <label className="text-[10px] text-stone-500">夢幻引薦</label>
                          <input type="text" value={slot.dreamReferral || ''}
                            onChange={e => updateSlotField(selected.id, slotKey, 'dreamReferral', e.target.value)}
                            placeholder="夢想中的大客戶類型"
                            className="w-full mt-0.5 px-2 py-1 text-xs border border-stone-200 rounded bg-white" />
                        </div>
                      </div>
                    </div>
                    {helper && (
                      <div className="text-xs text-stone-500 pt-1 border-t border-stone-200/60">
                        小幫手：<span className="font-semibold text-stone-700">{helper.name}</span>
                      </div>
                    )}
                  </div>

                  {['content', 'coffee'].map(trackKey => {
                    const trackTasks = data.taskTemplate.filter(t => (t.track || 'content') === trackKey);
                    if (trackTasks.length === 0) return null;
                    const trackDone = trackTasks.filter(t => slot.tasks?.[t.id]?.done).length;
                    const trackTotal = trackTasks.length;
                    const trackLabel = trackKey === 'content' ? '演講準備' : '咖啡會議邀約';
                    const trackColor = trackKey === 'content' ? '#A01E2E' : '#8B6F47';
                    const TrackIcon = trackKey === 'content' ? Presentation : Coffee;
                    return (
                      <div key={trackKey} className="mb-4">
                        <div className="flex items-center justify-between mb-2 pb-1.5 border-b border-stone-100">
                          <div className="flex items-center gap-1.5">
                            <TrackIcon className="w-4 h-4" style={{ color: trackColor }} />
                            <div className="text-sm font-semibold" style={{ color: '#1A1414' }}>
                              {trackLabel}
                            </div>
                          </div>
                          <div className="text-xs text-stone-500">
                            {trackDone} / {trackTotal}
                          </div>
                        </div>
                        <div className="space-y-1.5">
                          {trackTasks.map(task => {
                            const taskData = slot.tasks?.[task.id] || {};
                            const done = taskData.done || false;
                            const note = taskData.note || '';
                            const doneAt = taskData.doneAt;
                            const noteKey = `${selected.id}_${slotKey}_${task.id}`;
                            const noteExpanded = expandedNotes.has(noteKey);
                            const dl = taskDeadline(selected.date, task.weekBefore);
                            const dlStatus = deadlineStatus(dl, done);
                            return (
                              <div
                                key={task.id}
                                className={`p-2.5 rounded-md transition-colors ${done ? 'bg-stone-50' : 'hover:bg-stone-50'}`}
                              >
                                <div className="flex items-center gap-3">
                                  <input
                                    type="checkbox"
                                    checked={done}
                                    onChange={() => toggleTask(selected.id, slotKey, task.id)}
                                    className="w-4 h-4 rounded cursor-pointer"
                                    style={{ accentColor: trackColor }}
                                  />
                                  <div className="flex-1 min-w-0">
                                    <div className={`text-sm ${done ? 'text-stone-400 line-through' : 'text-stone-800'}`}>
                                      {task.name}
                                    </div>
                                    {done && doneAt && (
                                      <div className="text-[10px] text-stone-400">
                                        完成於 {new Date(doneAt).toLocaleDateString('zh-TW')}
                                      </div>
                                    )}
                                  </div>
                                  <button
                                    onClick={() => toggleNoteExpand(noteKey)}
                                    className={`p-1 rounded hover:bg-stone-200 transition-colors ${note ? 'text-amber-600' : 'text-stone-400'}`}
                                    title={note ? '編輯備註' : (trackKey === 'coffee' ? '記錄邀約對象' : '加入備註')}
                                  >
                                    <MessageSquare className="w-4 h-4" />
                                  </button>
                                  {/* 截止日（自動由演講日往前推 weekBefore 週算出）*/}
                                  <div className="text-right whitespace-nowrap" style={{ minWidth: '64px' }}>
                                    <div className={`text-xs font-semibold ${done ? 'text-stone-300' : 'text-stone-600'}`}>
                                      {formatShortDate(dl)}
                                    </div>
                                    {dlStatus ? (
                                      <div className="text-[10px] font-semibold" style={{ color: dlStatus.color }}>
                                        {dlStatus.label}
                                      </div>
                                    ) : (
                                      <div className="text-[10px] text-stone-300">第-{task.weekBefore}週</div>
                                    )}
                                  </div>
                                </div>
                                {(noteExpanded || note) && (
                                  <textarea
                                    value={note}
                                    onChange={e => updateNote(selected.id, slotKey, task.id, e.target.value)}
                                    placeholder={trackKey === 'coffee' ? '邀約對象：(例：陳會計師 / 李建築師)' : '加入備註（自動儲存，前台會顯示）'}
                                    rows={2}
                                    className="mt-2 w-full px-3 py-1.5 text-xs border border-stone-200 rounded bg-white resize-none focus:border-stone-500 focus:outline-none"
                                  />
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}

                  {/* EDM 草稿產生器 */}
                  <button
                    onClick={() => setEdmModal({ text: generateEdmDraft(slot, speaker, selected.date), speakerName: speaker.name })}
                    className="w-full mt-2 px-3 py-2 text-sm rounded-md text-white hover:opacity-90 transition-opacity flex items-center justify-center gap-1.5"
                    style={{ background: '#8B6F47', fontFamily: "'Noto Sans TC', sans-serif" }}
                  >
                    <Megaphone className="w-4 h-4" />
                    📋 產生 EDM 草稿
                  </button>
                </>
              ) : (
                <div className="text-sm text-stone-400 py-8 text-center">尚未安排演講人</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============ 會員管理 ============
function MemberManager({ data, saveData, showToast }) {
  const fileRef = useRef(null);
  const [form, setForm] = useState({ name: '', industry: '', company: '', email: '', phone: '' });

  const handleExcelImport = async (file) => {
    try {
      await ensureXLSX();
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (rows.length === 0) {
        showToast('Excel 沒有資料', 'error');
        return;
      }

      // 自動辨識欄位（兼容中英文欄名）
      const newMembers = rows.map((r, idx) => {
        const get = (keys) => {
          for (const k of keys) {
            if (r[k] !== undefined && r[k] !== '') return String(r[k]).trim();
          }
          return '';
        };
        return {
          id: `u_${Date.now()}_${idx}`,
          name: get(['姓名', '名字', 'Name', 'name', '會員姓名']),
          industry: get(['行業別', '行業', '產業', 'Industry', 'industry', '分類']),
          company: get(['公司', '公司名稱', 'Company', 'company']),
          email: get(['Email', 'email', '電子郵件', 'E-mail']),
          phone: get(['電話', '手機', 'Phone', 'phone', '聯絡電話']),
        };
      }).filter(m => m.name);

      if (newMembers.length === 0) {
        showToast('找不到「姓名」欄位，請檢查 Excel 格式', 'error');
        return;
      }

      const confirmed = confirm(`匯入 ${newMembers.length} 位會員？\n（將覆蓋現有會員名單）`);
      if (!confirmed) return;

      // 匯入是「整批換掉」：把被換掉的舊會員 id 全部宣告為刪除，伺服器才不會把舊名單救回來
      const newIds = new Set(newMembers.map(m => m.id));
      const removedIds = (data.members || []).map(m => m.id).filter(id => !newIds.has(id));
      saveData({ ...data, members: newMembers }, removedIds.length ? { deletedIds: { members: removedIds } } : {});
      showToast(`成功匯入 ${newMembers.length} 位會員`);
    } catch (e) {
      showToast('匯入失敗：' + e.message, 'error');
    }
    if (fileRef.current) fileRef.current.value = '';
  };

  const downloadTemplate = async () => {
    await ensureXLSX();
    const ws = XLSX.utils.json_to_sheet([
      { 姓名: '郭泓志', 行業別: '律師', 公司: '泓品法律事務所', 電話: '07-xxx-xxxx', Email: 'test@example.com' },
      { 姓名: '陳婉瑜', 行業別: '律師', 公司: '泓品法律事務所', 電話: '07-xxx-xxxx', Email: 'test2@example.com' },
    ]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '會員名單');
    XLSX.writeFile(wb, 'BNI_會員名單_範本.xlsx');
  };

  const addMember = () => {
    if (!form.name.trim()) {
      showToast('請填姓名', 'error');
      return;
    }
    const newM = { id: `u_${Date.now()}`, ...form };
    saveData({ ...data, members: [...data.members, newM] });
    setForm({ name: '', industry: '', company: '', email: '', phone: '' });
    showToast('新增成功');
  };

  const deleteMember = (id) => {
    if (!confirm('確定刪除？該會員已排入的演講將被清空')) return;
    const meetings = data.meetings.map(m => ({
      ...m,
      slotA: m.slotA.speakerId === id || m.slotA.helperId === id
        ? { ...m.slotA, speakerId: m.slotA.speakerId === id ? null : m.slotA.speakerId, helperId: m.slotA.helperId === id ? null : m.slotA.helperId }
        : m.slotA,
      slotB: m.slotB.speakerId === id || m.slotB.helperId === id
        ? { ...m.slotB, speakerId: m.slotB.speakerId === id ? null : m.slotB.speakerId, helperId: m.slotB.helperId === id ? null : m.slotB.helperId }
        : m.slotB,
    }));
    saveData({ ...data, members: data.members.filter(m => m.id !== id), meetings }, { deletedIds: { members: [id] } });
  };

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <h3 className="text-xl font-bold mb-5" style={{ color: '#1A1414' }}>會員管理</h3>

      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-5">
        <div className="text-sm font-semibold mb-3">Excel 匯入</div>
        <div className="flex flex-wrap gap-2 items-center">
          <input
            ref={fileRef}
            type="file"
            accept=".xlsx,.xls"
            onChange={e => e.target.files?.[0] && handleExcelImport(e.target.files[0])}
            className="text-sm"
          />
          <button
            onClick={downloadTemplate}
            className="px-3 py-1.5 text-sm border border-stone-300 rounded-md hover:bg-stone-50 flex items-center gap-1.5"
          >
            <Download className="w-4 h-4" />下載範本
          </button>
        </div>
        <div className="text-xs text-stone-500 mt-2">
          支援欄位：姓名（必填）、行業別、公司、電話、Email。匯入會覆蓋現有名單。
        </div>
      </div>

      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-5">
        <div className="text-sm font-semibold mb-3">手動新增</div>
        <div className="grid md:grid-cols-5 gap-2">
          <input type="text" placeholder="姓名*" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} className="px-3 py-2 text-sm border border-stone-300 rounded-md" />
          <input type="text" placeholder="行業別" value={form.industry} onChange={e => setForm({ ...form, industry: e.target.value })} className="px-3 py-2 text-sm border border-stone-300 rounded-md" />

// ============ 任務模板管理 ============
function TaskTemplateManager({ data, saveData, showToast }) {
  const [chapter, setChapter] = useState(data.chapterName);
  const [tasks, setTasks] = useState(data.taskTemplate);

  const updateTask = (idx, field, value) => {
    const next = [...tasks];
    next[idx] = { ...next[idx], [field]: value };
    setTasks(next);
  };

  const addTask = () => {
    setTasks([...tasks, { id: `t_${Date.now()}`, name: '新任務', weekBefore: 0, icon: 'Circle', track: 'content' }]);
  };

  const deleteTask = (idx) => {
    if (!confirm('確定刪除這個任務項目？')) return;
    setTasks(tasks.filter((_, i) => i !== idx));
  };

  const save = () => {
    saveData({ ...data, chapterName: chapter, taskTemplate: tasks });
    showToast('儲存完成');
  };

  const resetDefault = () => {
    if (!confirm('確定重置為預設任務模板？')) return;
    setTasks(DEFAULT_TASKS);
  };

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <h3 className="text-xl font-bold mb-5" style={{ color: '#1A1414' }}>分會與任務設定</h3>

      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-5">
        <div className="text-sm font-semibold mb-3">分會名稱</div>
        <input
          type="text"
          value={chapter}
          onChange={e => setChapter(e.target.value)}
          className="px-3 py-2 text-sm border border-stone-300 rounded-md w-full md:w-1/2"
        />
      </div>

      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-5">
        <div className="flex justify-between items-center mb-3">
          <div className="text-sm font-semibold">任務模板</div>
          <div className="flex gap-2">
            <button onClick={resetDefault} className="px-3 py-1.5 text-xs border border-stone-300 rounded-md hover:bg-stone-50">重置預設</button>
            <button onClick={addTask} className="px-3 py-1.5 text-xs text-white rounded-md flex items-center gap-1" style={{ background: '#A01E2E' }}>
              <Plus className="w-3 h-3" />新增任務
            </button>
          </div>
        </div>
        <div className="text-xs text-stone-500 mb-3">
          「第 -N 週」代表演講前 N 週。軌道分為「演講準備」（content）與「咖啡會議邀約」（coffee），兩條平行進行。
        </div>
        {['content', 'coffee'].map(trackKey => {
          const trackTasks = tasks.filter(t => (t.track || 'content') === trackKey).sort((a, b) => b.weekBefore - a.weekBefore);
          const trackLabel = trackKey === 'content' ? '演講準備' : '咖啡會議邀約';
          const trackColor = trackKey === 'content' ? '#A01E2E' : '#8B6F47';
          const TrackIcon = trackKey === 'content' ? Presentation : Coffee;
          return (
            <div key={trackKey} className="mb-4">
              <div className="flex items-center gap-1.5 mb-2 pb-1.5 border-b border-stone-200">
                <TrackIcon className="w-4 h-4" style={{ color: trackColor }} />
                <div className="text-sm font-semibold" style={{ color: trackColor }}>{trackLabel}</div>
                <div className="text-xs text-stone-400">({trackTasks.length})</div>
              </div>
              <div className="space-y-2">
                {trackTasks.map((task) => (
                  <div key={task.id} className="flex flex-wrap gap-2 items-center p-2 rounded-md bg-stone-50">
                    <input
                      type="text"
                      value={task.name}
                      onChange={e => updateTask(tasks.indexOf(task), 'name', e.target.value)}
                      className="flex-1 min-w-[180px] px-3 py-1.5 text-sm border border-stone-300 rounded-md bg-white"
                    />
                    <div className="flex items-center gap-1 text-xs text-stone-500">
                      第-
                      <input
                        type="number"
                        value={task.weekBefore}
                        onChange={e => updateTask(tasks.indexOf(task), 'weekBefore', parseInt(e.target.value) || 0)}
                        className="w-14 px-2 py-1.5 text-sm border border-stone-300 rounded-md bg-white"
                      />
                      週
                    </div>
                    <select
                      value={task.track || 'content'}
                      onChange={e => updateTask(tasks.indexOf(task), 'track', e.target.value)}
                      className="px-2 py-1.5 text-xs border border-stone-300 rounded-md bg-white"
                    >
                      <option value="content">演講準備</option>
                      <option value="coffee">咖啡會議</option>
                    </select>
                    <select
                      value={task.icon}
                      onChange={e => updateTask(tasks.indexOf(task), 'icon', e.target.value)}
                      className="px-2 py-1.5 text-xs border border-stone-300 rounded-md bg-white"
                    >
                      {Object.keys(ICON_MAP).map(ic => <option key={ic} value={ic}>{ic}</option>)}
                    </select>
                    <button onClick={() => deleteTask(tasks.indexOf(task))} className="text-stone-400 hover:text-red-600">
                      <Trash2 className="w-4 h-4" />
                    </button>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <button onClick={save} className="px-5 py-2.5 text-white rounded-md font-semibold" style={{ background: '#A01E2E' }}>
        儲存設定
      </button>
    </div>
  );
}

const COFFEE_STATUS = {
  pending: { text: '邀約中', color: '#A01E2E', bg: '#FCEFE3' },
  scheduled: { text: '待進行', color: '#B8860B', bg: '#FFF8E1' },
  done: { text: '已完成', color: '#4A6741', bg: '#EDF3E8' },
  cancelled: { text: '已取消', color: '#888', bg: '#F0F0F0' },
};
const COFFEE_WILLINGNESS = {
  // 舊資料相容：unknown 的舊紀錄會 fallback 到「邀約中」顯示
  unknown: { text: '邀約中', color: '#A01E2E', bg: '#FCEFE3' },
  pending: { text: '邀約中', color: '#A01E2E', bg: '#FCEFE3' },
  confirmed: { text: '確認出席', color: '#4A6741', bg: '#EDF3E8' },
  declined: { text: '拒絕', color: '#6C6C6C', bg: '#F0F0F0' },
};
const COFFEE_CONVERSION = {
  none: { text: '—', color: '#AAA', bg: '#F5F5F5' },
  following: { text: '跟進中', color: '#8B6F47', bg: '#FFF8E1' },
  signed: { text: '已簽單', color: '#A01E2E', bg: '#FCEFE3' },
  paid: { text: '已繳費', color: '#2D5A27', bg: '#EDF3E8' },
  sworn: { text: '已宣誓🎉', color: '#1A6B1A', bg: '#D4EDDA' },
};

function CoffeeMeetingPage({ data, saveData, showToast }) {
  const editMode = useEditMode();
  const { member: me } = React.useContext(IdentityContext);
  const [chapterStatsOpen, setChapterStatsOpen] = useState(false); // 分會 8 顆統計卡預設摺疊
  // 預設看「待進行 + 邀約中」（最常用的兩個狀態）；3 個多選 + 1 個 inviterId 單選 + search
  const [filter, setFilter] = useState({ inviterId: '', statuses: ['scheduled', 'pending'], willingnesses: [], conversions: [], search: '' });
  const [editingId, setEditingId] = useState(null);
  const [formData, setFormData] = useState({});
  const [groupMeetings, setGroupMeetings] = useState([]);       // 從運營台讀組聚
  const [importPanelOpen, setImportPanelOpen] = useState(false);
  const [selectedOffers, setSelectedOffers] = useState(new Set());

  // 逐筆確認流程：reviewQueue=待確認的 offer 列表；reviewIdx=當前處理到第幾筆；reviewDraft=當前可編輯的草稿；confirmedDrafts=已確認待儲存的
  const [reviewQueue, setReviewQueue] = useState([]);
  const [reviewIdx, setReviewIdx] = useState(0);
  const [reviewDraft, setReviewDraft] = useState(null);
  const [confirmedDrafts, setConfirmedDrafts] = useState([]);
  const [reviewSubmitting, setReviewSubmitting] = useState(false); // 防止 finalize 重入（連點「確認此筆並完成」會多次寫入）

  const memberById = useMemo(() => {
    const map = {};
    data.members.forEach(m => { map[m.id] = m; });
    return map;
  }, [data.members]);

  // 首次載入：讀運營台組聚資料，抓所有 pending 的引薦意向
  useEffect(() => {
    (async () => {
      try {
        const res = await apiClient.get('bni_group_meetings_v1', true);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          if (Array.isArray(parsed)) setGroupMeetings(parsed);
        }
      } catch (e) { console.error('[load group meetings]', e); }
    })();
  }, []);

  // 從 groupMeetings 計算所有可匯入的 offer
  // 兼容兩種 schema：
  //   - 舊版（單主講）：gm.speaker.memberId + gm.neededConnections[]
  //   - 新版（多主講）：gm.speakers[].memberId + gm.speakers[].neededConnections[]
  const importableOffers = useMemo(() => {
    const results = [];
    const collectFromSpeaker = (gm, speakerId, neededConnections) => {
      if (!speakerId) return;            // 沒主講人的跳過
      (neededConnections || []).forEach(nc => {
        (nc.offers || []).forEach(of => {
          if (of.status === 'imported') return;  // 已匯入跳過
          if (of.wantImport === false) return;    // 使用者勾選「不匯入」跳過（舊資料 undefined 視為 true）
          if (!of.contactName?.trim()) return;    // 沒填姓名跳過
          results.push({
            // compositeId 加上 speakerId，避免新版多主講人時 nc.id 跨 speaker 衝突
            compositeId: gm.id + ':' + speakerId + ':' + nc.id + ':' + of.id,
            meetingId: gm.id,
            speakerId,                     // 咖啡會議的 inviterId + write-back 找 speaker 用
            ncId: nc.id,
            offerId: of.id,
            meetingDate: gm.date,
            introducerId: of.introducerId,
            contactName: of.contactName,
            contactProfession: of.contactProfession || '',
            profileWanted: nc.profileWanted || '',
          });
        });
      });
    };
    (groupMeetings || []).forEach(gm => {
      // 新版：speakers[] 陣列
      if (Array.isArray(gm.speakers) && gm.speakers.length) {
        gm.speakers.forEach(sp => collectFromSpeaker(gm, sp.memberId, sp.neededConnections));
      } else {
        // 舊版：單一 speaker 結構
        collectFromSpeaker(gm, gm.speaker?.memberId, gm.neededConnections);
      }
    });
    return results;
  }, [groupMeetings]);

  const allMeetings = data.coffeeMeetings || [];

  const filtered = useMemo(() => {
    let result = [...allMeetings];
    if (filter.inviterId) result = result.filter(cm => cm.inviterId === filter.inviterId);
    if (filter.statuses && filter.statuses.length > 0) result = result.filter(cm => filter.statuses.includes(cm.meetingStatus || 'pending'));
    if (filter.willingnesses && filter.willingnesses.length > 0) result = result.filter(cm => filter.willingnesses.includes(cm.attendanceWillingness || 'pending'));
    if (filter.conversions && filter.conversions.length > 0) result = result.filter(cm => filter.conversions.includes(cm.conversionStatus || 'none'));
    if (filter.search) {
      const q = filter.search.toLowerCase();
      result = result.filter(cm =>
        (cm.guestName || '').toLowerCase().includes(q) ||
        (cm.guestIndustry || '').toLowerCase().includes(q)
      );
    }
    return result.sort((a, b) => new Date(b.meetingTime || b.createdAt || 0) - new Date(a.meetingTime || a.createdAt || 0));
  }, [allMeetings, filter]);

  // 統計
  const stats = useMemo(() => ({
    total: allMeetings.length,
    done: allMeetings.filter(cm => cm.meetingStatus === 'done').length,
    pending: allMeetings.filter(cm => cm.meetingStatus === 'pending').length,
    scheduled: allMeetings.filter(cm => cm.meetingStatus === 'scheduled').length,
    confirmed: allMeetings.filter(cm => cm.attendanceWillingness === 'confirmed').length,
    following: allMeetings.filter(cm => cm.conversionStatus === 'following').length,
    signed: allMeetings.filter(cm => cm.conversionStatus === 'signed').length,
    sworn: allMeetings.filter(cm => cm.conversionStatus === 'sworn').length,
  }), [allMeetings]);

  // Session 5：「我的咖啡」三件事 —— 即將進行 / 待跟進 / 本月已完成
  // 篩選邏輯：邀約人是我，或我在參與者名單裡。
  const myStats = useMemo(() => {
    if (!me) return null;
    const isMine = (cm) =>
      cm.inviterId === me.id ||
      (Array.isArray(cm.participantIds) && cm.participantIds.includes(me.id));
    const mine = allMeetings.filter(isMine);
    const now = new Date();
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    return {
      scheduled: mine.filter(cm =>
        cm.meetingStatus === 'scheduled' &&
        cm.meetingTime && new Date(cm.meetingTime) >= now
      ).length,
      following: mine.filter(cm => cm.conversionStatus === 'following').length,
      doneThisMonth: mine.filter(cm =>
        cm.meetingStatus === 'done' &&
        cm.meetingTime && new Date(cm.meetingTime) >= monthStart
      ).length,
      total: mine.length,
    };
  }, [me, allMeetings]);

  // 近期 6 週演講人名單（方便快速建立咖啡會議）
  const upcomingSpeakers = useMemo(() => {
    const today = new Date();
    const ids = new Set();
    data.meetings
      .filter(m => daysBetween(today, new Date(m.date)) >= -1)
      .forEach(m => {
        if (m.slotA.speakerId) ids.add(m.slotA.speakerId);
        if (m.slotB.speakerId) ids.add(m.slotB.speakerId);
      });
    return [...ids].map(id => memberById[id]).filter(Boolean);
  }, [data.meetings, memberById]);

  const openNew = (presetInviterId) => {
    setFormData({
      guestName: '',
      guestIndustry: '',
      inviterId: presetInviterId || '',
      presenterId: '',           // 主講人（選填）
      participantIds: [],        // 參與者（多選，記錄分會夥伴實際到場名單）
      meetingTime: '',
      location: '',              // 地點（選填）
      meetingStatus: 'pending',
      attendanceWillingness: 'pending',
      attendanceTime: '',
      conversionStatus: 'none',
      notes: '',
      minutes: '',               // 會議記錄（事後撰寫實際會談內容、行動項目）
    });
    setEditingId('new');
  };

  const openEdit = (cm) => {
    setFormData({ ...cm });
    setEditingId(cm.id);
  };

  const saveMeeting = () => {
    if (!formData.guestName?.trim()) {
      showToast('請填寫來賓姓名', 'error');
      return;
    }
    let next;
    if (editingId === 'new') {
      const newCm = { ...formData, id: `cm_${Date.now()}`, createdAt: new Date().toISOString() };
      next = { ...data, coffeeMeetings: [...allMeetings, newCm] };
    } else {
      next = {
        ...data,
        coffeeMeetings: allMeetings.map(cm => cm.id === editingId ? { ...cm, ...formData } : cm)
      };
    }
    saveData(next);
    setEditingId(null);
    showToast('儲存完成');
  };

  const deleteMeeting = (id) => {
    if (!confirm('確定刪除這筆咖啡會議？')) return;
    saveData({ ...data, coffeeMeetings: allMeetings.filter(cm => cm.id !== id) }, { deletedIds: { coffeeMeetings: [id] } });
    showToast('已刪除');
  };

  // 從 offer 建立可編輯草稿（review 階段每筆都會初始化一份）
  const makeDraftFromOffer = (o) => {
    const introducer = o.introducerId ? memberById[o.introducerId] : null;
    const speaker = o.speakerId ? memberById[o.speakerId] : null;
    const note = `由 ${introducer?.name || '組員'} 引薦給 ${speaker?.name || '主講人'}（${formatDate(o.meetingDate)} 組聚）`
      + (o.profileWanted ? `\n原需求：${o.profileWanted}` : '');
    return {
      __offerCompositeId: o.compositeId, // 用來最終回寫 imported 狀態
      guestName: o.contactName || '',
      guestIndustry: o.contactProfession || '',
      // 邀約人：引薦這個人脈的組員（誰跟這位來賓熟，誰負責約咖啡），沒填引薦人才 fallback 主講人
      inviterId: o.introducerId || o.speakerId,
      // 主講人：這場咖啡會議要把這位來賓帶來聽誰的演講
      presenterId: o.speakerId,
      meetingTime: '',                   // 留空讓使用者填
      location: '',
      meetingStatus: 'pending',          // 預設邀約中
      attendanceWillingness: 'pending',
      attendanceTime: '',
      conversionStatus: 'none',
      notes: note,
    };
  };

  // 開始逐筆確認流程
  const startReview = () => {
    const selected = importableOffers.filter(o => selectedOffers.has(o.compositeId));
    if (selected.length === 0) { showToast('請先勾選要匯入的項目', 'error'); return; }
    setReviewQueue(selected);
    setReviewIdx(0);
    setReviewDraft(makeDraftFromOffer(selected[0]));
    setConfirmedDrafts([]);
    setImportPanelOpen(false); // 關掉勾選面板，切到逐筆確認
  };

  // 確認此筆：把 draft 加入 confirmedDrafts；最後一筆 → 觸發 finalize
  const reviewConfirmCurrent = () => {
    if (reviewSubmitting) return;  // 防重入
    const newConfirmed = [...confirmedDrafts, reviewDraft];
    advanceReview(newConfirmed);
  };
  // 跳過此筆：不加入 confirmedDrafts，直接 advance
  const reviewSkipCurrent = () => {
    if (reviewSubmitting) return;
    advanceReview(confirmedDrafts);
  };
  // 推進到下一筆，或結束
  const advanceReview = (currentConfirmed) => {
    const nextIdx = reviewIdx + 1;
    if (nextIdx >= reviewQueue.length) {
      // 已到最後 → 收尾儲存
      finalizeReview(currentConfirmed);
    } else {
      setConfirmedDrafts(currentConfirmed);
      setReviewIdx(nextIdx);
      setReviewDraft(makeDraftFromOffer(reviewQueue[nextIdx]));
    }
  };
  // 取消整個逐筆確認流程（已確認的依使用者選擇是否保留）
  const cancelReview = () => {
    if (reviewSubmitting) return;
    if (confirmedDrafts.length === 0) {
      // 沒確認過任何 → 直接清空
      resetReviewState();
      return;
    }
    if (confirm(`已確認 ${confirmedDrafts.length} 筆，是否儲存這些已確認的，或全部放棄？\n\n按「確定」儲存已確認的，按「取消」全部放棄。`)) {
      finalizeReview(confirmedDrafts);
    } else {
      resetReviewState();
    }
  };
  const resetReviewState = () => {
    setReviewQueue([]);
    setReviewIdx(0);
    setReviewDraft(null);
    setConfirmedDrafts([]);
    setSelectedOffers(new Set());
    setReviewSubmitting(false);
  };

  // 收尾：把所有已確認的 draft 寫進 coffeeMeetings + 對應 group meeting offer 標記 imported
  const finalizeReview = async (allConfirmed) => {
    if (reviewSubmitting) return;          // 防重入：finalize 還在跑就再呼叫直接 ignore
    setReviewSubmitting(true);             // 鎖 — 防止連點 modal 多次觸發 finalize
    // 立刻清掉 modal 顯示（reviewDraft=null 會讓 modal unmount），即使 await 還在跑也按不到了
    setReviewDraft(null);
    if (allConfirmed.length === 0) {
      showToast('沒有要儲存的項目');
      resetReviewState();
      return;
    }
    const now = new Date().toISOString();
    const newCms = allConfirmed.map((d, i) => ({
      id: `cm_${Date.now()}_${i}`,
      guestName: d.guestName,
      guestIndustry: d.guestIndustry,
      inviterId: d.inviterId,
      presenterId: d.presenterId || '',
      meetingTime: d.meetingTime || '',
      location: d.location || '',
      meetingStatus: d.meetingStatus || 'pending',
      attendanceWillingness: d.attendanceWillingness || 'pending',
      attendanceTime: d.attendanceTime || '',
      conversionStatus: d.conversionStatus || 'none',
      notes: d.notes || '',
      sourceGroupMeetingCompositeId: d.__offerCompositeId,
      createdAt: now,
    }));
    saveData({ ...data, coffeeMeetings: [...allMeetings, ...newCms] });

    // 回寫組聚：把對應 offer 標 imported（兼容新舊 schema，跟原本 doImport 一樣）
    const confirmedKeys = new Set(allConfirmed.map(d => d.__offerCompositeId));
    const markOffer = (gm, speakerId, of, ncId) => {
      const key = gm.id + ':' + speakerId + ':' + ncId + ':' + of.id;
      if (!confirmedKeys.has(key)) return of;
      return { ...of, status: 'imported', importedAt: now };
    };
    const updatedGroupMeetings = groupMeetings.map(gm => {
      if (Array.isArray(gm.speakers) && gm.speakers.length) {
        return {
          ...gm,
          speakers: gm.speakers.map(sp => ({
            ...sp,
            neededConnections: (sp.neededConnections || []).map(nc => ({
              ...nc,
              offers: (nc.offers || []).map(of => markOffer(gm, sp.memberId, of, nc.id)),
            })),
          })),
        };
      }
      const oldSpeakerId = gm.speaker?.memberId || '';
      return {
        ...gm,
        neededConnections: (gm.neededConnections || []).map(nc => ({
          ...nc,
          offers: (nc.offers || []).map(of => markOffer(gm, oldSpeakerId, of, nc.id)),
        })),
      };
    });
    try {
      await apiClient.set('bni_group_meetings_v1', JSON.stringify(updatedGroupMeetings), true);
      setGroupMeetings(updatedGroupMeetings);
      showToast(`已匯入 ${allConfirmed.length} 筆引薦為咖啡會議`);
    } catch (e) {
      showToast('匯入成功但回寫組聚失敗，下次可能會重複顯示：' + e.message, 'error');
    }
    resetReviewState();
  };

  // 將勾選的組聚 offer 直接匯入（保留舊邏輯，但目前 UI 已改用 startReview，這個函式僅作備用）
  const doImport = async () => {
    const selected = importableOffers.filter(o => selectedOffers.has(o.compositeId));
    if (selected.length === 0) { showToast('請先勾選要匯入的項目', 'error'); return; }

    // 1. 新增 coffee meetings
    const now = new Date().toISOString();
    const newCms = selected.map(o => {
      const introducer = o.introducerId ? memberById[o.introducerId] : null;
      const note = `由 ${introducer?.name || '組員'} 引薦（${formatDate(o.meetingDate)} 組聚）`
        + (o.profileWanted ? `\n原需求：${o.profileWanted}` : '');
      return {
        id: `cm_${Date.now()}_${Math.random().toString(36).slice(2, 5)}`,
        guestName: o.contactName,
        guestIndustry: o.contactProfession || '',
        inviterId: o.speakerId,
        meetingTime: '',
        meetingStatus: 'pending',               // 邀約中
        attendanceWillingness: 'pending',
        conversionStatus: 'none',
        notes: note,
        sourceGroupMeetingId: o.meetingId,      // 追溯來源
        sourceOfferId: o.offerId,
        createdAt: now,
      };
    });

    // 2. 更新主站 coffeeMeetings
    saveData({ ...data, coffeeMeetings: [...allMeetings, ...newCms] });

    // 3. 回寫組聚：把對應的 offer 標為 imported（兼容新舊 schema）
    // selectedKeys 用 meetingId:speakerId:ncId:offerId（與 compositeId 一致）
    const selectedKeys = new Set(selected.map(o => o.meetingId + ':' + o.speakerId + ':' + o.ncId + ':' + o.offerId));
    const markOffer = (gm, speakerId, of, ncId) => {
      const key = gm.id + ':' + speakerId + ':' + ncId + ':' + of.id;
      if (!selectedKeys.has(key)) return of;
      return { ...of, status: 'imported', importedAt: now };
    };
    const updatedGroupMeetings = groupMeetings.map(gm => {
      // 新版：speakers[]
      if (Array.isArray(gm.speakers) && gm.speakers.length) {
        return {
          ...gm,
          speakers: gm.speakers.map(sp => ({
            ...sp,
            neededConnections: (sp.neededConnections || []).map(nc => ({
              ...nc,
              offers: (nc.offers || []).map(of => markOffer(gm, sp.memberId, of, nc.id)),
            })),
          })),
        };
      }
      // 舊版：meeting.neededConnections
      const oldSpeakerId = gm.speaker?.memberId || '';
      return {
        ...gm,
        neededConnections: (gm.neededConnections || []).map(nc => ({
          ...nc,
          offers: (nc.offers || []).map(of => markOffer(gm, oldSpeakerId, of, nc.id)),
        })),
      };
    });
    try {
      await apiClient.set('bni_group_meetings_v1', JSON.stringify(updatedGroupMeetings), true);
      setGroupMeetings(updatedGroupMeetings);
      showToast(`已匯入 ${selected.length} 筆引薦為咖啡會議`);
    } catch (e) {
      showToast('匯入成功但回寫組聚失敗，下次可能會重複顯示：' + e.message, 'error');
    }

    // 4. 關閉 modal
    setImportPanelOpen(false);
    setSelectedOffers(new Set());
  };

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="mb-6 flex items-start justify-between gap-4 flex-wrap">
        <div>
          <div className="text-[10px] tracking-[0.3em] text-stone-400 mb-2">COFFEE MEETING TRACKER</div>
          <h2 className="text-3xl md:text-4xl font-bold mb-1" style={{ color: '#1A1414' }}>
            咖啡會議 <span style={{ color: '#8B6F47' }}>追蹤</span>
          </h2>
          <div className="text-sm text-stone-500">記錄每場 121，邀約嘉賓來聽主題演講、開啟簽單機會</div>
        </div>
        {editMode && importableOffers.length > 0 && (
          <button
            onClick={() => { setImportPanelOpen(true); setSelectedOffers(new Set(importableOffers.map(o => o.compositeId))); }}
            className="relative px-4 py-2.5 text-sm font-semibold text-white rounded-md shadow-sm hover:shadow-md transition-all flex items-center gap-2"
            style={{ background: '#B8860B' }}
            title="將組聚中的引薦意向轉為咖啡會議"
          >
            <Megaphone className="w-4 h-4" />
            從組聚匯入引薦
            <span className="absolute -top-1.5 -right-1.5 bg-red-600 text-white text-[10px] font-bold rounded-full min-w-[20px] h-5 px-1.5 flex items-center justify-center">
              {importableOffers.length}
            </span>
          </button>
        )}
      </div>

      {/* Session 5：我的咖啡（個人化區塊，識別過身份才顯示）*/}
      {me && myStats && (
        <div className="mb-5 p-4 rounded-xl border border-stone-200" style={{ background: 'linear-gradient(135deg, #FFF8EE 0%, #FAF3E5 100%)' }}>
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <span className="text-lg">☕</span>
              <span className="text-sm font-bold" style={{ color: 'var(--c-coffee)' }}>我的咖啡 · {me.name}</span>
            </div>
            {myStats.total === 0 && (
              <span className="text-xs text-stone-500">還沒有你的紀錄{editMode ? '，可點下方「+ 新增」開始' : '，切到右上角「✏️ 編輯」模式新增'}</span>
            )}
          </div>
          {myStats.total > 0 && (
            <div className="grid grid-cols-3 gap-2 md:gap-3">
              <button
                type="button"
                onClick={() => setFilter({
                  inviterId: me.id, statuses: ['scheduled'], willingnesses: [], conversions: [], search: '',
                })}
                className="bg-white rounded-lg p-3 text-left hover:shadow-md transition-shadow border border-transparent hover:border-amber-300"
                title="點此只看自己的待進行"
              >
                <div className="text-[10px] tracking-widest text-stone-400">即將進行</div>
                <div className="text-2xl md:text-3xl font-bold" style={{ color: '#B8860B' }}>{myStats.scheduled}</div>
              </button>
              <button
                type="button"
                onClick={() => setFilter({
                  inviterId: me.id, statuses: [], willingnesses: [], conversions: ['following'], search: '',
                })}
                className="bg-white rounded-lg p-3 text-left hover:shadow-md transition-shadow border border-transparent hover:border-amber-300"
                title="點此只看自己的跟進中"
              >
                <div className="text-[10px] tracking-widest text-stone-400">待跟進</div>
                <div className="text-2xl md:text-3xl font-bold" style={{ color: 'var(--c-coffee)' }}>{myStats.following}</div>
              </button>
              <button
                type="button"
                onClick={() => setFilter({
                  inviterId: me.id, statuses: ['done'], willingnesses: [], conversions: [], search: '',
                })}
                className="bg-white rounded-lg p-3 text-left hover:shadow-md transition-shadow border border-transparent hover:border-amber-300"
                title="點此只看自己本月已完成"
              >
                <div className="text-[10px] tracking-widest text-stone-400">本月已完成</div>
                <div className="text-2xl md:text-3xl font-bold" style={{ color: 'var(--c-kpi-green)' }}>{myStats.doneThisMonth}</div>
              </button>
            </div>
          )}
        </div>
      )}

      {/* 分會統計（8 卡）—— Session 5 改為預設摺疊，會員平常用不到 */}
      <details
        open={chapterStatsOpen}
        onToggle={(e) => setChapterStatsOpen(e.currentTarget.open)}
        className="mb-5 bg-white rounded-lg border border-stone-200"
      >
        <summary className="cursor-pointer px-3 py-2 text-xs text-stone-500 select-none flex items-center gap-1.5">
          <span>查看分會統計（8 項）</span>
          <ChevronRight className="w-3 h-3" style={{ transform: chapterStatsOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' }} />
        </summary>
        <div className="grid grid-cols-4 md:grid-cols-8 gap-2 p-3 pt-0">
          <StatCard label="總場次" value={stats.total} color="#1A1414"
            active={
              !filter.statuses?.length && !filter.willingnesses?.length && !filter.conversions?.length && !filter.inviterId && !filter.search
            }
            onClick={() => setFilter({ inviterId: '', statuses: [], willingnesses: [], conversions: [], search: '' })} />
          <StatCard label="邀約中" value={stats.pending} color="#A01E2E"
            active={filter.statuses?.length === 1 && filter.statuses[0] === 'pending'}
            onClick={() => setFilter({
              ...filter,
              statuses: (filter.statuses?.length === 1 && filter.statuses[0] === 'pending') ? [] : ['pending'],
              willingnesses: [], conversions: [],
            })} />
          <StatCard label="待進行" value={stats.scheduled} color="#B8860B"
            active={filter.statuses?.length === 1 && filter.statuses[0] === 'scheduled'}
            onClick={() => setFilter({
              ...filter,
              statuses: (filter.statuses?.length === 1 && filter.statuses[0] === 'scheduled') ? [] : ['scheduled'],
              willingnesses: [], conversions: [],
            })} />
          <StatCard label="已完成" value={stats.done} color="#8B6F47"
            active={filter.statuses?.length === 1 && filter.statuses[0] === 'done'}
            onClick={() => setFilter({
              ...filter,
              statuses: (filter.statuses?.length === 1 && filter.statuses[0] === 'done') ? [] : ['done'],
              willingnesses: [], conversions: [],
            })} />
          <StatCard label="確認出席" value={stats.confirmed} color="#4A6741"
            active={filter.willingnesses?.length === 1 && filter.willingnesses[0] === 'confirmed'}
            onClick={() => setFilter({
              ...filter,
              statuses: [],
              willingnesses: (filter.willingnesses?.length === 1 && filter.willingnesses[0] === 'confirmed') ? [] : ['confirmed'],
              conversions: [],
            })} />
          <StatCard label="跟進中" value={stats.following} color="#8B6F47"
            active={filter.conversions?.length === 1 && filter.conversions[0] === 'following'}
            onClick={() => setFilter({
              ...filter,
              statuses: [], willingnesses: [],
              conversions: (filter.conversions?.length === 1 && filter.conversions[0] === 'following') ? [] : ['following'],
            })} />
          <StatCard label="已簽單" value={stats.signed} color="#A01E2E"
            active={filter.conversions?.length === 1 && filter.conversions[0] === 'signed'}
            onClick={() => setFilter({
              ...filter,
              statuses: [], willingnesses: [],
              conversions: (filter.conversions?.length === 1 && filter.conversions[0] === 'signed') ? [] : ['signed'],
            })} />
          <StatCard label="已宣誓" value={stats.sworn} color="#1A6B1A"
            active={filter.conversions?.length === 1 && filter.conversions[0] === 'sworn'}
            onClick={() => setFilter({
              ...filter,
              statuses: [], willingnesses: [],
              conversions: (filter.conversions?.length === 1 && filter.conversions[0] === 'sworn') ? [] : ['sworn'],
            })} />
        </div>
      </details>

      {/* 近期演講人快速建立 —— 編輯模式才顯示（新增動作）*/}
      {editMode && upcomingSpeakers.length > 0 && (
        <div className="mb-4 p-3 bg-white rounded-lg border border-stone-200">
          <div className="flex items-center gap-2 mb-2 flex-wrap">
            <div className="text-xs font-semibold text-stone-700">近期演講人快速建立：</div>
            {upcomingSpeakers.map(m => (
              <button
                key={m.id}
                onClick={() => openNew(m.id)}
                className="px-2 py-1 text-xs bg-stone-100 hover:bg-amber-100 rounded transition-colors"
              >
                + {m.name} 的咖啡會議
              </button>
            ))}
          </div>
        </div>
      )}

      {/* 篩選 */}
      <div className="bg-white rounded-lg border border-stone-200 p-3 mb-4 flex flex-wrap gap-2 items-center">
        <input
          type="text"
          placeholder="搜尋來賓 / 行業別..."
          value={filter.search}
          onChange={e => setFilter({ ...filter, search: e.target.value })}
          className="px-3 py-1.5 text-sm border border-stone-300 rounded-md flex-1 min-w-[150px]"
        />
        <div className="min-w-[180px]">
          <MemberSearchSelect
            members={data.members}
            value={filter.inviterId}
            onChange={id => setFilter({ ...filter, inviterId: id || '' })}
            placeholder="所有邀約人"
            showIndustry={false}
          />
        </div>
        <MultiSelectFilter
          label="狀態"
          allText="所有狀態"
          values={filter.statuses || []}
          onChange={vals => setFilter({ ...filter, statuses: vals })}
          options={[
            { value: 'pending', label: '邀約中' },
            { value: 'scheduled', label: '待進行' },
            { value: 'done', label: '已完成' },
            { value: 'cancelled', label: '已取消' },
          ]}
        />
        <MultiSelectFilter
          label="出席意願"
          allText="所有意願"
          values={filter.willingnesses || []}
          onChange={vals => setFilter({ ...filter, willingnesses: vals })}
          options={[
            { value: 'pending', label: '邀約中' },
            { value: 'confirmed', label: '確認出席' },
            { value: 'declined', label: '拒絕' },
          ]}
        />
        <MultiSelectFilter
          label="轉化"
          allText="所有轉化"
          values={filter.conversions || []}
          onChange={vals => setFilter({ ...filter, conversions: vals })}
          options={[
            { value: 'none', label: '不再追蹤' },
            { value: 'following', label: '跟進中' },
            { value: 'signed', label: '已簽單' },
            { value: 'paid', label: '已繳費' },
            { value: 'sworn', label: '已宣誓' },
          ]}
        />
        {editMode && (
          <button
            onClick={() => openNew()}
            className="px-4 py-1.5 text-sm text-white rounded-md flex items-center gap-1"
            style={{ background: '#8B6F47' }}
          >
            <Plus className="w-4 h-4" />新增咖啡會議
          </button>
        )}
      </div>

      {/* 列表 */}
      <div className="space-y-2">
        {filtered.length === 0 ? (
          <div className="text-center py-16 bg-white rounded-lg border border-stone-200">
            <Coffee className="w-12 h-12 text-stone-300 mx-auto mb-2" />
            <div className="text-sm text-stone-500">沒有咖啡會議記錄</div>
            <div className="text-xs text-stone-400 mt-1">{editMode ? '點「新增咖啡會議」開始記錄' : '切到右上角「✏️ 編輯」模式才能新增'}</div>
          </div>
        ) : (
          filtered.map(cm => (
            <CoffeeCard
              key={cm.id}
              cm={cm}
              inviter={memberById[cm.inviterId]}
              presenter={cm.presenterId ? memberById[cm.presenterId] : null}
              members={data.members}
              onEdit={() => openEdit(cm)}
              onDelete={() => deleteMeeting(cm.id)}
            />
          ))
        )}
      </div>

      {/* 編輯表單 Modal */}
      {editingId && (
        <CoffeeMeetingModal
          isNew={editingId === 'new'}
          formData={formData}
          setFormData={setFormData}
          members={data.members}
          onSave={saveMeeting}
          onClose={() => setEditingId(null)}
        />
      )}

      {/* 從組聚匯入引薦 Modal */}
      {importPanelOpen && (
        <div className="fixed inset-0 z-[60] flex items-start justify-center p-0 sm:py-8 sm:px-4 bg-black/50">
          <div className="bg-white w-full max-w-3xl rounded-none sm:rounded-2xl shadow-2xl flex flex-col max-h-screen sm:max-h-[calc(100vh-4rem)]">
            <div className="flex items-center justify-between px-5 py-4 border-b border-stone-200 sm:rounded-t-2xl flex-shrink-0">
              <div>
                <h3 className="text-lg font-bold" style={{ color: '#1A1414' }}>從組聚匯入引薦意向</h3>
                <div className="text-xs text-stone-500 mt-0.5">勾選要轉為咖啡會議的引薦 → 下一步會逐筆讓你確認/修改細節</div>
              </div>
              <button onClick={() => setImportPanelOpen(false)} className="p-1.5 hover:bg-stone-100 rounded-lg">
                <X className="w-5 h-5 text-stone-500" />
              </button>
            </div>
            <div className="p-5 overflow-y-auto flex-1">
              <div className="flex items-center gap-3 mb-3 pb-3 border-b border-stone-100">
                <label className="text-xs flex items-center gap-1.5 cursor-pointer">
                  <input type="checkbox"
                    checked={selectedOffers.size === importableOffers.length && importableOffers.length > 0}
                    onChange={e => setSelectedOffers(e.target.checked ? new Set(importableOffers.map(o => o.compositeId)) : new Set())} />
                  <span>全選</span>
                </label>
                <div className="text-xs text-stone-500">已勾選 {selectedOffers.size} / {importableOffers.length}</div>
              </div>

              <div className="space-y-2">
                {importableOffers.map(o => {
                  const speaker = memberById[o.speakerId];
                  const introducer = o.introducerId ? memberById[o.introducerId] : null;
                  const checked = selectedOffers.has(o.compositeId);
                  return (
                    <label key={o.compositeId}
                      className={`flex gap-3 p-3 rounded-lg border cursor-pointer transition-colors ${checked ? 'border-amber-400 bg-amber-50/40' : 'border-stone-200 hover:bg-stone-50'}`}>
                      <input type="checkbox" checked={checked} className="mt-1"
                        onChange={e => setSelectedOffers(prev => {
                          const next = new Set(prev);
                          if (e.target.checked) next.add(o.compositeId); else next.delete(o.compositeId);
                          return next;
                        })} />
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                          <span className="font-semibold text-stone-800">{o.contactName}</span>
                          {o.contactProfession && <span className="text-xs text-stone-500">· {o.contactProfession}</span>}
                        </div>
                        <div className="text-xs text-stone-600 space-y-0.5">
                          <div>
                            主講人 <b>{speaker?.name || '未知'}</b> 將邀約
                            {introducer && <span> · 由 <b>{introducer.name}</b> 引薦</span>}

                          {o.profileWanted && <div className="text-stone-500">原需求：{o.profileWanted}</div>}
                          <div className="text-[10px] text-stone-400">組聚日期：{formatDate(o.meetingDate)}</div>
                        </div>
                      </div>
                    </label>
                  );
                })}
                {importableOffers.length === 0 && (
                  <div className="text-sm text-stone-400 text-center py-8">目前沒有待匯入的引薦意向</div>
                )}
              </div>
            </div>
            <div className="border-t border-stone-200 bg-stone-50 px-5 py-3 flex justify-end gap-2 flex-shrink-0 sm:rounded-b-2xl">
              <button onClick={() => setImportPanelOpen(false)}
                className="px-4 py-2 text-sm border border-stone-300 rounded-md hover:bg-white">取消</button>
              <button onClick={startReview} disabled={selectedOffers.size === 0}
                className="px-4 py-2 text-sm font-semibold text-white rounded-md disabled:opacity-40"
                style={{ background: '#B8860B' }}>
                下一步：逐筆確認 {selectedOffers.size} 筆 →
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 逐筆確認 Modal — 每筆引薦獨立檢視/修改後再匯入 */}
      {reviewDraft && reviewQueue.length > 0 && (
        <div className="fixed inset-0 z-[60] flex items-start justify-center p-0 sm:py-8 sm:px-4 bg-black/50">
          <div className="bg-white w-full max-w-2xl rounded-none sm:rounded-2xl shadow-2xl flex flex-col max-h-screen sm:max-h-[calc(100vh-4rem)]">
            <div className="flex items-center justify-between px-5 py-4 border-b border-stone-200 sm:rounded-t-2xl flex-shrink-0">
              <div>
                <h3 className="text-lg font-bold" style={{ color: '#1A1414' }}>
                  逐筆確認匯入（{reviewIdx + 1} / {reviewQueue.length}）
                </h3>
                <div className="text-xs text-stone-500 mt-0.5">
                  原組聚資訊：{(() => {
                    const o = reviewQueue[reviewIdx];
                    const sp = memberById[o.speakerId];
                    const intro = o.introducerId ? memberById[o.introducerId] : null;
                    return `${formatDate(o.meetingDate)} 組聚 · 主講人 ${sp?.name || '?'}${intro ? ` · 由 ${intro.name} 引薦` : ''}`;
                  })()}
                </div>
                {confirmedDrafts.length > 0 && (

              </CFField>
              <CFField label="備註">
                <textarea value={reviewDraft.notes} rows={3}
                  onChange={e => setReviewDraft({ ...reviewDraft, notes: e.target.value })}
                  className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md resize-none" />

            <div className="border-t border-stone-200 bg-stone-50 px-5 py-3 flex justify-between gap-2 flex-shrink-0 sm:rounded-b-2xl">

              <div className="flex gap-2">
                <button onClick={reviewSkipCurrent} disabled={reviewSubmitting}
