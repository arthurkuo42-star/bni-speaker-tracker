function CoffeeCard({ cm, inviter, presenter, members, onEdit, onDelete }) {
  const editMode = useEditMode();
  const [minutesExpanded, setMinutesExpanded] = useState(false);
  const statusInfo = COFFEE_STATUS[cm.meetingStatus] || COFFEE_STATUS.pending;
  const willingnessInfo = COFFEE_WILLINGNESS[cm.attendanceWillingness] || COFFEE_WILLINGNESS.pending;
  // 時間：能 parse 成 Date 就漂亮顯示；不能（如 LINE 上傳的中文字串）就直接秀原字串
  const fmtTime = (t) => {
    if (!t) return '—';
    const d = new Date(t);
    return isNaN(d.getTime()) ? String(t) : d.toLocaleString('zh-TW', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  };
  // 出席例會改為只存日期；顯示時切 "YYYY-MM-DD" 並轉成 "MM/DD"
  const fmtDate = (t) => {
    if (!t) return '—';
    const ymd = String(t).slice(0, 10);
    const parts = ymd.split('-');
    return parts.length === 3 ? `${parts[1]}/${parts[2]}` : ymd;
  };
  return (
    <div className="bg-white rounded-lg border border-stone-200 p-4 hover:border-stone-400 transition-colors">
      <div className="flex items-start justify-between gap-3 mb-3">
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline gap-2 mb-1 flex-wrap">
            <div className="font-bold text-base" style={{ color: '#1A1414' }}>{cm.guestName || '(未填)'}</div>
            {cm.guestIndustry && <div className="text-xs text-stone-500">· {cm.guestIndustry}</div>}
          </div>
          <div className="flex items-center gap-1.5 text-xs text-stone-500 flex-wrap">
            <span>邀約人：</span>
            <span className="font-medium px-1.5 py-0.5 rounded" style={{ background: '#F5EFE6', color: '#8B6F47' }}>{inviter?.name || '—'}</span>
            {presenter && (
              <>
                <span className="text-stone-400">·</span>
                <span>主講人：</span>
                <span className="font-medium px-1.5 py-0.5 rounded" style={{ background: '#FCEFE3', color: '#A01E2E' }}>{presenter.name}</span>
              </>
            )}
            {cm.location && (
              <>
                <span className="text-stone-400">·</span>
                <span>📍 {cm.location}</span>
              </>
            )}
          </div>
        </div>
        {editMode && (
          <div className="flex gap-1 flex-shrink-0">
            <button onClick={onEdit} className="p-1.5 text-stone-400 hover:text-stone-800 rounded hover:bg-stone-100">
              <Edit3 className="w-4 h-4" />
            </button>
            <button onClick={onDelete} className="p-1.5 text-stone-400 hover:text-red-600 rounded hover:bg-red-50">
              <Trash2 className="w-4 h-4" />
            </button>
          </div>
        )}
      </div>
      <div className="grid grid-cols-3 gap-3 text-xs">
        <div>
          <div className="text-stone-400 mb-1">咖啡會議</div>
          <div className="inline-block px-2 py-0.5 rounded text-xs font-medium" style={{ color: statusInfo.color, background: statusInfo.bg }}>
            {statusInfo.text}
          </div>
          <div className="text-stone-500 mt-1">{fmtTime(cm.meetingTime)}</div>
        </div>
        <div>
          <div className="text-stone-400 mb-1">出席例會意願</div>
          <div className="inline-block px-2 py-0.5 rounded text-xs font-medium" style={{ color: willingnessInfo.color, background: willingnessInfo.bg }}>
            {willingnessInfo.text}
          </div>
          {cm.attendanceTime && <div className="text-stone-500 mt-1">{fmtDate(cm.attendanceTime)}</div>}
        </div>
        <div>
          <div className="text-stone-400 mb-1">轉化追蹤</div>
          {(() => {
            const ci = COFFEE_CONVERSION[cm.conversionStatus || 'none'] || COFFEE_CONVERSION.none;
            return cm.conversionStatus && cm.conversionStatus !== 'none' ? (
              <div className="inline-block px-2 py-0.5 rounded text-xs font-medium" style={{ color: ci.color, background: ci.bg }}>{ci.text}</div>
            ) : (
              <div className="text-stone-400">—</div>
            );
          })()}
        </div>
      </div>
      {/* 參與者：分會夥伴 chips */}
      {Array.isArray(cm.participantIds) && cm.participantIds.length > 0 && (
        <div className="mt-3 flex flex-wrap items-center gap-1">
          <span className="text-xs text-stone-500">👥 參與者：</span>
          {cm.participantIds.slice(0, 5).map(id => {
            const m = (members || []).find(x => x.id === id);
            if (!m) return null;
            return <span key={id} className="text-xs px-2 py-0.5 rounded-full bg-amber-50 text-amber-900 border border-amber-200">{m.name}</span>;
          })}
          {cm.participantIds.length > 5 && (
            <span className="text-xs text-stone-500">+{cm.participantIds.length - 5}</span>
          )}
        </div>
      )}
      {cm.notes && (
        <div className="mt-3 text-xs text-stone-600 px-3 py-2 rounded bg-amber-50 border-l-2 border-amber-300">
          💬 {cm.notes}
        </div>
      )}
      {cm.minutes && (
        <div className="mt-2 text-xs text-stone-700 px-3 py-2 rounded bg-stone-50 border-l-2 border-stone-400">
          <div className="font-semibold text-stone-600 mb-1 flex items-center justify-between">

          <div className="whitespace-pre-wrap">
            {minutesExpanded || cm.minutes.length <= 80 ? cm.minutes : cm.minutes.slice(0, 80) + "…"}
          </div>
        </div>
      )}
    </div>
  );

// 參與者多選：以 chips 顯示已選 + 下方搜尋框可新增
function ParticipantPicker({ members, selectedIds, onChange }) {
  const [q, setQ] = useState("");
  const selectedSet = new Set(selectedIds);
  const remaining = members.filter(m =>
    !selectedSet.has(m.id) && (!q || m.name.includes(q) || (m.industry || "").includes(q))
  );
  const add = (id) => { onChange([...selectedIds, id]); setQ(""); };
  const remove = (id) => onChange(selectedIds.filter(x => x !== id));
  return (
    <div className="border border-stone-300 rounded-md bg-white">
      <div className="p-2 flex flex-wrap gap-1.5 min-h-[40px]">
        {selectedIds.length === 0 && <span className="text-stone-400 text-sm self-center">（尚未選擇）</span>}
        {selectedIds.map(id => {
          const m = members.find(x => x.id === id);
          if (!m) return null;
          return (
            <span key={id} className="inline-flex items-center gap-1 px-2 py-0.5 text-xs rounded-full bg-amber-100 text-amber-900">
              {m.name}{m.industry ? ` · ${m.industry}` : ""}
              <button type="button" onClick={() => remove(id)} className="ml-0.5 text-amber-700 hover:text-red-600 leading-none">×</button>
            </span>
          );
        })}
      </div>
      <div className="border-t border-stone-200 p-2 flex items-center gap-2">
        <input value={q} onChange={e => setQ(e.target.value)}
          placeholder="搜尋姓名/行業 + 點下方加入..."
          className="flex-1 text-sm outline-none bg-transparent" />
        <span className="text-[11px] text-stone-400">{selectedIds.length} 位</span>
      </div>
      {(q || remaining.length > 0) && (
        <div className="border-t border-stone-200 max-h-40 overflow-y-auto p-1">
          {remaining.length === 0 && <div className="text-xs text-stone-400 px-2 py-1.5">{selectedIds.length === members.length ? "全部成員都已加入" : "無符合"}</div>}
          {remaining.slice(0, 20).map(m => (
            <button key={m.id} type="button" onClick={() => add(m.id)}
              className="w-full text-left text-sm px-2 py-1 rounded hover:bg-amber-50">
              <span className="font-medium">{m.name}</span>
              {m.industry && <span className="text-xs text-stone-400 ml-1.5">· {m.industry}</span>}
            </button>
          ))}
          {remaining.length > 20 && <div className="text-xs text-stone-400 px-2 py-1">…還有 {remaining.length - 20} 位，請輸入關鍵字過濾</div>}
        </div>
      )}
    </div>
  );
}

// 多選下拉（checkbox 樣式）— 給篩選器用，可多選
function MultiSelectFilter({ label, options, values, onChange, allText = "全部" }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  // 點擊外部關閉
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);
  const selectedLabels = options.filter(o => values.includes(o.value)).map(o => o.label);
  const buttonText = values.length === 0
    ? allText
    : (selectedLabels.length === 1 ? selectedLabels[0] : `${label}：${selectedLabels.length} 項`);
  const toggle = (val) => {
    onChange(values.includes(val) ? values.filter(v => v !== val) : [...values, val]);
  };
  const clearAll = () => onChange([]);
  return (
    <div ref={ref} className="relative">
      <button type="button" onClick={() => setOpen(!open)}
        className="px-3 py-1.5 text-sm border border-stone-300 rounded-md bg-white hover:bg-stone-50 flex items-center gap-1.5 min-w-[120px] justify-between">
        <span className={values.length === 0 ? "text-stone-500" : "text-stone-800 font-medium"}>{buttonText}</span>
        <ChevronDown className={`w-4 h-4 text-stone-400 transition-transform ${open ? "rotate-180" : ""}`} />
      </button>
      {open && (
        <div className="absolute top-full left-0 mt-1 bg-white border border-stone-200 rounded-md shadow-lg z-30 min-w-[160px] py-1">
          <button type="button" onClick={clearAll}
            className="w-full px-3 py-1.5 text-left text-xs text-stone-500 hover:bg-stone-50 border-b border-stone-100">
            清除選擇（顯示全部）
          </button>
          {options.map(o => {
            const checked = values.includes(o.value);
            return (
              <label key={o.value}
                className={`flex items-center gap-2 px-3 py-1.5 cursor-pointer text-sm hover:bg-stone-50 ${checked ? "bg-amber-50/50" : ""}`}>
                <input type="checkbox" checked={checked} onChange={() => toggle(o.value)} className="w-3.5 h-3.5 accent-[#B8860B]" />
                <span className="text-stone-800">{o.label}</span>
              </label>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============ KPI 紅綠燈 Dashboard ============
const LIGHT_COLORS = {
  green: { bg: '#EDF3E8', color: '#2D5A27', label: '綠燈', emoji: '🟢' },
  yellow: { bg: '#FFF8E1', color: '#8B6F00', label: '黃燈', emoji: '🟡' },
  red: { bg: '#FCEFE3', color: '#A01E2E', label: '紅燈', emoji: '🔴' },
  grey: { bg: '#F0F0F0', color: '#666', label: '灰燈', emoji: '⚫' },
};

function getKpiLightKey(score) {
  if (score >= 70) return 'green';
  if (score >= 50) return 'yellow';
  if (score >= 30) return 'red';
  return 'grey';
}

// 把「第一組」「第二組」...解析成數字以利排序；解析不出來的丟到最後
const CHINESE_ORDINAL_MAP = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12 };
function groupOrdinal(name) {
  if (!name) return 999;
  const m = String(name).match(/^第(.+?)組/);
  if (!m) return 999;
  const v = CHINESE_ORDINAL_MAP[m[1]];
  return typeof v === 'number' ? v : 999;
}

// ============ 紅綠燈：具體建議（port 自後端 scoring.js getRecommendations）============
// 後端 /api/groups-overview 只對 < 70 分的會員回傳 recommendations，
// 為了讓綠燈會員也看到「衝上滿分」建議，整個邏輯前端再算一次。
// 邏輯保持與 scoring.js 同步 —— 若後端規則改了，這裡也要跟著改。
function _calcKpiUpgrades(member, remainWeeks, targetScore) {
  const tw = member.totalWeeks || ((member.pastWeeks || 0) + (remainWeeks || 0));
  const gap = targetScore - member.totalScore;
  if (gap <= 0) return { primary: [], backup: [], warnings: [], gap: 0, canReach: true };

  const warnings = [];
  const upgrades = [];
  const raw = member.raw || {};

  if ((member.absenceScore || 0) < 20) {
    warnings.push(`⚠️ 缺席 ${raw.absences || 0} 次（得 ${member.absenceScore || 0}/20）→ 不要再缺席`);
  }

  // 引薦（priority 1）
  const currentRefTotal = (raw.internalRef || 0) + (raw.externalRef || 0);
  for (const t of [{ rate: 1.5, score: 20 }, { rate: 1.2, score: 15 }, { rate: 1.0, score: 10 }, { rate: 0.75, score: 5 }]) {
    if (t.score > (member.referralScore || 0)) {
      const needed = Math.ceil(t.rate * tw) - currentRefTotal;
      if (needed > 0) {
        const perWeek = remainWeeks > 0 ? Math.ceil(needed / remainWeeks) : needed;
        upgrades.push({ category: "引薦", priority: 1, gain: t.score - (member.referralScore || 0), targetScore: t.score, needed, action: `再提供 ${needed} 個引薦（每週 ${perWeek} 個）`, shortAction: `+${needed} 引薦` });
      }
    }
  }
  // 1-2-1（priority 1）
  for (const t of [{ rate: 2.001, score: 15 }, { rate: 1.0, score: 10 }, { rate: 0.5, score: 5 }]) {
    if (t.score > (member.meetingScore || 0)) {
      const needed = Math.ceil(t.rate * tw) - (raw.oneToOne || 0);
      if (needed > 0) {
        const perWeek = remainWeeks > 0 ? Math.ceil(needed / remainWeeks) : needed;
        upgrades.push({ category: "1-2-1", priority: 1, gain: t.score - (member.meetingScore || 0), targetScore: t.score, needed, action: `再約 ${needed} 次 1-2-1（每週 ${perWeek} 次）`, shortAction: `+${needed} 次 1-2-1` });
      }
    }
  }
  // 教育積分（priority 2）
  for (const t of [{ units: 6, score: 15 }, { units: 4, score: 10 }, { units: 2, score: 5 }]) {
    if (t.score > (member.trainingScore || 0)) {
      const needed = t.units - (raw.training || 0);
      if (needed > 0) {
        upgrades.push({ category: "教育積分", priority: 2, gain: t.score - (member.trainingScore || 0), targetScore: t.score, needed, action: `再完成 ${needed} 個教育積分`, shortAction: `+${needed} 教育積分` });
      }
    }
  }
  // 來賓（priority 3）
  for (const t of [{ per4: 2, score: 15 }, { per4: 1, score: 10 }]) {
    if (t.score > (member.visitorScore || 0)) {
      const needed = Math.ceil(t.per4 * (tw / 4)) - (raw.visitors || 0);
      if (needed > 0) {
        upgrades.push({ category: "來賓", priority: 3, gain: t.score - (member.visitorScore || 0), targetScore: t.score, needed, action: `再帶 ${needed} 位來賓`, shortAction: `+${needed} 位來賓` });
      }
    }
  }
  // 交易（priority 3）
  for (const t of [{ val: 2000000, score: 15 }, { val: 800000, score: 10 }, { val: 400000, score: 5 }]) {
    if (t.score > (member.transactionScore || 0)) {
      const needed = t.val - (raw.transactionValue || 0);
      if (needed > 0) {
        upgrades.push({ category: "交易價值", priority: 3, gain: t.score - (member.transactionScore || 0), targetScore: t.score, needed, action: `再增加 $${needed.toLocaleString()} 交易金額`, shortAction: `+$${(needed / 10000).toFixed(0)}萬交易` });
      }
    }
  }

  upgrades.sort((a, b) => a.priority !== b.priority ? a.priority - b.priority : b.gain - a.gain);

  const primary = [], backup = [];
  let remaining = gap;
  const used = new Set();
  for (const u of upgrades) {
    if (u.priority <= 2 && remaining > 0 && !used.has(u.category)) {
      primary.push(u); remaining -= u.gain; used.add(u.category);
    }
  }
  for (const u of upgrades) {
    if (u.priority === 3 && remaining > 0 && !used.has(u.category)) {
      primary.push(u); remaining -= u.gain; used.add(u.category);
    }
  }
  for (const u of upgrades) {
    if (u.priority === 3 && !used.has(u.category)) {
      backup.push(u); used.add(u.category);
    }
  }
  const primaryGain = primary.reduce((s, u) => s + u.gain, 0);
  return { primary, backup, warnings, gap, canReach: primaryGain >= gap };
}

function getKpiRecommendations(member, remainWeeks) {
  if (!member) return null;
  const score = member.totalScore;
  if (score >= 100) {
    return { status: 'perfect', gap: 0, primary: [], warnings: [], headline: '🏆 滿分！完美表現' };
  }
  if (score >= 70) {
    const perfect = _calcKpiUpgrades(member, remainWeeks, 100);
    return {
      status: 'green',
      gap: 100 - score,
      primary: perfect.primary,
      backup: perfect.backup,
      warnings: perfect.warnings,
      headline: `✅ 已達綠燈，再 ${100 - score} 分到滿分`,
      tierLabel: '🏆 衝上滿分',
    };
  }
  // 黃 / 紅 / 灰：先給「衝綠燈」
  const green = _calcKpiUpgrades(member, remainWeeks, 70);
  return {
    status: green.canReach ? 'reachable' : 'stretch',
    gap: green.gap,
    primary: green.primary,
    backup: green.backup,
    warnings: green.warnings,
    headline: `🎯 距離綠燈差 ${green.gap} 分`,
    tierLabel: '🟢 衝上綠燈',
  };
}

function KpiDashboard() {
  const [loading, setLoading] = useState(true);
  const [kpiData, setKpiData] = useState(null);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState('');
  const [expandedMember, setExpandedMember] = useState(null);
  const [expandedGroups, setExpandedGroups] = useState(new Set());
  const [viewMode, setViewMode] = useState('groups'); // 'groups' | 'all'

  const proxyUrl = (typeof window !== 'undefined' && window.BNI_PROXY_URL) ? window.BNI_PROXY_URL : '';

  useEffect(() => {
    if (!proxyUrl) { setLoading(false); setError('KPI 功能僅在部署版本可用'); return; }
    (async () => {
      try {
        const res = await fetch(proxyUrl + '/api/groups-overview');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        setKpiData(await res.json());
      } catch (e) { setError('載入 KPI 資料失敗：' + e.message); }
      finally { setLoading(false); }
    })();
  }, []);

  // 彙總所有會員
  const allMembers = useMemo(() => {
    if (!kpiData || !kpiData.groups) return [];
    const members = [];
    const seen = new Set();
    for (const [gName, g] of Object.entries(kpiData.groups)) {
      for (const m of g.members) {
        if (!seen.has(m.name)) {
          seen.add(m.name);
          members.push({ ...m, groupName: gName });
        }
      }
    }
    return members.sort((a, b) => b.totalScore - a.totalScore);
  }, [kpiData]);

  // 統計
  const stats = useMemo(() => {
    const s = { green: 0, yellow: 0, red: 0, grey: 0, total: 0 };
    allMembers.forEach(m => {
      s[getKpiLightKey(m.totalScore)]++;
      s.total++;
    });
    return s;
  }, [allMembers]);

  // 搜尋過濾
  const filtered = useMemo(() => {
    if (!search.trim()) return allMembers;
    const q = search.toLowerCase();
    return allMembers.filter(m => m.name.toLowerCase().includes(q));
  }, [allMembers, search]);

  if (loading) return (
    <div className="text-center py-20 text-stone-500" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>載入 KPI 資料中⋯</div>
  );
  if (error) return (
    <div className="text-center py-20" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <AlertCircle className="w-10 h-10 text-stone-300 mx-auto mb-3" />
      <div className="text-stone-500">{error}</div>
      {error.includes('HTTP') && <div className="text-xs text-stone-400 mt-2">請確認 KPI 系統是否有上傳月報資料</div>}
    </div>
  );

  const toggleGroup = (name) => {
    setExpandedGroups(prev => {
      const next = new Set(prev);
      if (next.has(name)) next.delete(name); else next.add(name);
      return next;
    });
  };

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="mb-6">
        <div className="text-[10px] tracking-[0.3em] text-stone-400 mb-2">KPI TRAFFIC LIGHT</div>
        <h2 className="text-3xl md:text-4xl font-bold mb-1" style={{ color: '#1A1414' }}>
          KPI <span style={{ color: '#2D5A27' }}>紅綠燈</span>
        </h2>
        {kpiData && kpiData.config && (
          <div className="text-sm text-stone-500">
            計算基準：{kpiData.totalWeeks - (kpiData.config.remainWeeks || 0)} 週已過 + {kpiData.config.remainWeeks || 0} 週剩餘
          </div>
        )}
      </div>

      {/* 統計卡 */}
      <div className="grid grid-cols-4 gap-2 md:gap-3 mb-5">
        {['green', 'yellow', 'red', 'grey'].map(key => (
          <div key={key} className="rounded-lg p-3 text-center" style={{ background: LIGHT_COLORS[key].bg }}>
            <div className="text-2xl md:text-3xl font-bold" style={{ color: LIGHT_COLORS[key].color }}>{stats[key]}</div>
            <div className="text-xs text-stone-500">{LIGHT_COLORS[key].emoji} {LIGHT_COLORS[key].label}</div>
          </div>
        ))}
      </div>

      {/* 搜尋 + 切換 */}
      <div className="bg-white rounded-lg border border-stone-200 p-3 mb-5 flex flex-wrap gap-2 items-center">
        <input
          type="text"
          placeholder="搜尋會員姓名⋯"
          value={search}
          onChange={e => setSearch(e.target.value)}
          className="px-3 py-1.5 text-sm border border-stone-300 rounded-md flex-1 min-w-[150px]"
        />
        <div className="flex gap-1">
          <button
            onClick={() => setViewMode('groups')}
            className={`px-3 py-1.5 text-xs rounded ${viewMode === 'groups' ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}
          >按組別</button>
          <button
            onClick={() => setViewMode('all')}
            className={`px-3 py-1.5 text-xs rounded ${viewMode === 'all' ? 'bg-stone-800 text-white' : 'bg-stone-100 text-stone-600'}`}
          >全員排名</button>
        </div>
      </div>

      {/* 搜尋結果 / 全員排名 */}
      {(search.trim() || viewMode === 'all') && (
        <div className="bg-white rounded-lg border border-stone-200 mb-5 overflow-hidden">
          <div className="px-4 py-3 border-b border-stone-100 text-sm font-semibold text-stone-700">
            {search.trim() ? `搜尋結果（${filtered.length}）` : `全員排名（${allMembers.length}人）`}
          </div>
          <div className="divide-y divide-stone-100">
            {(search.trim() ? filtered : allMembers).map(m => (
              <KpiMemberRow key={m.name} member={m} expanded={expandedMember === m.name}
                onToggle={() => setExpandedMember(expandedMember === m.name ? null : m.name)} />
            ))}
            {search.trim() && filtered.length === 0 && (
              <div className="py-8 text-center text-stone-400 text-sm">找不到「{search}」</div>
            )}
          </div>
        </div>
      )}

      {/* 組別檢視 */}
      {viewMode === 'groups' && !search.trim() && kpiData && kpiData.groups && (
        <div className="space-y-3">
          {Object.entries(kpiData.groups)
            .sort((a, b) => groupOrdinal(a[0]) - groupOrdinal(b[0]))
            .map(([gName, group]) => {
              const expanded = expandedGroups.has(gName);
              const s = group.summary;
              return (
                <div key={gName} className="bg-white rounded-lg border border-stone-200 overflow-hidden">
                  <button
                    onClick={() => toggleGroup(gName)}
                    className="w-full px-4 py-3.5 flex items-center justify-between text-left hover:bg-stone-50"
                  >
                    <div className="flex items-center gap-3">
                      <div className="text-sm font-bold" style={{ color: '#1A1414' }}>{gName}</div>
                      <div className="text-xs text-stone-500">（{group.count}人）平均 {group.avg} 分</div>
                    </div>
                    <div className="flex items-center gap-2">
                      <div className="flex gap-1 text-xs">
                        {s.green > 0 && <span className="px-1.5 py-0.5 rounded" style={{ background: '#EDF3E8', color: '#2D5A27' }}>🟢{s.green}</span>}
                        {s.yellow > 0 && <span className="px-1.5 py-0.5 rounded" style={{ background: '#FFF8E1', color: '#8B6F00' }}>🟡{s.yellow}</span>}
                        {s.red > 0 && <span className="px-1.5 py-0.5 rounded" style={{ background: '#FCEFE3', color: '#A01E2E' }}>🔴{s.red}</span>}
                        {s.grey > 0 && <span className="px-1.5 py-0.5 rounded" style={{ background: '#F0F0F0', color: '#666' }}>⚫{s.grey}</span>}
                      </div>
                      {expanded ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
                    </div>
                  </button>
                  {expanded && (
                    <div className="border-t border-stone-100 divide-y divide-stone-50">
                      {group.members.map(m => (
                        <KpiMemberRow key={m.name} member={m} expanded={expandedMember === m.name}
                          onToggle={() => setExpandedMember(expandedMember === m.name ? null : m.name)} />
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
        </div>
      )}
    </div>
  );
}

function KpiMemberRow({ member, expanded, onToggle }) {
  const m = member;
  const lk = getKpiLightKey(m.totalScore);
  const lc = LIGHT_COLORS[lk];

  const ScoreBar = ({ label, score, max }) => {
    const pct = max > 0 ? Math.round((score / max) * 100) : 0;
    const barColor = score === max ? '#2D5A27' : score > 0 ? '#C9A55C' : '#E5E0D5';
    return (
      <div className="flex items-center gap-2 text-xs py-0.5">
        <div className="w-12 text-stone-500 text-right">{label}</div>
        <div className="flex-1 h-3 rounded-full overflow-hidden" style={{ background: '#F0EBE3' }}>
          <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: barColor }} />
        </div>
        <div className="w-12 text-stone-600 font-medium">{score}/{max}</div>
      </div>
    );
  };

  return (
    <div>
      <button onClick={onToggle} className="w-full px-4 py-2.5 flex items-center justify-between text-left hover:bg-stone-50 transition-colors">
        <div className="flex items-center gap-2.5">
          <span className="text-lg">{lc.emoji}</span>
          <span className="text-sm font-semibold" style={{ color: '#1A1414' }}>{m.name}</span>
          {m.groupName && <span className="text-[10px] text-stone-400">{m.groupName}</span>}
        </div>
        <div className="flex items-center gap-2">
          <span className="text-sm font-bold" style={{ color: lc.color }}>{m.totalScore}</span>
          <span className="text-[10px] text-stone-400">/100</span>
          {expanded ? <ChevronDown className="w-3.5 h-3.5 text-stone-400" /> : <ChevronRight className="w-3.5 h-3.5 text-stone-400" />}
        </div>
      </button>
      {expanded && (
        <div className="px-4 pb-3 pt-1">
          <div className="bg-stone-50 rounded-lg p-3 mb-2">
            <ScoreBar label="缺席" score={m.absenceScore} max={20} />
            <ScoreBar label="引薦" score={m.referralScore} max={20} />
            <ScoreBar label="來賓" score={m.visitorScore} max={15} />
            <ScoreBar label="1-2-1" score={m.meetingScore} max={15} />
            <ScoreBar label="教育" score={m.trainingScore} max={15} />
            <ScoreBar label="交易" score={m.transactionScore} max={15} />
          </div>
          {m.raw && (
            <div className="text-[10px] text-stone-400 grid grid-cols-3 gap-x-3 gap-y-0.5 mb-2">
              <span>缺席 {m.raw.absences} 次</span>
              <span>引薦 {(m.raw.internalRef||0)+(m.raw.externalRef||0)} 次</span>
              <span>來賓 {m.raw.visitors} 位</span>
              <span>1-2-1 {m.raw.oneToOne} 次</span>
              <span>教育 {m.raw.training} 積分</span>
              <span>交易 ${(m.raw.transactionValue||0).toLocaleString()}</span>
            </div>
          )}
          {m.recommendations && m.recommendations.summary && (
            <div className="text-xs p-2 rounded" style={{ background: lk === 'yellow' ? '#FFF8E1' : '#FCEFE3', color: lk === 'yellow' ? '#8B6F00' : '#A01E2E' }}>
              {m.recommendations.summary}
            </div>
          )}
          {!m.recommendations && m.totalScore >= 70 && (
            <div className="text-xs p-2 rounded" style={{ background: '#EDF3E8', color: '#2D5A27' }}>
              ✅ 已達綠燈標準！繼續保持💪
            </div>
          )}
        </div>
      )}
    </div>
  );
}

    try { return localStorage.getItem('bni_admin_key') || ''; } catch { return ''; }
  });

    { id: 'chains', label: '服務鏈', icon: ListChecks },
  ];

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-xl font-bold" style={{ color: '#1A1414' }}>紅綠燈管理</h3>

  );
}

// ─── 月報管理 ───
function KpiMonthManager({ proxyUrl, headers, showToast }) {
  const [months, setMonths] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [month, setMonth] = useState('');
  const fileRef = useRef(null);

  const fetchMonths = async () => {
    try {
      const res = await fetch(proxyUrl + '/api/months', { headers });
      if (res.ok) setMonths((await res.json()).months || []);
    } catch {}
    finally { setLoading(false); }
  };

  useEffect(() => { fetchMonths(); }, []);

  // 預設月份選項（近12個月，民國年格式）
  const monthOptions = useMemo(() => {
    const opts = [];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const rocYear = d.getFullYear() - 1911;
      const m = String(d.getMonth() + 1).padStart(2, '0');
      opts.push(`${rocYear}-${m}`);
    }
    return opts;
  }, []);

  const handleUpload = async () => {
    if (!month) { showToast('請選擇月份', 'error'); return; }
    if (!fileRef.current?.files?.[0]) { showToast('請選擇 Excel 檔案', 'error'); return; }
    setUploading(true);
    try {
      const formData = new FormData();
      formData.append('month', month);
      formData.append('file', fileRef.current.files[0]);
      const res = await fetch(proxyUrl + '/api/upload', {
        method: 'POST', headers: { 'X-Admin-Key': headers['X-Admin-Key'] }, body: formData,
      });
      const data = await res.json();
      if (res.ok) {
        showToast(`✅ ${month} 上傳成功（${data.memberCount} 位會員）`);
        fileRef.current.value = '';
        fetchMonths();
      } else {
        showToast(data.error || '上傳失敗', 'error');
      }
    } catch (e) { showToast('上傳失敗：' + e.message, 'error'); }
    finally { setUploading(false); }
  };

  const deleteMonth = async (m) => {
    if (!confirm(`確定刪除 ${m} 的月報資料？`)) return;
    try {
      const res = await fetch(proxyUrl + '/api/month/' + m, { method: 'DELETE', headers });
      if (res.ok) { showToast('已刪除 ' + m); fetchMonths(); }
      else showToast('刪除失敗', 'error');
    } catch (e) { showToast('刪除失敗：' + e.message, 'error'); }
  };

  return (
    <div>
      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-4">
        <div className="text-sm font-semibold mb-3">上傳月報 Excel</div>
        <div className="flex flex-wrap gap-2 items-end">
          <div>
            <div className="text-xs text-stone-500 mb-1">月份</div>
            <select value={month} onChange={e => setMonth(e.target.value)}
              className="px-3 py-2 text-sm border border-stone-300 rounded-md bg-white">
              <option value="">— 選擇月份 —</option>
              {monthOptions.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <div className="text-xs text-stone-500 mb-1">Excel 檔案</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv"
              className="text-sm file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:bg-stone-100 file:text-stone-700 hover:file:bg-stone-200" />
          </div>
          <button onClick={handleUpload} disabled={uploading}
            className="px-4 py-2 text-sm text-white rounded-md flex items-center gap-1 disabled:opacity-50"
            style={{ background: '#2D5A27' }}>
            <Upload className="w-4 h-4" />{uploading ? '上傳中⋯' : '上傳'}
          </button>
        </div>
      </div>
      <div className="bg-white rounded-lg border border-stone-200 p-4">
        <div className="text-sm font-semibold mb-3">已上傳月份</div>
        {loading ? <div className="text-sm text-stone-400 py-4 text-center">載入中⋯</div> :
         months.length === 0 ? <div className="text-sm text-stone-400 py-4 text-center">尚未上傳任何月報</div> :
         <div className="space-y-1">
           {months.map(m => (
             <div key={m.month} className="flex items-center justify-between py-2 px-3 rounded-md hover:bg-stone-50">
               <div className="text-sm"><span className="font-semibold">{m.month}</span><span className="text-stone-500 ml-2">{m.memberCount} 位會員</span></div>
               <button onClick={() => deleteMonth(m.month)} className="text-stone-400 hover:text-red-600"><Trash2 className="w-4 h-4" /></button>
             </div>
           ))}
         </div>}
      </div>
    </div>
  );
}

// ─── 小組管理 ───
function KpiGroupManager({ proxyUrl, headers, showToast }) {
  const [groups, setGroups] = useState({});
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [newMember, setNewMember] = useState({});
  const [edited, setEdited] = useState(false);
  const fileRef = useRef(null);

  const fetchGroups = async () => {
    try {
      const res = await fetch(proxyUrl + '/api/groups', { headers });
      if (res.ok) { setGroups(await res.json()); setEdited(false); }
    } catch {}
    finally { setLoading(false); }
  };

  useEffect(() => { fetchGroups(); }, []);

  const handleUpload = async () => {
    if (!fileRef.current?.files?.[0]) { showToast('請選擇 Excel 檔案', 'error'); return; }
    setUploading(true);
    try {
      const formData = new FormData();
      formData.append('file', fileRef.current.files[0]);
      const res = await fetch(proxyUrl + '/api/groups/upload', {
        method: 'POST', headers: { 'X-Admin-Key': headers['X-Admin-Key'] }, body: formData,
      });
      const data = await res.json();
      if (res.ok) { showToast(`✅ 上傳成功（${data.groupCount} 組、${data.totalMembers} 人）`); fileRef.current.value = ''; fetchGroups(); }
      else showToast(data.error || '上傳失敗', 'error');
    } catch (e) { showToast('上傳失敗：' + e.message, 'error'); }
    finally { setUploading(false); }
  };

  const removeMember = (groupName, memberName) => {
    const next = { ...groups, [groupName]: groups[groupName].filter(n => n !== memberName) };
    setGroups(next); setEdited(true);
  };

  const moveMember = (fromGroup, memberName, toGroup) => {
    if (fromGroup === toGroup) return;
    const next = { ...groups };
    next[fromGroup] = next[fromGroup].filter(n => n !== memberName);
    if (!next[toGroup]) next[toGroup] = [];
    next[toGroup] = [...next[toGroup], memberName];
    setGroups(next); setEdited(true);
  };

  const addMember = (groupName) => {
    const name = (newMember[groupName] || '').trim();
    if (!name) return;
    const next = { ...groups, [groupName]: [...(groups[groupName] || []), name] };
    setGroups(next); setEdited(true);
    setNewMember({ ...newMember, [groupName]: '' });
  };

  const saveGroups = async () => {
    setSaving(true);
    try {
      const res = await fetch(proxyUrl + '/api/groups', {
        method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify(groups),
      });
      if (res.ok) { showToast('✅ 小組儲存成功'); setEdited(false); }
      else showToast('儲存失敗', 'error');
    } catch (e) { showToast('儲存失敗：' + e.message, 'error'); }
    finally { setSaving(false); }
  };

  const groupEntries = Object.entries(groups);
  const allGroupNames = Object.keys(groups);

  return (
    <div>
      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-4">
        <div className="text-sm font-semibold mb-2">上傳行政小組名單 Excel</div>
        <div className="text-xs text-stone-500 mb-3">格式 A：兩欄（組別、姓名）｜格式 B：每欄一組（欄名＝組名）</div>
        <div className="flex flex-wrap gap-2 items-end">
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv"
            className="text-sm file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-sm file:bg-stone-100 file:text-stone-700" />
          <button onClick={handleUpload} disabled={uploading}
            className="px-4 py-2 text-sm text-white rounded-md flex items-center gap-1 disabled:opacity-50" style={{ background: '#2D5A27' }}>
            <Upload className="w-4 h-4" />{uploading ? '上傳中⋯' : '上傳'}
          </button>
        </div>
      </div>
      <div className="bg-white rounded-lg border border-stone-200 p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="text-sm font-semibold">行政小組編輯（{groupEntries.length} 組）</div>
          {edited && (
            <button onClick={saveGroups} disabled={saving}
              className="px-4 py-1.5 text-sm text-white rounded-md font-semibold disabled:opacity-50" style={{ background: '#2D5A27' }}>
              {saving ? '儲存中⋯' : '💾 儲存變更'}
            </button>
          )}
        </div>
        {loading ? <div className="text-sm text-stone-400 py-4 text-center">載入中⋯</div> :
         groupEntries.length === 0 ? <div className="text-sm text-stone-400 py-4 text-center">尚未設定行政小組</div> :
         <div className="space-y-3">
           {groupEntries.map(([name, members]) => (
             <div key={name} className="p-3 rounded-md bg-stone-50">
               <div className="text-sm font-semibold mb-2">{name}（{members.length}人）</div>
               <div className="space-y-1 mb-2">
                 {members.map(m => (
                   <div key={m} className="flex items-center gap-2 py-1 px-2 rounded bg-white text-sm">
                     <span className="flex-1">{m}</span>
                     <select defaultValue="" onChange={e => { if (e.target.value) { moveMember(name, m, e.target.value); e.target.value = ''; } }}
                       className="text-xs border border-stone-200 rounded px-1 py-0.5 bg-white text-stone-500">
                       <option value="" disabled>移至⋯</option>
                       {allGroupNames.filter(g => g !== name).map(g => <option key={g} value={g}>{g}</option>)}
                     </select>
                     <button onClick={() => removeMember(name, m)} className="text-stone-400 hover:text-red-600" title="移除">
                       <X className="w-3.5 h-3.5" />
                     </button>
                   </div>
                 ))}
               </div>
               <div className="flex gap-1">
                 <input type="text" placeholder="新增成員姓名" value={newMember[name] || ''}
                   onChange={e => setNewMember({ ...newMember, [name]: e.target.value })}
                   onKeyDown={e => e.key === 'Enter' && addMember(name)}
                   className="flex-1 px-2 py-1 text-sm border border-stone-200 rounded" />
                 <button onClick={() => addMember(name)} className="px-2 py-1 text-xs text-white rounded" style={{ background: '#2D5A27' }}>
                   <Plus className="w-3.5 h-3.5" />
                 </button>
               </div>
             </div>
           ))}
         </div>}
      </div>
    </div>
  );
}

// ─── 參數設定 ───
function KpiConfigEditor({ proxyUrl, headers, showToast }) {
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await fetch(proxyUrl + '/api/config', { headers });
        if (res.ok) setConfig(await res.json());
      } catch {}
      finally { setLoading(false); }
    })();
  }, []);

  const save = async () => {
    setSaving(true);
    try {
      const res = await fetch(proxyUrl + '/api/config', {
        method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify({ remainWeeks: config.remainWeeks, nextMonthWeeks: config.nextMonthWeeks }),
      });
      if (res.ok) showToast('✅ 設定已儲存');
      else showToast('儲存失敗', 'error');
    } catch (e) { showToast('儲存失敗：' + e.message, 'error'); }
    finally { setSaving(false); }
  };

  if (loading || !config) return <div className="text-sm text-stone-400 py-8 text-center">載入中⋯</div>;

  return (
    <div className="bg-white rounded-lg border border-stone-200 p-4">
      <div className="text-sm font-semibold mb-4">KPI 計算參數</div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <div className="text-xs text-stone-500 mb-1">本月剩餘週數</div>
          <input type="number" min="0" max="5" value={config.remainWeeks || 0}
            onChange={e => setConfig({ ...config, remainWeeks: parseInt(e.target.value) || 0 })}
            className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md" />
          <div className="text-xs text-stone-400 mt-1">影響目前成績計算（分母加入剩餘週數）</div>
        </div>
        <div>
          <div className="text-xs text-stone-500 mb-1">下月預計週數</div>
          <input type="number" min="1" max="6" value={config.nextMonthWeeks || 4}
            onChange={e => setConfig({ ...config, nextMonthWeeks: parseInt(e.target.value) || 4 })}
            className="w-full px-3 py-2 text-sm border border-stone-300 rounded-md" />
          <div className="text-xs text-stone-400 mt-1">用於 Washout 預測計算</div>
        </div>
      </div>
      {config.updatedAt && (
        <div className="text-xs text-stone-400 mb-3">上次更新：{new Date(config.updatedAt).toLocaleString('zh-TW')}</div>
      )}
      <button onClick={save} disabled={saving}
        className="px-5 py-2 text-sm text-white rounded-md font-semibold disabled:opacity-50"
        style={{ background: '#2D5A27' }}>
        {saving ? '儲存中⋯' : '儲存設定'}
      </button>
    </div>
  );
}

// ─── LINE 推播 ───
function KpiPushPanel({ proxyUrl, headers, showToast }) {
  const [pushing, setPushing] = useState('');
  const [result, setResult] = useState(null);
  const [bindings, setBindings] = useState(null);
  const [allMemberNames, setAllMemberNames] = useState([]);
  const [bindingsOpen, setBindingsOpen] = useState(false);
  const [speechWeeks, setSpeechWeeks] = useState(2);
  const [speechTarget, setSpeechTarget] = useState('both');

  const fetchBindings = async () => {
    try {
      const res = await fetch(proxyUrl + '/api/bindings', { headers });
      if (res.ok) setBindings(await res.json());
    } catch {}
  };
  const fetchMembers = async () => {
    try {
      const res = await fetch(proxyUrl + '/api/members', { headers });
      if (res.ok) { const data = await res.json(); setAllMemberNames((data.members || []).map(m => m.name).sort()); }
    } catch {}
  };
  useEffect(() => { fetchBindings(); fetchMembers(); }, []);

  const pushAction = async (url, body, label) => {
    if (!confirm(`確定${label}？`)) return;
    setPushing(label); setResult(null);
    try {
      const res = await fetch(proxyUrl + url, {
        method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' }, body: JSON.stringify(body),
      });
      const data = await res.json();
      if (res.ok) { setResult({ ok: true, ...data }); showToast(`✅ ${label}完成`); }
      else { setResult({ ok: false, error: data.error }); showToast(data.error || '推播失敗', 'error'); }
    } catch (e) { setResult({ ok: false, error: e.message }); showToast('推播失敗', 'error'); }
    finally { setPushing(''); }
  };

  const unbind = async (userId, name) => {
    if (!confirm(`確定解除「${name}」的 LINE 綁定？`)) return;
    try {
      const res = await fetch(proxyUrl + '/api/bindings/' + encodeURIComponent(userId), { method: 'DELETE', headers });
      if (res.ok) { showToast(`已解除「${name}」`); fetchBindings(); }
    } catch (e) { showToast('解除失敗', 'error'); }
  };

  const unbindAll = async () => {
    if (!confirm('確定清除全部 LINE 綁定？所有會員需重新綁定')) return;
    try {
      const res = await fetch(proxyUrl + '/api/bindings-all', { method: 'DELETE', headers });
      if (res.ok) { showToast('已清除全部綁定'); fetchBindings(); }
    } catch (e) { showToast('清除失敗', 'error'); }
  };

  const bindingEntries = bindings ? Object.entries(bindings).sort((a, b) => a[1].localeCompare(b[1])) : [];
  const boundNames = new Set(bindingEntries.map(([, name]) => name));
  const unboundNames = allMemberNames.filter(n => !boundNames.has(n));
  const targetLabel = { speaker: '演講人', helper: '小幫手', both: '演講人 + 小幫手' };

  return (
    <div>
      {/* LINE 綁定管理（折疊） */}
      <div className="bg-white rounded-lg border border-stone-200 mb-4 overflow-hidden">
        <button onClick={() => setBindingsOpen(!bindingsOpen)}
          className="w-full px-4 py-3 flex items-center justify-between text-left hover:bg-stone-50">
          <div className="flex items-center gap-2">
            <div className="text-sm font-semibold">LINE 綁定管理</div>
            <div className="text-xs text-stone-500">
              已綁 <span className="font-bold" style={{ color: '#2D5A27' }}>{bindingEntries.length}</span>
              {unboundNames.length > 0 && <> / 未綁 <span className="font-bold" style={{ color: '#A01E2E' }}>{unboundNames.length}</span></>}
            </div>
          </div>
          {bindingsOpen ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
        </button>
        {bindingsOpen && (
          <div className="border-t border-stone-100 p-4">
            {bindingEntries.length > 0 && (
              <div className="mb-4">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs font-semibold text-stone-600">✅ 已綁定（{bindingEntries.length}人）</div>
                  <button onClick={unbindAll} className="text-[10px] text-red-500 hover:text-red-700">清除全部</button>
                </div>
                <div className="flex flex-wrap gap-1">
                  {bindingEntries.map(([uid, name]) => (
                    <span key={uid} className="inline-flex items-center gap-1 px-2 py-1 text-xs bg-green-50 text-green-800 rounded">
                      {name}
                      <button onClick={() => unbind(uid, name)} className="text-green-400 hover:text-red-600"><X className="w-3 h-3" /></button>
                    </span>
                  ))}
                </div>
              </div>
            )}
            {unboundNames.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-600 mb-2">❌ 未綁定（{unboundNames.length}人）</div>
                <div className="text-xs text-stone-500 p-2 bg-red-50 rounded border border-red-100">
                  {unboundNames.join('、')}
                </div>
                <div className="text-[10px] text-stone-400 mt-1">請提醒以上會員在 LINE 輸入「我是○○○」完成綁定</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* KPI 推播 */}
      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-4">
        <div className="text-sm font-semibold mb-3">KPI 推播</div>
        <div className="space-y-2">
          <button onClick={() => pushAction('/api/push', { target: 'non-green' }, '推播非綠燈會員')} disabled={!!pushing}

          <button onClick={() => pushAction('/api/push-washout', { target: 'green-drop' }, '推播 Washout 警告')} disabled={!!pushing}
            className="w-full px-4 py-3 text-sm bg-red-50 text-red-800 border border-red-200 rounded-md text-left hover:bg-red-100 disabled:opacity-50 flex items-center justify-between">
            <div><div className="font-semibold">⚠️ 推播 Washout 警告</div><div className="text-xs mt-0.5">提醒可能掉燈的會員</div></div>
            {pushing === '推播 Washout 警告' && <span className="text-xs">發送中⋯</span>}
          </button>
        </div>
      </div>

      {/* 演講進度推播 */}
      <div className="bg-white rounded-lg border border-stone-200 p-4 mb-4">
        <div className="text-sm font-semibold mb-3">演講進度推播</div>
        <div className="flex flex-wrap gap-2 mb-3">
          <div>
            <div className="text-xs text-stone-500 mb-1">推播範圍</div>
            <select value={speechWeeks} onChange={e => setSpeechWeeks(parseInt(e.target.value))}
              className="px-3 py-1.5 text-sm border border-stone-300 rounded-md bg-white">
              <option value={1}>未來 1 週</option><option value={2}>未來 2 週</option>
              <option value={4}>未來 4 週</option><option value={6}>未來 6 週</option>
            </select>
          </div>
          <div>
            <div className="text-xs text-stone-500 mb-1">推播對象</div>
            <select value={speechTarget} onChange={e => setSpeechTarget(e.target.value)}
              className="px-3 py-1.5 text-sm border border-stone-300 rounded-md bg-white">
              <option value="both">演講人 + 小幫手</option>
              <option value="speaker">僅演講人</option><option value="helper">僅小幫手</option>
            </select>
          </div>
        </div>
        <button onClick={() => pushAction('/api/push-speech', { weeks: speechWeeks, target: speechTarget }, `推播演講進度（${targetLabel[speechTarget]}，${speechWeeks}週）`)}
          disabled={!!pushing}
          className="w-full px-4 py-3 text-sm border rounded-md text-left hover:bg-stone-50 disabled:opacity-50 flex items-center justify-between"
          style={{ background: '#F0FFF0', color: '#2D5A27', borderColor: '#B8E6B8' }}>
          <div><div className="font-semibold">🎤 推播演講準備進度</div><div className="text-xs mt-0.5">提醒{targetLabel[speechTarget]}注意未完成項目</div></div>
          {pushing.includes('演講進度') && <span className="text-xs">發送中⋯</span>}
        </button>
      </div>

      {/* 今日咖啡會議推播 */}
      <div className="bg-white rounded-lg border border-stone-200 p-4">
        <div className="text-sm font-semibold mb-3">咖啡會議推播</div>
        <button onClick={() => pushAction('/api/push-coffee-today', {}, '推播今日咖啡行程')} disabled={!!pushing}
          className="w-full px-4 py-3 text-sm border rounded-md text-left hover:bg-stone-50 disabled:opacity-50 flex items-center justify-between"
          style={{ background: '#FFF8F0', color: '#8B6F47', borderColor: '#E8D5B8' }}>
          <div><div className="font-semibold">☕ 推播今日咖啡會議行程</div><div className="text-xs mt-0.5">通知全分會今天有哪些咖啡會議</div></div>
          {pushing === '推播今日咖啡行程' && <span className="text-xs">發送中⋯</span>}
        </button>
      </div>

      {result && (
        <div className={`mt-3 p-3 rounded text-sm ${result.ok ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`}>
          {result.ok ? `✅ ${result.sent !== undefined ? '發送 ' + result.sent + ' 人' : ''}${result.coffeeCount ? '（' + result.coffeeCount + ' 場）' : ''}${result.failed ? '，失敗 ' + result.failed : ''}${result.message ? ' ' + result.message : ''}` : `❌ ${result.error}`}
        </div>
      )}
    </div>
  );
}

// ============ 產業服務鏈 ============
const CHAIN_COLORS = {
  'ac-purple': '#6B4C8A', 'ac-blue': '#2B6CB0', 'ac-green': '#2D5A27',
  'ac-red': '#A01E2E', 'ac-orange': '#C67A2E', 'ac-yellow': '#8B6F00',
  'ac-teal': '#2C7A7B', 'ac-gray': '#4A5568', 'ac-pink': '#B83280', 'ac-indigo': '#4C51BF',
};

function ServiceChainView() {
  const [loading, setLoading] = useState(true);
  const [chains, setChains] = useState([]);
  const [error, setError] = useState(null);
  const [expandedChains, setExpandedChains] = useState(new Set());
  const proxyUrl = (typeof window !== 'undefined' && window.BNI_PROXY_URL) ? window.BNI_PROXY_URL : '';

  useEffect(() => {
    if (!proxyUrl) { setLoading(false); setError('僅在部署版本可用'); return; }
    (async () => {
      try {
        // SWR：有快取就瞬間顯示，背景更新
        const data = await swrFetchRaw(proxyUrl + '/api/chains-data', (fresh) => {
          if (fresh && Array.isArray(fresh.chains)) setChains(fresh.chains);
        });
        if (data && Array.isArray(data.chains)) {
          setChains(data.chains);
        } else if (!data) {
          setError('載入失敗：無法連線');
        }
      } catch (e) { setError('載入失敗：' + e.message); }
      finally { setLoading(false); }
    })();
  }, []);

  const toggleChain = (i) => {
    setExpandedChains(prev => { const n = new Set(prev); if (n.has(i)) n.delete(i); else n.add(i); return n; });
  };

  const totalMembers = chains.reduce((sum, c) => sum + (c.groups || []).reduce((s, g) => s + (g.members || []).length, 0), 0);

  if (loading) return <div className="text-center py-20 text-stone-500" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>載入產業服務鏈⋯</div>;
  if (error) return <div className="text-center py-20 text-stone-500" style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>{error}</div>;

  return (
    <div style={{ fontFamily: "'Noto Sans TC', sans-serif" }}>
      <div className="mb-6">
        <div className="text-[10px] tracking-[0.3em] text-stone-400 mb-2">SERVICE CHAINS</div>
        <h2 className="text-3xl md:text-4xl font-bold mb-1" style={{ color: '#1A1414' }}>
          產業 <span style={{ color: '#6B4C8A' }}>服務鏈</span>
        </h2>
        <div className="text-sm text-stone-500">{chains.length} 條服務鏈 · {totalMembers} 位會員</div>
      </div>
      <div className="space-y-2">
        {chains.map((chain, ci) => {
          const color = CHAIN_COLORS[chain.ac] || '#4A5568';
          const expanded = expandedChains.has(ci);
          const memberCount = (chain.groups || []).reduce((s, g) => s + (g.members || []).length, 0);
          return (
            <div key={ci} className="bg-white rounded-lg border border-stone-200 overflow-hidden">
              <button onClick={() => toggleChain(ci)}
                className="w-full px-4 py-3.5 flex items-center justify-between text-left hover:bg-stone-50">
                <div className="flex items-center gap-3">
                  <div className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: color }} />
                  <div>
                    <div className="text-sm font-bold" style={{ color: '#1A1414' }}>{chain.name}</div>
                    {chain.aud && <div className="text-[11px] text-stone-500">{chain.aud}</div>}
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-stone-500">{memberCount}人</span>
                  {expanded ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
                </div>
              </button>
              {expanded && (
                <div className="border-t border-stone-100 px-4 py-3">
                  {(chain.groups || []).map((group, gi) => (
                    <div key={gi} className="mb-3 last:mb-0">
                      <div className="text-xs font-semibold mb-1.5" style={{ color }}>{group.label}（{(group.members || []).length}人）</div>
                      <div className="flex flex-wrap gap-1.5">
                        {(group.members || []).map(([name, industry], mi) => (
                          <span key={mi} className="inline-flex items-baseline gap-1 px-2 py-1 text-xs rounded" style={{ background: color + '10', color }}>
                            <span className="font-medium">{name}</span>
                            <span className="text-[10px] opacity-70">{industry}</span>
                          </span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── 服務鏈管理（Admin） ───
function ServiceChainEditor({ proxyUrl, headers, showToast }) {
  const [loading, setLoading] = useState(true);
  const [chainsData, setChainsData] = useState(null);
  const [edited, setEdited] = useState(false);
  const [saving, setSaving] = useState(false);
  const [newMember, setNewMember] = useState({});

  const fetchChains = async () => {
    try {
      const res = await fetch(proxyUrl + '/api/chains-data');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      setChainsData(await res.json());
      setEdited(false);
    } catch (e) { showToast('載入失敗：' + e.message, 'error'); }
    finally { setLoading(false); }
  };

  useEffect(() => { fetchChains(); }, []);

  const saveChains = async () => {
    setSaving(true);
    try {
      const res = await fetch(proxyUrl + '/api/chains-data', {
        method: 'PUT', headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify(chainsData),
      });
      if (res.ok) { showToast('✅ 服務鏈已儲存（同步至服務鏈網站）'); setEdited(false); }
      else showToast('儲存失敗', 'error');
    } catch (e) { showToast('儲存失敗：' + e.message, 'error'); }
    finally { setSaving(false); }
  };

  const removeMember = (chainIdx, groupIdx, memberIdx) => {
    const next = JSON.parse(JSON.stringify(chainsData));
    next.chains[chainIdx].groups[groupIdx].members.splice(memberIdx, 1);
    setChainsData(next); setEdited(true);
  };

  const addMember = (chainIdx, groupIdx) => {
    const key = `${chainIdx}-${groupIdx}`;
    const val = (newMember[key] || '').trim();
    if (!val) return;
    const parts = val.split(/[,，/／]/).map(s => s.trim()).filter(s => s);
    const name = parts[0] || val;
    const industry = parts[1] || '';
    const next = JSON.parse(JSON.stringify(chainsData));
    next.chains[chainIdx].groups[groupIdx].members.push([name, industry]);
    setChainsData(next); setEdited(true);
    setNewMember({ ...newMember, [key]: '' });
  };

  const moveMember = (fromChain, fromGroup, memberIdx, toChain, toGroup) => {
    const next = JSON.parse(JSON.stringify(chainsData));
    const member = next.chains[fromChain].groups[fromGroup].members.splice(memberIdx, 1)[0];
    next.chains[toChain].groups[toGroup].members.push(member);
    setChainsData(next); setEdited(true);
  };

  if (loading) return <div className="text-sm text-stone-400 py-8 text-center">載入中⋯</div>;
  if (!chainsData || !chainsData.chains) return <div className="text-sm text-stone-400 py-8 text-center">無服務鏈資料</div>;

  // Build move targets
  const moveTargets = [];
  chainsData.chains.forEach((c, ci) => {
    (c.groups || []).forEach((g, gi) => {
      moveTargets.push({ ci, gi, label: `${c.name} → ${g.label}` });
    });
  });

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div className="text-sm text-stone-500">編輯後自動同步至 <a href="https://arthurkuo42-star.github.io/futding-chains/" target="_blank" className="underline">服務鏈網站</a></div>
        {edited && (
          <button onClick={saveChains} disabled={saving}
            className="px-4 py-1.5 text-sm text-white rounded-md font-semibold disabled:opacity-50" style={{ background: '#6B4C8A' }}>
            {saving ? '儲存中⋯' : '💾 儲存變更'}
          </button>
        )}
      </div>
      <div className="space-y-3">
        {chainsData.chains.map((chain, ci) => {
          const color = CHAIN_COLORS[chain.ac] || '#4A5568';
          return (
            <div key={ci} className="bg-white rounded-lg border border-stone-200 p-4">
              <div className="flex items-center gap-2 mb-3">
                <div className="w-3 h-3 rounded-full" style={{ background: color }} />
                <div className="text-sm font-bold">{chain.name}</div>
              </div>
              {(chain.groups || []).map((group, gi) => (
                <div key={gi} className="mb-3 last:mb-0 pl-2 border-l-2" style={{ borderColor: color + '40' }}>
                  <div className="text-xs font-semibold mb-1.5" style={{ color }}>{group.label}（{(group.members || []).length}人）</div>
                  <div className="space-y-1 mb-2">
                    {(group.members || []).map(([name, industry], mi) => (
                      <div key={mi} className="flex items-center gap-2 py-1 px-2 rounded bg-stone-50 text-sm">
                        <span className="flex-1">{name} <span className="text-xs text-stone-400">{industry}</span></span>
                        <select defaultValue="" onChange={e => {
                          if (!e.target.value) return;
                          const [tc, tg] = e.target.value.split('-').map(Number);
                          moveMember(ci, gi, mi, tc, tg);
                          e.target.value = '';
                        }} className="text-[10px] border border-stone-200 rounded px-1 py-0.5 bg-white text-stone-500 max-w-[120px]">
                          <option value="" disabled>移至⋯</option>
                          {moveTargets.filter(t => !(t.ci === ci && t.gi === gi)).map(t => (
                            <option key={`${t.ci}-${t.gi}`} value={`${t.ci}-${t.gi}`}>{t.label}</option>
                          ))}
                        </select>
                        <button onClick={() => removeMember(ci, gi, mi)} className="text-stone-400 hover:text-red-600">
                          <X className="w-3.5 h-3.5" />
                        </button>
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-1">
                    <input type="text" placeholder="新增：姓名，行業" value={newMember[`${ci}-${gi}`] || ''}
                      onChange={e => setNewMember({ ...newMember, [`${ci}-${gi}`]: e.target.value })}
                      onKeyDown={e => e.key === 'Enter' && addMember(ci, gi)}
                      className="flex-1 px-2 py-1 text-xs border border-stone-200 rounded" />
                    <button onClick={() => addMember(ci, gi)} className="px-2 py-1 text-xs text-white rounded" style={{ background: color }}>
                      <Plus className="w-3.5 h-3.5" />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}
