                                      <div key={of.id} className={`bg-white rounded p-2 text-xs ${wantImport ? "" : "opacity-60"}`}>
                                        <div className="grid grid-cols-[110px_1fr_auto] gap-1.5 items-center mb-1">
                                          <MemberSelect members={referralCandidates} value={of.introducerId} onChange={v => updOffer(sp.id, nc.id, of.id, "introducerId", v)} placeholder="邀約人" />
                                          <input value={of.contactName} onChange={e => updOffer(sp.id, nc.id, of.id, "contactName", e.target.value)}
                                            placeholder="人脈姓名" className="border border-stone-200 rounded px-2 py-1" />
                                          <button onClick={() => rmOffer(sp.id, nc.id, of.id)} className="p-1 text-stone-400 hover:text-red-500"><X className="w-3 h-3" /></button>
                                        </div>
                                        <input value={of.contactProfession} onChange={e => updOffer(sp.id, nc.id, of.id, "contactProfession", e.target.value)}
                                          placeholder="人脈專業（例：不動產估價師）" className="w-full border border-stone-200 rounded px-2 py-1 text-xs" />
                                        <label className="flex items-center gap-1 mt-1.5 text-[11px] cursor-pointer select-none">
                                          <input type="checkbox"
                                            checked={wantImport}
                                            disabled={isImported}
                                            onChange={e => updOffer(sp.id, nc.id, of.id, "wantImport", e.target.checked)}
                                            className="w-3.5 h-3.5 accent-[#059669]" />
                                          <span className={wantImport ? "text-emerald-700 font-medium" : "text-stone-400"}>
                                            {wantImport ? "✅ 要匯入咖啡會議" : "❌ 不匯入咖啡會議"}
                                          </span>
                                          {isImported && <span className="ml-1 text-[10px] bg-emerald-500 text-white px-1 rounded">已匯入</span>}
                                        </label>
                                      </div>
                                    );
                                  })}
                                </div>
                              )}
                              <button onClick={() => addOffer(sp.id, nc.id)}
                                className="ml-4 text-xs text-[#8B1A1A] hover:underline flex items-center gap-1">
                                <Plus className="w-3 h-3" />誰有此人脈？
                              </button>
                            </div>
                          ))}
                          <Btn variant="outline" size="sm" onClick={() => addConnection(sp.id)}><Plus className="w-3.5 h-3.5" />新增人脈需求</Btn>
                        </div>
                      </details>
                    </>
                  )}
                </div>
              </div>
            );
          })}
          <button type="button" onClick={addSpeaker}
            className="w-full border-2 border-dashed border-[#B8860B]/40 rounded-xl px-3 py-3 text-sm text-[#B8860B] hover:bg-amber-50 font-semibold">
            <Plus className="w-4 h-4 inline mr-1" />新增主講人
          </button>
        </div>
      </FormSection>

      {/* ============ 3. 小組內引薦記錄（全分會不顯示）============ */}
      {!isChapter && (
      <FormSection title="3. 小組內彼此引薦" badge={summary("", form.referrals.length)} icon={<ArrowRightLeft className="w-4 h-4 text-[#B8860B]" />}>
        <div className="space-y-2">
          {form.referrals.map((r, i) => (
            <div key={r.id} className="border border-stone-200 rounded-lg p-2.5 bg-stone-50">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-xs font-bold text-stone-400">#{i + 1}</span>
                <MemberSelect members={groupMembers} value={r.fromMemberId} onChange={v => updReferral(r.id, "fromMemberId", v)} placeholder="引薦人" />
                <ArrowRightLeft className="w-3 h-3 text-stone-400" />
                <MemberSelect members={groupMembers} value={r.toMemberId} onChange={v => updReferral(r.id, "toMemberId", v)} placeholder="收到引薦" />
                <button onClick={() => rmReferral(r.id)} className="ml-auto p-1 text-stone-400 hover:text-red-500"><Trash2 className="w-3.5 h-3.5" /></button>
              </div>
              <div className="grid grid-cols-[1fr_140px] gap-2 mb-2">
                <input value={r.referralName} onChange={e => updReferral(r.id, "referralName", e.target.value)}
                  placeholder="被引薦對象（例：林先生）"
                  className="border border-stone-300 rounded px-2 py-1.5 text-sm" />
                <div className="flex items-center gap-1">
                  <span className="text-xs text-stone-500">成交金額</span>
                  <input type="number" value={r.amount || ""} onChange={e => updReferral(r.id, "amount", e.target.value)}
                    placeholder="0" className="w-full border border-stone-300 rounded px-2 py-1.5 text-sm text-right" />
                </div>
              </div>
              <textarea value={r.content} onChange={e => updReferral(r.id, "content", e.target.value)}
                rows={2} placeholder="引薦內容（業務類型、需求描述...）"
                className="w-full border border-stone-200 rounded px-2 py-1.5 text-sm bg-white" />
            </div>
          ))}
          <Btn variant="outline" size="sm" onClick={addReferral}><Plus className="w-3.5 h-3.5" />新增引薦</Btn>
        </div>
      </FormSection>
      )}

      {/* ============ 4. 下次組聚（全分會不顯示）============ */}
      {!isChapter && (
      <FormSection title="4. 下次組聚時間" badge={form.nextMeeting?.date ? <span className="text-[10px] bg-emerald-500 text-white px-1.5 py-0.5 rounded-full">已填</span> : summary("", 0)} icon={<Calendar className="w-4 h-4 text-[#B8860B]" />}>
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className="text-xs text-stone-500">日期</label>
            <input type="date" value={form.nextMeeting?.date || ""}
              onChange={e => set("nextMeeting", { ...form.nextMeeting, date: e.target.value })}
              className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
          </div>
          <div>
            <label className="text-xs text-stone-500">時間</label>
            <input type="time" value={form.nextMeeting?.time || ""}
              onChange={e => set("nextMeeting", { ...form.nextMeeting, time: e.target.value })}
              className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
          </div>
        </div>
        <div className="mt-2">
          <label className="text-xs text-stone-500">地點（留空則沿用本次）</label>
          <input value={form.nextMeeting?.location || ""}
            onChange={e => set("nextMeeting", { ...form.nextMeeting, location: e.target.value })}
            placeholder={form.location || "例：事務所會議室..."}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </div>
        <div className="mt-2">
          <label className="text-xs text-stone-500">下次主講人（選填）</label>
          <MemberSelect
            members={group ? members.filter(m => group.memberIds?.includes(m.id)) : members}
            value={form.nextMeeting?.nextSpeakerId || ""}
            onChange={v => set("nextMeeting", { ...form.nextMeeting, nextSpeakerId: v || "" })}
            placeholder="（選填，可後續再決定）" />
        </div>
      </FormSection>
      )}

      {/* ============ 附加：其他討論（預設收起） ============ */}
      <FormSection title="其他討論" defaultOpen={false}
        badge={form.discussion ? <span className="text-[10px] bg-emerald-500 text-white px-1.5 py-0.5 rounded-full">已填</span> : summary("", 0)}
        icon={<FileText className="w-4 h-4 text-stone-500" />}>
        <Field label="其他討論">
          <textarea value={form.discussion || ""} onChange={e => set("discussion", e.target.value)}
            rows={3} placeholder="若有其他議題..."
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </FormSection>

      <div className="flex items-center justify-between pt-3 border-t border-stone-200 mt-4">
        <div>
          {meeting && onDelete && (
            <Btn variant="danger" size="sm" onClick={() => { if (confirm("確定刪除此會議記錄？")) onDelete(meeting.id); }}>
              <Trash2 className="w-3.5 h-3.5" />刪除
            </Btn>
          )}
        </div>
        <div className="flex gap-2">
          <Btn variant="outline" onClick={onCancel} disabled={saving}>取消</Btn>
          <Btn variant="primary" onClick={submit} disabled={saving}>
            <Save className="w-4 h-4" />{saving ? "儲存中⋯" : "儲存"}
          </Btn>
        </div>
      </div>
    </div>
  );
}

// 通用摺疊 Section
function FormSection({ title, icon, badge, defaultOpen = true, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden mb-3">
      <button type="button" onClick={() => setOpen(!open)}
        className="w-full flex items-center justify-between px-3.5 py-2.5 hover:bg-stone-50 transition">
        <div className="flex items-center gap-2">
          {icon}
          <h4 className="font-semibold text-sm text-stone-800">{title}</h4>
          {badge}
        </div>
        {open ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
      </button>
      {open && <div className="px-3.5 pb-3.5 pt-1 border-t border-stone-100">{children}</div>}
    </div>
  );
}

// ============ 會議卡片 ============
function MeetingCard({ meeting, group, members, onEdit, onView }) {
  const [expanded, setExpanded] = useState(false);
  const [exportMenu, setExportMenu] = useState(false);
  const [exporting, setExporting] = useState(false);
  const getMember = (id) => members.find(m => m.id === id);
  const isChapter = isChapterMeeting(meeting);
  // 出席率分母：全分會 → 全分會成員數；組聚 → 該組成員數
  const totalPool = isChapter ? members.length : (group?.memberIds.length || 0);
  const attendRate = totalPool ? (meeting.attendees.length / totalPool * 100).toFixed(0) : 0;

  // 6 大欄位統計
  const resourceShares = (meeting.resourceShares || []).filter(r => r.needs || r.offers);
  const guests = meeting.guests || [];
  // 來賓 helper（顯示名稱 + 標籤）
  const guestDerived = guests.map(g => {
    const kind = g.kind || "member";
    const linked = kind === "member" && g.memberId ? getMember(g.memberId) : null;
    const name = kind === "member"
      ? (linked ? linked.name : "（未選擇會員）")
      : (g.name || "（未填姓名）");
    const industry = kind === "member" ? (linked?.industry || "") : (g.industry || "");
    const sourceLabel = kind === "member"
      ? (isChapterMeeting(meeting) ? "分會會員（非出席）" : "分會別組會員")
      : (g.fromChapter ? `外部 · ${g.fromChapter}` : "外部來賓");
    const hasValidIdentity = kind === "member" ? !!linked : !!g.name;
    return {
      id: g.id, kind, name, industry, sourceLabel, hasValidIdentity,
      sharing: g.sharing || "", feedback: g.feedback || "", otherFeedback: g.otherFeedback || "",
    };
  });
  // 卡片中的「來賓」區塊：移除 sharing/feedback（已合併到組員區塊），只顯示 otherFeedback 跟身分
  const visibleGuests = guestDerived.filter(vg => vg.otherFeedback || vg.hasValidIdentity);
  // 成長/喜悅：合併組員 + 有填的來賓
  const sharings = [
    ...((meeting.sharings || []).map(s => ({ id: s.id, name: getMember(s.memberId)?.name || "?", content: s.content, isGuest: false }))),
    ...(guestDerived.filter(g => g.sharing).map(g => ({ id: "g-share-" + g.id, name: g.name, content: g.sharing, isGuest: true }))),
  ];
  // 來賓給主講人的 feedback（合併到第一位主講人的 feedback 列表用）
  const guestFeedbackList = guestDerived.filter(g => g.feedback).map(g => ({ id: "g-fb-" + g.id, fromName: g.name, content: g.feedback, isGuest: true }));

  // 主講人陣列（含舊單主講相容）
  let allSpeakers = Array.isArray(meeting.speakers) ? meeting.speakers : [];
  if (allSpeakers.length === 0 && (meeting.speaker?.memberId || meeting.speaker?.topic
      || (meeting.conversationOpeners || []).length || (meeting.feedback || []).length
      || (meeting.neededConnections || []).length)) {
    allSpeakers = [{
      id: "legacy_speaker",
      memberId: meeting.speaker?.memberId || "",
      topic: meeting.speaker?.topic || "",
      conversationOpeners: meeting.conversationOpeners || [],
      feedback: meeting.feedback || [],
      neededConnections: meeting.neededConnections || [],
      collaborationGrid: { centerProfile: "", cells: ["", "", "", "", "", "", "", ""] },
    }];
  }
  // 只顯示「有實質內容」的主講人（過濾掉只按了 + 但完全空白的）
  const speakers = allSpeakers.filter(sp => {
    const hasIdentity = !!sp.memberId || !!(sp.topic || "").trim();
    const hasOpeners = (sp.conversationOpeners || []).some(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim);
    const hasFeedback = (sp.feedback || []).some(f => f.content);
    const hasConnections = (sp.neededConnections || []).some(nc => nc.profileWanted || (nc.offers || []).length);
    const grid = sp.collaborationGrid;
    const hasGrid = grid && (grid.centerProfile || (grid.cells || []).some(c => c));
    return hasIdentity || hasOpeners || hasFeedback || hasConnections || hasGrid;
  });
  const totalOfferCount = speakers.reduce((s, sp) => s + ((sp.neededConnections || []).reduce((s2, nc) => s2 + ((nc.offers || []).length), 0)), 0);
  const referrals = meeting.referrals || [];
  const referralTotal = referrals.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const nextMeeting = meeting.nextMeeting || {};

  const pill = (label, val, color) => (
    <span className={`inline-flex items-center gap-0.5 text-[10px] px-1.5 py-0.5 rounded ${color}`}>
      {label}<b className="ml-0.5">{val}</b>
    </span>
  );

  return (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden hover:shadow-md transition">
      <div className="h-1" style={{ backgroundColor: isChapter ? CHAPTER_GROUP_COLOR : (group?.color || "#999") }} />
      <div className="p-4">
        <div className="flex items-start justify-between gap-2 mb-2">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 flex-wrap mb-1">
              <Tag color={isChapter ? CHAPTER_GROUP_COLOR : (group?.color || "#999")}>
                {isChapter ? `🌐 ${CHAPTER_GROUP_NAME}` : (group?.name || "未知小組")}
              </Tag>
              <span className="text-sm font-semibold text-stone-800">{fmtDate(meeting.date)}</span>
              {meeting.time && <span className="text-xs text-stone-500">{meeting.time}</span>}
            </div>
            <div className="flex items-center gap-3 text-xs text-stone-500 flex-wrap">
              {meeting.location && <span className="flex items-center gap-0.5"><MapPin className="w-3 h-3" />{meeting.location}</span>}
              {meeting.scribe && <span className="flex items-center gap-0.5"><Edit2 className="w-3 h-3" />{getMember(meeting.scribe)?.name || "—"}</span>}
            </div>
          </div>
          <div className="flex items-center gap-1 flex-shrink-0 relative">
            <button onClick={() => setExportMenu(v => !v)}
              disabled={exporting}
              className="p-1.5 text-stone-400 hover:text-[#B8860B] hover:bg-stone-50 rounded-lg disabled:opacity-50"
              title="匯出記錄">
              {exporting ? <RefreshCw className="w-4 h-4 animate-spin" /> : <Download className="w-4 h-4" />}
            </button>
            {exportMenu && !exporting && (
              <div className="absolute top-full right-0 mt-1 bg-white border border-stone-200 rounded-lg shadow-lg py-1 z-20 min-w-[140px]">
                <button onClick={async () => {
                    setExportMenu(false); setExporting(true);
                    try { await downloadSingle(meeting, group, members, "docx"); }
                    catch (e) { alert("匯出失敗：" + e.message); }
                    finally { setExporting(false); }
                  }}
                  className="w-full px-3 py-1.5 text-left text-sm hover:bg-stone-50 flex items-center gap-2">
                  <FileText className="w-3.5 h-3.5 text-[#2B5797]" /> Word (.docx)
                </button>
                <button onClick={async () => {
                    setExportMenu(false); setExporting(true);
                    try { await downloadSingle(meeting, group, members, "pdf"); }
                    catch (e) { alert("匯出失敗：" + e.message); }
                    finally { setExporting(false); }
                  }}
                  className="w-full px-3 py-1.5 text-left text-sm hover:bg-stone-50 flex items-center gap-2">
                  <FileText className="w-3.5 h-3.5 text-[#C0392B]" /> PDF
                </button>
              </div>
            )}
            {onView && (
              <button onClick={() => onView(meeting)} className="p-1.5 text-stone-400 hover:text-blue-600 hover:bg-stone-50 rounded-lg" title="檢視（即時同步其他人的編輯進度）">
                <Eye className="w-4 h-4" />
              </button>
            )}
            <button onClick={() => onEdit(meeting)} className="p-1.5 text-stone-400 hover:text-[#8B1A1A] hover:bg-stone-50 rounded-lg" title="編輯">
              <Edit2 className="w-4 h-4" />
            </button>
          </div>
        </div>

        {speakers.length > 0 && (
          <div className="bg-gradient-to-br from-amber-50 to-white border border-amber-200 rounded-lg px-2.5 py-1.5 mb-2 flex items-start gap-2">
            <Presentation2 className="w-4 h-4 text-[#B8860B] flex-shrink-0 mt-0.5" />
            <div className="flex-1 min-w-0">
              <div className="text-[11px] text-[#B8860B] font-semibold">本次主講{speakers.length > 1 ? `（${speakers.length} 位）` : ""}：</div>
              {speakers.map((sp, i) => {
                const m = getMember(sp.memberId);
                // 全分會的 topic 是長文（已完成案例的分享）→ 標題只顯示前 30 字 + …
                const topicShown = sp.topic ? (isChapter && sp.topic.length > 30 ? sp.topic.slice(0, 30) + "…" : sp.topic) : "";
                return (
                  <div key={sp.id || i} className="text-xs text-stone-700 truncate">
                    <b>{m?.name || "（未指定）"}</b>{topicShown && <span className="text-stone-500"> · {topicShown}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div className="my-2">
          <div className="bg-emerald-50 rounded-lg py-1.5 text-center">
            <div className="text-lg font-bold text-emerald-700">{meeting.attendees.length}<span className="text-xs font-normal text-emerald-600">/{totalPool}</span></div>
            <div className="text-[10px] text-emerald-600">出席（{attendRate}%）</div>
          </div>
        </div>

        {/* 摘要 pill（分享 / 建議 不顯示數值，僅以展開卡片內容呈現）*/}
        <div className="flex flex-wrap gap-1 mb-2">
          {resourceShares.length > 0 && pill("資源分享", resourceShares.length, "bg-emerald-50 text-emerald-700")}
          {visibleGuests.length > 0 && pill("來賓", visibleGuests.length, "bg-emerald-50 text-emerald-700")}
          {totalOfferCount > 0 && pill("人脈引薦", totalOfferCount, "bg-purple-50 text-purple-700")}
          {!isChapter && referrals.length > 0 && pill(`引薦 NT$${referralTotal.toLocaleString()}`, referrals.length, "bg-pink-50 text-pink-700")}
          {!isChapter && nextMeeting.date && pill("下次", fmtShort(nextMeeting.date), "bg-stone-100 text-stone-600")}
        </div>

        {meeting.discussion && (
          <div className="text-sm text-stone-600 mb-2">
            <p className={expanded ? "" : "line-clamp-2"}>{meeting.discussion}</p>
          </div>
        )}

        <button onClick={() => setExpanded(!expanded)} className="text-xs text-[#B8860B] hover:text-[#8B1A1A] flex items-center gap-1">
          {expanded ? <ChevronDown className="w-3 h-3" /> : <ChevronRight className="w-3 h-3" />}
          {expanded ? "收合" : "展開詳細"}
        </button>

        {expanded && (
          <div className="mt-3 pt-3 border-t border-stone-100 space-y-3 text-sm">
            <div>
              <div className="text-xs font-semibold text-stone-700 mb-1.5">出席 ({meeting.attendees.length})</div>
              <div className="flex flex-wrap gap-1">
                {meeting.attendees.map(id => <span key={id} className="text-xs px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded">{getMember(id)?.name || id}</span>)}
              </div>
            </div>
            {/* 缺席不顯示在組聚記錄中（資料保留在 meeting.absentees）*/}

            {sharings.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-700 mb-1.5 flex items-center gap-1"><Sparkles className="w-3 h-3 text-[#B8860B]" />成長/喜悅分享</div>
                <div className="space-y-1">
                  {sharings.map(s => (
                    <div key={s.id} className={`text-xs rounded p-1.5 ${s.isGuest ? "bg-emerald-50/40" : "bg-amber-50/50"}`}>
                      <b className={s.isGuest ? "text-emerald-700" : "text-[#B8860B]"}>{s.name}{s.isGuest && <span className="text-[10px] text-stone-500">（來賓）</span>}：</b>
                      <span className="text-stone-700">{s.content || "（未填）"}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {visibleGuests.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-700 mb-1.5 flex items-center gap-1"><UserCheck className="w-3 h-3 text-emerald-600" />來賓（{visibleGuests.length}）</div>
                <div className="space-y-1.5">
                  {visibleGuests.map(vg => (
                    <div key={vg.id} className="text-xs bg-emerald-50/50 border border-emerald-100 rounded p-2">
                      <div className="mb-1">
                        <b className="text-emerald-700">{vg.name}</b>
                        {vg.industry && <span className="text-stone-600"> · {vg.industry}</span>}
                        <span className="text-[10px] text-stone-500 ml-1">[{vg.sourceLabel}]</span>
                      </div>
                      {vg.otherFeedback && <div className="text-stone-700"><b className="text-stone-600">📝 其他：</b>{vg.otherFeedback}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {resourceShares.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-700 mb-1.5 flex items-center gap-1"><ArrowRightLeft className="w-3 h-3 text-emerald-600" />資源需求/提供（{resourceShares.length}）</div>
                <div className="space-y-1.5">
                  {resourceShares.map(r => {
                    const m = getMember(r.memberId);
                    return (
                      <div key={r.id} className="text-xs bg-emerald-50/40 border border-emerald-100 rounded p-2">
                        <div className="mb-1"><b className="text-emerald-700">{m?.name || "?"}</b>{m?.industry && <span className="text-stone-500"> · {m.industry}</span>}</div>
                        {r.needs && <div className="text-stone-700"><b className="text-stone-600">💼 需要：</b>{r.needs}</div>}
                        {r.offers && <div className="text-stone-700"><b className="text-stone-600">🎁 可提供：</b>{r.offers}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {speakers.length > 0 && speakers.map((sp, spIdx) => {
              const m = getMember(sp.memberId);
              const speakerName = m?.name || "（未指定）";
              const filledOpeners = (sp.conversationOpeners || []).filter(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim);
              // 第一位主講人合併進來賓給的 feedback
              const fb = [
                ...(sp.feedback || []).map(f => ({ id: f.id, fromName: getMember(f.fromMemberId)?.name || "?", content: f.content, isGuest: false })),
                ...(spIdx === 0 ? guestFeedbackList : []),
              ].filter(f => f.content);
              const nc = sp.neededConnections || [];
              const grid = sp.collaborationGrid;
              const hasGrid = grid && (grid.centerProfile || (grid.cells || []).some(c => c));
              return (
                <div key={sp.id || spIdx} className="border-l-4 border-[#B8860B]/40 pl-3 space-y-2">
                  <div className="text-xs font-bold text-[#B8860B]">
                    {speakers.length > 1 ? `主講人 ${spIdx + 1}：` : "主講人："}{speakerName}
                    {sp.topic && !isChapter && <span className="text-stone-600 font-normal"> · {sp.topic}</span>}
                  </div>
                  {isChapter && sp.topic && (
                    <div className="bg-amber-50/60 border-l-2 border-amber-400 px-2 py-1.5 rounded">
                      <div className="text-[11px] font-bold text-stone-700 mb-0.5">📋 已完成案例的分享</div>
                      <div className="text-xs text-stone-700 whitespace-pre-wrap">{sp.topic}</div>
                    </div>
                  )}
                  {filledOpeners.length > 0 && (
                    <div>
                      <div className="text-[11px] font-semibold text-stone-600 mb-1 flex items-center gap-1"><MessageSquareQuote className="w-3 h-3 text-[#B8860B]" />開啟對話</div>
                      <div className="space-y-1">
                        {filledOpeners.map((o, i) => (
                          <div key={o.id} className="text-xs bg-amber-50/50 border border-amber-100 rounded p-2">
                            <div className="text-[11px] font-semibold text-[#B8860B] mb-0.5">目標客群 {i + 1}</div>
                            {o.who && <div className="text-stone-700"><b className="text-stone-600">WHO：</b>{o.who}</div>}
                            {o.yesno && <div className="text-stone-700"><b className="text-stone-600">問題：</b>{o.yesno}</div>}
                            {o.tagline && <div className="text-stone-700"><b className="text-stone-600">Tagline：</b>{o.tagline}</div>}
                            {o.painSolution && <div className="text-stone-700"><b className="text-stone-600">案例：</b>{o.painSolution}</div>}
                            {o.cta && <div className="text-stone-700"><b className="text-stone-600">CTA：</b>{o.cta}</div>}
                            {o.verbatim && <div className="mt-1 pt-1 border-t border-amber-100 text-stone-600 whitespace-pre-wrap text-[11px]">{o.verbatim}</div>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {fb.length > 0 && (
                    <div>
                      <div className="text-[11px] font-semibold text-stone-600 mb-1 flex items-center gap-1"><MessageSquareQuote className="w-3 h-3 text-blue-600" />對 {speakerName} 的建議</div>
                      <div className="space-y-1">
                        {fb.map(f => (
                          <div key={f.id} className={`text-xs rounded p-1.5 ${f.isGuest ? "bg-emerald-50/40" : "bg-blue-50/50"}`}>
                            <b className={f.isGuest ? "text-emerald-700" : "text-blue-700"}>{f.fromName}{f.isGuest && <span className="text-[10px] text-stone-500">（來賓）</span>}：</b>
                            <span className="text-stone-700">{f.content || "（未填）"}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {hasGrid && (
                    <div>
                      <div className="text-[11px] font-semibold text-stone-600 mb-1">🔲 {speakerName} 合作專業九宮格</div>
                      <div className="grid grid-cols-3 gap-1 max-w-xs">
                        {[0, 1, 2, 3, 4, 5, 6, 7, 8].map(idx => {
                          if (idx === 4) {
                            return (
                              <div key="c" className="aspect-square border-2 border-[#B8860B] rounded bg-amber-100 p-1 flex flex-col items-center justify-center">
                                <div className="text-[9px] font-bold text-[#B8860B]">{speakerName}</div>
                                <div className="text-[9px] text-stone-700 break-all text-center">{grid.centerProfile || ""}</div>
                              </div>
                            );
                          }
                          const cellIdx = idx < 4 ? idx : idx - 1;
                          return (
                            <div key={idx} className="aspect-square border border-stone-300 rounded bg-white p-1 text-[9px] text-stone-700 flex items-center justify-center text-center break-all">
                              {grid.cells?.[cellIdx] || ""}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {nc.length > 0 && (
                    <div>
                      <div className="text-[11px] font-semibold text-stone-600 mb-1 flex items-center gap-1"><Link2 className="w-3 h-3 text-purple-600" />{speakerName} 需要的合作人脈</div>
                      <div className="space-y-1.5">
                        {nc.map(ncItem => (
                          <div key={ncItem.id} className="text-xs bg-purple-50/50 rounded p-1.5">
                            <div className="text-stone-700">🎯 {ncItem.profileWanted || "（未填）"}</div>
                            {ncItem.offers?.length > 0 && (
                              <div className="mt-1 ml-3 space-y-0.5 text-[11px]">
                                {ncItem.offers.map(of => (
                                  <div key={of.id} className="text-stone-600">
                                    → <b>{getMember(of.introducerId)?.name || "?"}</b> 可引薦 <b>{of.contactName || "?"}</b>（{of.contactProfession || "?"}）
                                    {of.status === "imported" && <span className="ml-1 text-[9px] bg-emerald-500 text-white px-1 rounded">已匯入咖啡會議</span>}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {!isChapter && referrals.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-stone-700 mb-1.5 flex items-center gap-1"><ArrowRightLeft className="w-3 h-3 text-pink-600" />小組內引薦（總額 NT${referralTotal.toLocaleString()}）</div>
                <div className="space-y-1">
                  {referrals.map(r => (
                    <div key={r.id} className="text-xs bg-pink-50/50 rounded p-1.5">
                      <b className="text-pink-700">{getMember(r.fromMemberId)?.name || "?"}</b> → <b>{getMember(r.toMemberId)?.name || "?"}</b>
                      {r.referralName && <span className="text-stone-500"> · {r.referralName}</span>}
                      {r.amount && <span className="ml-1 text-emerald-700 font-semibold">NT${Number(r.amount).toLocaleString()}</span>}
                      {r.content && <div className="text-stone-600 mt-0.5">{r.content}</div>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {!isChapter && (nextMeeting.date || nextMeeting.nextSpeakerId) && (
              <div className="bg-stone-50 rounded-lg p-2 flex items-center gap-2 flex-wrap">
                <Calendar className="w-3.5 h-3.5 text-stone-500" />
                <span className="text-xs text-stone-700">
                  <b>下次組聚：</b>{nextMeeting.date ? fmtDate(nextMeeting.date) : "—"}
                  {nextMeeting.time && <span> {nextMeeting.time}</span>}
                  {nextMeeting.location && <span> · {nextMeeting.location}</span>}
                </span>
                {nextMeeting.nextSpeakerId && (
                  <span className="text-xs text-stone-700">
                    <b>下次主講：</b>{getMember(nextMeeting.nextSpeakerId)?.name || "—"}
                  </span>
                )}
              </div>
            )}

          </div>
        )}
      </div>
    </div>
  );
}

// ============ 會議檢視 Modal（唯讀，5 秒自動同步 + 手動重新整理）============
function MeetingViewModal({ meetingId, meetings, members, groups, onClose, onRefresh, onEdit }) {
  const [lastSyncedAt, setLastSyncedAt] = useState(Date.now());
  const [syncing, setSyncing] = useState(false);
  const [, setTick] = useState(0);  // 用來每秒重繪「N 秒前同步」

  // 每秒更新 tick，讓「同步狀態」文字即時跑
  useEffect(() => {
    if (!meetingId) return;
    const t = setInterval(() => setTick(x => x + 1), 1000);
    return () => clearInterval(t);
  }, [meetingId]);

  // 自動 polling — 每 5 秒從伺服器拉最新資料
  useEffect(() => {
    if (!meetingId) return;
    const doSync = async () => {
      setSyncing(true);
      try {
        await onRefresh();
        setLastSyncedAt(Date.now());
      } finally {
        setSyncing(false);
      }
    };
    const interval = setInterval(doSync, 5000);
    return () => clearInterval(interval);
  }, [meetingId, onRefresh]);

  const manualRefresh = async () => {
    setSyncing(true);
    try {
      await onRefresh();
      setLastSyncedAt(Date.now());
    } finally {
      setSyncing(false);
    }
  };

  if (!meetingId) return null;

  const meeting = meetings.find(m => m.id === meetingId);
  if (!meeting) {
    return (
      <Modal open={true} onClose={onClose} title="檢視會議記錄" maxWidth="max-w-2xl">
        <div className="text-center text-stone-400 py-12">
          <Eye className="w-10 h-10 mx-auto mb-2 opacity-30" />
          <p>會議已被刪除或同步中找不到</p>
        </div>
      </Modal>
    );
  }

  const isChapter = isChapterMeeting(meeting);
  const group = groups.find(g => g.id === meeting.groupId);
  const getMember = (id) => members.find(m => m.id === id);
  const totalPool = isChapter ? members.length : (group?.memberIds?.length || 0);
  const attendRate = totalPool ? (meeting.attendees.length / totalPool * 100).toFixed(0) : 0;
  const secondsAgo = Math.floor((Date.now() - lastSyncedAt) / 1000);

  // 來賓 helper
  const guestDerived = (meeting.guests || []).map(g => {
    const kind = g.kind || "member";
    const linked = kind === "member" && g.memberId ? getMember(g.memberId) : null;
    const name = kind === "member" ? (linked ? linked.name : "（未選擇會員）") : (g.name || "（未填姓名）");
    const industry = kind === "member" ? (linked?.industry || "") : (g.industry || "");
    const sourceLabel = kind === "member"
      ? (isChapter ? "分會會員（非出席）" : "分會別組會員")
      : (g.fromChapter ? `外部 · ${g.fromChapter}` : "外部來賓");
    const hasValidIdentity = kind === "member" ? !!linked : !!g.name;
    return { id: g.id, name, industry, sourceLabel, hasValidIdentity,
      sharing: g.sharing || "", feedback: g.feedback || "", otherFeedback: g.otherFeedback || "" };
  });
  const visibleGuests = guestDerived.filter(vg => vg.otherFeedback || vg.hasValidIdentity);
  const guestFeedbackList = guestDerived.filter(g => g.feedback).map(g => ({ id: "g-fb-" + g.id, fromName: g.name, content: g.feedback, isGuest: true }));

  // 主講人（含舊單主講相容）
  let allSpeakers = Array.isArray(meeting.speakers) ? meeting.speakers : [];
  if (allSpeakers.length === 0 && (meeting.speaker?.memberId || meeting.speaker?.topic
      || (meeting.conversationOpeners || []).length || (meeting.feedback || []).length
      || (meeting.neededConnections || []).length)) {
    allSpeakers = [{
      id: "legacy_speaker",
      memberId: meeting.speaker?.memberId || "", topic: meeting.speaker?.topic || "",
      conversationOpeners: meeting.conversationOpeners || [],
      feedback: meeting.feedback || [],
      neededConnections: meeting.neededConnections || [],
      collaborationGrid: { centerProfile: "", cells: ["", "", "", "", "", "", "", ""] },
    }];
  }
  const speakers = allSpeakers.filter(sp => {
    const hasIdentity = !!sp.memberId || !!(sp.topic || "").trim();
    const hasOpeners = (sp.conversationOpeners || []).some(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim);
    const hasFeedback = (sp.feedback || []).some(f => f.content);
    const hasConnections = (sp.neededConnections || []).some(nc => nc.profileWanted || (nc.offers || []).length);
    const grid = sp.collaborationGrid;
    const hasGrid = grid && (grid.centerProfile || (grid.cells || []).some(c => c));
    return hasIdentity || hasOpeners || hasFeedback || hasConnections || hasGrid;
  });

  // 成長/喜悅：合併組員 + 有填的來賓
  const sharings = [
    ...((meeting.sharings || []).map(s => ({ id: s.id, name: getMember(s.memberId)?.name || "?", content: s.content, isGuest: false }))),
    ...(guestDerived.filter(g => g.sharing).map(g => ({ id: "g-share-" + g.id, name: g.name, content: g.sharing, isGuest: true }))),
  ];
  const resourceShares = (meeting.resourceShares || []).filter(r => r.needs || r.offers);
  const referrals = meeting.referrals || [];
  const referralTotal = referrals.reduce((s, r) => s + (Number(r.amount) || 0), 0);
  const nextMeeting = meeting.nextMeeting || {};

  // 同步狀態文字
  let syncStatusText, syncStatusColor;
  if (syncing) {
    syncStatusText = "🔄 同步中…";
    syncStatusColor = "text-blue-600";
  } else if (secondsAgo < 5) {
    syncStatusText = `✓ ${secondsAgo} 秒前同步`;
    syncStatusColor = "text-emerald-600";
  } else if (secondsAgo < 30) {
    syncStatusText = `${secondsAgo} 秒前同步`;
    syncStatusColor = "text-stone-500";
  } else {
    syncStatusText = `${secondsAgo} 秒前同步（可能斷線）`;
    syncStatusColor = "text-amber-600";
  }

  return (
    <Modal open={true} onClose={onClose}
      title={
        <div className="flex items-center gap-2 flex-wrap">
          <Eye className="w-4 h-4 text-blue-600" />
          <span>檢視：{isChapter ? "🌐 全分會" : (group?.name || "未知小組")} · {fmtDate(meeting.date)}</span>
          <span className={`text-xs font-normal ${syncStatusColor}`}>{syncStatusText}</span>
        </div>
      }
      footer={
        <div className="flex items-center justify-between gap-2">
          <div className="text-xs text-stone-500">💡 此檢視自動每 5 秒同步一次。其他人按下「儲存」後，這裡會更新。</div>
          <div className="flex gap-2">
            <Btn variant="outline" size="sm" onClick={manualRefresh} disabled={syncing}>
              <RefreshCw className={`w-3.5 h-3.5 ${syncing ? "animate-spin" : ""}`} />立即同步
            </Btn>
            {onEdit && <Btn variant="primary" size="sm" onClick={() => onEdit(meeting)}><Edit2 className="w-3.5 h-3.5" />轉為編輯</Btn>}
          </div>
        </div>
      }
      maxWidth="max-w-5xl">
      <div className="space-y-3 text-sm">
        {/* 基本資訊 */}
        <div className="bg-stone-50 rounded-lg p-3 grid grid-cols-2 gap-x-4 gap-y-1.5">
          <div><b className="text-stone-600">小組：</b>{isChapter ? `🌐 ${CHAPTER_GROUP_NAME}` : (group?.name || "—")}</div>
          <div><b className="text-stone-600">日期：</b>{fmtDate(meeting.date)}{meeting.time && ` ${meeting.time}`}</div>
          {meeting.location && <div><b className="text-stone-600">地點：</b>{meeting.location}</div>}
          {meeting.scribe && <div><b className="text-stone-600">記錄人：</b>{getMember(meeting.scribe)?.name || "—"}</div>}
          <div className="col-span-2">
            <b className="text-stone-600">出席（{meeting.attendees.length} / {totalPool}，{attendRate}%）：</b>
            {meeting.attendees.length > 0 ? meeting.attendees.map(id => getMember(id)?.name || "?").join("、") : "—"}
          </div>
          {/* 缺席不顯示在檢視 modal 中 */}
        </div>

        {/* 成長/喜悅分享（含來賓合併） */}
        {sharings.length > 0 && (
          <div>
            <div className="text-sm font-bold text-stone-700 mb-1.5 flex items-center gap-1">
              <Sparkles className="w-4 h-4 text-[#B8860B]" />成長/喜悅分享（{sharings.length}）
            </div>
            <div className="space-y-1">
              {sharings.map(s => (
                <div key={s.id} className={`rounded p-2 ${s.isGuest ? "bg-emerald-50/40" : "bg-amber-50/50"}`}>
                  <b className={s.isGuest ? "text-emerald-700" : "text-[#B8860B]"}>{s.name}{s.isGuest && <span className="text-xs text-stone-500">（來賓）</span>}：</b>
                  <span className="text-stone-700">{s.content || "（未填）"}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 來賓清單（成長/喜悅 與 建議 已合併到組員區塊；這裡只顯示身分 + 其他回饋）*/}
        {visibleGuests.length > 0 && (
          <div>
            <div className="text-sm font-bold text-stone-700 mb-1.5 flex items-center gap-1">
              <UserCheck className="w-4 h-4 text-emerald-600" />來賓（{visibleGuests.length}）
            </div>
            <div className="space-y-1.5">
              {visibleGuests.map(vg => (
                <div key={vg.id} className="bg-emerald-50/50 border border-emerald-100 rounded p-2.5">
                  <div className="mb-1">
                    <b className="text-emerald-700">{vg.name}</b>
                    {vg.industry && <span className="text-stone-600"> · {vg.industry}</span>}
                    <span className="text-xs text-stone-500 ml-1">[{vg.sourceLabel}]</span>
                  </div>
                  {vg.otherFeedback && <div className="text-stone-700"><b className="text-stone-600">📝 其他：</b>{vg.otherFeedback}</div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 資源需求/提供 */}
        {resourceShares.length > 0 && (
          <div>
            <div className="text-sm font-bold text-stone-700 mb-1.5 flex items-center gap-1">
              <ArrowRightLeft className="w-4 h-4 text-emerald-600" />資源需求/提供（{resourceShares.length}）
            </div>
            <div className="space-y-1.5">
              {resourceShares.map(r => {
                const m = getMember(r.memberId);
                return (
                  <div key={r.id} className="bg-emerald-50/40 border border-emerald-100 rounded p-2.5">
                    <div className="mb-1"><b className="text-emerald-700">{m?.name || "?"}</b>{m?.industry && <span className="text-stone-500"> · {m.industry}</span>}</div>
                    {r.needs && <div className="text-stone-700"><b className="text-stone-600">💼 需要：</b>{r.needs}</div>}
                    {r.offers && <div className="text-stone-700"><b className="text-stone-600">🎁 可提供：</b>{r.offers}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* 主講人們 */}
        {speakers.length > 0 && speakers.map((sp, spIdx) => {
          const m = getMember(sp.memberId);
          const speakerName = m?.name || "（未指定）";
          const filledOpeners = (sp.conversationOpeners || []).filter(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim);
          // 第一位主講人合併進來賓的 feedback
          const fb = [
            ...(sp.feedback || []).map(f => ({ id: f.id, fromName: getMember(f.fromMemberId)?.name || "?", content: f.content, isGuest: false })),
            ...(spIdx === 0 ? guestFeedbackList : []),
          ].filter(f => f.content);
          const nc = sp.neededConnections || [];
          const grid = sp.collaborationGrid;
          const hasGrid = grid && (grid.centerProfile || (grid.cells || []).some(c => c));
          return (
            <div key={sp.id || spIdx} className="border-2 border-[#B8860B]/30 rounded-lg p-3 bg-amber-50/20 space-y-2">
              <div className="flex items-center gap-2 pb-2 border-b border-amber-200 flex-wrap">
                <Presentation2 className="w-4 h-4 text-[#B8860B]" />
                <span className="font-bold text-[#B8860B]">
                  {speakers.length > 1 ? `主講人 ${spIdx + 1}：` : "主講人："}{speakerName}
                </span>
                {sp.topic && !isChapter && <span className="text-stone-700"> · {sp.topic}</span>}
              </div>
              {isChapter && sp.topic && (
                <div className="bg-amber-50/60 border-l-2 border-amber-400 px-3 py-2 rounded">
                  <div className="text-xs font-bold text-stone-700 mb-1">📋 已完成案例的分享</div>
                  <div className="text-sm text-stone-700 whitespace-pre-wrap">{sp.topic}</div>
                </div>
              )}

              {filledOpeners.length > 0 && (
                <div>
                  <div className="text-xs font-bold text-stone-700 mb-1 flex items-center gap-1"><MessageSquareQuote className="w-3.5 h-3.5 text-[#B8860B]" />開啟對話</div>
                  <div className="space-y-1">
                    {filledOpeners.map((o, i) => (
                      <div key={o.id} className="bg-amber-50/50 border border-amber-100 rounded p-2 text-xs">
                        <div className="font-semibold text-[#B8860B] mb-0.5">目標客群 {i + 1}</div>
                        {o.who && <div className="text-stone-700"><b className="text-stone-600">WHO：</b>{o.who}</div>}
                        {o.yesno && <div className="text-stone-700"><b className="text-stone-600">問題：</b>{o.yesno}</div>}
                        {o.tagline && <div className="text-stone-700"><b className="text-stone-600">Tagline：</b>{o.tagline}</div>}
                        {o.painSolution && <div className="text-stone-700"><b className="text-stone-600">案例：</b>{o.painSolution}</div>}
                        {o.cta && <div className="text-stone-700"><b className="text-stone-600">CTA：</b>{o.cta}</div>}
                        {o.verbatim && <div className="mt-1 pt-1 border-t border-amber-100 text-stone-600 whitespace-pre-wrap">{o.verbatim}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {fb.length > 0 && (
                <div>
                  <div className="text-xs font-bold text-stone-700 mb-1 flex items-center gap-1"><MessageSquareQuote className="w-3.5 h-3.5 text-blue-600" />對 {speakerName} 的建議</div>

function ProgressDonut({ pct, size = 48, stroke = 5, color = "#B8860B" }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} className="transform -rotate-90">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#e7e5e4" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" className="transition-all" />
    </svg>
  );
}

function StatPill({ label, done, total, color }) {
  const pct = total ? Math.round(done / total * 100) : 0;
  return (
    <div className="flex-1 min-w-0 bg-stone-50 rounded-lg px-2 py-1.5">
      <div className="text-[10px] text-stone-500">{label}</div>
      <div className="text-sm font-bold" style={{ color: color || "#292524" }}>
        {done}<span className="text-xs font-normal text-stone-400">/{total}</span>
      </div>
      <div className="h-1 bg-stone-200 rounded overflow-hidden mt-1">
        <div className="h-full rounded transition-all" style={{ width: `${pct}%`, backgroundColor: color || "#B8860B" }} />
      </div>
    </div>
  );
}

function OneOnOneMatrix({ mentee, members, currentUserId, onUpdate, readOnly, isAdmin, editMode }) {
  const targets = getMenteeAllTargets(mentee);
  const getM = (id) => members.find(m => m.id === id);
  const [local, setLocal] = useState(mentee.oneOnOnes);
  useEffect(() => { setLocal(mentee.oneOnOnes); }, [mentee.id, mentee.oneOnOnes]);
  const dirty = JSON.stringify(local) !== JSON.stringify(mentee.oneOnOnes);

  // 計算本地變更數
  const dirtyCount = useMemo(() => {
    let cnt = 0;
    const all = new Set([...Object.keys(local), ...Object.keys(mentee.oneOnOnes)]);
    all.forEach(tid => {
      ONE_ON_ONE_TYPES.forEach(t => {
        const a = local[tid]?.[t.key]?.done || false;
        const b = mentee.oneOnOnes[tid]?.[t.key]?.done || false;
        if (a !== b) cnt++;
      });
    });
    return cnt;
  }, [local, mentee.oneOnOnes]);

  const toggle = (targetId, typeKey) => {
    const cur = local[targetId]?.[typeKey];
    const newVal = cur?.done ? { done: false }
      : { done: true, doneBy: currentUserId, doneAt: new Date().toISOString() };
    setLocal(p => ({
      ...p,
      [targetId]: { ...(p[targetId] || {}), [typeKey]: newVal },
    }));
  };
  const submit = () => onUpdate({ ...mentee, oneOnOnes: local });
  const reset = () => setLocal(mentee.oneOnOnes);

  const grouped = [
    { label: "核心團隊", items: targets.filter(t => t.group === "core") },
    { label: "導師團隊", items: targets.filter(t => t.group === "mentor") },
  ];
  return (
    <div className="space-y-4">
      {grouped.map(sec => (
        <div key={sec.label}>
          <div className="text-xs font-semibold text-stone-500 mb-1.5 px-1">{sec.label}（{sec.items.length} 人）</div>
          <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
            {sec.items.length === 0 && <div className="text-sm text-stone-400 italic text-center py-3">尚未設定</div>}
            {sec.items.map((tgt, i) => {
              const m = getM(tgt.memberId);
              const rec = local[tgt.memberId] || {};
              const origRec = mentee.oneOnOnes[tgt.memberId] || {};
              const canCheck = !readOnly && editMode && canCheckOneOnOne(mentee, currentUserId, tgt.memberId, isAdmin);
              const isMe = currentUserId === tgt.memberId;
              return (
                <div key={tgt.memberId + i} className={`px-3 py-2 ${i !== 0 ? "border-t border-stone-100" : ""}`}>
                  <div className="flex items-center gap-1 mb-1.5">
                    <span className="text-[10px] text-stone-400 bg-stone-100 px-1.5 py-0.5 rounded">{tgt.role}</span>
                    <span className="text-sm font-medium text-stone-800">{m?.name || tgt.memberId}</span>
                    {isMe && <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded">我</span>}
                  </div>
                  <div className="grid grid-cols-5 gap-1">
                    {ONE_ON_ONE_TYPES.map(t => {
                      const cell = rec[t.key] || { done: false };
                      const origDone = origRec[t.key]?.done || false;
                      const pendingChange = cell.done !== origDone;
                      const byM = getM(cell.doneBy);
                      return (
                        <button key={t.key} type="button"
                          disabled={!canCheck}
                          onClick={() => toggle(tgt.memberId, t.key)}
                          title={cell.done && byM ? `${byM.name} 簽 ${cell.doneAt ? fmtDate(cell.doneAt) : ""}` : (canCheck ? "點擊打勾" : "無權限")}
                          className={`py-1.5 rounded-md border text-[10px] font-medium transition flex flex-col items-center gap-0.5 relative
                            ${cell.done ? "bg-emerald-50 border-emerald-300 text-emerald-700" : "bg-white border-stone-200 text-stone-400"}
                            ${pendingChange ? "ring-2 ring-amber-400 ring-offset-1" : ""}
                            ${canCheck ? "hover:border-emerald-400" : "opacity-70 cursor-not-allowed"}`}>
                          {cell.done ? <CheckCircle2 className="w-3.5 h-3.5" /> : <Circle className="w-3.5 h-3.5" />}
                          <span className="leading-none">{t.short}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      {dirty && editMode && !readOnly && <SubmitBar onSubmit={submit} onReset={reset} label={`一對一矩陣有 ${dirtyCount} 項變更待儲存`} />}
    </div>
  );
}

                <span className="text-[10px] text-stone-500 bg-stone-100 px-1.5 py-0.5 rounded">{tp?.label}</span>
                <span className="text-sm font-medium text-stone-800 flex-1">{tp?.title}</span>
                {t.completedDate && <CheckCircle2 className="w-4 h-4 text-emerald-500" />}
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs">
                <div>
                  <div className="text-stone-500 mb-0.5">預定</div>
                  <input type="date" value={t.scheduledDate || ""} disabled={!canEditNow}
                    onChange={e => update(i, "scheduledDate", e.target.value)}
                    className="w-full border border-stone-200 rounded px-1.5 py-1 disabled:bg-stone-50" />
                </div>
                <div>
                  <div className="text-stone-500 mb-0.5">完成</div>
                  <input type="date" value={t.completedDate || ""} disabled={!canEditNow}
                    onChange={e => update(i, "completedDate", e.target.value)}
                    className="w-full border border-stone-200 rounded px-1.5 py-1 disabled:bg-stone-50" />
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {dirty && canEditNow && <SubmitBar onSubmit={submit} onReset={reset} />}
    </div>
  );
}

// GuestSection 現在改為**唯讀**，資料來源是主站咖啡會議
// kind === "coffeeMeetings"：顯示所有 inviterId = mentee.memberId 的咖啡會議
// kind === "guests"：只顯示「已出席例會」（meetingStatus=done 且 attendanceWillingness=confirmed）的那些
function GuestSection({ mentee, mainCoffeeMeetings = [], onRefreshCoffee, coffeeSyncingAt, kind = "guests" }) {
  const allMyMeetings = useMemo(() =>
    mainCoffeeMeetings.filter(cm => cm.inviterId === mentee.memberId),
    [mainCoffeeMeetings, mentee.memberId]
  );
  const list = useMemo(() => {
    if (kind === "guests") {
      return allMyMeetings.filter(cm =>
        cm.meetingStatus === "done" && cm.attendanceWillingness === "confirmed"
      );
    }
    return allMyMeetings;
  }, [allMyMeetings, kind]);

  // 排序：最新在前
  const sorted = useMemo(() => [...list].sort((a, b) => {
    const da = a.meetingTime || a.createdAt || "";
    const db = b.meetingTime || b.createdAt || "";
    return db.localeCompare(da);
  }), [list]);

  const hintText = kind === "guests"
    ? "此區資料來自「主站咖啡會議」中已出席例會的記錄（meetingStatus=已完成 且 出席意願=確認出席）"
    : "此區資料來自「主站咖啡會議」中該新生為邀約人的全部記錄";
  // 預填邀約人的主站連結
  const newLink = `index.html?view=coffee&inviter=${encodeURIComponent(mentee.memberId)}`;

  const fmtSyncAt = coffeeSyncingAt ? `${String(coffeeSyncingAt.getHours()).padStart(2, "0")}:${String(coffeeSyncingAt.getMinutes()).padStart(2, "0")}` : "";

  return (
    <div>
      <div className="text-[11px] text-stone-500 mb-2 flex items-start gap-1.5">
        <AlertCircle className="w-3 h-3 mt-0.5 flex-shrink-0" />
        <span className="flex-1">{hintText}</span>
      </div>
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <a href={newLink} target="_blank" rel="noopener noreferrer"
          className="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-semibold text-white rounded-md hover:opacity-90"
          style={{ background: "#8B6F47" }}>
          <Coffee className="w-3.5 h-3.5" />去主站新增咖啡會議 ↗
        </a>
        {onRefreshCoffee && (
          <button onClick={onRefreshCoffee}
            className="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs text-stone-600 border border-stone-300 rounded-md hover:bg-stone-50">
            <RefreshCw className="w-3 h-3" />重新整理
          </button>
        )}
        {fmtSyncAt && <span className="text-[10px] text-stone-400">同步於 {fmtSyncAt}</span>}
      </div>
      <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
        {sorted.length === 0 && <div className="text-sm text-stone-400 italic text-center py-6">
          尚無紀錄{kind === "guests" ? "（還沒有成功帶來賓出席）" : ""}
        </div>}
        {sorted.map((cm, i) => {
          const statusColor =
            cm.meetingStatus === "done" ? "#4A6741" :
            cm.meetingStatus === "cancelled" ? "#888" : "#A01E2E";
          const statusText =
            cm.meetingStatus === "done" ? "已完成" :
            cm.meetingStatus === "cancelled" ? "已取消" : "邀約中";
          const willColor =
            cm.attendanceWillingness === "confirmed" ? "#059669" :
            cm.attendanceWillingness === "declined" ? "#6b7280" :
            cm.attendanceWillingness === "pending" ? "#B8860B" : "#888";
          const willText =
            cm.attendanceWillingness === "confirmed" ? "已出席" :
            cm.attendanceWillingness === "declined" ? "未出席" :
            cm.attendanceWillingness === "pending" ? "邀約中" : "未確認";
          const convColor =
            cm.conversionStatus === "signed" || cm.conversionStatus === "paid" ? "#A01E2E" :
            cm.conversionStatus === "sworn" ? "#1A6B1A" :
            cm.conversionStatus === "following" ? "#8B6F47" : null;
          const convText =
            cm.conversionStatus === "signed" ? "已簽單" :
            cm.conversionStatus === "paid" ? "已繳費" :
            cm.conversionStatus === "sworn" ? "已宣誓🎉" :
            cm.conversionStatus === "following" ? "跟進中" : null;
          return (
            <div key={cm.id} className={`px-3 py-2.5 ${i !== 0 ? "border-t border-stone-100" : ""}`}>
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-xs text-stone-500 font-mono">{(cm.meetingTime || "").slice(0, 10) || "—"}</span>
                <span className="text-sm font-semibold text-stone-800">{cm.guestName || "—"}</span>
                <span className="text-xs text-stone-500">{cm.guestIndustry || ""}</span>
              </div>
              <div className="flex items-center gap-1 mt-1 flex-wrap">
                <Tag color={statusColor}>{statusText}</Tag>
                <Tag color={willColor}>{willText}</Tag>
                {convText && <Tag color={convColor}>{convText}</Tag>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AttendanceSection({ mentee, onUpdate, readOnly, editMode }) {
  const [local, setLocal] = useState(mentee.earlyAttendances);
  useEffect(() => { setLocal(mentee.earlyAttendances); }, [mentee.id, mentee.earlyAttendances]);
  const dirty = JSON.stringify(local) !== JSON.stringify(mentee.earlyAttendances);
  const addToday = () => {
    const today = new Date().toISOString().slice(0, 10);
    if (local.includes(today)) return alert("今日已記錄");
    setLocal([...local, today].sort());
  };
  const addCustom = () => {
    const d = prompt("輸入日期（YYYY-MM-DD）", new Date().toISOString().slice(0, 10));
    if (!d || local.includes(d)) return;
    setLocal([...local, d].sort());
  };
  const rm = (d) => setLocal(local.filter(x => x !== d));
  const submit = () => onUpdate({ ...mentee, earlyAttendances: local });
  const reset = () => setLocal(mentee.earlyAttendances);
  const done = local.length >= GRAD_REQS.earlyAttend;
  const canEditNow = !readOnly && editMode;
  return (
    <div>
      <div className="text-xs text-stone-500 mb-2 flex items-center gap-2">
        累計 {local.length} / {GRAD_REQS.earlyAttend} 次（例會 6:15 前到場達標）
        {done && <Tag color="#059669">✓ 已達標</Tag>}
      </div>
      <div className="flex flex-wrap gap-1.5 mb-2 min-h-[28px]">
        {local.map(d => (
          <div key={d} className="inline-flex items-center bg-purple-50 text-purple-700 rounded-md px-2 py-1 text-xs">
            {fmtDate(d)}
            {canEditNow && <button onClick={() => rm(d)} className="ml-1 text-purple-400 hover:text-red-500">×</button>}
          </div>
        ))}
        {local.length === 0 && <span className="text-sm text-stone-400 italic">尚無紀錄</span>}
      </div>
      {canEditNow && (
        <div className="flex gap-2">
          <Btn variant="outline" size="sm" onClick={addToday}><Plus className="w-3.5 h-3.5" />記錄今日</Btn>
          <Btn variant="ghost" size="sm" onClick={addCustom}>補登其他日期</Btn>
        </div>
      )}
      {dirty && canEditNow && <SubmitBar onSubmit={submit} onReset={reset} />}
    </div>
  );
}

function MenteeForm({ mentee, members, mentees, mentorshipDefaults, onSave, onCancel, onDelete }) {
  // 初始化優先級：編輯現有新生 > 分會預設 > 最新一位新生 > 全空
  const [form, setForm] = useState(() => {
    if (mentee) return mentee;
    const latest = mentees[0];
    const d = mentorshipDefaults;

    // 核心團隊優先級
    let coreTeam;
    if (d && Array.isArray(d.coreTeam) && d.coreTeam.length) {
      coreTeam = CORE_ROLES.map(r => {
        const found = d.coreTeam.find(c => c.role === r);
        return { role: r, memberId: found?.memberId || "" };
      });
    } else if (latest) {
      coreTeam = latest.coreTeam.map(c => ({ ...c }));
    } else {
      coreTeam = CORE_ROLES.map(r => ({ role: r, memberId: "" }));
    }

    // 導師團隊優先級
    let mentorTeam;
    if (d && Array.isArray(d.mentorTeam) && d.mentorTeam.length) {
      mentorTeam = d.mentorTeam.map(m => ({ ...m }));
    } else if (latest) {
      mentorTeam = latest.mentorTeam.map(m => ({ ...m }));
    } else {
      mentorTeam = [];
    }

    // 培訓預定日期：只從分會預設套用
    // 新結構支援一個培訓有多個日期（陣列），套用時挑「最近的未來日期」
    // 若全部都在過去，則用最晚的那一個當備案（比 null 有參考價值）
    const schedule = (d && d.trainingSchedule) || {};
    const todayStr = new Date().toISOString().slice(0, 10);
    const pickScheduledDate = (raw) => {
      if (!raw) return null;
      const list = Array.isArray(raw) ? raw.filter(Boolean) : [raw];
      if (list.length === 0) return null;
      const sorted = [...list].sort();                        // YYYY-MM-DD 字串可字典序
      const future = sorted.find(d => d >= todayStr);
      return future || sorted[sorted.length - 1];             // 若無未來日期，fallback 最晚那筆
    };
    const trainings = TRAININGS.map(t => ({
      id: t.id,
      scheduledDate: pickScheduledDate(schedule[t.id]),
      completedDate: null,
    }));

    return {
      id: uid("mte"),
      memberId: "", representativeIndustry: "",
      oathDate: new Date().toISOString().slice(0, 10),
      graduationDate: null, graduatedTeam: "",
      mentorPrimaryId: "", mentorSecondaryId: "",
      coreTeam, mentorTeam,
      oneOnOnes: {},
      passport: W_MILESTONES.map(w => ({ key: w.key, completedDate: null })),
      trainings,
      guests: [], coffeeMeetings: [], earlyAttendances: [], supplementReports: [],
      createdAt: new Date().toISOString(),
    };
  });
  // 判斷是否「新增模式且成功套用了預設」
  const isNew = !mentee;
  const hasAppliedDefaults = isNew && !!(mentorshipDefaults &&
    ((mentorshipDefaults.coreTeam?.length || 0) + (mentorshipDefaults.mentorTeam?.length || 0) > 0));
  // 團隊快照摺疊狀態：套用預設時預設摺疊，否則展開
  const [teamExpanded, setTeamExpanded] = useState(!hasAppliedDefaults);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const updCore = (idx, memberId) => {
    const nc = [...form.coreTeam]; nc[idx] = { ...nc[idx], memberId }; set("coreTeam", nc);
  };
  const updMentorTeam = (list) => {
    set("mentorTeam", list.map(id => form.mentorTeam.find(x => x.memberId === id) || { memberId: id, role: "導師" }));
  };
  const setMentorRole = (id, role) =>
    set("mentorTeam", form.mentorTeam.map(m => m.memberId === id ? { ...m, role } : m));

  const submit = () => {
    if (!form.memberId) return alert("請選擇新生");
    if (!form.mentorPrimaryId || !form.mentorSecondaryId) return alert("請選擇正副導師");
    onSave({ ...form, updatedAt: new Date().toISOString() });
  };
  const mentorOptions = members.filter(m => m.id !== form.memberId);

  // 套用預設的摘要（用於提示條）
  const appliedSummary = hasAppliedDefaults ? (() => {
    const chairRoleCount = form.coreTeam.filter(c => c.memberId).length;
    const mentorCount = form.mentorTeam.length;
    const scheduledCount = form.trainings.filter(t => t.scheduledDate).length;
    const parts = [];
    if (chairRoleCount) parts.push(`核心 ${chairRoleCount} 職`);
    if (mentorCount) parts.push(`導師 ${mentorCount} 人`);
    if (scheduledCount) parts.push(`培訓 ${scheduledCount} 場日期`);
    return parts.join("、");
  })() : "";

  return (
    <div>
      {hasAppliedDefaults && (
        <div className="mb-3 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2 text-xs text-emerald-900 flex items-start gap-2">
          <CheckCircle2 className="w-4 h-4 mt-0.5 flex-shrink-0" />
          <div className="flex-1">
            <b>已套用分會預設</b>（{appliedSummary}）
            {!teamExpanded && <button onClick={() => setTeamExpanded(true)} className="ml-2 underline">調整此新生的團隊快照</button>}
          </div>
        </div>
      )}

      <div className="grid grid-cols-2 gap-3">
        <Field label="新生" required>
          <MemberSelect members={members} value={form.memberId} onChange={v => set("memberId", v)} placeholder="選擇會員..." />
        </Field>
        <Field label="代表專業">
          <input value={form.representativeIndustry} onChange={e => set("representativeIndustry", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" placeholder="例：短影音行銷" />
        </Field>
        <Field label="宣誓日" required>
          <input type="date" value={form.oathDate} onChange={e => set("oathDate", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
        <Field label="畢業日" hint="結業後填寫">
          <input type="date" value={form.graduationDate || ""} onChange={e => set("graduationDate", e.target.value || null)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Field label="正導師" required>
          <MemberSelect members={mentorOptions} value={form.mentorPrimaryId} onChange={v => set("mentorPrimaryId", v)} />
        </Field>
        <Field label="副導師" required>
          <MemberSelect members={mentorOptions} value={form.mentorSecondaryId} onChange={v => set("mentorSecondaryId", v)} />
        </Field>
      </div>

      {/* 團隊快照：若已套用預設且未展開則摺疊 */}
      {teamExpanded ? (
        <>
          <Field label="核心團隊快照（宣誓當下）" hint="名單建立後釘死，不隨換屆變動">
            <div className="grid grid-cols-2 gap-2">
              {form.coreTeam.map((c, i) => (
                <div key={c.role} className="flex items-center gap-2">
                  <span className="text-xs text-stone-500 w-10 flex-shrink-0">{c.role}</span>
                  <div className="flex-1"><MemberSelect members={members} value={c.memberId} onChange={v => updCore(i, v)} placeholder="—" /></div>
                </div>
              ))}
            </div>
          </Field>

          <Field label={`導師團隊快照（${form.mentorTeam.length} 人）`} hint="預設為導師，可個別調整為副導師">
            <MemberMultiSelect members={mentorOptions} selectedIds={form.mentorTeam.map(m => m.memberId)} onChange={updMentorTeam} />
            {form.mentorTeam.length > 0 && (
              <div className="mt-2 flex flex-wrap gap-1">
                {form.mentorTeam.map(m => {
                  const mem = members.find(x => x.id === m.memberId);
                  return (
                    <div key={m.memberId} className="inline-flex items-center gap-1 bg-stone-100 rounded-md px-2 py-1 text-xs">
                      <span>{mem?.name}</span>
                      <select value={m.role} onChange={e => setMentorRole(m.memberId, e.target.value)}
                        className="bg-transparent text-xs border-l border-stone-300 pl-1">
                        <option value="導師">導師</option>
                        <option value="副導師">副導師</option>
                      </select>
                    </div>
                  );
                })}
              </div>
            )}
          </Field>

          {hasAppliedDefaults && (
            <div className="mb-3 -mt-2">
              <button onClick={() => setTeamExpanded(false)} className="text-xs text-stone-500 hover:text-stone-700 underline">
                ↑ 收合團隊快照
              </button>
            </div>
          )}
        </>
      ) : (
        <div className="mb-4 p-3 bg-stone-50 border border-stone-200 rounded-lg text-xs text-stone-600">
          核心團隊 {form.coreTeam.filter(c => c.memberId).length} 職 · 導師團隊 {form.mentorTeam.length} 人 已套用預設，可按上方「調整此新生的團隊快照」展開編輯。
        </div>
      )}

      <div className="flex items-center justify-between pt-3 border-t border-stone-200">
        <div>
          {mentees.some(x => x.id === form.id) && onDelete && (
            <Btn variant="danger" size="sm" onClick={() => { if (confirm("確定刪除此新生紀錄？所有資料將遺失")) onDelete(form.id); }}>
              <Trash2 className="w-3.5 h-3.5" />刪除
            </Btn>
          )}
        </div>
        <div className="flex gap-2">
          <Btn variant="outline" onClick={onCancel}>取消</Btn>
          <Btn variant="primary" onClick={submit}><Save className="w-4 h-4" />儲存</Btn>
        </div>
      </div>
    </div>
  );
}

function MenteeDetail({ menteeId, mentees, members, currentUserId, isAdmin, mainCoffeeMeetings = [], onRefreshCoffee, coffeeSyncingAt, onUpdate, onBack, onEdit }) {
  const mentee = mentees.find(m => m.id === menteeId);
  const [sectionOpen, setSectionOpen] = useState({
    oneOnOne: true, passport: true, training: true,
    attendance: false, guests: false, coffee: false,
  });
  const [editMode, setEditMode] = useState(false);
  if (!mentee) return null;

  const getM = (id) => members.find(m => m.id === id);
  const canEdit = canEditMentee(mentee, currentUserId, isAdmin);
  const readOnly = !canEdit;
  const s = getMenteeStats(mentee, mainCoffeeMeetings);
  const primary = getM(mentee.mentorPrimaryId);
  const secondary = getM(mentee.mentorSecondaryId);
  const menteeMember = getM(mentee.memberId);
  const toggleSec = (k) => setSectionOpen(p => ({ ...p, [k]: !p[k] }));

  const markGraduated = () => {
    if (mentee.graduationDate) {
      if (!confirm("取消畢業狀態？")) return;
      onUpdate({ ...mentee, graduationDate: null, graduatedTeam: "" });
    } else {
      const team = prompt("畢業後加入的領導團隊？（選填）", "導師團隊") ?? "";
      onUpdate({ ...mentee, graduationDate: new Date().toISOString().slice(0, 10), graduatedTeam: team });
    }
  };

  const Section = ({ k, title, icon, right, children }) => (
    <div className="bg-white border border-stone-200 rounded-xl overflow-hidden">
      <button onClick={() => toggleSec(k)} className="w-full flex items-center justify-between px-4 py-3 hover:bg-stone-50">
        <div className="flex items-center gap-2">
          {icon}<span className="font-semibold text-stone-800">{title}</span>{right}
        </div>
        {sectionOpen[k] ? <ChevronDown className="w-4 h-4 text-stone-400" /> : <ChevronRight className="w-4 h-4 text-stone-400" />}
      </button>
      {sectionOpen[k] && <div className="px-4 pb-4">{children}</div>}
    </div>
  );

  const mainColor = mentee.graduationDate ? "#059669" : "#B8860B";

  return (
    <div className="space-y-4">
      <div className="flex items-center gap-2 flex-wrap">
        <Btn variant="ghost" size="sm" onClick={onBack}><ArrowLeft className="w-4 h-4" />返回</Btn>
        <h2 className="text-lg font-semibold text-stone-800 flex-1 truncate">
          {menteeMember?.name} · {mentee.representativeIndustry}
        </h2>
        {canEdit ? (
          <>
            {!editMode ? (
              <Btn variant="primary" size="sm" onClick={() => setEditMode(true)}>
                <Edit2 className="w-3.5 h-3.5" />進入編輯
              </Btn>
            ) : (
              <Btn variant="success" size="sm" onClick={() => setEditMode(false)}>
                <CheckCircle2 className="w-3.5 h-3.5" />完成編輯
              </Btn>
            )}
            <Btn variant="outline" size="sm" onClick={() => onEdit(mentee.id)}><Edit2 className="w-3.5 h-3.5" />基本資料</Btn>
            <Btn variant={mentee.graduationDate ? "outline" : "success"} size="sm" onClick={markGraduated}>
              <Award className="w-3.5 h-3.5" />{mentee.graduationDate ? "取消畢業" : "標記畢業"}
            </Btn>
          </>
        ) : <Tag color="#6b7280">唯讀</Tag>}
      </div>

      <div className="bg-gradient-to-br from-amber-50 to-white border border-amber-200 rounded-xl p-4">
        <div className="flex items-center gap-3 mb-3">
          <div className="relative flex-shrink-0">
            <ProgressDonut pct={s.overallPct} size={64} stroke={6} color={mainColor} />
            <div className="absolute inset-0 flex items-center justify-center text-base font-bold" style={{ color: mainColor }}>
              {s.overallPct}%
            </div>
          </div>
          <div className="flex-1 text-sm min-w-0">
            <div className="grid grid-cols-2 gap-y-1 gap-x-2">
              <div className="truncate"><span className="text-stone-500">宣誓：</span>{fmtDate(mentee.oathDate)}</div>
              {mentee.graduationDate && <div className="truncate"><span className="text-stone-500">結業：</span>{fmtDate(mentee.graduationDate)}</div>}
              <div className="truncate"><span className="text-stone-500">正導師：</span>{primary?.name || "—"}</div>
              <div className="truncate"><span className="text-stone-500">副導師：</span>{secondary?.name || "—"}</div>
              {mentee.graduatedTeam && <div className="col-span-2 truncate"><span className="text-stone-500">畢業加入：</span>{mentee.graduatedTeam}</div>}
            </div>
          </div>
