// ===== 按需動態載入 script（匯出功能才會用到的大庫 —— docx ~700KB, html2pdf ~650KB, jszip ~100KB, file-saver ~5KB）=====
const _loadedScripts = {};
function loadScript(url) {
  if (_loadedScripts[url]) return _loadedScripts[url];
  _loadedScripts[url] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => { delete _loadedScripts[url]; reject(new Error('載入失敗：' + url)); };
    document.head.appendChild(s);
  });
  return _loadedScripts[url];
}
async function ensureDocxLibs() {
  const tasks = [];
  if (!window.docx) tasks.push(loadScript('https://unpkg.com/docx@8.5.0/build/index.umd.js'));
  if (!window.JSZip) tasks.push(loadScript('https://unpkg.com/jszip@3.10.1/dist/jszip.min.js'));
  if (!window.saveAs) tasks.push(loadScript('https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js'));
  if (tasks.length) await Promise.all(tasks);
}
async function ensurePdfLibs() {
  const tasks = [];
  if (!window.html2pdf) tasks.push(loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js'));
  if (!window.saveAs) tasks.push(loadScript('https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js'));

// ===== Storage (Railway Proxy + JSONBin，與 Speaker Tracker 共用同一個 bin) =====
const PROXY_URL = window.BNI_PROXY_URL || '';

// SWR（Stale-While-Revalidate）快取（與 index.src.html 同一套，共用 localStorage）
const SWR_PREFIX = 'swr_cache_v1:';
function swrRead(key) {
  try {
    const raw = localStorage.getItem(SWR_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function swrWrite(key, value) {
  try { localStorage.setItem(SWR_PREFIX + key, JSON.stringify(value)); } catch {}
}
function swrDelete(key) {
  try { localStorage.removeItem(SWR_PREFIX + key); } catch {}
}
// SWR 版的原始 fetch：給 /api/groups 這類不走 apiClient 的端點用
async function swrFetchRaw(url, onFresh) {
  const cacheKey = 'raw:' + url;
  const cached = swrRead(cacheKey);
  const fetchIt = async () => {
    try {
      const r = await fetch(url);
      if (!r.ok) return null;
      const data = await r.json();
      swrWrite(cacheKey, data);
      return data;
    } catch { return null; }
  };
  if (cached) {
    (async () => {
      const fresh = await fetchIt();
      if (fresh && onFresh) {
        try { if (JSON.stringify(fresh) !== JSON.stringify(cached)) onFresh(fresh); } catch {}
      }
    })();
    return cached;
  }
  return (await fetchIt()) || {};
}

// 共享 PIN 取得邏輯：避免 3 個 useEffect 同時 401 時，prompt 跳 3 次
// 所有並發呼叫共用同一個 prompt，第一個輸入後其他人從 localStorage 拿到
let _pinAskingPromise = null;
async function obtainWritePin() {
  // 1. localStorage 已有 → 直接回（可能是別人剛 prompt 完並寫入）
  const cached = localStorage.getItem('bni_write_pin');
  if (cached) return cached;
  // 2. 已經有人在問 → 共用那個 promise
  if (_pinAskingPromise) return _pinAskingPromise;
  // 3. 第一個發問者：建 promise、彈 prompt、其他人都會等這個
  _pinAskingPromise = new Promise((resolve, reject) => {
    const pin = prompt('第一次寫入需要輸入「寫入 PIN」（與 Speaker Tracker 共用）：');
    if (pin) resolve(pin.trim());  // trim 避免前後空白
    else {
      // 明確告知使用者：你取消了，資料沒存到
      alert('⚠️ 你取消了 PIN 輸入\n\n你剛剛的修改「沒有」儲存到雲端。\n如果想保留變更，請重新編輯後再次儲存並輸入 PIN（888888）。');
      reject(new Error('已取消'));
    }
  });
  // 等所有當前 batch 的等待者都拿到結果後，下次 batch 才能再問
  _pinAskingPromise.finally(() => {
    setTimeout(() => { _pinAskingPromise = null; }, 0);
  });
  return _pinAskingPromise;
}

const apiClient = {
  // 第二參數 onFresh：背景拿到新版時的 callback（可選）
  async get(key, onFresh) {
    const cached = swrRead(key);
    const fetchFresh = async () => {
      try {
        const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(key));
        if (res.status === 404) { swrDelete(key); return null; }
        if (!res.ok) throw new Error('讀取失敗: ' + res.status);
        const json = await res.json();
        const result = json && json.value !== undefined ? { value: json.value } : null;
        if (result) swrWrite(key, result);
        return result;
      } catch (e) {
        console.error('[apiClient.get]', key, e);
        return null;
      }
    };
    if (cached) {
      (async () => {
        const fresh = await fetchFresh();
        if (fresh && onFresh) {
          try { if (JSON.stringify(fresh) !== JSON.stringify(cached)) onFresh(fresh); } catch {}
        }
      })();
      return cached;
    }
    return await fetchFresh();
  },
  async set(key, value) {
    const payload = typeof value === 'string' ? value : JSON.stringify(value);
    const tryWrite = async (pin) => fetch(PROXY_URL + '/api/data', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Write-PIN': pin || '' },
      body: JSON.stringify({ key, value: payload })
    });
    let pin = localStorage.getItem('bni_write_pin') || '';
    let res = await tryWrite(pin);
    if (res.status === 401) {
      // 取得 PIN —— 並發呼叫共用同一個 prompt，使用者只會被問 1 次
      const newPin = await obtainWritePin();
      res = await tryWrite(newPin);
      if (res.ok) { localStorage.setItem('bni_write_pin', newPin); }
      else { localStorage.removeItem('bni_write_pin'); alert('PIN 錯誤'); throw new Error('PIN 錯誤'); }
    }
    if (!res.ok) throw new Error('寫入失敗: ' + res.status);
    // 寫入成功後立刻更新 SWR 快取
    swrWrite(key, { value: payload });
    return { value };
  }
};

  MEETINGS: "bni_group_meetings_v1",
  MEMBERS: "bni_speaker_tracker_v5",         // 讀主檔的 members 欄位，不單獨寫
  MENTEES: "bni_mentees_v1",
  MENTORSHIP_DEFAULTS: "bni_mentorship_defaults_v1",  // 分會預設核心團隊 + 導師團隊 + 培訓日期
  DASHBOARD_CONFIG: "bni_dashboard_config_v1",        // 組聚表板時間範圍設定
  CHAPTER_CHALLENGE: "bni_chapter_challenge_v1",      // 小組競賽（期間 + 各組培訓達成手動標記）
  CURRENT_USER: null,                        // 身份用 localStorage 本地保存
};

// ============ 主站咖啡會議同步（安全寫入 bni_speaker_tracker_v5）============
// 只動 coffeeMeetings 欄位，其他主檔資料原封不動
// updateFn: (currentCoffeeMeetings) => newCoffeeMeetings
async function syncMainCoffeeMeetings(updateFn) {
  console.log("[syncMainCoffeeMeetings] 開始，讀取主站資料...");
  // 1. 先讀最新主站資料
  const res = await apiClient.get("bni_speaker_tracker_v5");
  console.log("[syncMainCoffeeMeetings] 讀到 res:", res ? `有（value 長度 ${res.value?.length ?? 'N/A'}）` : "null");
  if (!res || !res.value) {
    throw new Error("無法讀取主站資料（回傳空）");
  }
  let mainData;
  try {
    // 相容兩種：value 是字串（已 stringify）或已是物件
    mainData = typeof res.value === "string" ? JSON.parse(res.value) : res.value;
  } catch (e) {
    console.error("[syncMainCoffeeMeetings] 解析失敗:", e, "前 200 字元:", String(res.value).slice(0, 200));
    throw new Error("主站資料解析失敗: " + e.message);
  }
  if (!mainData || typeof mainData !== "object") throw new Error("主站資料格式錯誤（非物件）");

  // 2. 套用更新（僅 coffeeMeetings 欄位）
  const current = Array.isArray(mainData.coffeeMeetings) ? mainData.coffeeMeetings : [];
  console.log("[syncMainCoffeeMeetings] 主站原有 coffeeMeetings 筆數:", current.length);
  const updated = updateFn(current);
  if (!Array.isArray(updated)) throw new Error("updateFn 必須回傳陣列");
  console.log("[syncMainCoffeeMeetings] 更新後 coffeeMeetings 筆數:", updated.length);

  // 3. 寫回（其他欄位保持原樣）
  const newMain = { ...mainData, coffeeMeetings: updated, updatedAt: new Date().toISOString() };
  console.log("[syncMainCoffeeMeetings] 寫回 bni_speaker_tracker_v5...");
  await apiClient.set("bni_speaker_tracker_v5", JSON.stringify(newMain));
  console.log("[syncMainCoffeeMeetings] ✓ 寫回完成");
}

// ============ 小組顏色 palette ============
const GROUP_COLORS = ["#B8860B", "#8B1A1A", "#2D5A27", "#6B4C8A", "#8B6F47", "#1E5A8A", "#A0522D", "#556B2F"];

// ============ 組聚匯出工具 ============
// 檔名安全化
function safeFilename(s) {
  return String(s || "").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, "").slice(0, 80);
}

// 建立組聚的文字內容結構，Word 與 PDF 共用這個資料
function buildMeetingContent(meeting, group, members) {
  const getMember = (id) => members.find(m => m.id === id);
  const memberName = (id) => getMember(id)?.name || "（未知成員）";
  const memberLabel = (id) => {
    const m = getMember(id);
    return m ? (m.industry ? `${m.name}（${m.industry}）` : m.name) : "（未知成員）";
  };

  const dateStr = meeting.date ? new Date(meeting.date).toLocaleDateString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit" }) : "";
  const timeStr = meeting.time || "";
  const attendeesNames = (meeting.attendees || []).map(memberName).join("、");
  const absenteesNames = (meeting.absentees || []).map(memberName).join("、");
  const scribeName = meeting.scribe ? memberName(meeting.scribe) : "";

  // 主講人（多位）：每位主講人各自帶 openers/feedback/connections/grid
  // 舊單主講結構（meeting.speaker + meeting.conversationOpeners + meeting.feedback + meeting.neededConnections）相容
  let speakers = Array.isArray(meeting.speakers) ? meeting.speakers : [];
  if (speakers.length === 0 && (meeting.speaker?.memberId || meeting.speaker?.topic
      || (meeting.conversationOpeners || []).length || (meeting.feedback || []).length
      || (meeting.neededConnections || []).length)) {
    speakers = [{
      id: "legacy_speaker",
      memberId: meeting.speaker?.memberId || "",
      topic: meeting.speaker?.topic || "",
      conversationOpeners: meeting.conversationOpeners || [],
      feedback: meeting.feedback || [],
      neededConnections: meeting.neededConnections || [],
      collaborationGrid: { centerProfile: "", cells: ["", "", "", "", "", "", "", ""] },
    }];
  }
  // 過濾：只匯出有實質內容的主講人（避免使用者誤按 + 後留下空白卡）
  speakers = speakers.filter(sp => {
    const hasIdentity = !!sp.memberId || !!(sp.topic || "").trim();
    const hasOpeners = (sp.conversationOpeners || []).some(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim);
    const hasFeedback = (sp.feedback || []).some(f => f.content);
    const hasConnections = (sp.neededConnections || []).some(nc => nc.profileWanted || (nc.offers || []).length);
    const grid = sp.collaborationGrid;
    const hasGrid = grid && (grid.centerProfile || (grid.cells || []).some(c => c));
    return hasIdentity || hasOpeners || hasFeedback || hasConnections || hasGrid;
  });

  const isChapter = isChapterMeeting(meeting);

  // 來賓資料整理（用於合併到組員 sharings / feedback）
  const guestList = (meeting.guests || []).map(g => {
    const kind = g.kind || "member";
    const linked = kind === "member" && g.memberId ? getMember(g.memberId) : null;
    const displayName = kind === "member"
      ? (linked ? linked.name : "（未選擇會員）")
      : (g.name || "（未填姓名）");
    return {
      name: displayName,
      sharing: g.sharing || "",
      feedback: g.feedback || "",
    };
  });
  // 多主講人時，來賓的 feedback 歸給「第一位主講人」（單一主講人時自動成立）；
  // 若沒有任何主講人，guest feedback 不顯示在主講人區塊（保留在來賓自己區塊就好）
  const firstSpeakerIdx = speakers.length > 0 ? 0 : -1;

  return {
    isChapter,
    meta: {
      groupName: isChapter ? CHAPTER_GROUP_NAME : (group?.name || "未知小組"),
      date: dateStr,
      time: timeStr,
      location: meeting.location || "",
      scribeName,
      attendeesNames,
      absenteesNames,
      attendeeCount: (meeting.attendees || []).length,
      absenteeCount: (meeting.absentees || []).length,
    },
    // 成長/喜悅：組員 + 有填內容的來賓
    sharings: [
      ...(meeting.sharings || []).map(s => ({
        name: memberName(s.memberId),
        content: s.content || "",
        isGuest: false,
      })),
      ...guestList.filter(g => g.sharing).map(g => ({
        name: g.name,
        content: g.sharing,
        isGuest: true,
      })),
    ],
    resourceShares: (meeting.resourceShares || []).map(r => ({
      name: memberName(r.memberId),
      industry: getMember(r.memberId)?.industry || "",
      needs: r.needs || "",
      offers: r.offers || "",
    })).filter(r => r.needs || r.offers),
    speakers: speakers.map((sp, spIdx) => ({
      name: sp.memberId ? memberLabel(sp.memberId) : "",
      topic: sp.topic || "",
      conversationOpeners: (sp.conversationOpeners || [])
        .filter(o => o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim)
        .map(o => ({
          who: o.who || "", yesno: o.yesno || "", tagline: o.tagline || "",
          painSolution: o.painSolution || "", cta: o.cta || "", verbatim: o.verbatim || "",
        })),
      feedback: [
        // 組員的建議
        ...(sp.feedback || []).map(f => ({
          from: memberName(f.fromMemberId),
          content: f.content || "",
          isGuest: false,
        })),
        // 第一位主講人合進有填 feedback 的來賓
        ...(spIdx === firstSpeakerIdx
          ? guestList.filter(g => g.feedback).map(g => ({
              from: g.name,
              content: g.feedback,
              isGuest: true,
            }))
          : []),
      ].filter(f => f.content),
      neededConnections: (sp.neededConnections || []).map(nc => ({
        profileWanted: nc.profileWanted || "",
        offers: (nc.offers || []).map(of => ({
          introducer: of.introducerId ? memberName(of.introducerId) : "",
          contactName: of.contactName || "",
          contactProfession: of.contactProfession || "",
          status: of.status || "pending",
        })),
      })),
      collaborationGrid: sp.collaborationGrid && (sp.collaborationGrid.centerProfile || (sp.collaborationGrid.cells || []).some(c => c))
        ? {
            centerProfile: sp.collaborationGrid.centerProfile || "",
            cells: [...(sp.collaborationGrid.cells || []), "", "", "", "", "", "", "", ""].slice(0, 8),
          }
        : null,
    })),
    // 來賓清單 — 僅顯示「身分 + 其他回饋」，sharing/feedback 已合併到組員區塊
    guests: (meeting.guests || []).map(g => {
      const kind = g.kind || "member";
      const linked = kind === "member" && g.memberId ? getMember(g.memberId) : null;
      const displayName = kind === "member"
        ? (linked ? linked.name : "（未選擇會員）")
        : (g.name || "（未填姓名）");
      const displayIndustry = kind === "member"
        ? (linked?.industry || "")
        : (g.industry || "");
      const sourceLabel = kind === "member"
        ? (isChapterMeeting(meeting) ? "分會會員（非出席）" : "分會別組會員")
        : (g.fromChapter ? `外部 · ${g.fromChapter}` : "外部來賓");
      const hasValidIdentity = kind === "member" ? !!linked : !!g.name;
      return {
        name: displayName,
        industry: displayIndustry,
        sourceLabel,
        kind,
        hasValidIdentity,
        otherFeedback: g.otherFeedback || "",
      };
    }).filter(g => g.otherFeedback || g.hasValidIdentity),
    referrals: (meeting.referrals || []).map(r => ({
      from: memberName(r.fromMemberId),
      to: memberName(r.toMemberId),
      referralName: r.referralName || "",
      content: r.content || "",
      amount: Number(r.amount) || 0,
    })),
    referralTotal: (meeting.referrals || []).reduce((s, r) => s + (Number(r.amount) || 0), 0),
    nextMeeting: meeting.nextMeeting || {},
  };
}

// 產出 Word .docx（使用 docx.js UMD 全域 window.docx）
async function exportMeetingDocx(meeting, group, members) {
  await ensureDocxLibs();
  if (!window.docx) { alert("Word 匯出功能未就緒（docx 庫載入失敗）"); return null; }
  const d = window.docx;
  const c = buildMeetingContent(meeting, group, members);

  // 常用樣式
  const RED = "8B1A1A";
  const GOLD = "B8860B";
  const DARK = "1A1414";
  const FONT = "標楷體";

  const txt = (text, opts = {}) => new d.TextRun({ text: String(text || ""), font: FONT, size: 22, ...opts });
  const p = (children, opts = {}) => new d.Paragraph({ children: Array.isArray(children) ? children : [children], spacing: { after: 80 }, ...opts });
  const hr = () => new d.Paragraph({ border: { bottom: { color: "CCCCCC", size: 6, style: "single" } }, spacing: { before: 60, after: 120 } });
  const h1 = (text, color = RED) => new d.Paragraph({
    children: [new d.TextRun({ text, font: FONT, size: 36, bold: true, color })],
    spacing: { before: 120, after: 120 },
    alignment: d.AlignmentType.CENTER,
  });
  const h2 = (text, emoji = "") => new d.Paragraph({
    children: [new d.TextRun({ text: (emoji ? emoji + " " : "") + text, font: FONT, size: 26, bold: true, color: RED })],
    spacing: { before: 200, after: 100 },
    border: { bottom: { color: RED, size: 10, style: "single" } },
  });
  const bullet = (text) => new d.Paragraph({
    children: [txt(text)],
    bullet: { level: 0 },
    spacing: { after: 40 },
  });
  const kv = (k, v) => new d.Paragraph({
    children: [
      new d.TextRun({ text: (k || "") + "：", font: FONT, size: 22, bold: true, color: DARK }),
      new d.TextRun({ text: String(v || "—"), font: FONT, size: 22, color: DARK }),
    ],
    spacing: { after: 40 },
  });

  const children = [];
  children.push(h1(c.isChapter ? "BNI 富鼎分會 全分會會議記錄" : "BNI 富鼎分會 組聚記錄"));
  children.push(new d.Paragraph({
    children: [new d.TextRun({ text: `${c.meta.groupName} · ${c.meta.date}${c.meta.time ? " " + c.meta.time : ""}`, font: FONT, size: 24, color: GOLD })],
    alignment: d.AlignmentType.CENTER,
    spacing: { after: 200 },
  }));

  // 基本資訊
  children.push(h2("基本資訊", "📋"));
  children.push(kv("小組", c.meta.groupName));
  children.push(kv("日期", c.meta.date));
  if (c.meta.time) children.push(kv("時間", c.meta.time));
  if (c.meta.location) children.push(kv("地點", c.meta.location));
  if (c.meta.scribeName) children.push(kv("記錄", c.meta.scribeName));
  children.push(kv("出席", `${c.meta.attendeesNames || "—"}（${c.meta.attendeeCount} 人）`));
  // 缺席：依使用者偏好，不顯示在組聚記錄中（資料仍保留在 meeting.absentees 供統計用）

  // 成長/喜悅分享（含合併進來的來賓 sharings）
  if (c.sharings.length) {
    children.push(h2("成長/喜悅分享", "💬"));
    c.sharings.forEach(s => {
      const labelText = s.name + (s.isGuest ? "（來賓）" : "") + "：";
      children.push(new d.Paragraph({
        children: [
          new d.TextRun({ text: labelText, font: FONT, size: 22, bold: true, color: s.isGuest ? "059669" : undefined }),
          txt(s.content),
        ],
        spacing: { after: 80 },
      }));
    });
  }

  // 來賓清單（成長/喜悅 跟 對主講人建議 已合併到組員區塊；這裡只列身分 + 其他回饋）
  if (c.guests && c.guests.length) {
    children.push(h2("來賓", "🎫"));
    c.guests.forEach((g, i) => {
      const header = [
        new d.TextRun({ text: `${i + 1}. ${g.name}`, font: FONT, size: 24, bold: true, color: "059669" }),
      ];
      if (g.industry) header.push(new d.TextRun({ text: `（${g.industry}）`, font: FONT, size: 22, color: DARK }));
      header.push(new d.TextRun({ text: `　· ${g.sourceLabel}`, font: FONT, size: 20, color: "888888" }));
      children.push(new d.Paragraph({ children: header, spacing: { before: 80, after: 40 } }));
      if (g.otherFeedback) {
        children.push(new d.Paragraph({
          children: [
            new d.TextRun({ text: "📝 其他回饋：", font: FONT, size: 22, bold: true, color: DARK }),
            txt(g.otherFeedback),
          ],
          spacing: { after: 80 },
        }));
      }
    });
  }

  // 資源需求/提供（全分會專用）
  if (c.resourceShares && c.resourceShares.length) {
    children.push(h2("資源需求/提供", "🔄"));
    c.resourceShares.forEach((r, i) => {
      const header = [
        new d.TextRun({ text: `${i + 1}. ${r.name}`, font: FONT, size: 24, bold: true, color: "059669" }),
      ];
      if (r.industry) header.push(new d.TextRun({ text: `（${r.industry}）`, font: FONT, size: 22, color: DARK }));
      children.push(new d.Paragraph({ children: header, spacing: { before: 80, after: 40 } }));
      if (r.needs) children.push(new d.Paragraph({
        children: [new d.TextRun({ text: "💼 需要的資源：", font: FONT, size: 22, bold: true, color: DARK }), txt(r.needs)],
        spacing: { after: 40 },
      }));
      if (r.offers) children.push(new d.Paragraph({
        children: [new d.TextRun({ text: "🎁 可提供的資源：", font: FONT, size: 22, bold: true, color: DARK }), txt(r.offers)],
        spacing: { after: 60 },
      }));
    });
  }

  // 主講人專業簡報（多位）
  if (c.speakers && c.speakers.length) {
    children.push(h2("主講人專業簡報", "🎤"));
    c.speakers.forEach((sp, spIdx) => {
      const headerParts = [];
      if (c.speakers.length > 1) headerParts.push(new d.TextRun({ text: `【主講人 ${spIdx + 1}】 `, font: FONT, size: 26, bold: true, color: GOLD }));
      headerParts.push(new d.TextRun({ text: sp.name || "（未指定）", font: FONT, size: 26, bold: true, color: RED }));
      // 組聚：簡報標題 inline；全分會：另起區塊（因為案例分享是多行長文）
      if (sp.topic && !c.isChapter) headerParts.push(new d.TextRun({ text: ` ｜ ${sp.topic}`, font: FONT, size: 24, color: DARK }));
      children.push(new d.Paragraph({ children: headerParts, spacing: { before: 200, after: 100 }, border: { bottom: { color: GOLD, size: 8, style: "single" } } }));

      // 全分會的「已完成案例的分享」獨立段落
      if (c.isChapter && sp.topic) {
        children.push(new d.Paragraph({
          children: [new d.TextRun({ text: "📋 已完成案例的分享", font: FONT, size: 24, bold: true, color: RED })],
          spacing: { before: 80, after: 40 },
        }));
        String(sp.topic).split(/\r?\n/).forEach(line => {
          children.push(new d.Paragraph({
            children: [new d.TextRun({ text: line, font: FONT, size: 22, color: DARK })],
            spacing: { after: 20 },
          }));
        });
      }

      // 開啟對話
      if (sp.conversationOpeners.length) {
        children.push(new d.Paragraph({
          children: [new d.TextRun({ text: "🗣️ 開啟對話", font: FONT, size: 24, bold: true, color: RED })],
          spacing: { before: 100, after: 60 },
        }));
        sp.conversationOpeners.forEach((o, i) => {
          children.push(new d.Paragraph({
            children: [new d.TextRun({ text: `目標客群 ${i + 1}`, font: FONT, size: 22, bold: true, color: GOLD })],
            spacing: { before: 60, after: 30 },
          }));
          if (o.who) children.push(kv("WHO｜我的客戶是", o.who));
          if (o.yesno) children.push(kv("YES/NO 問題", o.yesno));
          if (o.tagline) children.push(kv("介紹夥伴", o.tagline));
          if (o.painSolution) children.push(kv("痛點解決", o.painSolution));
          if (o.cta) children.push(kv("對接方式", o.cta));
          if (o.verbatim) {
            children.push(new d.Paragraph({
              children: [new d.TextRun({ text: "完整逐字稿：", font: FONT, size: 22, bold: true, color: DARK })],
              spacing: { before: 30, after: 20 },
            }));
            String(o.verbatim).split(/\r?\n/).forEach(line => {
              children.push(new d.Paragraph({ children: [txt(line)], spacing: { after: 20 } }));
            });
          }
        });
      }

      // 對主講人建議（含合併進來的來賓 feedback，標 [來賓]）
      if (sp.feedback.length) {
        children.push(new d.Paragraph({
          children: [new d.TextRun({ text: `💡 對 ${sp.name || "主講人"} 的建議`, font: FONT, size: 24, bold: true, color: RED })],
          spacing: { before: 100, after: 60 },
        }));
        sp.feedback.forEach((f, i) => {
          const labelText = `${i + 1}. ${f.from}${f.isGuest ? "（來賓）" : ""}：`;
          children.push(new d.Paragraph({
            children: [
              new d.TextRun({ text: labelText, font: FONT, size: 22, bold: true, color: f.isGuest ? "059669" : undefined }),
              txt(f.content),
            ],
            spacing: { after: 40 },
          }));
        });
      }

      // 九宮格合作圖（先腦力激盪 → 再到具體人脈需求）
      if (sp.collaborationGrid) {
        children.push(new d.Paragraph({
          children: [new d.TextRun({ text: `🔲 ${sp.name || "主講人"} 合作專業九宮格`, font: FONT, size: 24, bold: true, color: RED })],
          spacing: { before: 100, after: 60 },
        }));
        const cells = sp.collaborationGrid.cells;
        const center = sp.collaborationGrid.centerProfile;
        const cellTxt = (text, isCenter) => new d.TableCell({
          children: [new d.Paragraph({
            children: [
              new d.TextRun({ text: isCenter ? (sp.name || "主講人") + "\n" : "", font: FONT, size: 18, bold: true, color: GOLD }),
              new d.TextRun({ text: text || "", font: FONT, size: 18, color: DARK }),
            ],
            alignment: d.AlignmentType.CENTER,
          })],
          width: { size: 33, type: d.WidthType.PERCENTAGE },
          shading: isCenter ? { fill: "FEF3C7" } : undefined,
        });
        const rows = [
          new d.TableRow({ children: [cellTxt(cells[0]), cellTxt(cells[1]), cellTxt(cells[2])] }),
          new d.TableRow({ children: [cellTxt(cells[7]), cellTxt(center, true), cellTxt(cells[3])] }),
          new d.TableRow({ children: [cellTxt(cells[6]), cellTxt(cells[5]), cellTxt(cells[4])] }),
        ];
        children.push(new d.Table({
          rows,
          width: { size: 100, type: d.WidthType.PERCENTAGE },
        }));
        children.push(new d.Paragraph({ children: [txt(" ")], spacing: { after: 100 } }));
      }

      // 主講人需要的合作人脈
      if (sp.neededConnections.length) {
        children.push(new d.Paragraph({
          children: [new d.TextRun({ text: `🤝 ${sp.name || "主講人"} 需要的合作人脈`, font: FONT, size: 24, bold: true, color: RED })],
          spacing: { before: 100, after: 60 },
        }));
        sp.neededConnections.forEach((nc, i) => {
          children.push(new d.Paragraph({
            children: [new d.TextRun({ text: `需求 ${i + 1}：${nc.profileWanted}`, font: FONT, size: 22, bold: true, color: GOLD })],
            spacing: { before: 60, after: 30 },
          }));
          if (nc.offers.length === 0) {
            children.push(bullet("（尚無引薦）"));
          } else {
            nc.offers.forEach(of => {
              const parts = [];
              if (of.introducer) parts.push(`${of.introducer} 有人脈`);
              if (of.contactName) parts.push(of.contactName);
              if (of.contactProfession) parts.push(`（${of.contactProfession}）`);
              if (of.status === "imported") parts.push("[已匯入咖啡會議]");
              children.push(bullet(parts.join(" ") || "—"));
            });
          }
        });
      }
    });
  }

  // 引薦（全分會不顯示）
  if (!c.isChapter && c.referrals.length) {
    children.push(h2("小組內引薦", "🎯"));
    c.referrals.forEach((r, i) => {
      const amount = r.amount > 0 ? ` · 成交 NT$ ${r.amount.toLocaleString()}` : "";
      children.push(new d.Paragraph({
        children: [
          new d.TextRun({ text: `${i + 1}. `, font: FONT, size: 22, bold: true }),
          new d.TextRun({ text: `${r.from} → ${r.to}`, font: FONT, size: 22, bold: true, color: RED }),
          txt(`：${r.referralName || "—"}${amount}`),
        ],
        spacing: { after: 30 },
      }));
      if (r.content) {
        children.push(new d.Paragraph({
          children: [txt("　　" + r.content, { color: "555555" })],
          spacing: { after: 60 },
        }));
      }
    });
    if (c.referralTotal > 0) {
      children.push(new d.Paragraph({
        children: [new d.TextRun({ text: `本次引薦總額：NT$ ${c.referralTotal.toLocaleString()}`, font: FONT, size: 24, bold: true, color: RED })],
        alignment: d.AlignmentType.RIGHT,
        spacing: { before: 80, after: 100 },
      }));
    }
  }

  // 下次組聚（全分會不顯示）
  const nextSpeakerName = c.nextMeeting.nextSpeakerId ? memberName(c.nextMeeting.nextSpeakerId) : "";
  if (!c.isChapter && (c.nextMeeting.date || c.nextMeeting.time || c.nextMeeting.location || nextSpeakerName)) {
    children.push(h2("下次組聚", "📅"));
    if (c.nextMeeting.date) children.push(kv("日期", c.nextMeeting.date));
    if (c.nextMeeting.time) children.push(kv("時間", c.nextMeeting.time));
    if (c.nextMeeting.location) children.push(kv("地點", c.nextMeeting.location));
    if (nextSpeakerName) children.push(kv("下次主講人", nextSpeakerName));
  }

  // 頁尾
  const doc = new d.Document({
    styles: {
      default: {
        document: { run: { font: FONT, size: 22 } },
      },
    },
    sections: [{
      properties: { page: { margin: { top: 1000, right: 1000, bottom: 1000, left: 1000 } } },
      headers: {
        default: new d.Header({
          children: [new d.Paragraph({
            alignment: d.AlignmentType.RIGHT,
            children: [new d.TextRun({ text: c.isChapter ? "BNI 富鼎分會 · 全分會會議記錄" : "BNI 富鼎分會 · 組聚記錄", font: FONT, size: 18, color: "888888" })],
          })],
        }),
      },
      footers: {
        default: new d.Footer({
          children: [new d.Paragraph({
            alignment: d.AlignmentType.CENTER,
            children: [
              new d.TextRun({ text: "第 ", font: FONT, size: 20 }),
              new d.TextRun({ children: [d.PageNumber.CURRENT], font: FONT, size: 20 }),
              new d.TextRun({ text: " 頁／共 ", font: FONT, size: 20 }),
              new d.TextRun({ children: [d.PageNumber.TOTAL_PAGES], font: FONT, size: 20 }),
              new d.TextRun({ text: " 頁", font: FONT, size: 20 }),
            ],
          })],
        }),
      },
      children,
    }],
  });

  return d.Packer.toBlob(doc);
}

// 產出會議記錄 HTML 片段（body 內容），供 PDF 列印使用
// 樣式 inline，避免離屏 div 拿不到外部 style
function buildMeetingHtml(meeting, group, members) {
  const c = buildMeetingContent(meeting, group, members);
  const esc = (s) => String(s || "").replace(/[&<>"']/g, ch =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

  // inline style helpers
  const S = {
    root: 'font-family:"標楷體","DFKai-SB","BiauKai",serif;color:#1A1414;font-size:12pt;line-height:1.6;padding:20px;background:white;width:100%;',
    h1: 'color:#8B1A1A;text-align:center;font-size:20pt;margin:0 0 5px;font-weight:bold;',
    subtitle: 'color:#B8860B;text-align:center;font-size:13pt;margin:0 0 20px;',
    h2: 'color:#8B1A1A;font-size:14pt;border-bottom:2px solid #8B1A1A;padding-bottom:3px;margin:18px 0 8px;font-weight:bold;',
    section: 'margin-bottom:10px;page-break-inside:avoid;',
    kv: 'margin:3px 0;',
    item: 'margin:5px 0;',
    sub: 'padding-left:2em;color:#555;font-size:11pt;margin-top:2px;',
    fromto: 'color:#8B1A1A;font-weight:bold;',
    amount: 'color:#8B1A1A;font-weight:600;',
    ncBlock: 'margin:8px 0;',
    ncTitle: 'color:#B8860B;font-weight:bold;margin-bottom:3px;',
    ncList: 'margin:4px 0 4px 1.5em;padding:0;',
    ncLi: 'margin:2px 0;',
    ncLiEmpty: 'color:#888;list-style:none;margin:2px 0;',
    imported: 'color:#4A6741;font-size:10pt;',
    total: 'text-align:right;color:#8B1A1A;font-weight:bold;font-size:13pt;margin-top:10px;border-top:1px solid #B8860B;padding-top:5px;',
    statusDone: 'color:#4A6741;',
    statusPending: 'color:#B8860B;',
  };

  const section = (title, emoji, body) => body
    ? `<div style="${S.section}"><div style="${S.h2}">${emoji} ${title}</div>${body}</div>`
    : "";
  const kv = (k, v) => `<div style="${S.kv}"><b>${esc(k)}：</b>${esc(v || "—")}</div>`;

  let sharingsBlock = "";
  if (c.sharings.length) {
    sharingsBlock = c.sharings.map(s => {
      const tag = s.isGuest ? `<span style="color:#059669;font-weight:bold;font-size:10pt;">（來賓）</span>` : "";
      return `<div style="${S.item}"><b${s.isGuest ? ` style="color:#059669;"` : ""}>${esc(s.name)}${tag}：</b>${esc(s.content)}</div>`;
    }).join("");
  }

  let guestsBlock = "";
  if (c.guests && c.guests.length) {
    guestsBlock = c.guests.map((g, i) => {
      const title = `${i + 1}. <b style="color:#059669;">${esc(g.name)}</b>`
        + (g.industry ? `（${esc(g.industry)}）` : "")
        + ` <span style="color:#888;font-size:10pt;">· ${esc(g.sourceLabel)}</span>`;
      const rows = [];
      if (g.otherFeedback) rows.push(`<div style="${S.item}"><b>📝 其他回饋：</b>${esc(g.otherFeedback)}</div>`);
      return `<div style="${S.ncBlock}"><div style="${S.ncTitle}">${title}</div>${rows.join("")}</div>`;
    }).join("");
  }

  let resourceSharesBlock = "";
  if (c.resourceShares && c.resourceShares.length) {
    resourceSharesBlock = c.resourceShares.map((r, i) => {
      const title = `${i + 1}. <b style="color:#059669;">${esc(r.name)}</b>`
        + (r.industry ? `（${esc(r.industry)}）` : "");
      const rows = [];
      if (r.needs) rows.push(`<div style="${S.item}"><b>💼 需要的資源：</b>${esc(r.needs)}</div>`);
      if (r.offers) rows.push(`<div style="${S.item}"><b>🎁 可提供的資源：</b>${esc(r.offers)}</div>`);
      return `<div style="${S.ncBlock}"><div style="${S.ncTitle}">${title}</div>${rows.join("")}</div>`;
    }).join("");
  }

  // 主講人多位：每位生成一個獨立區塊，內含主題、開啟對話、建議、人脈、九宮格
  let speakersBlock = "";
  if (c.speakers && c.speakers.length) {
    speakersBlock = c.speakers.map((sp, spIdx) => {
      // 組聚：標題 inline 顯示主題；全分會：標題只顯示姓名，案例分享另開獨立區塊
      const inlineTopic = (sp.topic && !c.isChapter) ? esc(sp.topic) : "";
      const heading = c.speakers.length > 1
        ? `<div style="background:#FEF3C7;color:#8B1A1A;padding:6px 10px;font-weight:bold;font-size:13pt;border-left:4px solid #B8860B;margin:12px 0 8px;">【主講人 ${spIdx + 1}】 ${esc(sp.name || "（未指定）")}${inlineTopic ? `　｜　${inlineTopic}` : ""}</div>`
        : `<div style="${S.ncTitle}">${esc(sp.name || "（未指定）")}${inlineTopic ? ` ｜ ${inlineTopic}` : ""}</div>`;
      const parts = [heading];

      // 全分會：已完成案例的分享 獨立區塊
      if (c.isChapter && sp.topic) {
        parts.push(`<div style="margin:8px 0 4px;font-weight:bold;color:#8B1A1A;">📋 已完成案例的分享</div>`);
        parts.push(`<div style="white-space:pre-wrap;color:#333;font-size:11pt;background:#FFF8E1;padding:8px;border-left:3px solid #B8860B;border-radius:4px;margin-bottom:8px;">${esc(sp.topic)}</div>`);
      }

      // 開啟對話
      if (sp.conversationOpeners.length) {
        parts.push(`<div style="margin:8px 0 4px;font-weight:bold;color:#8B1A1A;">🗣️ 開啟對話</div>`);
        sp.conversationOpeners.forEach((o, i) => {
          const rows = [];
          if (o.who) rows.push(kv("WHO｜我的客戶是", o.who));
          if (o.yesno) rows.push(kv("YES/NO 問題", o.yesno));
          if (o.tagline) rows.push(kv("介紹夥伴", o.tagline));
          if (o.painSolution) rows.push(kv("痛點解決", o.painSolution));
          if (o.cta) rows.push(kv("對接方式", o.cta));
          const verbatim = o.verbatim
            ? `<div style="margin-top:4px;padding-top:4px;border-top:1px dashed #ccc;"><b>完整逐字稿：</b><div style="white-space:pre-wrap;color:#555;font-size:11pt;margin-top:2px;">${esc(o.verbatim)}</div></div>`
            : "";
          parts.push(`<div style="${S.ncBlock}"><div style="${S.ncTitle}">目標客群 ${i + 1}</div>${rows.join("")}${verbatim}</div>`);
        });
      }

      // 對主講人建議（含合併進來的來賓 feedback，標 [來賓]）
      if (sp.feedback.length) {
        parts.push(`<div style="margin:8px 0 4px;font-weight:bold;color:#8B1A1A;">💡 對 ${esc(sp.name || "主講人")} 的建議</div>`);
        sp.feedback.forEach((f, i) => {
          const tag = f.isGuest ? `<span style="color:#059669;font-size:10pt;">（來賓）</span>` : "";
          parts.push(`<div style="${S.item}">${i + 1}. <b${f.isGuest ? ` style="color:#059669;"` : ""}>${esc(f.from)}${tag}：</b>${esc(f.content)}</div>`);
        });
      }

      // 九宮格合作圖（先腦力激盪 → 再到具體人脈需求）
      if (sp.collaborationGrid) {
        const cells = sp.collaborationGrid.cells;
        const center = sp.collaborationGrid.centerProfile;
        const cellStyle = "border:1px solid #B8860B;padding:8px;text-align:center;width:33%;height:60px;vertical-align:middle;";
        const centerStyle = "border:2px solid #B8860B;padding:8px;text-align:center;width:33%;height:60px;vertical-align:middle;background:#FEF3C7;font-weight:bold;";
        parts.push(`<div style="margin:8px 0 4px;font-weight:bold;color:#8B1A1A;">🔲 ${esc(sp.name || "主講人")} 合作專業九宮格</div>`);
        parts.push(`<table style="border-collapse:collapse;width:100%;max-width:480px;margin:8px auto;">
          <tr><td style="${cellStyle}">${esc(cells[0])}</td><td style="${cellStyle}">${esc(cells[1])}</td><td style="${cellStyle}">${esc(cells[2])}</td></tr>
          <tr><td style="${cellStyle}">${esc(cells[7])}</td><td style="${centerStyle}"><div style="color:#B8860B;font-size:11pt;">${esc(sp.name || "主講人")}</div><div style="color:#1A1414;font-size:10pt;">${esc(center)}</div></td><td style="${cellStyle}">${esc(cells[3])}</td></tr>
          <tr><td style="${cellStyle}">${esc(cells[6])}</td><td style="${cellStyle}">${esc(cells[5])}</td><td style="${cellStyle}">${esc(cells[4])}</td></tr>
        </table>`);
      }

      // 主講人需要的合作人脈
      if (sp.neededConnections.length) {
        parts.push(`<div style="margin:8px 0 4px;font-weight:bold;color:#8B1A1A;">🤝 ${esc(sp.name || "主講人")} 需要的合作人脈</div>`);
        sp.neededConnections.forEach((nc, i) => {
          const offersHtml = nc.offers.length ? nc.offers.map(of => {
            const opieces = [];
            if (of.introducer) opieces.push(`${esc(of.introducer)} 有人脈`);
            if (of.contactName) opieces.push(esc(of.contactName));
            if (of.contactProfession) opieces.push(`（${esc(of.contactProfession)}）`);
            if (of.status === "imported") opieces.push(`<span style="${S.imported}">[已匯入咖啡會議]</span>`);
            return `<li style="${S.ncLi}">${opieces.join(" ")}</li>`;
          }).join("") : `<li style="${S.ncLiEmpty}">（尚無引薦）</li>`;
          parts.push(`<div style="${S.ncBlock}"><div style="${S.ncTitle}">需求 ${i + 1}：${esc(nc.profileWanted)}</div><ul style="${S.ncList}">${offersHtml}</ul></div>`);

      }

      return parts.join("");
    }).join("");
  }

  let referralsBlock = "";
  if (c.referrals.length) {
    const rows = c.referrals.map((r, i) => {
      const amt = r.amount > 0 ? `<span style="${S.amount}">成交 NT$ ${r.amount.toLocaleString()}</span>` : "";
      return `<div style="${S.item}">
        ${i + 1}. <span style="${S.fromto}">${esc(r.from)} → ${esc(r.to)}</span>：${esc(r.referralName || "—")} ${amt}
        ${r.content ? `<div style="${S.sub}">${esc(r.content)}</div>` : ""}

    }).join("");
    const total = c.referralTotal > 0
      ? `<div style="${S.total}">本次引薦總額：NT$ ${c.referralTotal.toLocaleString()}</div>` : "";
    referralsBlock = rows + total;

  let nextBlock = "";
  const nextSpName = c.nextMeeting.nextSpeakerId ? (members.find(m => m.id === c.nextMeeting.nextSpeakerId)?.name || "") : "";
  if (c.nextMeeting.date || c.nextMeeting.time || c.nextMeeting.location || nextSpName) {
    nextBlock = (c.nextMeeting.date ? kv("日期", c.nextMeeting.date) : "")

      + (nextSpName ? kv("下次主講人", nextSpName) : "");
  }

  return `<div style="${S.root}">
<div style="${S.h1}">${c.isChapter ? "BNI 富鼎分會 全分會會議記錄" : "BNI 富鼎分會 組聚記錄"}</div>
<div style="${S.subtitle}">${esc(c.meta.groupName)} · ${esc(c.meta.date)}${c.meta.time ? " " + esc(c.meta.time) : ""}</div>

<div style="${S.section}">
  <div style="${S.h2}">📋 基本資訊</div>

  ${c.meta.location ? kv("地點", c.meta.location) : ""}

  ${/* 缺席不顯示，資料仍保留 */ ""}
</div>

${section("成長/喜悅分享", "💬", sharingsBlock)}
${section("來賓", "🎫", guestsBlock)}
${c.isChapter ? section("資源需求/提供", "🔄", resourceSharesBlock) : ""}
${section("主講人專業簡報", "🎤", speakersBlock)}
${!c.isChapter ? section("小組內引薦", "🎯", referralsBlock) : ""}
${!c.isChapter ? section("下次組聚", "📅", nextBlock) : ""}
</div>`;
}

// 產出 PDF Blob（用 html2pdf 動態 export）
async function exportMeetingPdf(meeting, group, members) {
  await ensurePdfLibs();
  if (!window.html2pdf) { alert("PDF 匯出功能未就緒（html2pdf 載入失敗）"); return null; }
  const htmlFragment = buildMeetingHtml(meeting, group, members);
  // 把容器放螢幕外（不要用 opacity:0，因為 html2canvas 會跳過 opacity:0 的元素變成空白 PDF）
  const container = document.createElement("div");
  container.innerHTML = htmlFragment;
  container.style.position = "fixed";
  container.style.left = "-9999px";      // 螢幕外，不影響使用者畫面但仍正常渲染
  container.style.top = "0";
  container.style.width = "794px";       // 210mm @ 96dpi ≈ 794px
  container.style.background = "white";
  container.style.pointerEvents = "none";
  document.body.appendChild(container);

  // 等一個 frame 讓瀏覽器 layout + 字型載入
  await new Promise(r => requestAnimationFrame(() => r()));
  try {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
  } catch {}

  try {
    const worker = window.html2pdf().set({
      margin: [10, 10, 10, 10],
      filename: "meeting.pdf",
      image: { type: "jpeg", quality: 0.95 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        backgroundColor: "#ffffff",
        logging: false,
        // 重要：讓 html2canvas 用容器本身大小而不是 window
        windowWidth: 794,
      },
      jsPDF: { unit: "mm", format: "a4", orientation: "portrait", compress: true },
      pagebreak: { mode: ["css", "legacy"] },
    }).from(container);
    const blob = await worker.outputPdf("blob");
    return blob;
  } finally {
    document.body.removeChild(container);
  }
}

// 組聚檔名（不含副檔名）
function meetingFilenameBase(meeting, group) {
  const dateStr = meeting.date || "無日期";
  const isChapter = isChapterMeeting(meeting);
  const groupName = isChapter ? CHAPTER_GROUP_NAME : (group?.name || "未知小組");
  const prefix = isChapter ? "分會會議記錄" : "組聚記錄";
  return safeFilename(`${prefix}_${dateStr}_${groupName}`);
}

// 單筆下載（Word 或 PDF）
async function downloadSingle(meeting, group, members, format) {
  const base = meetingFilenameBase(meeting, group);
  if (format === "docx") {
    const blob = await exportMeetingDocx(meeting, group, members);
    if (!blob) return;
    window.saveAs(blob, base + ".docx");
  } else if (format === "pdf") {
    const blob = await exportMeetingPdf(meeting, group, members);
    if (!blob) return;
    window.saveAs(blob, base + ".pdf");
  }
}

// 批次下載（打包 zip，全部扁平在根目錄）
async function downloadBatchZip(meetings, groupsMap, members, format) {
  // 批次一定要 zip + saveAs；若是 pdf 也要 html2pdf，做個 union
  if (format === "pdf") {
    await Promise.all([ensurePdfLibs(), ensureDocxLibs()]); // ensureDocxLibs 會帶 JSZip + saveAs
  } else {
    await ensureDocxLibs();
  }
  if (!window.JSZip) { alert("批次匯出功能未就緒（JSZip 載入失敗）"); return; }
  const zip = new window.JSZip();
  const seen = {};  // 檔名重複防撞
  for (const meeting of meetings) {
    const group = groupsMap[meeting.groupId];
    let base = meetingFilenameBase(meeting, group);
    // 防止重複：加 -2 -3 etc
    if (seen[base]) {
      seen[base]++;
      base = `${base}-${seen[base]}`;
    } else {
      seen[base] = 1;
    }
    let blob;
    if (format === "docx") {
      blob = await exportMeetingDocx(meeting, group, members);
    } else if (format === "pdf") {
      blob = await exportMeetingPdf(meeting, group, members);
    }
    if (blob) {
      zip.file(base + "." + format, blob);
    }
  }
  const zipBlob = await zip.generateAsync({ type: "blob" });
  const today = new Date().toISOString().slice(0, 10);
  window.saveAs(zipBlob, `組聚記錄批次匯出_${today}_${meetings.length}筆.zip`);
}

// 將主站 KPI 小組（{組名: [姓名...]}）與 members 合併成運營台 groups[] 格式
function buildGroupsFromKpi(kpiGroups, members, extras) {
  if (!kpiGroups || typeof kpiGroups !== "object") return [];
  const nameToId = {};
  members.forEach(m => { if (m.name) nameToId[m.name.trim()] = m.id; });
  const entries = Object.entries(kpiGroups);
  return entries.map(([groupName, memberNames], i) => {
    const groupId = "kpi_" + groupName; // 穩定 ID（組名當鍵）
    const memberIds = (memberNames || []).map(n => nameToId[String(n).trim()]).filter(Boolean);
    const extra = (extras && extras[groupId]) || {};
    return {
      id: groupId,
      name: groupName,
      color: extra.color || GROUP_COLORS[i % GROUP_COLORS.length],
      leaderId: extra.leaderId || null,
      memberIds,
      _sourceMemberNames: memberNames || [],  // 保留原始姓名陣列供除錯
    };
  });
}

async function loadState(key, fallback, onFresh) {
  if (!key) return fallback;
  try {
    const wrappedOnFresh = onFresh ? (fresh) => {
      try {
        const parsed = fresh && fresh.value ? JSON.parse(fresh.value) : fallback;
        onFresh(parsed);
      } catch (e) { console.error("[loadState onFresh]", key, e); }
    } : undefined;
    const r = await apiClient.get(key, wrappedOnFresh);
    return r && r.value ? JSON.parse(r.value) : fallback;
  } catch (e) { console.error("[loadState]", key, e); return fallback; }
}
// 寫入錯誤通知：5 秒內同個 key 失敗只跳 1 次，避免短時間多個自動 save 連續失敗刷屏
const _saveErrorThrottle = {};
async function saveState(key, value) {
  if (!key) return;
  try {
    await apiClient.set(key, JSON.stringify(value));
  } catch (e) {
    console.error("[saveState]", key, e);
    // 「已取消」是使用者主動取消 PIN，已經在 obtainWritePin 內部 alert 過 → 不重複
    if (String(e.message || "").includes("已取消")) return;
    // 「PIN 錯誤」apiClient.set 也已 alert 過 → 不重複
    if (String(e.message || "").includes("PIN 錯誤")) return;
    // 其他錯誤（網路問題、伺服器 5xx）→ 通知使用者
    const now = Date.now();
    if (_saveErrorThrottle[key] && now - _saveErrorThrottle[key] < 5000) return;
    _saveErrorThrottle[key] = now;
    alert(`⚠️ 儲存到雲端失敗：${e.message}\n\n你剛才的修改可能尚未存到伺服器。\n建議：\n1. 檢查網路連線\n2. 重新整理頁面確認資料\n3. 必要時重新編輯後再儲存`);
  }
}

// ============ 導生計畫工具函式 ============
function canEditMentee(mentee, currentUserId, isAdmin) {
  if (isAdmin) return true;                        // 管理員一律可編輯
  if (!currentUserId || !mentee) return false;
  return mentee.memberId === currentUserId
    || mentee.mentorPrimaryId === currentUserId
    || mentee.mentorSecondaryId === currentUserId;
}
function canCheckOneOnOne(mentee, currentUserId, targetMemberId, isAdmin) {
  if (isAdmin) return true;
  if (!currentUserId) return false;
  if (canEditMentee(mentee, currentUserId, isAdmin)) return true;
  return currentUserId === targetMemberId; // 對象本人也能勾自己這格
}
function getMenteeAllTargets(mentee) {
  // 返回一對一矩陣的所有對象（核心 8 + 導師 N），依原始順序
  const core = mentee.coreTeam.map(c => ({ ...c, group: "core" }));
  const mentors = mentee.mentorTeam.map(m => ({ ...m, group: "mentor" }));
  return [...core, ...mentors];
}
function getMenteeStats(mentee, mainCoffeeMeetings) {
  const passportDone = mentee.passport.filter(p => p.completedDate).length;
  const trainingDone = mentee.trainings.filter(t => t.completedDate).length;
  const earlyAttend = mentee.earlyAttendances.length;
  const targets = getMenteeAllTargets(mentee);
  const totalCells = targets.length * ONE_ON_ONE_TYPES.length;
  let doneCells = 0;
  targets.forEach(t => {
    const rec = mentee.oneOnOnes[t.memberId] || {};
    ONE_ON_ONE_TYPES.forEach(tp => { if (rec[tp.key]?.done) doneCells++; });
  });
  // 咖啡與來賓從主站資料計算（若無則退回舊 mentee.guests/coffeeMeetings 做相容）
  let coffeeCount, guestCount;
  if (Array.isArray(mainCoffeeMeetings)) {
    const myCms = mainCoffeeMeetings.filter(cm => cm.inviterId === mentee.memberId);
    coffeeCount = myCms.length;
    guestCount = myCms.filter(cm =>
      cm.meetingStatus === "done" && cm.attendanceWillingness === "confirmed"
    ).length;
  } else {
    coffeeCount = (mentee.coffeeMeetings || []).length;
    guestCount = (mentee.guests || []).length;
  }
  const overallPct = Math.round(
    ((passportDone / GRAD_REQS.passport) * 0.25 +
      (trainingDone / GRAD_REQS.trainings) * 0.2 +
      (Math.min(earlyAttend, GRAD_REQS.earlyAttend) / GRAD_REQS.earlyAttend) * 0.15 +
      (totalCells ? doneCells / totalCells : 0) * 0.3 +
      (guestCount >= 2 ? 1 : guestCount / 2) * 0.05 +
      (coffeeCount >= 2 ? 1 : coffeeCount / 2) * 0.05
    ) * 100
  );
  return {
    passportDone, passportTotal: GRAD_REQS.passport,
    trainingDone, trainingTotal: GRAD_REQS.trainings,
    earlyAttend, earlyAttendTotal: GRAD_REQS.earlyAttend,
    oneOnOneDone: doneCells, oneOnOneTotal: totalCells,
    guestCount, coffeeCount,
    overallPct, isGraduated: !!mentee.graduationDate,
  };
}

            {selectedIds.includes(m.id) ? <CheckSquare className="w-4 h-4 text-[#B8860B]" /> : <Square className="w-4 h-4 text-stone-300" />}
            <span className="font-medium">{m.name}</span>
            {m.industry && <span className="text-xs text-stone-400">· {m.industry}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// 出席成員快選方格（組聚專用：小組成員數固定 7~10 人，平行點選最直覺）
function AttendeesGrid({ members, selectedIds, onChange }) {
  if (!members || members.length === 0) {
    return <div className="text-sm text-stone-400 italic">請先選擇小組</div>;
  }
  const allSelected = selectedIds.length === members.length;
  const toggle = (id) => onChange(selectedIds.includes(id) ? selectedIds.filter(x => x !== id) : [...selectedIds, id]);
  const selectAll = () => onChange(members.map(m => m.id));
  const clearAll = () => onChange([]);
  return (
    <div className="border border-stone-300 rounded-lg bg-white">
      <div className="flex items-center justify-between gap-2 px-2.5 py-1.5 border-b border-stone-200 bg-stone-50">
        <span className="text-xs text-stone-600">已選 <b className="text-[#B8860B]">{selectedIds.length}</b> / {members.length} 人</span>
        <div className="flex gap-1">
          <button type="button" onClick={selectAll} disabled={allSelected}
            className="text-[11px] px-2 py-0.5 rounded border border-stone-300 text-stone-600 hover:bg-amber-50 hover:text-[#B8860B] hover:border-[#B8860B] disabled:opacity-40 disabled:cursor-not-allowed">
            全選
          </button>
          <button type="button" onClick={clearAll} disabled={selectedIds.length === 0}
            className="text-[11px] px-2 py-0.5 rounded border border-stone-300 text-stone-600 hover:bg-stone-100 disabled:opacity-40 disabled:cursor-not-allowed">
            清除
          </button>
        </div>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-1.5 p-2">
        {members.map(m => {
          const selected = selectedIds.includes(m.id);
          return (
            <button key={m.id} type="button" onClick={() => toggle(m.id)}
              className={`flex items-start gap-1.5 px-2 py-1.5 rounded-md text-left text-sm transition border ${
                selected
                  ? "bg-amber-50 border-[#B8860B] text-stone-800"
                  : "bg-white border-stone-200 text-stone-700 hover:bg-stone-50 hover:border-stone-300"
              }`}>
              {selected
                ? <CheckSquare className="w-4 h-4 text-[#B8860B] flex-shrink-0 mt-0.5" />
                : <Square className="w-4 h-4 text-stone-300 flex-shrink-0 mt-0.5" />}
              <span className="flex-1 min-w-0">
                <div className="font-medium truncate">{m.name}</div>
                {m.industry && <div className="text-[10px] text-stone-400 truncate">{m.industry}</div>}
              </span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

// 單選（用於記錄人、負責人）
function MemberSelect({ members, value, onChange, placeholder = "選擇..." }) {
  return (
    <select value={value || ""} onChange={e => onChange(e.target.value || null)}
      className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm bg-white">
      <option value="">{placeholder}</option>
      {members.map(m => <option key={m.id} value={m.id}>{m.name}{m.industry ? ` · ${m.industry}` : ""}</option>)}
    </select>
  );
}

// ============ 會議表單 ============
function MeetingForm({ meeting, groups, members, mentees, setMentees, onSave, onCancel, onDelete }) {
  const [form, setForm] = useState(() => meeting || {
    id: uid("mt"), groupId: groups[0]?.id || "",
    date: new Date().toISOString().slice(0, 10),
    time: new Date().toTimeString().slice(0, 5),  // 點選當下的本地時間 HH:MM
    location: "", scribe: "",
    attendees: [], absentees: [],
    sharings: [],             // 1. 成長 / 喜悅分享
    guests: [],               // 1.5 來賓（分會別組會員 or 外部來賓）
    resourceShares: [],       // 2.（全分會專用）每位出席者：需要的資源 / 可提供的資源
    speakers: [],             // 3. 主講人陣列（每位主講人各自帶 openers/feedback/connections/grid）
    referrals: [],            // 4.（組聚專用）小組內引薦記錄
    nextMeeting: { date: "", time: "", location: "", nextSpeakerId: "" },  // 5.（組聚專用）下次組聚 + 下次主講人
    discussion: "", actionItems: [],        // actionItems 保留欄位但 UI 已移除（舊資料相容）
    createdAt: new Date().toISOString(),
  });

  // 遷移舊記錄：若 meeting 沒有新欄位，補齊空值；單主講人結構自動轉成 speakers[]
  useEffect(() => {
    if (!meeting) return;
    setForm(p => {
      const next = {
        sharings: [], guests: [], resourceShares: [],
        speakers: [],
        referrals: [],
        nextMeeting: { date: "", time: "", location: "", nextSpeakerId: "" },
        ...p,
      };
      // 確保 nextMeeting 有完整欄位（舊資料可能沒 nextSpeakerId）
      next.nextMeeting = { date: "", time: "", location: "", nextSpeakerId: "", ...next.nextMeeting };
      // 舊 schema 遷移：speaker / conversationOpeners / feedback / neededConnections → speakers[0]
      const hasLegacy = !Array.isArray(p.speakers) || p.speakers.length === 0;
      const oldSpeaker = p.speaker || {};
      const oldOpeners = Array.isArray(p.conversationOpeners) ? p.conversationOpeners : [];
      const oldFeedback = Array.isArray(p.feedback) ? p.feedback : [];
      const oldConnections = Array.isArray(p.neededConnections) ? p.neededConnections : [];
      const legacyHasContent = oldSpeaker.memberId || oldSpeaker.topic
        || oldOpeners.length || oldFeedback.length || oldConnections.length;
      if (hasLegacy && legacyHasContent) {
        next.speakers = [{
          id: uid("sp"),
          memberId: oldSpeaker.memberId || "",
          topic: oldSpeaker.topic || "",
          conversationOpeners: oldOpeners,
          feedback: oldFeedback,
          neededConnections: oldConnections,
          collaborationGrid: { centerProfile: "", cells: ["", "", "", "", "", "", "", ""] },
        }];
      }
      // 確保每個 speaker 都有完整欄位（防禦舊資料部分缺欄）
      next.speakers = (next.speakers || []).map(sp => ({
        id: sp.id || uid("sp"),
        memberId: sp.memberId || "",
        topic: sp.topic || "",
        conversationOpeners: Array.isArray(sp.conversationOpeners) ? sp.conversationOpeners : [],
        feedback: Array.isArray(sp.feedback) ? sp.feedback : [],
        neededConnections: Array.isArray(sp.neededConnections) ? sp.neededConnections : [],
        collaborationGrid: sp.collaborationGrid && Array.isArray(sp.collaborationGrid.cells)
          ? { centerProfile: sp.collaborationGrid.centerProfile || "",
              cells: [...sp.collaborationGrid.cells, "", "", "", "", "", "", "", ""].slice(0, 8) }
          : { centerProfile: "", cells: ["", "", "", "", "", "", "", ""] },
      }));
      return next;
    });
  }, []);

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const isChapter = form.groupId === CHAPTER_GROUP_ID;
  const group = groups.find(g => g.id === form.groupId);
  // 全分會：候選 = 全部成員；組聚：候選 = 該組成員
  const groupMembers = useMemo(() => {
    if (isChapter) return members;
    return members.filter(m => group?.memberIds?.includes(m.id));
  }, [members, group, isChapter]);
  const attendingMembers = useMemo(() =>
    groupMembers.filter(m => form.attendees.includes(m.id)),
    [groupMembers, form.attendees]
  );

  // 選了某組/全分會，沒出席的自動算缺席；切換 groupId 時清理過時 attendees；記錄人自動預填小組長
  useEffect(() => {
    if (!isChapter && !group) return;
    const pool = isChapter ? members.map(m => m.id) : (group?.memberIds || []);
    const poolSet = new Set(pool);
    setForm(p => {
      // 清理 attendees：只在「真的有不屬於 pool 的成員」時才產生新陣列（避免引用變更觸發無限 useEffect）
      const hasStale = (p.attendees || []).some(id => !poolSet.has(id));
      const cleanedAttendees = hasStale ? (p.attendees || []).filter(id => poolSet.has(id)) : p.attendees;
      const absent = pool.filter(id => !cleanedAttendees.includes(id));
      // 記錄人：若已選且不在新 pool → 清空
      const cleanedScribe = p.scribe && !poolSet.has(p.scribe) ? "" : p.scribe;
      const finalScribe = cleanedScribe || (isChapter ? "" : (group?.leaderId || ""));
      return {
        ...p,
        attendees: cleanedAttendees,
        absentees: absent,
        scribe: finalScribe,
      };
    });
  }, [form.attendees, form.groupId]);

  // ===== 各區塊 CRUD =====
  const upd = (arr, id, k, v) => arr.map(x => x.id === id ? { ...x, [k]: v } : x);
  const rm = (arr, id) => arr.filter(x => x.id !== id);

  // 1. 分享
  const addSharing = (memberId) => set("sharings", [...form.sharings, { id: uid("s"), memberId, content: "" }]);
  const updSharing = (id, k, v) => set("sharings", upd(form.sharings, id, k, v));
  const rmSharing = (id) => set("sharings", rm(form.sharings, id));

  // 1.5 來賓
  const addGuest = (kind) => set("guests", [...(form.guests || []), {
    id: uid("gst"), kind: kind || "member",
    memberId: "", name: "", industry: "", fromChapter: "",
    sharing: "", feedback: "", otherFeedback: "",
  }]);
  const updGuest = (id, k, v) => set("guests", upd(form.guests || [], id, k, v));
  const rmGuest = (id) => set("guests", rm(form.guests || [], id));

  // ===== 主講人（多位）=====
  // 全部用 functional update（setForm(p => ...)）避免 stale closure 問題
  // 通用 helper：對某位 speaker 進行 transform
  const transformSpeaker = (spId, transformFn) => setForm(p => ({
    ...p,
    speakers: (p.speakers || []).map(sp => sp.id === spId ? transformFn(sp) : sp),
  }));
  const addSpeaker = () => setForm(p => ({
    ...p,
    speakers: [...(p.speakers || []), {
      id: uid("sp"), memberId: "", topic: "",
      conversationOpeners: [{ id: uid("co"), who: "", yesno: "", tagline: "", painSolution: "", cta: "", verbatim: "" }],
      feedback: [],
      neededConnections: [],
      collaborationGrid: { centerProfile: "", cells: ["", "", "", "", "", "", "", ""] },
    }],
  }));
  const rmSpeaker = (spId) => setForm(p => ({
    ...p,
    speakers: (p.speakers || []).filter(sp => sp.id !== spId),
  }));
  const updSpeakerField = (spId, k, v) => transformSpeaker(spId, sp => ({ ...sp, [k]: v }));

  // ===== 開啟對話（per-speaker）=====
  const addOpener = (spId) => transformSpeaker(spId, sp => ({
    ...sp,
    conversationOpeners: [...(sp.conversationOpeners || []),
      { id: uid("co"), who: "", yesno: "", tagline: "", painSolution: "", cta: "", verbatim: "" }],
  }));
  const updOpener = (spId, oId, k, v) => transformSpeaker(spId, sp => ({
    ...sp,
    conversationOpeners: upd(sp.conversationOpeners || [], oId, k, v),
  }));
  const rmOpener = (spId, oId) => transformSpeaker(spId, sp => ({
    ...sp,
    conversationOpeners: rm(sp.conversationOpeners || [], oId),
  }));

  const generateScript = (o, speakerName) => {
    const who = (o.who || "").trim() || "（請填目標客群）";
    const yesno = (o.yesno || "").trim() || "（請填 YES/NO 問題）";
    const tagline = (o.tagline || "").trim() || "（請填 tagline）";
    const pain = (o.painSolution || "").trim();
    const cta = (o.cta || "").trim() || "（請填對接方式）";
    const sp = speakerName || "主講人";
    const painLine = pain ? pain + "。" : "";
    return `各位夥伴早安，我是 ${sp}。
我的客戶是——${who}。
如果你身邊有這樣的朋友，請幫我問他：「${yesno}」
如果他說想，請告訴他：「我認識 ${sp}，他是${tagline}。${painLine}${cta}」
再說一次，我的客戶是——${who}。我是 ${sp}，${tagline}。`;
  };

  // ===== 對主講人建議（per-speaker）=====
  const addFeedback = (spId, fromMemberId) => transformSpeaker(spId, sp => ({
    ...sp,
    feedback: [...(sp.feedback || []), { id: uid("fb"), fromMemberId, content: "" }],
  }));
  const updFeedback = (spId, fId, k, v) => transformSpeaker(spId, sp => ({
    ...sp,
    feedback: upd(sp.feedback || [], fId, k, v),
  }));
  const rmFeedback = (spId, fId) => transformSpeaker(spId, sp => ({
    ...sp,
    feedback: rm(sp.feedback || [], fId),
  }));

  // ===== 主講人需要的合作人脈（per-speaker）=====
  const addConnection = (spId) => transformSpeaker(spId, sp => ({
    ...sp,
    neededConnections: [...(sp.neededConnections || []),
      { id: uid("nc"), profileWanted: "", offers: [] }],
  }));
  const updConnection = (spId, ncId, k, v) => transformSpeaker(spId, sp => ({
    ...sp,
    neededConnections: upd(sp.neededConnections || [], ncId, k, v),
  }));
  const rmConnection = (spId, ncId) => transformSpeaker(spId, sp => ({
    ...sp,
    neededConnections: rm(sp.neededConnections || [], ncId),
  }));
  const addOffer = (spId, ncId) => transformSpeaker(spId, sp => ({
    ...sp,
    neededConnections: (sp.neededConnections || []).map(nc =>
      nc.id !== ncId ? nc : { ...nc, offers: [...nc.offers, {
        id: uid("of"), introducerId: "", contactName: "", contactProfession: "",
        wantImport: true,                                  // 預設要匯入到咖啡會議；使用者可取消
        status: "pending", createdAt: new Date().toISOString(),
      }] }),
  }));
  const updOffer = (spId, ncId, ofId, k, v) => transformSpeaker(spId, sp => ({
    ...sp,
    neededConnections: (sp.neededConnections || []).map(nc =>
      nc.id !== ncId ? nc : { ...nc, offers: nc.offers.map(of => of.id === ofId ? { ...of, [k]: v } : of) }),
  }));
  const rmOffer = (spId, ncId, ofId) => transformSpeaker(spId, sp => ({
    ...sp,
    neededConnections: (sp.neededConnections || []).map(nc =>
      nc.id !== ncId ? nc : { ...nc, offers: nc.offers.filter(of => of.id !== ofId) }),
  }));

  // ===== 九宮格合作圖（per-speaker）=====
  const updGridCenter = (spId, v) => transformSpeaker(spId, sp => ({
    ...sp,
    collaborationGrid: {
      cells: ["", "", "", "", "", "", "", ""],
      ...(sp.collaborationGrid || {}),
      centerProfile: v,
    },
  }));
  const updGridCell = (spId, idx, v) => transformSpeaker(spId, sp => {
    const baseCells = (sp.collaborationGrid?.cells) || ["", "", "", "", "", "", "", ""];
    const cells = [...baseCells];
    cells[idx] = v;
    return {
      ...sp,
      collaborationGrid: {
        centerProfile: sp.collaborationGrid?.centerProfile || "",
        cells,
      },
    };
  });

  // ===== 資源需求/提供（全分會專用）=====
  const addResourceShare = (memberId) => set("resourceShares", [...(form.resourceShares || []), {
    id: uid("rs"), memberId, needs: "", offers: "",
  }]);
  const updResourceShare = (id, k, v) => set("resourceShares", upd(form.resourceShares || [], id, k, v));
  const rmResourceShare = (id) => set("resourceShares", rm(form.resourceShares || [], id));

  // 5. 引薦記錄
  const addReferral = () => set("referrals", [...form.referrals, {
    id: uid("rf"), fromMemberId: "", toMemberId: "",
    referralName: "", content: "", amount: "",
  }]);
  const updReferral = (id, k, v) => set("referrals", upd(form.referrals, id, k, v));
  const rmReferral = (id) => set("referrals", rm(form.referrals, id));

  const [saving, setSaving] = useState(false);  // 儲存中：避免重複提交、顯示 loading
  const submit = async () => {
    if (saving) return;
    if (!form.groupId) return alert("請選擇小組或全分會");
    if (!form.date) return alert("請輸入日期");
    // 開啟對話：若有主講人有設 memberId，但所有目標客群皆為空白 → 提醒
    const speakersWithMember = (form.speakers || []).filter(sp => sp.memberId);
    const anyOpenerEmpty = speakersWithMember.some(sp => {
      const openers = sp.conversationOpeners || [];
      return openers.length === 0 || !openers.some(o => (o.who || o.yesno || o.tagline || o.cta || o.painSolution || o.verbatim || "").trim());
    });
    if (speakersWithMember.length > 0 && anyOpenerEmpty) {
      if (!confirm("有主講人尚未填寫任何「開啟對話」目標客群，確定要儲存嗎？\n（建議每位主講人至少填 1 個，讓夥伴能把主講人帶出分會）")) return;
    }
    setSaving(true);
    try {
      // onSave 同步先寫進 React state；底下的 saveState useEffect 會跑非同步寫雲端
      onSave({ ...form, updatedAt: new Date().toISOString() });
    } finally {
      // 簡單延遲 800ms 讓 useEffect 觸發的雲端寫入有機會跑到、PIN prompt 有機會跳出
      // 期間按鈕保持 disabled，防止連點
      setTimeout(() => setSaving(false), 800);
    }
  };

  // 誰還沒分享（用於下拉選單）
  const sharedIds = form.sharings.map(s => s.memberId);
  const pendingShareMembers = attendingMembers.filter(m => !sharedIds.includes(m.id));
  // 資源需求/提供 — 誰還沒填
  const resourceSharedIds = (form.resourceShares || []).map(r => r.memberId);
  const pendingResourceMembers = attendingMembers.filter(m => !resourceSharedIds.includes(m.id));
  // 主講人 memberId 集合（用於排除回饋下拉中的主講人自己）
  const speakerMemberIds = (form.speakers || []).map(sp => sp.memberId).filter(Boolean);
  // 引薦候選：出席組員 + 是分會會員的來賓（kind=member 且有 memberId，外部來賓不列）
  const referralCandidates = useMemo(() => {
    const seen = new Set(attendingMembers.map(m => m.id));
    const list = [...attendingMembers];
    (form.guests || []).forEach(g => {
      if (g.kind === "member" && g.memberId && !seen.has(g.memberId)) {
        const m = members.find(x => x.id === g.memberId);
        if (m) { list.push(m); seen.add(m.id); }
      }
    });
    return list;
  }, [attendingMembers, form.guests, members]);
  // pendingFeedbackMembersFor: 回傳一個 fn，給 speakerCard 用
  const pendingFeedbackMembersFor = (sp) => {
    const fbIds = (sp.feedback || []).map(f => f.fromMemberId);
    return attendingMembers.filter(m => !fbIds.includes(m.id) && m.id !== sp.memberId);
  };

  const summary = (label, count) => count > 0
    ? <span className="text-[10px] bg-[#B8860B] text-white px-1.5 py-0.5 rounded-full">{count}</span>
    : <span className="text-[10px] bg-stone-100 text-stone-400 px-1.5 py-0.5 rounded-full">0</span>;

  return (
    <div>
      {/* ============ 基本資訊 ============ */}
      <div className="grid grid-cols-2 gap-3">
        <Field label="小組" required>
          <select value={form.groupId} onChange={e => set("groupId", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm bg-white">
            <option value="">請選擇</option>
            <option value={CHAPTER_GROUP_ID}>🌐 全分會</option>
            {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
          </select>
        </Field>
        <Field label="記錄人">
          <MemberSelect members={groupMembers} value={form.scribe} onChange={v => set("scribe", v)} placeholder="（選填）" />
        </Field>
        <Field label="日期" required>
          <input type="date" value={form.date} onChange={e => set("date", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
        <Field label="時間">
          <input type="time" value={form.time || ""} onChange={e => set("time", e.target.value)}
            className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
        </Field>
      </div>

      <Field label="地點">
        <input value={form.location || ""} onChange={e => set("location", e.target.value)}
          placeholder="例：事務所會議室、85度C..."
          className="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm" />
      </Field>

      <Field label={`出席成員（${form.attendees.length} / ${groupMembers.length} 人）`} required
        hint={
          (isChapter || group)
            ? `未勾選者將自動列入缺席（${form.absentees.length} 人）`
            : "請先選擇小組或全分會"
        }>
        {(isChapter || group)
          ? <AttendeesGrid members={groupMembers} selectedIds={form.attendees} onChange={v => set("attendees", v)} />
          : <div className="text-sm text-stone-400 italic">請先選擇小組或全分會</div>}
      </Field>

      {/* ============ 1.5 來賓 ============ */}
      <FormSection title="來賓" badge={summary("", (form.guests || []).length)} icon={<UserCheck className="w-4 h-4 text-[#059669]" />}>
        <div className="text-xs text-stone-500 mb-2 bg-emerald-50 border border-emerald-200 rounded p-2 leading-relaxed">
          💡 {isChapter
            ? "來賓可以是分會會員（非出席）或外部來訪者。來賓不影響出席/缺席統計，但其發言會收入會議記錄。"
            : "來賓可以是分會別組會員，也可能是外部來訪者。來賓不影響出席/缺席統計，但其發言會收入組聚記錄。"}
        </div>
        <div className="space-y-2 mb-2">
          {(form.guests || []).map(g => {
            const linkedMember = g.kind === "member" && g.memberId ? members.find(x => x.id === g.memberId) : null;
            return (
              <div key={g.id} className="border border-emerald-200 rounded-lg p-2.5 bg-emerald-50/40">
