// ============ 分會預設團隊設定 Modal ============
function MentorshipDefaultsModal({ open, onClose, members, defaults, onSave }) {
  // 初始化 local state：用傳入的 defaults 或空白
  const [coreTeam, setCoreTeam] = useState([]);
  const [mentorTeam, setMentorTeam] = useState([]);
  // 資料結構：{ t1: ["2026-05-12", "2026-06-12"], t2: [...] } —— 每個培訓可有多個預定日期
  // 向後相容：舊資料若為字串，讀取時會自動包成 [str]
  const [trainingSchedule, setTrainingSchedule] = useState({});
  const [saving, setSaving] = useState(false);

  // 把混合（字串 | 陣列 | null）正規化為排序好的陣列
  const normalizeSchedule = (raw) => {
    const out = {};
    Object.entries(raw || {}).forEach(([k, v]) => {
      if (Array.isArray(v)) {
        out[k] = v.filter(Boolean);
      } else if (typeof v === 'string' && v) {
        out[k] = [v];
      } else {
        out[k] = [];
      }
      out[k] = [...new Set(out[k])].sort();  // 去重 + 升冪排序（YYYY-MM-DD 字串可字典排序）
    });
    return out;
  };

  useEffect(() => {
    if (!open) return;
    // Modal 開啟時重置 local state
    if (defaults) {
      setCoreTeam(defaults.coreTeam?.length
        ? CORE_ROLES.map(r => {
            const found = defaults.coreTeam.find(c => c.role === r);
            return { role: r, memberId: found?.memberId || "" };
          })
        : CORE_ROLES.map(r => ({ role: r, memberId: "" })));
      setMentorTeam((defaults.mentorTeam || []).map(m => ({ ...m })));
      setTrainingSchedule(normalizeSchedule(defaults.trainingSchedule));
    } else {
      setCoreTeam(CORE_ROLES.map(r => ({ role: r, memberId: "" })));
      setMentorTeam([]);
      setTrainingSchedule({});
    }
  }, [open, defaults]);

  if (!open) return null;

  const updCore = (idx, memberId) => {
    const nc = [...coreTeam];
    nc[idx] = { ...nc[idx], memberId };
    setCoreTeam(nc);
  };
  const updMentorTeam = (ids) => {
    setMentorTeam(ids.map(id => mentorTeam.find(x => x.memberId === id) || { memberId: id, role: "導師" }));
  };
  const setMentorRole = (id, role) =>
    setMentorTeam(mentorTeam.map(m => m.memberId === id ? { ...m, role } : m));
  // 每個培訓可有多個日期
  const addTrainingDate = (trainingId) =>
    setTrainingSchedule(p => {
      const list = Array.isArray(p[trainingId]) ? [...p[trainingId]] : [];
      list.push("");  // 新增空白待使用者填
      return { ...p, [trainingId]: list };
    });
  const updateTrainingDate = (trainingId, idx, date) =>
    setTrainingSchedule(p => {
      const list = Array.isArray(p[trainingId]) ? [...p[trainingId]] : [];
      list[idx] = date || "";
      return { ...p, [trainingId]: list };
    });
  const removeTrainingDate = (trainingId, idx) =>
    setTrainingSchedule(p => {
      const list = Array.isArray(p[trainingId]) ? [...p[trainingId]] : [];
      list.splice(idx, 1);
      return { ...p, [trainingId]: list };
    });

  const handleSave = async () => {
    setSaving(true);
    try {
      // 儲存前清掉空字串 + 去重排序
      const cleanSchedule = {};
      Object.entries(trainingSchedule).forEach(([k, v]) => {
        const arr = Array.isArray(v) ? v : (v ? [v] : []);
        const clean = [...new Set(arr.filter(Boolean))].sort();
        if (clean.length) cleanSchedule[k] = clean;
      });
      await onSave({
        coreTeam: coreTeam.filter(c => c.memberId),
        mentorTeam: mentorTeam.filter(m => m.memberId),
        trainingSchedule: cleanSchedule,
      });
      onClose();
    } catch (e) {
      alert("儲存失敗：" + e.message);
    } finally {
      setSaving(false);
    }
  };

  const coreFilled = coreTeam.filter(c => c.memberId).length;

  return (
    <Modal open={open} onClose={onClose} title="分會預設團隊" maxWidth="max-w-2xl"
      footer={
        <div className="flex items-center justify-between gap-2">
          <span className="text-xs text-stone-500">
            {defaults?.updatedAt ? `上次更新：${fmtDate(defaults.updatedAt)}` : "尚未設定過"}
          </span>
          <div className="flex gap-2">
            <Btn variant="ghost" size="sm" onClick={onClose} disabled={saving}>取消</Btn>
            <Btn variant="primary" size="sm" onClick={handleSave} disabled={saving}>
              <Save className="w-3.5 h-3.5" />
              {saving ? "儲存中⋯" : "儲存預設"}
            </Btn>
          </div>
        </div>
      }>
      <div className="space-y-5">
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
          💡 這裡設定的內容會套用到<b>每次新增新生</b>。既有新生的快照不會被影響。
        </div>

        {/* 核心團隊 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="font-semibold text-stone-800 flex items-center gap-2">
              <Users className="w-4 h-4 text-[#B8860B]" />
              核心團隊（8 職）
            </div>
            <span className="text-xs text-stone-500">已填 {coreFilled}/8</span>
          </div>
          <div className="grid grid-cols-2 gap-2">
            {coreTeam.map((c, i) => (
              <div key={c.role} className="flex items-center gap-2">
                <span className="text-xs text-stone-600 w-14 flex-shrink-0">{c.role}</span>
                <div className="flex-1 min-w-0">
                  <MemberSelect members={members} value={c.memberId}
                    onChange={id => updCore(i, id)} placeholder="—" />
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* 導師團隊 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="font-semibold text-stone-800 flex items-center gap-2">
              <GraduationCap className="w-4 h-4 text-[#8B1A1A]" />
              導師團隊（{mentorTeam.length} 人）
            </div>
          </div>
          <MemberMultiSelect members={members} selectedIds={mentorTeam.map(m => m.memberId)} onChange={updMentorTeam} />
          {mentorTeam.length > 0 && (
            <div className="mt-2 flex flex-wrap gap-1.5">
              {mentorTeam.map(m => {
                const mem = members.find(x => x.id === m.memberId);
                return (
                  <div key={m.memberId} className="inline-flex items-center gap-1 bg-stone-50 border border-stone-200 rounded-md px-2 py-1 text-xs">
                    <span>{mem?.name || m.memberId}</span>
                    <select value={m.role} onChange={e => setMentorRole(m.memberId, e.target.value)}
                      className="text-[10px] bg-white border border-stone-200 rounded px-1 py-0.5">
                      <option value="導師">導師</option>
                      <option value="副導師">副導師</option>
                    </select>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* 培訓預定日期 */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="font-semibold text-stone-800 flex items-center gap-2">
              <BookOpen className="w-4 h-4 text-[#0369a1]" />
              本期培訓預定日期
            </div>
            <span className="text-xs text-stone-500">選填，新增新生時會套用最近一次未來日期</span>
          </div>
          <div className="space-y-3">
            {TRAININGS.map(t => {
              const dates = Array.isArray(trainingSchedule[t.id]) ? trainingSchedule[t.id] : [];
              return (
                <div key={t.id} className="border border-stone-200 rounded-lg p-2.5 bg-stone-50/50">
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="text-[10px] text-stone-500 bg-stone-100 px-1.5 py-0.5 rounded flex-shrink-0">{t.label}</span>
                    <span className="text-sm text-stone-700 flex-1 min-w-0 truncate">{t.title}</span>
                    <button type="button" onClick={() => addTrainingDate(t.id)}
                      className="text-[11px] px-2 py-0.5 rounded border border-[#0369a1] text-[#0369a1] hover:bg-[#0369a1] hover:text-white transition-colors flex-shrink-0">
                      + 新增日期
                    </button>
                  </div>
                  {dates.length === 0 ? (
                    <div className="text-[11px] text-stone-400 italic pl-1">尚未設定</div>
                  ) : (
                    <div className="space-y-1 pl-1">
                      {dates.map((d, idx) => (
                        <div key={idx} className="flex items-center gap-1.5">
                          <input type="date" value={d || ""}
                            onChange={e => updateTrainingDate(t.id, idx, e.target.value)}
                            className="text-xs border border-stone-200 rounded px-1.5 py-1 bg-white" />
                          <button type="button" onClick={() => removeTrainingDate(t.id, idx)}
                            className="text-xs text-stone-400 hover:text-red-600 px-1"
                            title="刪除這筆">×</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </Modal>
  );
}

function MentorshipView({ mentees, setMentees, persistMenteesChange, members, currentUserId, onLogout, isAdmin = true, mainCoffeeMeetings = [], onRefreshCoffee, coffeeSyncingAt, mentorshipDefaults, onSaveDefaults }) {
  const [detailId, setDetailId] = useState(null);
  const [editingId, setEditingId] = useState(null); // "new" | mentee.id | null
  const [filter, setFilter] = useState({ mode: "all", search: "" });
  const [defaultsOpen, setDefaultsOpen] = useState(false);

  // 防多裝置互相覆蓋：透過 persistMenteesChange 做「讀伺服器最新 → 只改這一筆 → 寫回」
  const saveMentee = async (m) => {
    const updated = { ...m, updatedAt: new Date().toISOString() };
    setEditingId(null);
    await persistMenteesChange(server => {
      const idx = server.findIndex(x => x.id === updated.id);
      if (idx >= 0) { server[idx] = updated; return server; }   // 編輯既有
      return [updated, ...server];                              // 新增
    });
  };
  const deleteMentee = async (id) => {
    setEditingId(null); setDetailId(null);
    await persistMenteesChange(server => server.filter(m => m.id !== id));
  };

  const filtered = useMemo(() => {
    let list = mentees;
    if (filter.mode === "inProgress") list = list.filter(m => !m.graduationDate);
    if (filter.mode === "graduated") list = list.filter(m => m.graduationDate);
    if (filter.mode === "mine") list = list.filter(m =>
      m.mentorPrimaryId === currentUserId || m.mentorSecondaryId === currentUserId);
    if (filter.search) {
      const q = filter.search;
      list = list.filter(m => {
        const mem = members.find(x => x.id === m.memberId);
        return (mem?.name || "").includes(q) || (m.representativeIndustry || "").includes(q);
      });
    }
    return [...list].sort((a, b) => {
      if (!!a.graduationDate !== !!b.graduationDate) return a.graduationDate ? 1 : -1;
      return new Date(b.oathDate) - new Date(a.oathDate);
    });
  }, [mentees, filter, currentUserId, members]);

  const editingMentee = editingId && editingId !== "new" ? mentees.find(m => m.id === editingId) : null;

  const formModal = (
    <Modal open={!!editingId} onClose={() => setEditingId(null)}
      title={editingMentee ? "編輯新生基本資料" : "新增新生"} maxWidth="max-w-2xl">
      {editingId && (
        <MenteeForm mentee={editingMentee} members={members} mentees={mentees}
          mentorshipDefaults={mentorshipDefaults}
          onSave={saveMentee} onCancel={() => setEditingId(null)} onDelete={deleteMentee} />
      )}
    </Modal>
  );

  if (detailId) {
    return (
      <div>
        <MenteeDetail menteeId={detailId} mentees={mentees} members={members} currentUserId={currentUserId}
          isAdmin={isAdmin}
          mainCoffeeMeetings={mainCoffeeMeetings} onRefreshCoffee={onRefreshCoffee} coffeeSyncingAt={coffeeSyncingAt}
          onUpdate={saveMentee} onBack={() => setDetailId(null)} onEdit={(id) => setEditingId(id)} />
        {formModal}
      </div>
    );
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-3 gap-2 flex-wrap">
        <div className="flex items-center gap-2">
          <h2 className="text-lg font-semibold text-stone-800">導生計畫</h2>
          <span className="text-[10px] px-1.5 py-0.5 rounded-full font-semibold text-white" style={{ background: '#8B1A1A' }}>
            ADMIN
          </span>
        </div>
        <div className="flex items-center gap-2">
          {onLogout && (
            <button onClick={onLogout} className="text-xs text-stone-400 hover:text-stone-700 px-2 py-1">
              登出管理員
            </button>
          )}
          <Btn variant="outline" onClick={() => setDefaultsOpen(true)} title="設定新增新生時的預設團隊">
            <Settings className="w-4 h-4" />預設團隊
          </Btn>
          <Btn variant="primary" onClick={() => setEditingId("new")}><Plus className="w-4 h-4" />新增新生</Btn>
        </div>
      </div>
      {!mentorshipDefaults && (
        <div className="mb-3 bg-blue-50 border border-blue-200 rounded-lg p-3 text-sm text-blue-900 flex items-start gap-2">
          <AlertCircle className="w-4 h-4 mt-0.5 flex-shrink-0" />
          <div className="flex-1">
            <b>尚未設定分會預設團隊</b> · 建議先設定核心 8 職與導師團隊，新增新生時會自動套用，節省時間。
            <button onClick={() => setDefaultsOpen(true)} className="ml-2 underline font-semibold">立即設定</button>
          </div>
        </div>
      )}
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <select value={filter.mode} onChange={e => setFilter({ ...filter, mode: e.target.value })}
          className="border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white">
          <option value="all">全部新生</option>
          <option value="inProgress">進行中</option>
          <option value="graduated">已畢業</option>
          {currentUserId && <option value="mine">我是導師的</option>}
        </select>
        <input type="search" value={filter.search} onChange={e => setFilter({ ...filter, search: e.target.value })}
          placeholder="搜尋姓名 / 行業..."
          className="flex-1 min-w-[140px] border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white" />
      </div>
      {filtered.length === 0 ? (
        <div className="bg-white border border-dashed border-stone-300 rounded-xl py-12 text-center text-stone-400">
          <GraduationCap className="w-12 h-12 mx-auto mb-2 opacity-40" />
          <p className="text-sm">{mentees.length ? "無符合條件的新生" : "尚未建立任何新生紀錄"}</p>
        </div>
      ) : (
        <div className="grid gap-3 sm:grid-cols-2">
          {filtered.map(m => <MenteeCard key={m.id} mentee={m} members={members} mainCoffeeMeetings={mainCoffeeMeetings} onOpen={setDetailId} />)}
        </div>
      )}
      {formModal}
      <MentorshipDefaultsModal open={defaultsOpen} onClose={() => setDefaultsOpen(false)}
        members={members} defaults={mentorshipDefaults} onSave={onSaveDefaults} />
    </div>
  );
}

// ============ 組聚小表板（各組組聚次數 / 引薦單數 / 引薦金額） ============
// 時間範圍由 dashboardConfig 控制（可在小齒輪選單設定，存 JSONBin）
function computeDashboardRange(config) {
  const now = new Date();
  const mode = config?.rangeMode || "thisMonth";
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (mode === "thisMonth") {
    return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: null };
  }
  if (mode === "thisQuarter") {
    const q = Math.floor(now.getMonth() / 3);
    return { start: new Date(now.getFullYear(), q * 3, 1), end: null };
  }
  if (mode === "thisYear") {
    return { start: new Date(now.getFullYear(), 0, 1), end: null };
  }
  if (mode === "last90") {
    const s = new Date(today); s.setDate(s.getDate() - 90);
    return { start: s, end: null };
  }
  if (mode === "custom") {
    return {
      start: config.customStart ? new Date(config.customStart) : null,
      end: config.customEnd ? new Date(config.customEnd + "T23:59:59") : null,
    };
  }
  // all
  return { start: null, end: null };
}

function dashboardRangeLabel(config) {
  const map = {
    thisMonth: "本月", thisQuarter: "本季", thisYear: "本年",
    last90: "近 90 天", all: "全部", custom: "自訂",
  };
  const base = map[config?.rangeMode || "thisMonth"] || "本月";
  if (config?.rangeMode === "custom") {
    return `自訂：${config.customStart || "—"} ~ ${config.customEnd || "—"}`;
  }
  return base;
}

function GroupStatsBar({ meetings, groups, config, onConfigChange }) {
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState(config || { rangeMode: "thisMonth" });
  useEffect(() => { setDraft(config || { rangeMode: "thisMonth" }); }, [config, open]);

  const stats = useMemo(() => {
    const { start, end } = computeDashboardRange(config);
    const inRange = meetings.filter(m => {
      const d = new Date(m.date);
      if (start && d < start) return false;
      if (end && d > end) return false;
      return true;
    });
    const groupRows = groups.map(g => {
      const gMeetings = inRange.filter(m => m.groupId === g.id);
      const refs = gMeetings.flatMap(m => m.referrals || []);
      const refTotal = refs.reduce((s, r) => s + (Number(r.amount) || 0), 0);
      return { group: g, meetings: gMeetings.length, refCount: refs.length, refTotal };
    });
    // 全分會（獨立列，與小組並列；不混入小組統計）
    const chapterMeetings = inRange.filter(isChapterMeeting);
    const chapterRefs = chapterMeetings.flatMap(m => m.referrals || []);
    const chapterRefTotal = chapterRefs.reduce((s, r) => s + (Number(r.amount) || 0), 0);
    if (chapterMeetings.length > 0) {
      groupRows.push({
        group: { id: CHAPTER_GROUP_ID, name: `🌐 ${CHAPTER_GROUP_NAME}`, color: CHAPTER_GROUP_COLOR },
        meetings: chapterMeetings.length,
        refCount: chapterRefs.length,
        refTotal: chapterRefTotal,
      });
    }
    return groupRows;
  }, [meetings, groups, config]);

  const totalMeetings = stats.reduce((s, x) => s + x.meetings, 0);
  const totalRefCount = stats.reduce((s, x) => s + x.refCount, 0);
  const totalRefAmount = stats.reduce((s, x) => s + x.refTotal, 0);

  return (
    <div className="bg-white border border-stone-200 rounded-xl px-3 py-2 mb-3 relative">
      <div className="flex items-center gap-2 mb-1.5">
        <span className="text-xs font-semibold text-stone-700">各組表現</span>
        <span className="text-[10px] text-stone-500 bg-stone-100 rounded px-1.5 py-0.5">{dashboardRangeLabel(config)}</span>
        <span className="text-[10px] text-stone-400 ml-auto whitespace-nowrap">
          合計：組聚 {totalMeetings}　引薦 {totalRefCount} 單　NT${totalRefAmount.toLocaleString()}
        </span>
        <button onClick={() => setOpen(v => !v)}
          className="p-1 text-stone-400 hover:text-[#B8860B] rounded" title="時間範圍設定">

// ============ 小組競賽（5–6 月活動）：3 項統計 + 排行榜 + 培訓手動標記 ============
function computeChallengeStats({ groups, members, meetings, coffeeMeetings, rangeStart, rangeEnd, trainingDone }) {
  // 把日期轉成 YYYY-MM-DD（含當日，包含邊界）
  const inRange = (dateStr) => {
    if (!dateStr) return false;
    const d = String(dateStr).slice(0, 10);
    return d >= rangeStart && d <= rangeEnd;
  };
  // 取出期間內的「組聚 + 全分會組聚」（含 attendees）
  const meetingsInRange = (meetings || []).filter(m => inRange(m.date));
  // 取出期間內、未取消的咖啡會議
  const coffeeInRange = (coffeeMeetings || []).filter(c => {
    if (c.meetingStatus === "cancelled") return false;
    // meetingTime 可能是 ISO 或舊格式；用 createdAt 當 fallback
    const dateStr = c.meetingTime || c.createdAt || "";
    return inRange(dateStr);
  });

  return groups.map(g => {
    const memberIds = new Set(g.memberIds || []);
    const totalMembers = memberIds.size;
    if (totalMembers === 0) return null;

    // ── 1. 組聚參加：每位成員的場次（本組組聚 + 全分會組聚）──
    const memberMeetingCount = {};
    g.memberIds.forEach(mid => { memberMeetingCount[mid] = 0; });
    meetingsInRange.forEach(m => {
      const isOwnGroup = m.groupId === g.id;
      const isChapterMtg = m.groupId === CHAPTER_GROUP_ID;
      if (!isOwnGroup && !isChapterMtg) return;
      (m.attendees || []).forEach(aid => {
        if (memberIds.has(aid)) memberMeetingCount[aid] = (memberMeetingCount[aid] || 0) + 1;
      });
    });
    const meetingMembersAchieved = g.memberIds.filter(mid => memberMeetingCount[mid] >= 5).length;
    const meetingPassed = meetingMembersAchieved === totalMembers;

    // ── 2a. 主約咖啡：小組總主約 ≥ 小組人數 ──
    let groupInviteCount = 0;
    const memberInviteCount = {};
    g.memberIds.forEach(mid => { memberInviteCount[mid] = 0; });
    coffeeInRange.forEach(c => {
      if (c.inviterId && memberIds.has(c.inviterId)) {
        groupInviteCount++;
        memberInviteCount[c.inviterId] = (memberInviteCount[c.inviterId] || 0) + 1;
      }
    });
    const invitePassed = groupInviteCount >= totalMembers;

    // ── 2b. 參加咖啡：每位成員 ≥ 5 場（任一身分）──
    const memberCoffeeCount = {};
    g.memberIds.forEach(mid => { memberCoffeeCount[mid] = 0; });
    coffeeInRange.forEach(c => {
      const involved = new Set();
      if (c.inviterId) involved.add(c.inviterId);
      if (c.presenterId) involved.add(c.presenterId);
      (c.participantIds || []).forEach(p => involved.add(p));
      involved.forEach(id => {
        if (memberIds.has(id)) memberCoffeeCount[id] = (memberCoffeeCount[id] || 0) + 1;
      });
    });
    const coffeeMembersAchieved = g.memberIds.filter(mid => memberCoffeeCount[mid] >= 5).length;
    const coffeePassed = coffeeMembersAchieved === totalMembers;

    // ── 3. 培訓：手動標記 ──
    const trainingPassed = !!(trainingDone && trainingDone[g.id]);

    // 達成率：4 項中達成幾項（meeting / invite / coffee / training）
    const achievedCount = (meetingPassed ? 1 : 0) + (invitePassed ? 1 : 0) + (coffeePassed ? 1 : 0) + (trainingPassed ? 1 : 0);
    const achievementRate = Math.round((achievedCount / 4) * 100);

    return {
      group: g,
      totalMembers,
      // 1. 組聚
      memberMeetingCount,
      meetingMembersAchieved,
      meetingPassed,
      // 2a. 主約
      groupInviteCount,
      memberInviteCount,
      invitePassed,
      // 2b. 參加咖啡
      memberCoffeeCount,
      coffeeMembersAchieved,
      coffeePassed,
      // 3. 培訓
      trainingPassed,
      // 排序用
      achievedCount,
      achievementRate,
    };
  }).filter(Boolean).sort((a, b) => b.achievedCount - a.achievedCount || b.achievementRate - a.achievementRate);
}

// SVG 圓環進度（中間放百分比文字）
function ProgressRing({ percent, color, size = 72, stroke = 8 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - Math.max(0, Math.min(100, percent)) / 100);
  return (
    <svg width={size} height={size} className="flex-shrink-0">
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#E7E5E4" strokeWidth={stroke} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: "stroke-dashoffset 0.6s ease-out, stroke 0.3s" }} />
      <text x="50%" y="50%" dominantBaseline="central" textAnchor="middle"
        fontSize={size * 0.28} fontWeight="bold" fill={color}>
        {percent}%
      </text>
    </svg>
  );
}

// 進度色條（漸層 + 百分比文字 in bar）
function ProgressBar({ percent, color, height = 14, label }) {
  const pct = Math.max(0, Math.min(100, percent));
  return (
    <div className="relative w-full bg-stone-100 rounded-full overflow-hidden" style={{ height }}>
      <div className="absolute top-0 left-0 h-full transition-all duration-500"
        style={{ width: `${pct}%`, background: `linear-gradient(90deg, ${color}AA, ${color})` }} />
      {label && (
        <div className="absolute inset-0 flex items-center justify-center text-[10px] font-semibold text-stone-700"
          style={{ textShadow: "0 0 2px rgba(255,255,255,0.7)" }}>
          {label}
        </div>
      )}
    </div>
  );
}

// 依達成率回傳對應顏色
function challengeColor(pct) {
  if (pct >= 100) return "#1A6B1A"; // emerald
  if (pct >= 75)  return "#7C9A2D"; // lime green
  if (pct >= 50)  return "#B8860B"; // amber
  if (pct >= 25)  return "#D97706"; // dark amber
  return "#A01E2E";                  // red
}

function ChapterChallengeView({ groups, members, meetings, coffeeMeetings, config, onConfigChange }) {

  const [draftStart, setDraftStart] = useState(config.rangeStart);
  const [draftEnd, setDraftEnd] = useState(config.rangeEnd);

  const stats = useMemo(() => computeChallengeStats({
    groups, members, meetings, coffeeMeetings,
    rangeStart: config.rangeStart, rangeEnd: config.rangeEnd,
    trainingDone: config.trainingDone || {},
  }), [groups, members, meetings, coffeeMeetings, config]);

  const toggleTraining = (groupId) => {
    const newDone = { ...(config.trainingDone || {}) };
    newDone[groupId] = !newDone[groupId];
    onConfigChange({ ...config, trainingDone: newDone });
  };

  const saveRange = () => {
    onConfigChange({ ...config, rangeStart: draftStart, rangeEnd: draftEnd });
    setEditingRange(false);
  };

  // 牌面圖示
  const medal = (i) => i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i + 1}`;

  // 全會總覽
  const summary = useMemo(() => {
    if (stats.length === 0) return null;
    const fullCompleted = stats.filter(s => s.achievementRate === 100).length;
    const avgRate = Math.round(stats.reduce((sum, s) => sum + s.achievementRate, 0) / stats.length);
    const top = stats[0];
    return { fullCompleted, avgRate, top };
  }, [stats]);

  const getMember = (id) => members.find(m => m.id === id);

  // 計算每個指標的進度百分比（更細緻，激勵用）
  const metricProgress = (s) => {
    // 組聚：總場次 / 目標場次（每人最多計 5 場避免單人爆刷）
    const meetingDone = s.group.memberIds.reduce((sum, mid) => sum + Math.min(s.memberMeetingCount[mid] || 0, 5), 0);
    const meetingTarget = s.totalMembers * 5;
    const meetingPct = meetingTarget > 0 ? Math.round((meetingDone / meetingTarget) * 100) : 0;
    // 主約：總主約 / 人數，capped 100%
    const invitePct = s.totalMembers > 0 ? Math.min(100, Math.round((s.groupInviteCount / s.totalMembers) * 100)) : 0;
    // 參加咖啡：類似組聚（每人最多計 5 場）
    const coffeeDone = s.group.memberIds.reduce((sum, mid) => sum + Math.min(s.memberCoffeeCount[mid] || 0, 5), 0);
    const coffeeTarget = s.totalMembers * 5;
    const coffeePct = coffeeTarget > 0 ? Math.round((coffeeDone / coffeeTarget) * 100) : 0;
    // 培訓：二元
    const trainPct = s.trainingPassed ? 100 : 0;
    return { meetingDone, meetingTarget, meetingPct, invitePct, coffeeDone, coffeeTarget, coffeePct, trainPct };
  };

  return (
    <div>
      {/* 標題 + 期間 */}

          <div className="text-sm text-stone-600 mt-1">
            期間：
            {editingRange ? (
              <span className="inline-flex items-center gap-1.5 ml-1">
                <input type="date" value={draftStart} onChange={e => setDraftStart(e.target.value)}
                  className="border border-stone-300 rounded px-2 py-0.5 text-sm" />
                <span>~</span>
                <input type="date" value={draftEnd} onChange={e => setDraftEnd(e.target.value)}
                  className="border border-stone-300 rounded px-2 py-0.5 text-sm" />
                <Btn size="sm" variant="primary" onClick={saveRange}>儲存</Btn>
                <Btn size="sm" variant="ghost" onClick={() => { setEditingRange(false); setDraftStart(config.rangeStart); setDraftEnd(config.rangeEnd); }}>取消</Btn>
              </span>
            ) : (
              <>
                <b>{config.rangeStart} ~ {config.rangeEnd}</b>
                <button onClick={() => setEditingRange(true)} className="ml-2 text-xs text-[#B8860B] hover:underline">[修改期間]</button>
              </>
            )}
          </div>
        </div>
      </div>

      {/* 全會總覽 banner */}
      {summary && (
        <div className="bg-gradient-to-br from-amber-50 via-orange-50 to-amber-100 border-2 border-amber-300 rounded-xl p-4 mb-4 shadow-sm">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <div className="text-xs font-bold text-[#8B1A1A] uppercase tracking-wider">Chapter Challenge</div>
              <div className="text-lg font-bold text-stone-800 mt-0.5">全分會競賽進度</div>
            </div>
            <div className="flex gap-4 text-sm flex-wrap">
              <div className="text-center">
                <div className="text-2xl font-bold" style={{ color: challengeColor(summary.avgRate) }}>{summary.avgRate}%</div>
                <div className="text-[10px] text-stone-600 mt-0.5">全會平均達成</div>
              </div>
              <div className="text-center">
                <div className="text-2xl font-bold text-emerald-700">{summary.fullCompleted}<span className="text-sm text-stone-500">/{stats.length}</span></div>
                <div className="text-[10px] text-stone-600 mt-0.5">100% 完成組數</div>
              </div>
              <div className="text-center">
                <div className="text-base font-bold text-stone-800">🥇 {summary.top.group.name}</div>
                <div className="text-[10px] text-stone-600 mt-0.5">領先小組（{summary.top.achievementRate}%）</div>
              </div>
            </div>
          </div>
        </div>

            return (
              <div key={s.group.id} className={`rounded-xl overflow-hidden ${cardBorder} bg-white transition-shadow hover:shadow-lg`}>

                          const passed = val >= target;
                          return (
                            <div className={`text-center text-xs font-semibold ${passed ? "text-emerald-700" : "text-amber-700"}`}>
                              {val}{passed && " ✓"}
                              {!passed && val < target && (
                                <div className="text-[9px] text-stone-400 font-normal">差 {target - val}</div>
                              )}
                            </div>
                          );
                        };
                        const allPassed = meetingC >= 5 && inviteC >= 1 && coffeeC >= 5;
                        return (
                          <div key={mid} className={`px-3 py-2 grid grid-cols-[1fr_60px_60px_70px] gap-2 border-t border-stone-100 ${allPassed ? "bg-emerald-50/40" : ""}`}>
                            <div className="text-stone-700 text-xs flex items-center">
                              {allPassed && <span className="text-emerald-600 mr-1">⭐</span>}
                              {m?.name || "?"}
                              {m?.industry && <span className="text-stone-400 text-[10px] ml-1">{m.industry}</span>}
                            </div>
                            {cell(meetingC, 5)}
                            {cell(inviteC, 1)}
                            {cell(coffeeC, 5)}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============ 導生管理員驗證 ============
function MentorshipAdminGate({ onPass }) {
  const [adminKey, setAdminKey] = useState("");
  const [verifying, setVerifying] = useState(false);
  const [error, setError] = useState("");

  // 自動嘗試用 localStorage 已存的 key 驗證
  useEffect(() => {
    const saved = (typeof localStorage !== 'undefined') ? localStorage.getItem('bni_admin_key') : null;
    if (!saved) return;
    (async () => {
      try {
        const res = await fetch(PROXY_URL + '/api/members', { headers: { 'X-Admin-Key': saved } });
        if (res.ok) onPass();
      } catch {}
    })();
  }, []);

  const verify = async () => {
    if (!adminKey) return;
    setVerifying(true); setError("");
    try {
      const res = await fetch(PROXY_URL + '/api/members', { headers: { 'X-Admin-Key': adminKey } });
      if (res.status === 401) { setError("管理員密鑰錯誤"); return; }
      if (!res.ok) { setError("連線失敗：HTTP " + res.status); return; }
      try { localStorage.setItem('bni_admin_key', adminKey); } catch {}
      onPass();
    } catch (e) { setError("連線失敗：" + e.message); }
    finally { setVerifying(false); }
  };

  return (
    <div className="max-w-md mx-auto mt-12">
      <div className="bg-white rounded-xl border border-stone-200 p-6 text-center shadow-sm">
        <div className="inline-flex items-center justify-center w-14 h-14 rounded-full mb-3" style={{ background: '#FEF3C7' }}>
          <GraduationCap className="w-7 h-7" style={{ color: '#B8860B' }} />
        </div>
        <h3 className="text-lg font-bold mb-1 text-stone-800">導生計畫 · 管理員驗證</h3>
        <div className="text-xs text-stone-500 mb-5">導生資料涉及新生隱私，僅限管理員檢視</div>
        <input
          type="password"
          value={adminKey}
          onChange={e => setAdminKey(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && verify()}
          placeholder="輸入管理員密鑰（ADMIN_KEY）"
          className="w-full px-4 py-2.5 text-sm border border-stone-300 rounded-md mb-3 text-center"
        />
        {error && <div className="text-xs text-red-600 mb-3">{error}</div>}
        <button
          onClick={verify}
          disabled={verifying || !adminKey}
          className="w-full py-2.5 text-sm text-white rounded-md font-semibold disabled:opacity-50 transition"
          style={{ background: '#8B1A1A' }}
        >
          {verifying ? "驗證中⋯" : "驗證並進入"}
        </button>
        <div className="text-xs text-stone-400 mt-4">
          管理員密鑰與主站「紅綠燈管理」共用
        </div>
      </div>
    </div>
  );
}

function getInitialTab() {
  try {
    const params = new URLSearchParams(window.location.search);
    const t = params.get("tab");
    // 主站底部 tab 會帶 ?tab=challenge 過來，這裡白名單要列進去否則都 fallback 到 meetings
    if (t === "meetings" || t === "mentorship" || t === "groups" || t === "challenge") return t;
  } catch {}
  return "meetings";
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState(getInitialTab);
  const [groups, setGroups] = useState([]);
  const [meetings, setMeetings] = useState([]);
  const [members, setMembers] = useState([]);
  const [mentees, setMentees] = useState([]);
  const [mainCoffeeMeetings, setMainCoffeeMeetings] = useState([]);  // 從主站讀（只讀）
  const [coffeeSyncingAt, setCoffeeSyncingAt] = useState(null);
  const [currentUserId, setCurrentUserId] = useState(null);
  const [mentorshipDefaults, setMentorshipDefaults] = useState(null);  // 分會預設團隊
  const [dashboardConfig, setDashboardConfig] = useState({ rangeMode: "thisMonth" });  // 組聚表板時間範圍
  // 小組競賽：期間 + 各組培訓達成手動標記（trainingDone[groupId] = true/false）
  const [challengeConfig, setChallengeConfig] = useState({
    rangeStart: "2026-05-01",
    rangeEnd: "2026-06-30",
    trainingDone: {},
  });

  const [editingMeeting, setEditingMeeting] = useState(null);
  const [viewingMeetingId, setViewingMeetingId] = useState(null);  // 即時檢視中的會議 id

  // 重新從伺服器拉最新組聚資料（檢視 modal 打開時用）
  const refreshMeetings = async () => {
    try {
      // 直接 bypass cache 抓 fresh
      const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(STORAGE_KEYS.MEETINGS));
      if (!res.ok) return null;
      const json = await res.json();
      const value = json && json.value !== undefined ? json.value : null;
      if (value === null) return null;
      const parsed = typeof value === 'string' ? JSON.parse(value) : value;
      if (Array.isArray(parsed)) {
        setMeetings(parsed);
        return parsed;
      }
      return null;
    } catch (e) {
      console.error('[refreshMeetings]', e);
      return null;
    }
  };
  const [filter, setFilter] = useState({ groupId: "", onlyMine: false });
  const [adminVerified, setAdminVerified] = useState(false);   // 導生功能需要管理員驗證
  const [batchExportOpen, setBatchExportOpen] = useState(false);
  const [batchExporting, setBatchExporting] = useState(false);
  const [batchSelection, setBatchSelection] = useState(new Set());
  const [toast, setToast] = useState(null);

  const showToast = (msg, type = "ok") => {
    setToast({ msg, type, id: Date.now() });
    setTimeout(() => setToast(t => (t && t.msg === msg ? null : t)), 2000);
  };

  // 初始載入（SWR：有快取就瞬間顯示，背景更新；沒快取就等網路）
  useEffect(() => {
    // 共用的 ref：存所有三個與 groups 有關的最新資料，任何一方更新都重算 groups
    const deps = { kpiGroups: {}, members: [], extras: {} };
    const rebuildGroups = () => {
      const built = buildGroupsFromKpi(deps.kpiGroups, deps.members, deps.extras);
      setGroups(built);
    };

    (async () => {
      // 平行載入：運營台資料 + 主檔會員 + 主站 KPI 小組 + 導生預設 + 表板設定 + 小組競賽設定
      const [meetingsData, mainData, menteesData, extrasData, kpiGroupsRes, defaultsData, dashCfg, challengeCfg] = await Promise.all([
        loadState(STORAGE_KEYS.MEETINGS, null, (fresh) => setMeetings(fresh || [])),
        loadState(STORAGE_KEYS.MEMBERS, null, (fresh) => {
          const mem = (fresh && Array.isArray(fresh.members)) ? fresh.members : [];
          if (mem.length) { setMembers(mem); deps.members = mem; rebuildGroups(); }
          const cms = (fresh && Array.isArray(fresh.coffeeMeetings)) ? fresh.coffeeMeetings : [];
          setMainCoffeeMeetings(cms);
          setCoffeeSyncingAt(new Date());
        }),
        loadState(STORAGE_KEYS.MENTEES, null, (fresh) => setMentees(fresh || SEED_MENTEES)),
        loadState(STORAGE_KEYS.GROUP_EXTRAS, {}, (fresh) => { deps.extras = fresh || {}; rebuildGroups(); }),
        swrFetchRaw(PROXY_URL + '/api/groups', (fresh) => { deps.kpiGroups = fresh || {}; rebuildGroups(); }),
        loadState(STORAGE_KEYS.MENTORSHIP_DEFAULTS, null, (fresh) => setMentorshipDefaults(fresh)),
        loadState(STORAGE_KEYS.DASHBOARD_CONFIG, { rangeMode: "thisMonth" }, (fresh) => {
          if (fresh && typeof fresh === "object") setDashboardConfig(fresh);
        }),
        loadState(STORAGE_KEYS.CHAPTER_CHALLENGE, null, (fresh) => {
          if (fresh && typeof fresh === "object") setChallengeConfig({ rangeStart: "2026-05-01", rangeEnd: "2026-06-30", trainingDone: {}, ...fresh });
        }),
      ]);
      const liveMembers = (mainData && Array.isArray(mainData.members)) ? mainData.members : [];
      deps.kpiGroups = kpiGroupsRes || {};
      deps.members = liveMembers;
      deps.extras = extrasData || {};
      const builtGroups = buildGroupsFromKpi(kpiGroupsRes, liveMembers, extrasData);
      setGroups(builtGroups);
      setMeetings(meetingsData || []);
      setMembers(liveMembers.length ? liveMembers : SEED_MEMBERS);
      setMentees(menteesData || SEED_MENTEES);
      setMentorshipDefaults(defaultsData);  // null 表示尚未設定
      if (dashCfg && typeof dashCfg === "object") setDashboardConfig(dashCfg);
      if (challengeCfg && typeof challengeCfg === "object") setChallengeConfig({ rangeStart: "2026-05-01", rangeEnd: "2026-06-30", trainingDone: {}, ...challengeCfg });
      // 主站咖啡會議（只讀，用於導生頁統計）
      const mainCms = (mainData && Array.isArray(mainData.coffeeMeetings)) ? mainData.coffeeMeetings : [];
      setMainCoffeeMeetings(mainCms);
      setCoffeeSyncingAt(new Date());
      const savedUid = (typeof localStorage !== 'undefined') ? localStorage.getItem('bni_operations_user') : null;
      setCurrentUserId(savedUid || (liveMembers[0]?.id || null));
      setLoaded(true);
    })();
  }, []);

  // 儲存分會預設（供 MentorshipView 呼叫）
  const saveMentorshipDefaults = async (newDefaults) => {
    const withTime = { ...newDefaults, updatedAt: new Date().toISOString() };
    setMentorshipDefaults(withTime);
    await saveState(STORAGE_KEYS.MENTORSHIP_DEFAULTS, withTime);
  };

  // 儲存組聚表板時間範圍設定
  const saveDashboardConfig = async (cfg) => {
    setDashboardConfig(cfg);
    try { await saveState(STORAGE_KEYS.DASHBOARD_CONFIG, cfg); } catch (e) { console.error(e); }
  };

  // 儲存小組競賽設定（期間 + 培訓手動標記）
  const saveChallengeConfig = async (cfg) => {
    setChallengeConfig(cfg);
    try { await saveState(STORAGE_KEYS.CHAPTER_CHALLENGE, cfg); } catch (e) { console.error(e); }
  };

  // 手動重新整理主站咖啡會議（導生頁用）
  const refreshMainCoffee = async () => {
    try {
      const res = await apiClient.get("bni_speaker_tracker_v5");
      if (res && res.value) {
        const parsed = typeof res.value === "string" ? JSON.parse(res.value) : res.value;
        const cms = Array.isArray(parsed?.coffeeMeetings) ? parsed.coffeeMeetings : [];
        setMainCoffeeMeetings(cms);
        setCoffeeSyncingAt(new Date());
      }
    } catch (e) {
      console.error("[refreshMainCoffee]", e);
      alert("重新整理失敗：" + e.message);
    }
  };

  // 自動儲存
  // 2026-04-24 修：SWR 快取 race 導致舊版資料會被自動 save 覆寫回伺服器。
  // 流程：loaded=true 後等 2 秒，讓 SWR 的 onFresh callback 有機會跑完再開放自動 save。
  // 使用者在這 2 秒內編輯不會遺失 —— useEffect 依賴 hydrationDone，釋放後會再跑一次並存下最新 state。
  const [hydrationDone, setHydrationDone] = useState(false);
  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => setHydrationDone(true), 2000);
    return () => clearTimeout(t);
  }, [loaded]);
  // groups 本體來自主站 KPI，只把 metadata (leaderId/color) 另存
  useEffect(() => {
    if (!loaded || !hydrationDone) return;
    const extras = {};
    groups.forEach(g => {
      if (g.leaderId || g.color) extras[g.id] = { leaderId: g.leaderId, color: g.color };
    });
    saveState(STORAGE_KEYS.GROUP_EXTRAS, extras);
  }, [groups, loaded, hydrationDone]);
  // （已移除 meetings 的「整包自動儲存」：那會讓多裝置互相覆蓋。
  //   改由 saveMeeting / deleteMeeting 做「讀伺服器最新 → 只改這一筆 → 寫回」的合併寫入。）
  // members 為唯讀，由 Speaker Tracker 主檔管理
  // （已移除 mentees 的「整包自動儲存」：那會讓多裝置互相覆蓋。
  //   改由 MentorshipView 的 saveMentee / deleteMentee 走 persistMenteesChange 合併寫入。）
  useEffect(() => {
    if (!loaded) return;
    try {
      if (currentUserId) localStorage.setItem('bni_operations_user', currentUserId);
      else localStorage.removeItem('bni_operations_user');
    } catch {}
  }, [currentUserId, loaded]);

  // 會議 CRUD
  // 防多裝置互相覆蓋：寫入前先讀「伺服器最新的整包」，只改動這一筆再寫回，
  // 這樣其他人/其他分頁新增或編輯的記錄，不會被本機這包蓋掉。
  const persistMeetingsChange = async (mutator) => {
    let serverArr = meetings; // 萬一讀不到伺服器，至少用本機目前的當基底（不會比現況更糟）
    try {
      const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(STORAGE_KEYS.MEETINGS));
      if (res.ok) {
        const j = await res.json();
        serverArr = j && j.value ? JSON.parse(j.value) : [];
      } else if (res.status === 404) {
        serverArr = [];
      }
    } catch (e) {
      console.warn('[persistMeetings] 讀伺服器最新失敗，改用本機基底', e);
      serverArr = meetings;
    }
    if (!Array.isArray(serverArr)) serverArr = [];
    const merged = mutator(serverArr.slice());
    setMeetings(merged);                              // 本機畫面同步成合併後結果
    await saveState(STORAGE_KEYS.MEETINGS, merged);   // 寫回（含 PIN 處理 / 失敗提示）
    return merged;
  };

  const saveMeeting = async (m) => {
    const updated = { ...m, updatedAt: new Date().toISOString() };
    setEditingMeeting(updated);  // 讓編輯頁面持續開啟、顯示最新內容
    await persistMeetingsChange(server => {
      const idx = server.findIndex(x => x.id === updated.id);
      if (idx >= 0) { server[idx] = updated; return server; }   // 編輯既有
      return [updated, ...server];                              // 新增
    });
    showToast("已儲存");
  };
  const deleteMeeting = async (id) => {
    setEditingMeeting(null);
    await persistMeetingsChange(server => server.filter(m => m.id !== id));
  };

  // 導生 mentees 同樣防多裝置互相覆蓋：讀伺服器最新整包 → 只改這一筆 → 寫回
  const persistMenteesChange = async (mutator) => {
    let serverArr = mentees;

      const res = await fetch(PROXY_URL + '/api/data?key=' + encodeURIComponent(STORAGE_KEYS.MENTEES));

        const j = await res.json();
        serverArr = j && j.value ? JSON.parse(j.value) : [];

        serverArr = [];

      console.warn('[persistMentees] 讀伺服器最新失敗，改用本機基底', e);
      serverArr = mentees;
    }
    if (!Array.isArray(serverArr)) serverArr = [];
    const merged = mutator(serverArr.slice());
    setMentees(merged);                              // 本機畫面同步成合併後結果
    await saveState(STORAGE_KEYS.MENTEES, merged);   // 寫回（含 PIN 處理 / 失敗提示）
    return merged;
  };

  // 篩選會議
  const filteredMeetings = useMemo(() => {
    return meetings
      .filter(m => !filter.groupId || m.groupId === filter.groupId)
      .filter(m => !filter.onlyMine || !currentUserId ||
        m.attendees.includes(currentUserId) || m.absentees.includes(currentUserId))

          {toast.type === "error" ? "⚠️ " : "✓ "}{toast.msg}
        </div>
      )}
      {/* 頂部 ─ 視覺與 index.html 一致 */}
      <header className="border-b-2" style={{ borderColor: '#A01E2E', background: 'white' }}>
        <div className="max-w-7xl mx-auto px-4 md:px-6 py-5 flex items-center justify-between gap-3">
          <div>
            <div className="text-[10px] tracking-[0.3em] text-stone-500 mb-1">BNI · CHAPTER ASSISTANT</div>
            <h1 className="text-xl md:text-2xl font-bold" style={{ color: '#1A1414' }}>
              富鼎分會 <span className="text-stone-400 mx-1">·</span> <span style={{ color: '#A01E2E' }}>分會助理</span>
            </h1>
          </div>
          <div className="flex items-center gap-2">
            <select value={currentUserId || ""} onChange={e => setCurrentUserId(e.target.value || null)}
              className="bg-white border border-stone-200 rounded-md px-2 py-1.5 text-xs text-stone-700">
              <option value="">（切換身份）</option>
              {members.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}

          </div>
        </div>

          <a href="index.html"
            className="px-2 md:px-4 py-2 text-sm rounded-md transition-all flex items-center gap-1.5 bg-stone-100 text-stone-600 hover:bg-stone-200"

            <Home className="w-4 h-4" /><span className="hidden md:inline">首頁</span>

          {[

          </a>
          <button onClick={() => { setTab("groups"); try { window.history.replaceState({}, '', '?tab=groups'); } catch {} }}
            className={`px-2 md:px-4 py-2 text-sm rounded-md transition-all flex items-center gap-1.5 ${tab === "groups" ? "text-white" : "bg-stone-100 text-stone-600 hover:bg-stone-200"}`}
            style={tab === "groups" ? { background: '#475569' } : {}}>
            <Settings className="w-4 h-4" /><span className="hidden md:inline">行政小組</span>
          </button>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 md:px-6 py-5">
        {tab === "meetings" && (
          <div>
            {groups.length > 0 && (
              <GroupStatsBar meetings={meetings} groups={groups}
                config={dashboardConfig} onConfigChange={saveDashboardConfig} />
            )}
            <div className="flex items-center justify-between gap-2 mb-3 flex-wrap">
              <div className="flex items-center gap-2">
                <select value={filter.groupId} onChange={e => setFilter({ ...filter, groupId: e.target.value })}
                  className="border border-stone-300 rounded-lg px-3 py-1.5 text-sm bg-white">
                  <option value="">全部</option>
                  <option value={CHAPTER_GROUP_ID}>🌐 全分會</option>
                  {groups.map(g => <option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
                {currentUserId && (
                  <label className="flex items-center gap-1.5 text-sm text-stone-600 cursor-pointer">
                    <input type="checkbox" checked={filter.onlyMine} onChange={e => setFilter({ ...filter, onlyMine: e.target.checked })} />
                    只看我參與的
                  </label>
                )}
              </div>
              <div className="flex items-center gap-2">
                {filteredMeetings.length > 0 && (
                  <Btn variant="outline" size="sm" onClick={() => {
                    setBatchSelection(new Set(filteredMeetings.map(m => m.id)));
                    setBatchExportOpen(true);
                  }}>
                    <Package className="w-4 h-4" />批次匯出 ({filteredMeetings.length})
                  </Btn>
                )}
                <Btn variant="primary" onClick={() => setEditingMeeting({})}><Plus className="w-4 h-4" />新增組聚</Btn>
              </div>
            </div>

            {filteredMeetings.length === 0 ? (
              <div className="bg-white border border-dashed border-stone-300 rounded-xl py-12 text-center text-stone-400">
                <Calendar className="w-12 h-12 mx-auto mb-2 opacity-40" />
                <p className="text-sm">{meetings.length ? "無符合條件的組聚" : "尚未建立任何組聚記錄"}</p>
              </div>
            ) : (
              <div className="grid gap-3 sm:grid-cols-2">
                {filteredMeetings.map(m => (
                  <MeetingCard key={m.id} meeting={m} group={groups.find(g => g.id === m.groupId)}
                    members={members} onEdit={setEditingMeeting} onView={(mt) => setViewingMeetingId(mt.id)} />
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "mentorship" && (
          adminVerified
            ? <MentorshipView mentees={mentees} setMentees={setMentees} persistMenteesChange={persistMenteesChange} members={members} currentUserId={currentUserId} isAdmin={true}
                mainCoffeeMeetings={mainCoffeeMeetings} onRefreshCoffee={refreshMainCoffee} coffeeSyncingAt={coffeeSyncingAt}
                mentorshipDefaults={mentorshipDefaults} onSaveDefaults={saveMentorshipDefaults}
                onLogout={() => { setAdminVerified(false); try { localStorage.removeItem('bni_admin_key'); } catch {} }} />
            : <MentorshipAdminGate onPass={() => setAdminVerified(true)} />
        )}
        {tab === "groups" && <GroupsView groups={groups} setGroups={setGroups} members={members} meetings={meetings} />}
        {tab === "challenge" && (
          <ChapterChallengeView groups={groups} members={members} meetings={meetings}
            coffeeMeetings={mainCoffeeMeetings}
            config={challengeConfig} onConfigChange={saveChallengeConfig} />
        )}
      </main>

      <Modal open={!!editingMeeting} onClose={() => setEditingMeeting(null)}
        title={editingMeeting?.id ? "編輯會議記錄" : "新增會議記錄"} maxWidth="max-w-5xl">
        {editingMeeting && (
          <MeetingForm meeting={editingMeeting.id ? editingMeeting : null} groups={groups} members={members}
            mentees={mentees} setMentees={setMentees}
            onSave={saveMeeting} onCancel={() => setEditingMeeting(null)} onDelete={deleteMeeting} />
        )}
      </Modal>

      {/* 唯讀檢視 Modal（5 秒自動同步）*/}
      <MeetingViewModal
        meetingId={viewingMeetingId}
        meetings={meetings}
        members={members}
        groups={groups}
        onClose={() => setViewingMeetingId(null)}
        onRefresh={refreshMeetings}
        onEdit={(mt) => { setViewingMeetingId(null); setEditingMeeting(mt); }}
      />

      <Modal open={batchExportOpen} onClose={() => !batchExporting && setBatchExportOpen(false)}
        title="批次匯出組聚記錄" maxWidth="max-w-2xl">
        <div className="space-y-3">
          <div className="flex items-center justify-between text-sm">
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox"
                checked={batchSelection.size === filteredMeetings.length && filteredMeetings.length > 0}
                onChange={e => setBatchSelection(e.target.checked
                  ? new Set(filteredMeetings.map(m => m.id))
                  : new Set())} />
              <span className="font-semibold">全選</span>
            </label>
            <span className="text-stone-500">已勾選 {batchSelection.size} / {filteredMeetings.length}</span>
          </div>

          <div className="max-h-[40vh] overflow-y-auto border border-stone-200 rounded-lg divide-y divide-stone-100">
            {filteredMeetings.map(m => {
              const isCh = isChapterMeeting(m);
              const g = groups.find(x => x.id === m.groupId);
              // 主講人摘要（多位顯示前 2 位）：speakers[] 為主，舊 speaker 物件相容
              const speakerArr = Array.isArray(m.speakers) && m.speakers.length
                ? m.speakers
                : (m.speaker?.memberId ? [{ memberId: m.speaker.memberId }] : []);
              const speakerNames = speakerArr.slice(0, 2).map(s => members.find(x => x.id === s.memberId)?.name).filter(Boolean);
              const speakerSummary = speakerNames.length > 0
                ? speakerNames.join("、") + (speakerArr.length > 2 ? ` +${speakerArr.length - 2}` : "")
                : "";
              const checked = batchSelection.has(m.id);
              return (
                <label key={m.id}
                  className={`flex items-center gap-3 px-3 py-2 cursor-pointer ${checked ? "bg-amber-50/40" : "hover:bg-stone-50"}`}>
                  <input type="checkbox" checked={checked}
                    onChange={e => setBatchSelection(prev => {
                      const next = new Set(prev);
                      if (e.target.checked) next.add(m.id); else next.delete(m.id);
                      return next;
                    })} />
                  <div className="flex-1 min-w-0 flex items-center gap-2 flex-wrap">
                    <Tag color={isCh ? CHAPTER_GROUP_COLOR : (g?.color || "#999")}>
                      {isCh ? `🌐 ${CHAPTER_GROUP_NAME}` : (g?.name || "未知小組")}
                    </Tag>
                    <span className="text-sm font-semibold">{fmtDate(m.date)}</span>
                    {speakerSummary && <span className="text-xs text-stone-500">主講：{speakerSummary}</span>}
                  </div>
                </label>
              );
            })}
          </div>

          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-900">
            💡 匯出會打包成 zip 檔，每筆一個獨立檔案。批次超過 20 筆時速度會變慢，建議先用「篩選小組」減少筆數。
          </div>

          <div className="flex items-center justify-end gap-2 pt-2 border-t border-stone-200">
            <Btn variant="ghost" size="sm"
              onClick={() => !batchExporting && setBatchExportOpen(false)}
              disabled={batchExporting}>取消</Btn>
            <Btn variant="outline" size="sm"
              disabled={batchSelection.size === 0 || batchExporting}
              onClick={async () => {
                const selected = filteredMeetings.filter(m => batchSelection.has(m.id));
                if (!selected.length) return;
                setBatchExporting(true);
                try {
                  const gMap = {};
                  groups.forEach(g => { gMap[g.id] = g; });
                  await downloadBatchZip(selected, gMap, members, "docx");
                  showToast("已匯出 " + selected.length + " 筆 Word");
                  setBatchExportOpen(false);
                } catch (e) { alert("匯出失敗：" + e.message); }
                finally { setBatchExporting(false); }
              }}>
              <FileText className="w-3.5 h-3.5" />匯出 Word (zip)
            </Btn>
            <Btn variant="primary" size="sm"
              disabled={batchSelection.size === 0 || batchExporting}
              onClick={async () => {
                const selected = filteredMeetings.filter(m => batchSelection.has(m.id));
                if (!selected.length) return;
                setBatchExporting(true);
                try {
                  const gMap = {};
                  groups.forEach(g => { gMap[g.id] = g; });
                  await downloadBatchZip(selected, gMap, members, "pdf");
                  showToast("已匯出 " + selected.length + " 筆 PDF");
                  setBatchExportOpen(false);
                } catch (e) { alert("匯出失敗：" + e.message); }
                finally { setBatchExporting(false); }
              }}>
              <FileText className="w-3.5 h-3.5" />匯出 PDF (zip)
            </Btn>
          </div>
          {batchExporting && (
            <div className="text-center text-sm text-stone-500 py-2">
              <RefreshCw className="w-4 h-4 animate-spin inline-block mr-1" />匯出中，請稍候⋯
            </div>
          )}
        </div>
      </Modal>
      <BottomTabBar tab={tab} setTab={setTab} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

<!-- Service Worker：快取 CDN 資產與本頁，二次進站近乎瞬開 -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => { /* 靜默失敗，不影響主流程 */ });
    });
  }
</script>
</body>
</html>
